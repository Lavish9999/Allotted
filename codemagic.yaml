workflows:
  ios-allotted:
    name: Allotted iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: ASC_API_KEY
    environment:
      groups:
        - appstore_signing
      vars:
        BUNDLE_ID: "com.twotonemotion.allotted"
      node: 20.11.0
      xcode: 26.4
      cocoapods: default
    scripts:
      - name: Check required signing variables
        script: |
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "Missing CERTIFICATE_PRIVATE_KEY in the appstore_signing environment group."
            echo "Add a certificate private key in Codemagic before starting the iOS workflow."
            exit 1
          fi
      - name: Install npm dependencies
        script: npm install --no-audit --no-fund
      - name: Validate committed app source
        script: npm test
      - name: Add iOS platform
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
      - name: Generate app icons & splash
        script: npx capacitor-assets generate --ios
      - name: Sync web assets into iOS project
        script: npx cap sync ios
      - name: Skip export-compliance prompt
        script: |
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/App/App/Info.plist 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" ios/App/App/Info.plist
      - name: Install CocoaPods deps
        script: |
          cd ios/App && pod install
      - name: Set up code signing (creates cert + profile if missing)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Set iOS app version and build number
        script: |
          cd ios/App
          APP_VERSION=$(node -p "require('../../package.json').version")
          BUILD_VERSION=$(date +%Y%m%d%H%M)
          echo "Marketing version from package.json: $APP_VERSION"
          echo "Build number being applied: $BUILD_VERSION"
          echo "Bundle ID: $BUNDLE_ID"
          agvtool new-marketing-version "$APP_VERSION"
          agvtool new-version -all "$BUILD_VERSION"
          echo "Final Info.plist CFBundleShortVersionString: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' App/Info.plist)"
          echo "Final Info.plist CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' App/Info.plist)"
      - name: Diagnose final iOS version values
        script: |
          echo "Reading ios/App/App/Info.plist before IPA build"
          echo "CFBundleShortVersionString: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' ios/App/App/Info.plist)"
          echo "CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ios/App/App/Info.plist)"
          echo "CFBundleIdentifier: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' ios/App/App/Info.plist)"
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
