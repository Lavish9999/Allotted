workflows:
  ios-allotted:
    name: Allotted iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: ASC_API_KEY
    environment:
      vars:
        BUNDLE_ID: "com.twotonemotion.allotted"
      node: 20.11.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Add iOS platform
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
      - name: Generate app icons & splash
        script: npx capacitor-assets generate --ios || true
      - name: Sync web assets into iOS project
        script: npx cap sync ios
      - name: Install CocoaPods deps
        script: |
          cd ios/App && pod install
      - name: Set up code signing (creates cert + profile if missing)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
