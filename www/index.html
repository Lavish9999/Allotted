</style></head><body><header class=top><div class=brand><svg class=logo viewBox='0 0 100 100' aria-label=Allotted><line x1=50 y1=18 x2=25 y2=82 stroke='var(--teal)' stroke-width=12 stroke-linecap=round/><line x1=50 y1=18 x2=75 y2=82 stroke='var(--amber)' stroke-width=12 stroke-linecap=round/><line x1=37 y1=57 x2=63 y2=57 stroke='var(--teal)' stroke-width=9 stroke-linecap=round/></svg><div><b>Allotted</b><div class='small muted'>Private envelope budget</div></div></div><button id=settingsBtn class='btn'>Settings</button></header><div id="app"></div><div id=modal></div><input id=fileInput type=file accept='.json,application/json' hidden><script>
const KEY="budget-app-v1",SCHEMA=8,$=s=>document.querySelector(s),fmt=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(+n||0),fmtC=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2}).format(+n||0),esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])),money=v=>{v=parseFloat(v);return isNaN(v)?0:Math.max(0,v)},id=()=>'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);/* const money=v=> confirm("Clear all transactions */let tab='dashboard',mk=new Date().toISOString().slice(0,7),storageBroken=false,storageWarning='';function defaultSettings(){return{onboardingCompleted:false,paycheckMode:false,payFrequency:'biweekly',customDays:14,nextPayday:'',payAmount:0,monthlyIncome:0,savingsGoal:0}}function defaultState(){return{schemaVersion:SCHEMA,months:{},debts:[],debtPlan:{strategy:'avalanche',extra:0},settings:defaultSettings(),lastBackup:null,theme:'dark',lastLog:null}}let S=defaultState();function item(n,p,r,d){return{id:id(),name:n||'Envelope',planned:money(p),actual:0,txns:[],recurring:!!r,dueDay:d||null}}function blankMonth(){return{income:[{id:id(),name:'Take-home pay',amount:0}],savings:[{id:id(),name:'Savings',amount:0}],groups:[{id:id(),name:'Bills',items:[]},{id:id(),name:'Spending',items:[]}]}}function setTheme(){document.documentElement.dataset.theme=S.theme||'dark'}function adoptState(d){if(!d||typeof d!=='object')return;S={...defaultState(),...S};if(d.months)S.months=d.months;if(Array.isArray(d.debts))S.debts=d.debts;if(d.debtPlan)S.debtPlan={strategy:d.debtPlan.strategy||'avalanche',extra:money(d.debtPlan.extra)};if(d.settings)S.settings={...defaultSettings(),...d.settings};if(d.theme)S.theme=d.theme;if(d.lastBackup!==undefined)S.lastBackup=d.lastBackup;if(d.lastLog)S.lastLog=d.lastLog}function recalcItem(i){i.actual=(i.txns||[]).reduce((s,t)=>s+money(t.amount),0)}function migrate(){S.settings={...defaultSettings(),...(S.settings||{})};S.months=S.months||{};S.debts=Array.isArray(S.debts)?S.debts:[];S.debtPlan=S.debtPlan||{strategy:'avalanche',extra:0};Object.keys(S.months).forEach(k=>{let m=S.months[k]||blankMonth();m.income=Array.isArray(m.income)?m.income:[];m.savings=Array.isArray(m.savings)?m.savings:[];m.groups=Array.isArray(m.groups)?m.groups:[];if(!m.income.length)m.income=[{id:id(),name:'Take-home pay',amount:money(S.settings.monthlyIncome)}];if(!m.savings.length)m.savings=[{id:id(),name:'Savings',amount:money(S.settings.savingsGoal)}];if(!m.groups.length)m.groups=[{id:id(),name:'Bills',items:[]},{id:id(),name:'Spending',items:[]}];m.income.forEach(x=>{x.id=x.id||id();x.name=x.name||'Income';x.amount=money(x.amount)});m.savings.forEach(x=>{x.id=x.id||id();x.name=x.name||'Savings';x.amount=money(x.amount)});m.groups.forEach(g=>{g.id=g.id||id();g.name=g.name||'Group';g.items=Array.isArray(g.items)?g.items:[];g.items.forEach(i=>{i.id=i.id||id();i.name=i.name||'Envelope';i.planned=money(i.planned);i.txns=Array.isArray(i.txns)?i.txns:[];i.txns=i.txns.map(t=>({id:t.id||id(),date:t.date||k+'-01',amount:money(t.amount),note:t.note||''}));recalcItem(i)})});S.months[k]=m});if(Object.keys(S.months).length)S.settings.onboardingCompleted=true;setTheme()}function load(){try{let raw=localStorage.getItem(KEY);if(raw)adoptState(JSON.parse(raw))}catch(e){storageBroken=true;storageWarning='Saved data could not be read. Restore a backup before changing anything.'}migrate()}function save(){try{localStorage.setItem(KEY,JSON.stringify(S));storageBroken=false;return true}catch(e){storageBroken=true;storageWarning='This device could not save your budget. Copy a backup now.';return false}}function commit(){let ok=save();render();if(!ok)toast(storageWarning)}function M(){return S.months[mk]||null}function ensureMonth(){if(!S.months[mk])S.months[mk]=blankMonth();return S.months[mk]}function monthName(k){let a=k.split('-').map(Number);return new Date(a[0],a[1]-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'})}function monthShort(k){let a=k.split('-').map(Number);return new Date(a[0],a[1]-1,1).toLocaleDateString('en-US',{month:'short',year:'numeric'})}function shiftMonth(k,n){let a=k.split('-').map(Number),d=new Date(a[0],a[1]-1+n,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}function latestBefore(k){let keys=Object.keys(S.months).filter(x=>x<k).sort();return keys[keys.length-1]||null}function cloneForward(k){let m=JSON.parse(JSON.stringify(S.months[k]));m.income.forEach(x=>x.id=id());m.savings.forEach(x=>x.id=id());m.groups.forEach(g=>{g.id=id();g.items.forEach(i=>{i.id=id();i.actual=0;i.txns=[]})});return m}function selectMonth(k,carry){let old=mk;mk=k;if(carry&&!S.months[mk]){let src=latestBefore(mk);if(src){S.months[mk]=cloneForward(src);save();toast('Copied '+monthShort(src),'good',()=>{delete S.months[mk];mk=old;commit()})}}render()}function totals(m){if(!m)return{income:0,savings:0,planned:0,actual:0,remaining:0,available:0};let income=m.income.reduce((s,x)=>s+money(x.amount),0),savings=m.savings.reduce((s,x)=>s+money(x.amount),0),planned=m.groups.reduce((s,g)=>s+g.items.reduce((a,i)=>a+money(i.planned),0),0),actual=m.groups.reduce((s,g)=>s+g.items.reduce((a,i)=>a+money(i.actual),0),0);return{income,savings,planned,actual,remaining:income-savings-planned,available:income-savings-actual}}function allItems(m){let out=[];(m?.groups||[]).forEach(g=>g.items.forEach(i=>out.push({g,item:i})));return out}function findItem(m,gid,iid){let g=(m?.groups||[]).find(x=>x.id===gid),i=g?(g.items||[]).find(x=>x.id===iid):null;return{g,i}}function billItems(m){return allItems(m).filter(x=>x.item.recurring)}function todayLocal(){let d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate())}function itemPaid(i){return money(i.planned)>0&&money(i.actual)>=money(i.planned)-.01}function billStatus(i,monthKey){if(itemPaid(i))return{cls:'good',label:'Paid'};if(!i.dueDay)return{cls:'warn',label:'Set due date'};let a=(monthKey||mk).split('-').map(Number),due=new Date(a[0],a[1]-1,Math.min(31,+i.dueDay||1)),diff=Math.ceil((due-todayLocal())/86400000);if(diff<0)return{cls:'bad',label:'Overdue'};if(diff===0)return{cls:'warn',label:'Due today'};if(diff<=7)return{cls:'warn',label:'Due in '+diff+'d'};return{cls:'',label:'Due '+due.toLocaleDateString('en-US',{month:'short',day:'numeric'})}}function billOccurrencesBetween(from,to){let out=[];Object.keys(S.months).forEach(k=>billItems(S.months[k]).forEach(x=>{let a=k.split('-').map(Number),d=new Date(a[0],a[1]-1,Math.min(31,+x.item.dueDay||1));if(d>=from&&d<=to)out.push({date:d,item:x.item,amount:x.item.planned,paid:itemPaid(x.item)})}));return out.sort((a,b)=>a.date-b.date)}function safeUntilPayday(){let s=S.settings;if(!s.nextPayday)return null;let next=new Date(s.nextPayday+'T00:00:00'),today=todayLocal(),step=s.payFrequency==='weekly'?7:s.payFrequency==='monthly'?30:14;while(next<today)next=new Date(next.getTime()+step*86400000);let pay=money(s.payAmount)||((money(s.monthlyIncome)||totals(M()).income)/(30/step)),spent=0;return{left:pay-spent,perDay:pay/Math.max(1,Math.ceil((next-today)/86400000)),daysUntil:Math.max(1,Math.ceil((next-today)/86400000))}}function debtPayoff(){let ds=S.debts.map(d=>({...d,balance:money(d.balance),apr:money(d.apr),minPayment:money(d.minPayment)})).filter(d=>d.balance),m=0,int=0;while(ds.some(d=>d.balance>.01)&&m<600){m++;ds.forEach(d=>{let x=d.balance*(d.apr/100/12);d.balance+=x;int+=x;d.balance-=Math.min(d.balance,d.minPayment+money(S.debtPlan.extra))})}return{months:m,interest:int}}function toast(msg,type,undo){document.querySelectorAll('.toast').forEach(x=>x.remove());let el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),undo?6500:3000)}function field(i,l,v,t='text'){return'<label class=field><span class=small>'+l+'</span><input id='+i+' type='+t+' value=\"'+esc(v||'')+'\"></label>'}function sheet(title,body){$('#modal').innerHTML='<div class=sheetBg data-close=1><div class=sheet><h2>'+title+'</h2>'+body+'<button id=closeSheet class=btn style=\"margin-top:12px\">Close</button></div></div>';$('#closeSheet').onclick=closeModal;$('.sheetBg').onclick=e=>{if(e.target.dataset.close)closeModal()}}function closeModal(){$('#modal').innerHTML=''}function nav(){let n=[['dashboard','Today'],['budget','Plan'],['track','Spend'],['bills','Bills'],['more','More']];return'<nav class=nav><div class=navin>'+n.map(x=>'<button data-tab='+x[0]+' class='+(tab===x[0]?'on':'')+'>'+x[1]+'</button>').join('')+'</div></nav><button id=fab class=fab>+</button>'}function backupReminder(){let t=totals(M()),has=Object.keys(S.months).length&&(t.income||t.planned||t.actual||S.debts.length),age=S.lastBackup?Math.floor((Date.now()-S.lastBackup)/86400000):999;if(!has||age<=7)return'';return'<section class=\"card span12\"><div class=row><div><b>Backup reminder</b><div class=\"small muted\">Your data is only on this device.</div></div><button id=dashBackup class=btn>Back up</button></div></section>'}function render(){let app=$('#app');if(!S.settings.onboardingCompleted&&!Object.keys(S.months).length){app.innerHTML=welcome()+nav();bind();return}app.innerHTML='<main class=wrap>'+(storageBroken?'<div class=card>'+esc(storageWarning)+'</div>':'')+monthBar()+({dashboard:dashboard,budget:budget,track:track,bills:bills,more:more,debt:debt}[tab]||dashboard)()+'</main>'+nav();bind()}function monthBar(){return'<div class=\"row monthBar\"><button class=\"btn\" data-mnav=-1>Prev</button><button class=btn id=pickMonth>'+monthName(mk)+'</button><button class=btn data-mnav=1>Next</button></div>'}function welcome(){return'<main class=wrap><section class=\"card hero\"><div class=label>Private budget</div><div class=metric>Know what you can spend.</div><p class=muted>Create clean envelopes for bills, spending, savings, and debt.</p><div class=stack><button id=startGuided class=\"btn primary\">Build my budget</button><button id=startBlank class=btn>Start empty</button><button id=restoreWelcome class=btn>Restore backup</button></div></section></main>'}function envPreview(){let env=allItems(ensureMonth()).slice(0,6);if(!env.length)return'<div class=empty>Add envelopes for groceries, gas, bills, savings, and anything else you want to control.</div>';return'<div class=envs>'+env.map(x=>{let i=x.item,p=i.planned?Math.min(100,Math.round(i.actual/i.planned*100)):0,left=i.planned-i.actual;return'<div class=\"env click\" data-edititem='+x.g.id+':'+i.id+'><div class=row><div><b>'+esc(i.name)+'</b><div class=\"small muted\">'+(i.recurring?'Bill':'Envelope')+'</div></div><div class=money>'+fmt(left)+'</div></div><div class=bar><i style=\"width:'+p+'%\"></i></div></div>'}).join('')+'</div>'}function upcoming(){let occ=billOccurrencesBetween(todayLocal(),new Date(Date.now()+14*86400000)).filter(x=>!x.paid).slice(0,4);return occ.length?occ.map(o=>'<div class=row><div><b>'+esc(o.item.name)+'</b><div class=\"small muted\">'+o.date.toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</div></div><div class=money>'+fmt(o.amount)+'</div></div>').join(''):'<div class=empty>No unpaid bills due soon.</div>'}function dashboard(){let m=ensureMonth(),t=totals(m),safe=S.settings.paycheckMode?safeUntilPayday():null,av=safe?safe.left:t.available,pct=t.planned?Math.min(100,Math.round(t.actual/t.planned*100)):0;return'<div class=grid>'+backupReminder()+'<section class=\"card hero span8\"><div class=row><div><div class=label>Available today</div><div class=metric>'+fmt(av)+'</div></div><span class=\"pill '+(av<0?'bad':'good')+'\">'+(av<0?'Over budget':'On track')+'</span></div><p class=muted>'+(safe?fmt(safe.perDay)+' per day until payday.':'Income minus savings and real spending this month.')+'</p><div class=bar><i style=\"width:'+pct+'%\"></i></div><div class=stats><div class=stat><span class=\"small muted\">Income</span><b>'+fmt(t.income)+'</b></div><div class=stat><span class=\"small muted\">Planned</span><b>'+fmt(t.planned+t.savings)+'</b></div><div class=stat><span class=\"small muted\">Spent</span><b>'+fmt(t.actual)+'</b></div></div><div class=split style=\"margin-top:16px\"><button id=dashLogSpend class=\"btn primary\">Add expense</button><button id=dashAddIncome class=btn>'+(t.income?'Edit income':'Add income')+'</button></div></section><section class=\"card span4\"><div class=label>Left to assign</div><div class=\"metric sm\">'+fmt(t.remaining)+'</div><p class=\"small muted\">Money without a job.</p><button id=quickBudget class=btn>Plan envelopes</button></section><section class=\"card span8\"><div class=row><div><div class=label>Envelopes</div><b>Budget at a glance</b></div><button id=startSpending class=btn>Edit</button></div>'+envPreview()+'</section><section class=\"card span4\"><div class=label>Next bills</div>'+upcoming()+'</section></div>'}function rows(kind){let list=ensureMonth()[kind]||[];return list.length?list.map(x=>'<div class=\"row click\" data-editmoney='+kind+':'+x.id+'><div><b>'+esc(x.name)+'</b><div class=\"small muted\">Tap to edit</div></div><div class=money>'+fmt(x.amount)+'</div></div>').join(''):'<div class=empty>Add '+kind+' first.</div>'}function budget(){let m=ensureMonth(),t=totals(m);return'<div class=grid><section class=\"card hero span12\"><div class=label>Plan</div><div class=\"metric sm\">'+fmt(t.remaining)+' left to assign</div></section><section class=\"card span6\"><div class=row><b>Income</b><button id=addIncome class=\"btn primary\">Add</button></div>'+rows('income')+'</section><section class=\"card span6\"><div class=row><b>Savings</b><button id=addSavings class=btn>Add</button></div>'+rows('savings')+'</section>'+m.groups.map(g=>'<section class=\"card span6\"><div class=row><b>'+esc(g.name)+'</b><button class=btn data-additem='+g.id+'>Add</button></div>'+(g.items.length?g.items.map(i=>'<div class=\"row click\" data-edititem='+g.id+':'+i.id+'><div><b>'+esc(i.name)+'</b><div class=\"small muted\">'+(i.recurring?'Bill':'Envelope')+'</div></div><div><div class=money>'+fmt(i.planned)+'</div><div class=\"small muted\">spent '+fmt(i.actual)+'</div></div></div>').join(''):'<div class=empty>No envelopes yet.</div>')+'</section>').join('')+'</div>'}function track(){let tx=[];allItems(ensureMonth()).forEach(x=>(x.item.txns||[]).forEach(t=>tx.push({...t,gid:x.g.id,iid:x.item.id,line:x.item.name,cat:x.g.name})));tx.sort((a,b)=>(b.date||'').localeCompare(a.date||''));return'<div class=grid><section class=\"card span12\"><div class=row><div><div class=label>Spend</div><div class=\"metric sm\">'+fmt(totals(ensureMonth()).actual)+'</div></div><button id=addTxn class=\"btn primary\">Add expense</button></div></section><section class=\"card span12\">'+(tx.length?tx.map(t=>'<div class=\"row click\" data-edittxn='+t.gid+':'+t.iid+':'+t.id+'><div><b>'+esc(t.line)+'</b><div class=\"small muted\">'+esc(t.cat)+' - '+esc(t.date||'')+'</div></div><div class=money>'+fmtC(t.amount)+'</div></div>').join(''):'<div class=empty>No expenses yet.</div>')+'</section></div>'}function bills(){let b=billItems(ensureMonth());return'<div class=grid><section class=\"card span12\"><div class=row><div><div class=label>Bills</div><p class=muted>Paying a bill logs an expense.</p></div><button id=addBill class=\"btn primary\">Add bill</button></div></section><section class=\"card span12\">'+(b.length?b.map(x=>{let st=billStatus(x.item,mk);return'<div class=row><div><b>'+esc(x.item.name)+'</b><span class=\"pill '+st.cls+'\">'+st.label+'</span></div><div><div class=money>'+fmt(x.item.planned)+'</div><button class=btn data-paybill='+x.g.id+':'+x.item.id+'>'+(itemPaid(x.item)?'Undo':'Pay')+'</button></div></div>'}).join(''):'<div class=empty>No bills yet.</div>')+'</section></div>'}function more(){return'<div class=grid><section class=\"card span12\"><div class=stack><button id=goDebt class=btn>Debt payoff</button><button id=goSettings class=btn>Settings and backup</button><button id=goPrivacy class=btn>Privacy</button></div></section></div>'}function debt(){let r=debtPayoff();return'<div class=grid><section class=\"card span12\"><div class=row><div><div class=label>Debt payoff</div><div class=\"metric sm\">'+(r.months?r.months+' months':'No debt')+'</div><p class=\"small muted\">Estimated interest: '+fmtC(r.interest)+'</p></div><button id=addDebt class=\"btn primary\">Add debt</button></div></section><section class=\"card span12\">'+(S.debts.length?S.debts.map(d=>'<div class=\"row click\" data-editdebt='+d.id+'><b>'+esc(d.name)+'</b><div class=money>'+fmt(d.balance)+'</div></div>').join(''):'<div class=empty>Add debts to compare payoff plans.</div>')+'</section></div>'}function backupPayload(){return JSON.stringify({...S,exportedAt:new Date().toISOString()},null,2)}async function copyBackup(){let txt=backupPayload();try{await navigator.clipboard.writeText(txt);S.lastBackup=Date.now();save();toast('Backup copied')}catch(e){sheet('Copy backup','<textarea readonly style=\"height:190px\">'+esc(txt)+'</textarea>')}}function downloadBackup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([backupPayload()],{type:'application/json'}));a.download='allotted-backup.json';a.click();S.lastBackup=Date.now();save()}function applyBackup(text,skipConfirm){try{let d=JSON.parse(text.trim());if(!d.months)throw 0;if(!skipConfirm&&!confirm('Restore this backup and replace everything currently in Allotted?'))return false;S=defaultState();adoptState(d);migrate();closeModal();commit();toast('Backup restored');return true}catch(e){toast('That is not a valid backup');return false}}function openPasteRestore(){sheet('Restore backup','<textarea id=restoreArea style=\"height:170px\"></textarea><button id=restoreGo class=\"btn primary\">Restore</button>');$('#restoreGo').onclick=()=>applyBackup($('#restoreArea').value)}function openSettings(){let age=S.lastBackup?Math.floor((Date.now()-S.lastBackup)/86400000):null;sheet('Settings and backup','<div class=stack><button id=themeToggle class=btn>Theme: '+(S.theme==='light'?'Light':'Dark')+'</button><button id=paySettings class=btn>Income and paycheck</button><button id=copyBackup class=\"btn primary\">Copy private backup</button><button id=downloadBackup class=btn>Download backup file</button><button id=restoreText class=btn>Restore from text</button><button id=restoreFile class=btn>Restore from file</button><div class=\"small muted\">Last backup: '+(age===null?'never':age===0?'today':age+' days ago')+'</div><button id=clearTxns class=\"btn warn\">Clear '+monthShort(mk)+' transactions</button><button id=clearMonth class=\"btn warn\">Clear '+monthShort(mk)+' plan</button></div>');$('#themeToggle').onclick=()=>{S.theme=S.theme==='light'?'dark':'light';setTheme();commit();openSettings()};$('#paySettings').onclick=openPaySettings;$('#copyBackup').onclick=copyBackup;$('#downloadBackup').onclick=downloadBackup;$('#restoreText').onclick=openPasteRestore;$('#restoreFile').onclick=()=>$('#fileInput').click();$('#clearTxns').onclick=()=>{if(!confirm('Clear all transactions for '+monthName(mk)+'?'))return;ensureMonth().groups.forEach(g=>g.items.forEach(i=>{i.txns=[];i.actual=0}));closeModal();commit()};$('#clearMonth').onclick=()=>{if(confirm('Clear '+monthName(mk)+'?')){delete S.months[mk];closeModal();commit()}}}function openPrivacy(){sheet('Your privacy','<p class=muted>Allotted has no accounts, no bank connection, no analytics, no ads, and no network calls during normal use. Your budget, bills, debts, and transactions stay on this device.</p>')}function openPaySettings(){let s=S.settings;sheet('Income and paycheck',field('mincome','Monthly take-home income',s.monthlyIncome,'number')+field('sgoal','Monthly savings goal',s.savingsGoal,'number')+field('nextPay','Next payday',s.nextPayday,'date')+field('payAmt','Pay amount',s.payAmount,'number')+'<button id=savePay class=\"btn primary\">Save</button>');$('#savePay').onclick=()=>{s.monthlyIncome=money($('#mincome').value);s.savingsGoal=money($('#sgoal').value);s.nextPayday=$('#nextPay').value;s.payAmount=money($('#payAmt').value);s.paycheckMode=!!s.nextPayday;closeModal();commit()}}function startOnboarding(){sheet('Build your budget',field('obIncome','Monthly take-home income','','number')+field('obBills','Monthly bills total','','number')+field('obSavings','Monthly savings goal','','number')+field('obCats','Envelopes','Groceries, Gas, Restaurants, Fun')+'<button id=finishOb class=\"btn primary\">Create envelopes</button>');$('#finishOb').onclick=()=>{let income=money($('#obIncome').value),saveGoal=money($('#obSavings').value),bill=money($('#obBills').value),cats=$('#obCats').value.split(',').map(x=>x.trim()).filter(Boolean),m=blankMonth();m.income[0].amount=income;m.savings[0].amount=saveGoal;m.groups=[{id:id(),name:'Bills',items:bill?[item('Monthly bills',bill,true,1)]:[]},{id:id(),name:'Spending',items:[]}];let left=Math.max(0,income-saveGoal-bill),each=cats.length?Math.floor(left/cats.length):0;m.groups[1].items=cats.map((c,i)=>item(c,i===cats.length-1?left-each*(cats.length-1):each,false));S.months[mk]=m;S.settings.monthlyIncome=income;S.settings.savingsGoal=saveGoal;S.settings.onboardingCompleted=true;closeModal();commit()}}function openMoney(kind,idv){let m=ensureMonth(),list=m[kind],x=idv?list.find(v=>v.id===idv):null;sheet((x?'Edit ':'Add ')+kind,field('mn','Name',x?.name||'')+field('ma','Amount',x?.amount||'','number')+'<button id=saveMoney class=\"btn primary\">Save</button>');$('#saveMoney').onclick=()=>{let o=x||{id:id()};o.name=$('#mn').value||kind;o.amount=money($('#ma').value);if(!x)list.push(o);closeModal();commit()}}function openLine(gid,iid,makeBill){let g=ensureMonth().groups.find(x=>x.id===gid)||ensureMonth().groups[0],i=iid?g.items.find(x=>x.id===iid):null;sheet(i?'Edit envelope':'Add envelope',field('ln','Name',i?.name||'')+field('lp','Planned amount',i?.planned||'','number')+field('ld','Due day for bills',i?.dueDay||'','number')+'<label class=row><span>Recurring bill</span><input id=lr type=checkbox style=\"width:auto\" '+((i?.recurring||makeBill)?'checked':'')+'></label><button id=saveLine class=\"btn primary\">Save</button>'+(i?'<button id=deleteLine class=\"btn warn\">Delete</button>':''));$('#saveLine').onclick=()=>{let o=i||item('',0,false);o.name=$('#ln').value||'Envelope';o.planned=money($('#lp').value);o.recurring=$('#lr').checked;o.dueDay=$('#ld').value||null;if(!i)g.items.push(o);closeModal();commit()};let d=$('#deleteLine');if(d)d.onclick=()=>{if(confirm('Delete this line and its transactions?')){g.items=g.items.filter(x=>x.id!==iid);closeModal();commit()}}}function openTxn(ref){let choices=allItems(ensureMonth());if(!choices.length){tab='budget';render();toast('Add an envelope first');return}let gid='',iid='',tid='',source=null,tx=null;if(ref){[gid,iid,tid]=ref.split(':');source=findItem(ensureMonth(),gid,iid);tx=source.i?.txns.find(x=>x.id===tid)}let selected=tx?gid+':'+iid:(S.lastLog?S.lastLog.gid+':'+S.lastLog.iid:'');sheet(tx?'Edit expense':'Add expense','<label class=field><span class=small>Envelope</span><select id=txLine>'+choices.map(x=>'<option value='+x.g.id+':'+x.item.id+' '+((x.g.id+':'+x.item.id)===selected?'selected':'')+'>'+esc(x.item.name)+'</option>').join('')+'</select></label>'+field('txAmt','Amount',tx?.amount||'','number')+field('txDate','Date',tx?.date||new Date().toISOString().slice(0,10),'date')+field('txNote','Note',tx?.note||'')+'<button id=saveTxn class=\"btn primary\">Add expense</button>'+(tx?'<button id=deleteTxn class=\"btn warn\">Delete transaction</button>':''));$('#saveTxn').onclick=()=>{let [ng,ni]=$('#txLine').value.split(':'),dest=findItem(ensureMonth(),ng,ni),o=tx||{id:id()};o.amount=money($('#txAmt').value);o.date=$('#txDate').value||new Date().toISOString().slice(0,10);o.note=$('#txNote').value||'';if(tx&&source.i){source.i.txns=source.i.txns.filter(x=>x.id!==tid);recalcItem(source.i)}dest.i.txns=dest.i.txns||[];dest.i.txns.push(o);recalcItem(dest.i);S.lastLog={gid:ng,iid:ni};closeModal();commit()};let del=$('#deleteTxn');if(del)del.onclick=()=>{if(confirm('Delete this transaction?')){source.i.txns=source.i.txns.filter(x=>x.id!==tid);recalcItem(source.i);closeModal();commit()}}}function payBill(gid,iid){let i=findItem(ensureMonth(),gid,iid).i;if(!i)return;if(itemPaid(i)){i.txns=[];i.actual=0}else{i.txns=[{id:id(),date:new Date().toISOString().slice(0,10),amount:i.planned,note:'Bill paid'}];recalcItem(i)}commit()}function openDebt(idv){let d=idv?S.debts.find(x=>x.id===idv):null;sheet(d?'Edit debt':'Add debt',field('dn','Name',d?.name||'')+field('db','Balance',d?.balance||'','number')+field('dm','Minimum payment',d?.minPayment||'','number')+field('da','APR',d?.apr||'','number')+'<button id=saveDebt class=\"btn primary\">Save</button>');$('#saveDebt').onclick=()=>{let o=d||{id:id()};o.name=$('#dn').value||'Debt';o.balance=money($('#db').value);o.minPayment=money($('#dm').value);o.apr=money($('#da').value);if(!d)S.debts.push(o);closeModal();commit()}}function addMenu(){sheet('Add','<div class=stack><button id=menuTxn class=\"btn primary\">Add expense</button><button id=menuSpend class=btn>New envelope</button><button id=menuBill class=btn>New bill</button><button id=menuIncome class=btn>Income</button></div>');$('#menuTxn').onclick=()=>{closeModal();openTxn()};$('#menuSpend').onclick=()=>{closeModal();let g=ensureMonth().groups.find(x=>!/bill/i.test(x.name))||ensureMonth().groups[0];openLine(g.id)};$('#menuBill').onclick=()=>{closeModal();let g=ensureMonth().groups.find(x=>/bill/i.test(x.name))||ensureMonth().groups[0];openLine(g.id,null,true)};$('#menuIncome').onclick=()=>{closeModal();openMoney('income')}}function bind(){document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});document.querySelectorAll('[data-mnav]').forEach(b=>b.onclick=()=>selectMonth(shiftMonth(mk,parseInt(b.dataset.mnav)),parseInt(b.dataset.mnav)>0));let p=$('#pickMonth');if(p)p.onclick=()=>{let v=prompt('Go to month YYYY-MM',mk);if(v&&v.length===7)selectMonth(v,true)};let f=$('#fab');if(f)f.onclick=addMenu;let sg=$('#startGuided');if(sg)sg.onclick=startOnboarding;let sb=$('#startBlank');if(sb)sb.onclick=()=>{S.months[mk]=blankMonth();S.settings.onboardingCompleted=true;commit();openMoney('income')};let rw=$('#restoreWelcome');if(rw)rw.onclick=openPasteRestore;['dashAddIncome','startIncome'].forEach(x=>{let e=$('#'+x);if(e)e.onclick=()=>openMoney('income')});let dl=$('#dashLogSpend');if(dl)dl.onclick=()=>openTxn();let qb=$('#quickBudget');if(qb)qb.onclick=()=>{tab='budget';render()};let ss=$('#startSpending');if(ss)ss.onclick=()=>{tab='budget';render()};let dbk=$('#dashBackup');if(dbk)dbk.onclick=copyBackup;let ai=$('#addIncome');if(ai)ai.onclick=()=>openMoney('income');let as=$('#addSavings');if(as)as.onclick=()=>openMoney('savings');document.querySelectorAll('[data-editmoney]').forEach(b=>b.onclick=()=>{let p=b.dataset.editmoney.split(':');openMoney(p[0],p[1])});document.querySelectorAll('[data-additem]').forEach(b=>b.onclick=()=>openLine(b.dataset.additem));document.querySelectorAll('[data-edititem]').forEach(b=>b.onclick=()=>{let p=b.dataset.edititem.split(':');openLine(p[0],p[1])});let at=$('#addTxn');if(at)at.onclick=()=>openTxn();document.querySelectorAll('[data-edittxn]').forEach(b=>b.onclick=()=>openTxn(b.dataset.edittxn));let ab=$('#addBill');if(ab)ab.onclick=()=>{let g=ensureMonth().groups.find(x=>/bill/i.test(x.name))||ensureMonth().groups[0];openLine(g.id,null,true)};document.querySelectorAll('[data-paybill]').forEach(b=>b.onclick=()=>{let p=b.dataset.paybill.split(':');payBill(p[0],p[1])});let gd=$('#goDebt');if(gd)gd.onclick=()=>{tab='debt';render()};let gs=$('#goSettings');if(gs)gs.onclick=openSettings;let gp=$('#goPrivacy');if(gp)gp.onclick=openPrivacy;let ad=$('#addDebt');if(ad)ad.onclick=()=>openDebt();document.querySelectorAll('[data-editdebt]').forEach(b=>b.onclick=()=>openDebt(b.dataset.editdebt))}$('#settingsBtn').onclick=openSettings;document.getElementById("fileInput").addEventListener("change",e=>{let f=e.target.files&&e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>applyBackup(String(r.result||''));r.readAsText(f);e.target.value=''});load();if(!storageBroken)save();render();
