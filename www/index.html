@keyframes iDraw{to{stroke-dashoffset:0}}

<body>
<div id="app"></div>
<div id="modal"></div>
<input type="file" id="fileInput" accept=".json,application/json" style="display:none">

<script>
// ================= data =================
const KEY="budget-app-v1";
const fmt=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n);
const fmtC=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(n);
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
let uid=0; const nid=()=>"i"+Date.now()+"-"+(uid++);

function templateMonth(){
  const it=(name,planned,rec)=>({id:nid(),name,planned:planned||0,actual:0,txns:[],recurring:!!rec});
  return {
    income:[{id:nid(),name:"Take-home pay",amount:0}],
    savings:[{id:nid(),name:"Savings",amount:0}],
    groups:[
      {id:nid(),name:"Housing",items:[it("Rent / Mortgage",0,true)]},
      {id:nid(),name:"Utilities",items:[it("Electric",0,true),it("Water",0,true),it("Internet",0,true)]},
      {id:nid(),name:"Food",items:[it("Groceries",0),it("Restaurants",0)]},
      {id:nid(),name:"Transportation",items:[it("Car payment",0,true),it("Insurance",0,true),it("Gas / Fuel",0)]},
      {id:nid(),name:"Subscriptions",items:[it("Streaming",0,true)]},
      {id:nid(),name:"Health",items:[it("Gym",0,true)]},
      {id:nid(),name:"Other",items:[]},
    ],
  };
}

function blankMonth(){
  return {
    income:[{id:nid(),name:"Take-home pay",amount:0}],
    savings:[{id:nid(),name:"Savings",amount:0}],
    groups:[{id:nid(),name:"Other",items:[]}],
  };
}

const CURRENT_SCHEMA=2;
function defaultSettings(){
  return {onboardingCompleted:false,paycheckMode:false,payFrequency:"biweekly",nextPayday:"",payAmount:0,monthlyIncome:0,savingsGoal:0,customDays:14};
}
let S={schemaVersion:CURRENT_SCHEMA,months:{},bills:[],debts:[],settings:defaultSettings(),lastBackup:null,theme:"dark",lastLog:null};
let mk=new Date().toISOString().slice(0,7); // selected month "YYYY-MM"
let tab="dashboard";

// merge a stored/backup object into live state without dropping known keys
function adoptState(d){
  if(!d||typeof d!=="object")return;
  if(d.months)S.months=d.months;
  if(Array.isArray(d.bills))S.bills=d.bills;
  if(Array.isArray(d.debts))S.debts=d.debts;
  if(d.settings&&typeof d.settings==="object")S.settings={...defaultSettings(),...d.settings};
  if(d.lastBackup!==undefined)S.lastBackup=d.lastBackup;
  if(d.theme)S.theme=d.theme;
  if(d.lastLog)S.lastLog=d.lastLog;
  if(typeof d.schemaVersion==="number")S.schemaVersion=d.schemaVersion;
}

function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw)adoptState(JSON.parse(raw));
  }catch(e){}
  applyTheme();
  migrate();
}
function applyTheme(){
  document.documentElement.setAttribute("data-theme",S.theme||"dark");
  const bg=S.theme==="light"?"#F2F5F6":"#0B0E10";
  const mc=document.querySelector('meta[name="theme-color"]');
  if(mc)mc.setAttribute("content",bg);
  try{
    const sb=window.Capacitor&&Capacitor.Plugins&&Capacitor.Plugins.StatusBar;
    if(sb){
      sb.setStyle({style:S.theme==="light"?"LIGHT":"DARK"});
      if(sb.setBackgroundColor)sb.setBackgroundColor({color:bg});
    }
  }catch(e){}
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function commit(){save();render();}

const M=()=>S.months[mk]||null;

// keep an item's cached spent total in sync with its transaction list
function recalcItem(i){i.actual=(i.txns||[]).reduce((s,x)=>s+(parseFloat(x.amount)||0),0);}
// canonical spend group for a month (creates one if none exist)
function spendGroup(m){if(!m.groups)m.groups=[];if(!m.groups.length)m.groups.push({id:nid(),name:"Spending",items:[]});return m.groups[0];}
// every recurring budget line for a month = that month's bills, with its group id
function recurringItems(m){const out=[];if(m&&m.groups)m.groups.forEach(g=>(g.items||[]).forEach(i=>{if(i.recurring)out.push({gid:g.id,item:i});}));return out;}
function itemPaid(i){return (i.planned||0)>0&&(i.actual||0)>=(i.planned||0)-0.01;}
function itemRemaining(i){return (i.planned||0)-(i.actual||0);}
// upgrade older data: turn a bare "actual" number into a transaction list, seed v2 keys
function migrate(){
  // schema v1 groundwork: ensure every item has a txn list
  Object.keys(S.months).forEach(k=>{
    const m=S.months[k];if(!m||!m.groups)return;
    m.groups.forEach(g=>g.items.forEach(i=>{
      if(!Array.isArray(i.txns)){
        i.txns=(i.actual>0)?[{id:nid(),date:k+"-01",amount:i.actual,note:"opening balance"}]:[];
      }
      recalcItem(i);
    }));
  });
  // schema v2: first-class bills/debts + settings (paycheck, onboarding)
  if(!Array.isArray(S.bills))S.bills=[];
  // schema v3: bills are now just recurring budget lines. Fold any legacy
  // first-class bills into the budget so existing users keep their data.
  if(S.bills.length){
    const tk=S.months[mk]?mk:(Object.keys(S.months).sort().pop()||null);
    const tm=tk&&S.months[tk];
    if(tm){
      const grp=spendGroup(tm);
      const have=new Set();
      tm.groups.forEach(g=>(g.items||[]).forEach(i=>{if(i.recurring)have.add((i.name||"").toLowerCase());}));
      S.bills.forEach(b=>{
        const nm=(b.name||"").trim();if(!nm)return;
        if(have.has(nm.toLowerCase()))return;
        grp.items.push({id:nid(),name:nm,planned:parseFloat(b.amount)||0,actual:0,txns:[],recurring:true,dueDay:b.dueDay||null});
        have.add(nm.toLowerCase());
      });
    }
    S.bills=[];
  }
  if(!Array.isArray(S.debts))S.debts=[];
  if(!S.debtPlan||typeof S.debtPlan!=="object")S.debtPlan={strategy:"avalanche",extra:0};
  S.settings=(S.settings&&typeof S.settings==="object")?{...defaultSettings(),...S.settings}:defaultSettings();
  // anyone who already has budget data is an existing user — never show them onboarding
  if(Object.keys(S.months).length>0)S.settings.onboardingCompleted=true;
  S.schemaVersion=CURRENT_SCHEMA;
}

// most recent month at or before key k that actually has data
function latestBefore(k){
  const keys=Object.keys(S.months).filter(x=>x<k).sort();
  return keys.length?keys[keys.length-1]:null;
}
// deep-clone a month's PLAN forward: fresh ids, actuals zeroed, spent-history cleared
function cloneForward(srcKey){
  const src=S.months[srcKey];
  const copy=JSON.parse(JSON.stringify(src));
  copy.income.forEach(i=>i.id=nid());
  copy.savings.forEach(i=>i.id=nid());
  copy.groups.forEach(g=>{g.id=nid();g.items.forEach(i=>{i.id=nid();i.actual=0;i.txns=[];});});
  return copy;
}
function monthName(k){const[y,m]=k.split("-").map(Number);return new Date(y,m-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});}
function monthShort(k){const[y,m]=k.split("-").map(Number);return new Date(y,m-1,1).toLocaleDateString("en-US",{month:"short"});}
function shiftMonth(k,n){const[y,m]=k.split("-").map(Number);const d=new Date(y,m-1+n,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}

function totals(m){
  if(!m)return{income:0,savings:0,planned:0,actual:0,remaining:0,rate:0};
  const income=m.income.reduce((s,i)=>s+(i.amount||0),0);
  const savings=m.savings.reduce((s,i)=>s+(i.amount||0),0);
  const planned=m.groups.reduce((s,g)=>s+g.items.reduce((a,i)=>a+(i.planned||0),0),0);
  const actual=m.groups.reduce((s,g)=>s+g.items.reduce((a,i)=>a+(i.actual||0),0),0);
  return{income,savings,planned,actual,remaining:income-savings-planned,rate:income>0?savings/income*100:0};
}

// true if a month is freshly started with nothing entered yet (safe to discard)
function monthUntouched(m){
  if(!m)return true;
  const t=totals(m);
  const txns=m.groups.reduce((s,g)=>s+g.items.reduce((a,i)=>a+((i.txns||[]).length),0),0);
  return t.income===0&&t.savings===0&&t.planned===0&&t.actual===0&&txns===0;
}

// ================= ui helpers =================
function toast(msg,color,undoFn){
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const t=document.createElement("div");t.className="toast";t.style.border="1px solid "+(color||"var(--teal)");
  if(undoFn){
    t.style.display="flex";t.style.alignItems="center";t.style.gap="14px";
    const s=document.createElement("span");s.textContent=msg;t.appendChild(s);
    const b=document.createElement("button");b.textContent="Undo";
    b.style.cssText="background:none;border:none;color:var(--teal);font-weight:800;font-size:14px;cursor:pointer;padding:2px 2px;white-space:nowrap";
    b.onclick=()=>{t.remove();try{undoFn();}catch(e){}};
    t.appendChild(b);
  }else{t.textContent=msg;}
  document.body.appendChild(t);setTimeout(()=>t.remove(),undoFn?6000:3500);
}

let _kbL=null;
function _kbSync(){
  const mbg=document.getElementById("mbg");if(!mbg||!window.visualViewport)return;
  const kb=Math.max(0,window.innerHeight-window.visualViewport.height-window.visualViewport.offsetTop);
  mbg.style.paddingBottom=kb+"px";
  const sh=mbg.querySelector(".sheet");if(sh)sh.style.maxHeight=(window.visualViewport.height-24)+"px";
}
function closeModal(){
  if(_kbL&&window.visualViewport){window.visualViewport.removeEventListener("resize",_kbL);window.visualViewport.removeEventListener("scroll",_kbL);_kbL=null;}
  document.getElementById("modal").innerHTML="";
}
function sheet(title,body){
  document.getElementById("modal").innerHTML=
    '<div class="modal-bg" id="mbg"><div class="sheet" onclick="event.stopPropagation()">'
    +'<div class="handle"></div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><h3 style="margin:0">'+title+'</h3>'
    +'<button id="mclose" style="background:var(--inset);border:none;color:var(--dim);padding:7px;border-radius:99px;display:flex">'+I.x+'</button></div>'
    +body+'</div></div>';
  document.getElementById("mbg").onclick=e=>{if(e.target.id==="mbg")closeModal();};
  document.getElementById("mclose").onclick=closeModal;
  if(window.visualViewport){_kbL=_kbSync;window.visualViewport.addEventListener("resize",_kbL);window.visualViewport.addEventListener("scroll",_kbL);}
}
function fieldHTML(id,label,val,type,ph,hint){
  let v=val??"";
  if(type==="number"&&(v===0||v==="0"))v="";
  const onf=(type==="number")?' onfocus="this.select()"':'';
  return '<label class="field"><span>'+label+'</span><input id="'+id+'" type="'+(type||"text")+'" '+(type==="number"?'inputmode="decimal" ':'')+'value="'+esc(v)+'" placeholder="'+(ph||"")+'"'+onf+'>'+(hint?'<span style="font-size:11px;margin-top:4px;margin-bottom:0;color:var(--dim);display:block">'+hint+'</span>':'')+'</label>';
}

function openMonthPicker(){
  const MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  let py=Number(mk.slice(0,4));
  function body(){
    return '<div id="mpBody">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
      +'<button id="mpPrev" style="background:var(--inset);border:1px solid var(--line);color:var(--dim);border-radius:99px;width:36px;height:36px;display:flex;align-items:center;justify-content:center">'+I.left+'</button>'
      +'<div style="font-weight:800;font-size:19px" class="mono">'+py+'</div>'
      +'<button id="mpNext" style="background:var(--inset);border:1px solid var(--line);color:var(--dim);border-radius:99px;width:36px;height:36px;display:flex;align-items:center;justify-content:center">'+I.right+'</button></div>'
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px">'
      +MN.map((nm,i)=>{
        const k=py+"-"+String(i+1).padStart(2,"0");
        const sel=k===mk, has=!!S.months[k];
        return '<button data-pickmo="'+k+'" style="padding:15px 0;border-radius:13px;font-weight:800;font-size:14px;border:1px solid '+(sel?'var(--teal)':'var(--line)')+';background:'+(sel?'var(--teal)':'var(--inset)')+';color:'+(sel?'#062C27':'var(--text)')+'">'+nm+(has&&!sel?'<span style="display:block;font-size:9px;color:var(--teal);font-weight:700;margin-top:2px">•</span>':'')+'</button>';
      }).join("")
      +'</div></div>';
  }
  function wire(){
    document.getElementById("mpPrev").onclick=()=>{py--;refresh();};
    document.getElementById("mpNext").onclick=()=>{py++;refresh();};
    document.querySelectorAll("[data-pickmo]").forEach(b=>b.onclick=()=>{mk=b.dataset.pickmo;closeModal();render();});
  }
  function refresh(){document.getElementById("mpBody").outerHTML=body();wire();}
  sheet("Jump to month",body());
  wire();
}

function render(){
  const m=M(), t=totals(m);
  const noData=Object.keys(S.months).length===0;
  let html=headerHTML(t,m);
  html+='<div class="wrap fade-up">';
  if(noData) html+=welcomeHTML();
  else if(tab==="dashboard") html+=dashboardHTML(m,t);
  else if(tab==="budget") html+=m?budgetHTML(m,t):emptyMonthHTML();
  else if(tab==="track") html+=m?trackHTML(m,t):emptyMonthHTML();
  else if(tab==="bills") html+=billsHTML();
  else if(tab==="more") html+=moreHTML();
  else if(tab==="debt") html+=debtsHTML();
  else if(tab==="weekly") html+=weeklyReviewHTML();
  else if(tab==="year") html+=yearHTML();
  else html+=dashboardHTML(m,t);
  html+='</div>';
  if(!noData){
    const on=x=>tab===x?"on":"";
    const moreActive=["more","bills","weekly","year"].includes(tab);
    html+='<div class="nav"><div class="nav-inner">'
    +'<button data-tab="dashboard" class="'+on("dashboard")+'">'+I.home+(tab==="dashboard"?'<span>Home</span>':'')+'</button>'
    +'<button data-tab="budget" class="'+on("budget")+'">'+I.cal+(tab==="budget"?'<span>Budget</span>':'')+'</button>'
    +'<button data-tab="track" class="'+on("track")+'">'+I.list+(tab==="track"?'<span>Track</span>':'')+'</button>'
    +'<button data-tab="debt" class="'+on("debt")+'">'+I.card+(tab==="debt"?'<span>Debt</span>':'')+'</button>'
    +'<button data-tab="more" class="'+(moreActive?"on":"")+'">'+I.grid+(moreActive?'<span>More</span>':'')+'</button>'
    +'</div></div>';
  }
  document.getElementById("app").innerHTML=html;
  bind();
  animateHero();
}

function welcomeHTML(){
  return '<div class="card" style="text-align:center;max-width:440px;margin:10px auto;padding:32px 24px">'
    +'<div style="display:flex;justify-content:center;margin-bottom:14px">'+logoSVG(72,true)+'</div>'
    +'<div style="font-size:26px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px">Allotted</div>'
    +'<div style="color:var(--teal);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:20px">Give every dollar a job</div>'
    +'<div style="color:var(--dim);font-size:13.5px;line-height:1.65;margin-bottom:22px">At the start of each month, give every dollar of income a job. Then track what you spend and watch each category drain down. Everything stays on this device.</div>'
    +'<button id="wOnboard" class="btn btn-teal" style="margin-bottom:10px">Let\u2019s build your first budget</button>'
    +'<button id="wBlank" class="btn btn-ghost" style="margin-bottom:10px;color:var(--text)">Skip \u2014 start from scratch</button>'
    +'<button id="wImport" class="btn btn-ghost" style="color:var(--text)">Restore from a backup</button>'
    +'</div>';
}

// ================= onboarding (first-time setup) =================
let OB=null;
const OB_BILLS=[{name:"Rent / Mortgage",day:1},{name:"Car payment",day:5},{name:"Car insurance",day:10},{name:"Phone",day:15},{name:"Internet",day:20},{name:"Electric",day:25}];
const OB_CATS=["Groceries","Gas","Eating out","Fun","Clothes","Household","Kids","Health"];

function startOnboarding(){
  OB={step:1,income:"",freq:"biweekly",payday:"",pay:"",bills:[],cats:["Groceries","Gas","Eating out","Fun"],goal:""};
  obRender();
}
function obNav(back,lastLabel){
  return '<div style="display:flex;gap:10px;margin-top:20px">'
    +(back?'<button id="obBack" class="btn btn-ghost" style="flex:0 0 auto;width:auto;padding:14px 22px;color:var(--text)">Back</button>':'')
    +'<button id="obNext" class="btn btn-teal" style="flex:1 1 auto;width:auto;min-width:0">'+(lastLabel||"Next")+'</button></div>'
    +'<button id="obSkip" class="btn btn-ghost" style="color:var(--dim);margin-top:10px;font-size:13px">Skip setup</button>';
}
function obIncome(){
  return '<div class="ob-sub">Start with your income. About how much money comes in each month, after taxes?</div>'
    +fieldHTML("obIncome","Monthly take-home income",OB.income,"number","e.g. 3200","A rough number is fine \u2014 you can change it later.")
    +obNav(false);
}
function obPay(){
  const opts=[["weekly","Weekly"],["biweekly","Every 2 weeks"],["semimonthly","Twice a month"],["monthly","Monthly"],["custom","Custom"]];
  const chips=opts.map(o=>'<button data-obfreq="'+o[0]+'" class="ob-chip'+(OB.freq===o[0]?" on":"")+'">'+o[1]+'</button>').join("");
  return '<div class="ob-sub">This powers the \u201cwhat can I spend until payday\u201d view. Not sure? Skip the dates for now.</div>'
    +'<div class="ob-chips" style="margin-bottom:16px">'+chips+'</div>'
    +fieldHTML("obPayday","Next payday",OB.payday,"date","")
    +fieldHTML("obPay","Amount per paycheck (optional)",OB.pay,"number","e.g. 1600")
    +obNav(true);
}
function obBills(){
  const have=OB.bills.map(b=>(b.name||"").toLowerCase());
  const sugg=OB_BILLS.filter(b=>!have.includes(b.name.toLowerCase()))
    .map(b=>'<button data-obaddbill="'+esc(b.name)+'|'+b.day+'" class="ob-chip">+ '+esc(b.name)+'</button>').join("");
  const rows=OB.bills.map((b,i)=>
    '<div class="ob-billrow">'
    +'<input id="obBn'+i+'" value="'+esc(b.name||"")+'" placeholder="Bill name" class="ob-in" style="flex:2;min-width:0">'
    +'<input id="obBa'+i+'" value="'+esc(b.amount||"")+'" inputmode="decimal" placeholder="$" class="ob-in" style="flex:1;min-width:0">'
    +'<input id="obBd'+i+'" value="'+esc(b.day||"")+'" inputmode="numeric" placeholder="Day" class="ob-in" style="width:52px;flex:0 0 auto">'
    +'<button data-obdelbill="'+i+'" class="ob-del">'+I.x+'</button></div>').join("");
  return '<div class="ob-sub">Add bills you know are coming \u2014 rent, car payment, phone, subscriptions. Set the day of the month each is due.</div>'
    +(sugg?'<div class="ob-chips" style="margin-bottom:14px">'+sugg+'</div>':'')
    +(rows||'<div style="color:var(--dim);font-size:13px;margin-bottom:8px">No bills added yet.</div>')
    +'<button id="obAddBill" class="addline" style="margin-top:6px">'+I.plus+' Add a bill</button>'
    +obNav(true);
}
function obCats(){
  const chips=OB_CATS.map(c=>'<button data-obcat="'+esc(c)+'" class="ob-chip'+(OB.cats.includes(c)?" on":"")+'">'+esc(c)+'</button>').join("");
  const custom=OB.cats.filter(c=>!OB_CATS.includes(c)).map(c=>'<button data-obcat="'+esc(c)+'" class="ob-chip on">'+esc(c)+' &times;</button>').join("");
  return '<div class="ob-sub">Add spending categories like groceries, gas, food, clothes, or fun. Tap to add or remove.</div>'
    +'<div class="ob-chips" style="margin-bottom:12px">'+chips+custom+'</div>'
    +'<div style="display:flex;gap:8px"><input id="obNewCat" placeholder="Add your own" class="ob-in" style="flex:1;min-width:0"><button id="obAddCat" class="btn btn-ghost" style="width:auto;flex:0 0 auto;padding:11px 18px;color:var(--text)">Add</button></div>'
    +obNav(true);
}
function obGoal(){
  return '<div class="ob-sub">Want to set money aside each month? Add a savings goal, or skip it.</div>'
    +fieldHTML("obGoal","Monthly savings goal (optional)",OB.goal,"number","e.g. 200","")
    +'<div style="font-size:12px;color:var(--dim);margin-top:8px;line-height:1.55">When you finish, Allotted builds your first month from these answers \u2014 income, bills, and categories ready to go.</div>'
    +obNav(true,"Done \u2014 build my budget");
}
function obRender(){
  const dots='<div style="display:flex;gap:6px;justify-content:center;margin-bottom:18px">'
    +[1,2,3,4,5].map(i=>'<span style="width:7px;height:7px;border-radius:99px;background:'+(i<=OB.step?'var(--teal)':'var(--line)')+'"></span>').join("")+'</div>';
  let title="",body="";
  if(OB.step===1){title="Let\u2019s build your first budget";body=obIncome();}
  else if(OB.step===2){title="When do you get paid?";body=obPay();}
  else if(OB.step===3){title="Add your bills";body=obBills();}
  else if(OB.step===4){title="What do you spend on?";body=obCats();}
  else{title="One last thing";body=obGoal();}
  sheet(title,dots+body);
  obWire();
}
// pull the current step's inputs into OB before any navigation/re-render
function obReadStep(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:undefined;};
  if(OB.step===1){const v=g("obIncome");if(v!==undefined)OB.income=v;}
  else if(OB.step===2){const a=g("obPayday");if(a!==undefined)OB.payday=a;const b=g("obPay");if(b!==undefined)OB.pay=b;}
  else if(OB.step===3){OB.bills.forEach((bl,i)=>{const n=g("obBn"+i),am=g("obBa"+i),dy=g("obBd"+i);if(n!==undefined)bl.name=n;if(am!==undefined)bl.amount=am;if(dy!==undefined)bl.day=dy;});}
  else if(OB.step===5){const v=g("obGoal");if(v!==undefined)OB.goal=v;}
}
function obNext(){obReadStep();if(OB.step<5){OB.step++;obRender();}else obFinish();}
function obBack(){obReadStep();if(OB.step>1){OB.step--;obRender();}}
function obSkip(){closeModal();OB=null;S.months[mk]=blankMonth();S.settings.onboardingCompleted=true;tab="dashboard";commit();}
function obWire(){
  const nx=document.getElementById("obNext");if(nx)nx.onclick=obNext;
  const bk=document.getElementById("obBack");if(bk)bk.onclick=obBack;
  const sk=document.getElementById("obSkip");if(sk)sk.onclick=obSkip;
  document.querySelectorAll("[data-obfreq]").forEach(b=>b.onclick=()=>{obReadStep();OB.freq=b.dataset.obfreq;obRender();});

function obFinish(){
  obReadStep();
  const income=parseFloat(OB.income)||0, goal=parseFloat(OB.goal)||0;
  const cleanBills=OB.bills.filter(b=>b.name&&b.name.trim());
  // build the first month from the answers
  const month={
    income:[{id:nid(),name:"Take-home pay",amount:income}],
    savings:[{id:nid(),name:"Savings",amount:goal}],
    groups:[]
  };
  const billItems=cleanBills.map(b=>({id:nid(),name:b.name.trim(),planned:parseFloat(b.amount)||0,actual:0,txns:[],recurring:true,dueDay:Math.min(31,Math.max(1,parseInt(b.day)||1))}));
  if(billItems.length)month.groups.push({id:nid(),name:"Bills",items:billItems});
  const catItems=OB.cats.filter(c=>c&&c.trim()).map(c=>({id:nid(),name:c.trim(),planned:0,actual:0,txns:[],recurring:false}));
  month.groups.push({id:nid(),name:"Spending",items:catItems});
  month.groups.push({id:nid(),name:"Other",items:[]});
  S.months[mk]=month;
  // bills are recurring budget lines now — no separate store
  S.bills=[];
  // settings
  S.settings.onboardingCompleted=true;
  S.settings.monthlyIncome=income;
  S.settings.savingsGoal=goal;
  S.settings.payFrequency=OB.freq||"biweekly";
  S.settings.nextPayday=OB.payday||"";
  S.settings.payAmount=parseFloat(OB.pay)||0;
  closeModal();OB=null;tab="dashboard";commit();
  toast("Done \u2014 your first budget is ready");
}

let heroState={key:null,val:null};
function animateHero(){
  const el=document.getElementById("heroNum");
  if(!el){heroState={key:null,val:null};return;}
  const to=parseFloat(el.dataset.to), key=el.dataset.key;
  const reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  if(reduce||heroState.key!==key||heroState.val===null||isNaN(to)){
    heroState={key,val:isNaN(to)?0:to};return; // new view or reduced motion → no count
  }
  if(Math.abs(heroState.val-to)<0.5){heroState.val=to;return;}
  const from=heroState.val, start=performance.now(), dur=460;
  heroState.val=to;
  const step=now=>{
    let p=Math.min((now-start)/dur,1); p=1-Math.pow(1-p,3);
    const v=from+(to-from)*p;
    if(el.dataset.to!==String(to))return; // a newer render superseded this
    el.textContent=fmt(v);
    if(p<1)requestAnimationFrame(step); else el.textContent=fmt(to);
  };
  requestAnimationFrame(step);
}

function pacingNote(){
  const now=new Date();
  const curKey=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  if(mk!==curKey)return "";
  const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  return "day "+now.getDate()+" of "+dim;
}

// "Safe to spend today": flexible (non-recurring) money left, spread over days remaining.
// Bills (recurring) are committed, so they're excluded from the daily pool.
function safeToSpend(m){
  if(!m)return null;
  const now=new Date();
  const curKey=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  if(mk!==curKey)return null; // only meaningful for the live month
  const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const daysLeft=Math.max(1,dim-now.getDate()+1);
  let pool=0,flexPlanned=0,flexSpent=0;
  m.groups.forEach(g=>g.items.forEach(i=>{
    if(i.recurring)return;
    flexPlanned+=(i.planned||0);
    flexSpent+=(i.actual||0);
    pool+=(i.planned||0)-(i.actual||0);
  }));
  if(flexPlanned<=0)return null;
  return {perDay:Math.max(0,pool)/daysLeft,pool:pool,daysLeft:daysLeft,flexPlanned:flexPlanned,flexSpent:flexSpent,over:pool<-0.5};
}

function openGroupTxns(gid){
  const m=M();if(!m)return;
  const g=m.groups.find(x=>x.id===gid);
  if(!g)return;
  const gp=g.items.reduce((s,i)=>s+(i.planned||0),0);
  const ga=g.items.reduce((s,i)=>s+(i.actual||0),0);
  const rem=gp-ga;
  let entries=[];
  g.items.forEach(i=>(i.txns||[]).forEach(x=>entries.push({iid:i.id,item:i.name,x:x})));
  entries.sort((a,b)=>(b.x.date||"").localeCompare(a.x.date||""));
  const rows=entries.map(e=>
    '<div class="irow" data-gtxedit="'+e.iid+':'+e.x.id+'" style="cursor:pointer">'
    +'<div><div style="font-weight:700;font-size:13.5px" class="mono">'+fmtC(e.x.amount)+(e.x.note?' <span style="color:var(--dim);font-weight:400;font-family:inherit">· '+esc(e.x.note)+'</span>':'')+'</div>'
    +'<div style="font-size:11px;margin-top:2px"><span style="color:var(--teal);font-weight:600">'+esc(e.item)+'</span><span class="mono" style="color:var(--dim)"> · '+esc(e.x.date||'')+'</span></div></div>'
    +'<span style="color:var(--dim);opacity:.5;display:flex">'+I.right+'</span></div>'
  ).join("")||'<div style="color:var(--dim);font-size:12.5px;padding:6px 0">No transactions in this category yet this month.</div>';
  sheet(esc(g.name),
    '<div class="mono" style="font-size:12.5px;color:'+(rem<0?"var(--red)":"var(--dim)")+';margin-bottom:14px">'+fmt(ga)+' spent of '+fmt(gp)+' · '+fmt(rem)+' left</div>'
    +'<div class="label" style="margin-bottom:6px">'+monthName(mk)+' · '+entries.length+' transaction'+(entries.length!==1?'s':'')+'</div>'
    +rows);
  document.querySelectorAll("[data-gtxedit]").forEach(b=>b.onclick=()=>{const p=b.dataset.gtxedit.split(":");openTxnEdit(gid,p[0],p[1],()=>openGroupTxns(gid));});
}

function markPaid(gid,iid){
  const m=M();if(!m)return;
  const g=m.groups.find(x=>x.id===gid);const i=g&&g.items.find(x=>x.id===iid);
  if(!i)return;
  const due=(i.planned||0)-(i.actual||0);
  if(due<=0.5){toast(i.name+" is already at plan","var(--orange)");return;}
  i.txns=i.txns||[];
  const _tid=nid();
  i.txns.push({id:_tid,date:new Date().toISOString().slice(0,10),amount:due,note:"Paid in full"});
  recalcItem(i);commit();
  toast("Paid "+fmtC(due)+" · "+i.name,"var(--teal)",()=>{
    i.txns=(i.txns||[]).filter(x=>x.id!==_tid);recalcItem(i);commit();toast("Payment undone","var(--dim)");
  });
}

function payAllRecurring(){
  const m=M();if(!m)return;
  let count=0,sum=0;const today=new Date().toISOString().slice(0,10);const undoList=[];
  m.groups.forEach(g=>g.items.forEach(i=>{
    const due=(i.planned||0)-(i.actual||0);
    if(i.recurring&&due>0.5){i.txns=i.txns||[];const tid=nid();i.txns.push({id:tid,date:today,amount:due,note:"Paid in full"});recalcItem(i);undoList.push({i:i,tid:tid});count++;sum+=due;}
  }));
  if(!count){toast("No recurring bills due","var(--orange)");return;}
  commit();
  toast("Logged "+count+" bill"+(count>1?'s':'')+" · "+fmtC(sum)+" paid","var(--teal)",()=>{
    undoList.forEach(o=>{o.i.txns=(o.i.txns||[]).filter(x=>x.id!==o.tid);recalcItem(o.i);});
    commit();toast("Undone "+count+" payment"+(count>1?'s':''),"var(--dim)");
  });
}

function donutHTML(m){
  if(!m)return "";
  const palette=["#2DD4BF","#F59B45","#A78BFA","#60A5FA","#F472B6","#34D399","#FBBF24","#F87171","#818CF8","#22D3EE"];
  let cats=[];
  m.groups.forEach(g=>{const sp=g.items.reduce((s,i)=>s+(i.actual||0),0);if(sp>0.005)cats.push({name:g.name,spent:sp});});
  cats.sort((a,b)=>b.spent-a.spent);
  const total=cats.reduce((s,c)=>s+c.spent,0);
  if(total<=0||!cats.length)return "";
  let off=0,segs="",legend="";
  cats.forEach((c,idx)=>{
    const col=palette[idx%palette.length];
    const pct=c.spent/total*100;
    segs+='<circle cx="18" cy="18" r="15.915" fill="none" stroke="'+col+'" stroke-width="4.2" stroke-dasharray="'+pct.toFixed(2)+' '+(100-pct).toFixed(2)+'" stroke-dashoffset="'+(-off).toFixed(2)+'" transform="rotate(-90 18 18)"/>';
    off+=pct;
    legend+='<div style="display:flex;align-items:center;justify-content:space-between;font-size:12.5px;padding:3.5px 0">'
      +'<span style="display:flex;align-items:center;gap:7px;min-width:0"><span style="width:9px;height:9px;border-radius:2px;background:'+col+';flex-shrink:0"></span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(c.name)+'</span></span>'
      +'<span class="mono" style="color:var(--dim);flex-shrink:0;margin-left:10px">'+fmt(c.spent)+' · '+pct.toFixed(0)+'%</span></div>';
  });
  return '<div class="card" style="margin-top:14px"><div class="label" style="margin-bottom:14px">'+monthName(mk)+' spending by category</div>'
    +'<div style="display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap">'
    +'<div style="position:relative;width:130px;height:130px;flex-shrink:0">'
    +'<svg viewBox="0 0 36 36" width="130" height="130">'+segs+'</svg>'
    +'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none">'
    +'<div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em">Spent</div>'
    +'<div class="mono" style="font-size:17px;font-weight:800">'+fmt(total)+'</div></div></div>'
    +'<div style="flex:1 1 200px;max-width:300px;min-width:170px">'+legend+'</div>'
    +'</div></div>';
}

function openReorder(){

  if(!m||!m.groups.length){toast("No categories to reorder yet");return;}
  function rows(){
    return m.groups.map((g,idx)=>
      '<div class="rerow" data-gid="'+g.id+'" style="display:flex;align-items:center;gap:6px;background:var(--inset);border:1px solid var(--line);border-radius:13px;padding:11px 10px 11px 4px;margin-bottom:8px;user-select:none;-webkit-user-select:none">'

      +'<span style="flex:1;font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(g.name)+'</span>'
      +'<button data-reup="'+g.id+'"'+(idx===0?' disabled':'')+' style="background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:9px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;opacity:'+(idx===0?'.25':'1')+'">'+I.chevUp+'</button>'
      +'<button data-redown="'+g.id+'"'+(idx===m.groups.length-1?' disabled':'')+' style="background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:9px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;opacity:'+(idx===m.groups.length-1?'.25':'1')+'">'+I.chevDown+'</button>'
      +'</div>').join("");
  }
  sheet("Reorder categories",
    '<div style="color:var(--dim);font-size:12.5px;line-height:1.5;margin-bottom:14px">Drag the handle, or tap the arrows. Applies to '+monthName(mk)+'.</div>'
    +'<div id="relist">'+rows()+'</div>');
  function commitFromDOM(){
    const ids=[...document.querySelectorAll("#relist .rerow")].map(r=>r.dataset.gid);
    m.groups.sort((a,b)=>ids.indexOf(a.id)-ids.indexOf(b.id));
    save();render();
  }
  function rebuild(){const l=document.getElementById("relist");if(l){l.innerHTML=rows();wire();}}
  function wire(){
    document.querySelectorAll("[data-reup]").forEach(b=>b.onclick=()=>{
      const i=m.groups.findIndex(g=>g.id===b.dataset.reup);
      if(i>0){const a=m.groups;[a[i-1],a[i]]=[a[i],a[i-1]];save();render();rebuild();}
    });
    document.querySelectorAll("[data-redown]").forEach(b=>b.onclick=()=>{
      const i=m.groups.findIndex(g=>g.id===b.dataset.redown);
      if(i>=0&&i<m.groups.length-1){const a=m.groups;[a[i+1],a[i]]=[a[i],a[i+1]];save();render();rebuild();}
    });
    const list=document.getElementById("relist");
    list.querySelectorAll(".rehandle").forEach(h=>{
      h.onpointerdown=(e)=>{
        e.preventDefault();
        const drag=h.closest(".rerow");
        let baseY=e.clientY;
        drag.style.transition="none";drag.style.position="relative";drag.style.zIndex="20";
        drag.style.boxShadow="0 10px 28px rgba(0,0,0,.55)";drag.style.opacity=".97";
        const move=(ev)=>{
          drag.style.transform="translateY("+(ev.clientY-baseY)+"px)";
          const dRect=drag.getBoundingClientRect(),dMid=dRect.top+dRect.height/2;
          for(const r of [...list.querySelectorAll(".rerow")]){
            if(r===drag)continue;
            const rect=r.getBoundingClientRect(),mid=rect.top+rect.height/2;
            const rAfter=!!(drag.compareDocumentPosition(r)&Node.DOCUMENT_POSITION_FOLLOWING);
            if(rAfter&&dMid>mid){list.insertBefore(drag,r.nextSibling);baseY=ev.clientY;drag.style.transform="translateY(0)";break;}
            if(!rAfter&&dMid<mid){list.insertBefore(drag,r);baseY=ev.clientY;drag.style.transform="translateY(0)";break;}
          }
        };
        const up=()=>{
          document.removeEventListener("pointermove",move);
          document.removeEventListener("pointerup",up);
          drag.style.transition="";drag.style.transform="";drag.style.position="";
          drag.style.zIndex="";drag.style.boxShadow="";drag.style.opacity="";
          commitFromDOM();rebuild();
        };
        document.addEventListener("pointermove",move);
        document.addEventListener("pointerup",up);
      };
    });
  }
  wire();
}

// ================= v2 features: paycheck, bills, dashboard, debts, review =================
function todayLocal(){const n=new Date();return new Date(n.getFullYear(),n.getMonth(),n.getDate());}
function parseYMD(s){if(!s)return null;const p=String(s).split("-").map(Number);if(p.length<3||!p[0])return null;return new Date(p[0],p[1]-1,p[2]);}
function ymKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function dayDiff(a,b){return Math.round((b-a)/86400000);}
function clampDay(y,m,day){return Math.min(day||1,daysInMonth(y,m));}
function dateLabel(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}

// --- paycheck engine ---
const PERIODS_PER_MONTH={weekly:4.345,biweekly:2.17,semimonthly:2,monthly:1,custom:30/14};
function nextPaydayDate(){
  const s=S.settings; if(!s.payFrequency||!s.nextPayday)return null;
  const anchor=parseYMD(s.nextPayday); if(!anchor)return null;
  const today=todayLocal();
  let d=new Date(anchor);
  const step=()=>{
    if(s.payFrequency==="weekly")d.setDate(d.getDate()+7);
    else if(s.payFrequency==="biweekly")d.setDate(d.getDate()+14);
    else if(s.payFrequency==="custom")d.setDate(d.getDate()+(parseInt(s.customDays)||14));
    else if(s.payFrequency==="monthly")d.setMonth(d.getMonth()+1);
    else if(s.payFrequency==="semimonthly")d.setDate(d.getDate()+15);
  };
  let guard=0;
  while(d<today&&guard<800){step();guard++;}
  return d;
}
function paydayInfo(){
  const next=nextPaydayDate(); if(!next)return null;
  const today=todayLocal();
  const s=S.settings;
  let prev=new Date(next);
  if(s.payFrequency==="weekly")prev.setDate(prev.getDate()-7);
  else if(s.payFrequency==="biweekly")prev.setDate(prev.getDate()-14);
  else if(s.payFrequency==="custom")prev.setDate(prev.getDate()-(parseInt(s.customDays)||14));
  else if(s.payFrequency==="monthly")prev.setMonth(prev.getMonth()-1);
  else if(s.payFrequency==="semimonthly")prev.setDate(prev.getDate()-15);
  const start=prev<today?today:prev; // period we care about starts no earlier than today's paycheck window
  return {next,prev,daysUntil:Math.max(0,dayDiff(today,next)),periodStart:prev,today};
}
// every recurring-line occurrence (paid or not) with a due date inside [from, to]
function billOccurrencesBetween(from,to){
  const out=[];
  let y=from.getFullYear(),mo=from.getMonth();
  const endY=to.getFullYear(),endMo=to.getMonth();
  let guard=0;
  while((y<endY||(y===endY&&mo<=endMo))&&guard<24){
    const key=y+"-"+String(mo+1).padStart(2,"0");
    const mm=S.months[key];
    if(mm&&mm.groups){
      mm.groups.forEach(g=>(g.items||[]).forEach(i=>{
        if(!i.recurring)return;
        const dd=clampDay(y,mo,i.dueDay||1);
        const occ=new Date(y,mo,dd);
        if(occ>=from&&occ<=to) out.push({item:i,amount:i.planned||0,date:occ,monthKey:key,paid:itemPaid(i)});
      }));
    }
    mo++; if(mo>11){mo=0;y++;} guard++;
  }
  return out.sort((a,b)=>a.date-b.date);
}
function billsBeforePayday(){
  const pi=paydayInfo(); if(!pi)return null;
  const occ=billOccurrencesBetween(pi.today,pi.next);
  const unpaid=occ.filter(o=>!o.paid);
  return {occ,unpaid,total:occ.reduce((s,o)=>s+(o.amount||0),0),unpaidTotal:unpaid.reduce((s,o)=>s+(o.amount||0),0),info:pi};
}
// flexible (non-bill) spending logged within a date window, from budget envelopes
function flexibleSpentBetween(from,to){
  let sum=0;
  Object.values(S.months).forEach(m=>{if(!m||!m.groups)return;m.groups.forEach(g=>g.items.forEach(i=>{
    if(i.recurring)return; // recurring envelopes mirror bills; exclude to avoid double count
    (i.txns||[]).forEach(x=>{const d=parseYMD(x.date);if(d&&d>=from&&d<=to)sum+=(parseFloat(x.amount)||0);});
  }));});
  return sum;
}
// rollover: unused (or overspent) money carried from prior months for a category, by name
function rolloverCarry(monthKey,gName,iName,depth){
  depth=depth||0; if(depth>240)return 0;
  const prevKey=latestBefore(monthKey); if(!prevKey)return 0;
  const pm=S.months[prevKey]; if(!pm||!pm.groups)return 0;
  const pg=pm.groups.find(g=>g.name===gName); if(!pg)return 0;
  const pi=pg.items.find(it=>it.name===iName); if(!pi||!pi.rollover)return 0;
  return (pi.planned||0)+rolloverCarry(prevKey,gName,iName,depth+1)-(pi.actual||0);
}
// distinct recent transaction notes/merchants, newest first
function recentNotes(n){
  const all=[],seen=[],out=[];
  Object.values(S.months).forEach(m=>m&&m.groups&&m.groups.forEach(g=>g.items.forEach(i=>(i.txns||[]).forEach(x=>{if(x.note&&x.note.trim())all.push({note:x.note.trim(),date:x.date||""});}))));
  all.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  for(const x of all){const k=x.note.toLowerCase();if(seen.indexOf(k)<0){seen.push(k);out.push(x.note);}if(out.length>=(n||6))break;}
  return out;
}
function safeUntilPayday(){
  const s=S.settings;
  const bb=billsBeforePayday(); if(!bb)return null;
  const pi=bb.info;
  const pay=parseFloat(s.payAmount)||0;
  if(pay<=0)return {needPay:true,info:pi};
  const periodDays=Math.max(1,dayDiff(pi.prev,pi.next));
  const savingsForPeriod=(parseFloat(s.savingsGoal)||0)*(periodDays/30);
  const spent=flexibleSpentBetween(pi.periodStart,pi.today);
  const left=pay-savingsForPeriod-bb.total-spent;
  const days=Math.max(1,pi.daysUntil);
  return {pay,savingsForPeriod,billsTotal:bb.total,unpaidTotal:bb.unpaidTotal,spent,left,perDay:Math.max(0,left)/days,daysUntil:pi.daysUntil,info:pi,over:left<-0.5,bb};
}

// --- bill status (a bill is a recurring budget line in the current month) ---
function billStatus(i){
  if(itemPaid(i))return {state:"paid",label:"Paid",color:"var(--teal)",bg:"var(--tealsoft)"};
  const today=todayLocal();const y=today.getFullYear(),mo=today.getMonth();
  if(i.dueDay){
    const due=new Date(y,mo,clampDay(y,mo,i.dueDay));
    if(due<today)return {state:"overdue",label:"Overdue",color:"var(--red)",bg:"var(--redsoft)",due};
    const dleft=dayDiff(today,due);
    if(dleft<=7)return {state:"soon",label:dleft===0?"Due today":"Due in "+dleft+"d",color:"var(--orange)",bg:"var(--orangesoft)",due};
    return {state:"upcoming",label:"Due "+dateLabel(due),color:"var(--dim)",bg:"var(--inset)",due};
  }
  return {state:"unpaid",label:"Unpaid",color:"var(--orange)",bg:"var(--orangesoft)"};
}
function unpayBill(gid,iid){
  const m=M();if(!m)return;const g=m.groups.find(x=>x.id===gid);const i=g&&g.items.find(x=>x.id===iid);if(!i)return;
  const idx=(i.txns||[]).map(x=>x.note).lastIndexOf("Paid in full");
  if(idx>=0)i.txns.splice(idx,1); else i.txns=[];
  recalcItem(i);commit();toast("Marked unpaid","var(--dim)");
}

// --- dashboard ---
function feedbackLines(m,t){
  const out=[];
  const paycheck=S.settings.paycheckMode&&paydayInfo();
  if(paycheck){
    const sp=safeUntilPayday();
    if(sp&&!sp.needPay){
      if(sp.over)out.push({t:"You're "+fmt(-sp.left)+" short before payday — ease off flexible spending.",c:"var(--red)"});
      else out.push({t:"You have "+fmt(sp.left)+" for flexible spending until payday.",c:"var(--teal)"});
    }
    if(sp&&sp.bb&&sp.bb.unpaid.length)out.push({t:"You have "+sp.bb.unpaid.length+" unpaid bill"+(sp.bb.unpaid.length>1?"s":"")+" before payday.",c:"var(--orange)"});
  }else if(m){
    const sts=safeToSpend(m);
    if(sts&&!sts.over)out.push({t:"You have "+fmt(sts.pool)+" left for flexible spending this month.",c:"var(--teal)"});
    else if(sts&&sts.over)out.push({t:"You're over your flexible budget by "+fmt(-sts.pool)+".",c:"var(--red)"});
  }
  // category warnings
  if(m)m.groups.forEach(g=>g.items.forEach(i=>{
    if(i.recurring||!(i.planned>0))return;
    const r=(i.planned)-(i.actual||0);
    if(r<-0.5)out.push({t:"You're over budget in "+esc(i.name)+".",c:"var(--red)"});
    else if(i.actual>=i.planned*0.9)out.push({t:esc(i.name)+" is almost maxed out.",c:"var(--orange)"});
  }));
  if(!out.length)out.push({t:"You're on track. Nice work.",c:"var(--teal)"});
  return out.slice(0,3);
}

// --- debts ---
function debtList(){return (S.debts||[]).map(d=>({id:d.id,name:d.name,bal:parseFloat(d.balance)||0,apr:parseFloat(d.apr)||0,min:parseFloat(d.minPayment)||0})).filter(d=>d.bal>0.005);}
function debtOrder(strategy,list){list=(list||debtList()).slice();return list.sort((a,b)=>strategy==="snowball"?((a.bal-b.bal)||(b.apr-a.apr)):((b.apr-a.apr)||(a.bal-b.bal)));}
function debtPayoff(strategy,extra){
  let list=debtList().map(d=>({bal:d.bal,apr:d.apr,min:d.min}));
  if(!list.length)return {months:0,interest:0};
  const budget=list.reduce((s,d)=>s+d.min,0)+(extra||0);
  let months=0,interest=0,guard=0;
  while(list.some(d=>d.bal>0.005)){
    if(++guard>1200)return {months:Infinity,interest:Infinity};
    months++;
    list.forEach(d=>{if(d.bal>0.005){const i=d.bal*(d.apr/100/12);d.bal+=i;interest+=i;}});
    let avail=budget;
    list.forEach(d=>{if(d.bal>0.005&&avail>0){const pay=Math.min(d.min,d.bal,avail);d.bal-=pay;avail-=pay;}});
    debtOrder(strategy,list.filter(d=>d.bal>0.005)).forEach(d=>{if(avail>0.005&&d.bal>0.005){const pay=Math.min(avail,d.bal);d.bal-=pay;avail-=pay;}});
    if(budget < list.reduce((s,d)=>s+d.bal*(d.apr/100/12),0))return {months:Infinity,interest:Infinity};
  }
  return {months,interest:Math.round(interest)};
}
function moTxt(m){if(!isFinite(m))return "\u2014";if(m<=0)return "0 mo";if(m<12)return m+" mo";const y=Math.floor(m/12),mm=m%12;return y+"y"+(mm?" "+mm+"m":"");}

// --- weekly review ---
function weeklyReviewHTML(){
  const today=todayLocal();
  const weekAgo=new Date(today);weekAgo.setDate(weekAgo.getDate()-6);
  let spent=0, byCat={};
  Object.values(S.months).forEach(m=>{if(!m||!m.groups)return;m.groups.forEach(g=>g.items.forEach(i=>{
    (i.txns||[]).forEach(x=>{const dd=parseYMD(x.date);if(dd&&dd>=weekAgo&&dd<=today){const a=parseFloat(x.amount)||0;spent+=a;byCat[g.name]=(byCat[g.name]||0)+a;}});
  }));});
  const top=Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
  const nextWeek=new Date(today);nextWeek.setDate(nextWeek.getDate()+7);
  const dueNext=billOccurrencesBetween(today,nextWeek);
  const m=M();
  let nearLimit=[];
  if(m)m.groups.forEach(g=>g.items.forEach(i=>{if(!i.recurring&&i.planned>0&&i.actual>=i.planned*0.85)nearLimit.push(i.name);}));
  let h='<div class="narrow">'+moreBackBtn("This week");
  h+='<div class="card" style="margin-bottom:14px;text-align:center;padding:20px 18px">'
    +'<div style="color:var(--dim);font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-bottom:6px">Spent in the last 7 days</div>'
    +'<div class="mono" style="font-size:34px;font-weight:800;letter-spacing:-.02em">'+fmt(spent)+'</div>'
    +(top?'<div style="font-size:12.5px;color:var(--dim);margin-top:8px">Most went to <b style="color:var(--text)">'+esc(top[0])+'</b> ('+fmt(top[1])+')</div>':'<div style="font-size:12.5px;color:var(--dim);margin-top:8px">No spending logged this week yet.</div>')
    +'</div>';
  h+='<div class="gcard" style="margin-bottom:14px">'
    +'<div class="grow" style="cursor:default"><div class="gn">Bills due next week</div><div class="gv">'+dueNext.length+'</div></div>'
    +(dueNext.length?dueNext.map(o=>'<div class="grow" style="cursor:default"><div class="gn" style="font-weight:500;color:var(--dim);font-size:13px">'+esc(o.item.name)+' · '+dateLabel(o.date)+'</div><div class="gv" style="font-size:13px">'+fmt(o.amount||0)+'</div></div>').join(""):'')
    +'</div>';
  // suggested action
  let action="You're on track — no action needed.";
  if(dueNext.some(o=>!o.paid))action="Mark upcoming bills paid as you pay them.";
  else if(nearLimit.length)action="Review "+esc(nearLimit[0])+" — it's close to its limit.";
  else if(spent===0)action="Log any spending from this week so your numbers stay accurate.";
  h+='<div class="card" style="background:var(--tealsoft);border-color:var(--tealb)"><div style="font-size:11px;color:var(--teal);text-transform:uppercase;letter-spacing:.09em;font-weight:700;margin-bottom:6px">Suggested next step</div><div style="font-size:14px;line-height:1.5">'+action+'</div></div>';
  h+='</div>';
  return h;
}

    s.monthlyIncome=parseFloat(document.getElementById("ps_income").value)||0;
    s.savingsGoal=parseFloat(document.getElementById("ps_savings").value)||0;
    s.payFrequency=freq;
    const cd=document.getElementById("ps_customDays");if(cd)s.customDays=parseInt(cd.value)||14;
    s.nextPayday=document.getElementById("ps_payday").value||"";
    s.payAmount=parseFloat(document.getElementById("ps_amount").value)||0;
    closeModal();commit();toast("Saved","var(--teal)");
  };
}

function backupStatus(){
  if(!S.lastBackup)return {text:"Never backed up — grab one now",color:"var(--orange)"};
  const days=Math.floor((Date.now()-S.lastBackup)/86400000);
  const txt=days<=0?"Backed up today":days===1?"Backed up yesterday":"Backed up "+days+" days ago";
  return {text:txt,color:days>7?"var(--orange)":"var(--teal)"};
}

function openSettings(){
  const bs=backupStatus();
  sheet("Settings &amp; data",
    '<div class="label" style="margin-bottom:8px">Appearance</div>'
    +'<div class="seg" style="margin-bottom:18px">'
    +'<button data-themeset="dark" style="'+(S.theme!=="light"?"background:var(--tealsoft);color:var(--teal)":"background:transparent;color:var(--dim)")+'">Dark</button>'
    +'<button data-themeset="light" style="'+(S.theme==="light"?"background:var(--tealsoft);color:var(--teal)":"background:transparent;color:var(--dim)")+'">Light</button>'
    +'</div>'
    +'<div class="label" style="margin-bottom:8px">Setup</div>'
    +'<button id="setPaycheck" class="btn btn-ghost" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:14px;font-size:14px;color:var(--text);margin-bottom:10px;text-align:left"><span style="color:var(--teal);display:flex">'+I.wallet+'</span> Income &amp; paycheck</button>'
    +'<button id="setBills" class="btn btn-ghost" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:14px;font-size:14px;color:var(--text);margin-bottom:10px;text-align:left"><span style="color:var(--teal);display:flex">'+I.receipt+'</span> Manage bills</button>'
    +'<button id="setDebts" class="btn btn-ghost" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:14px;font-size:14px;color:var(--text);margin-bottom:10px;text-align:left"><span style="color:var(--teal);display:flex">'+I.card+'</span> Manage debts</button>'
    +'<button id="obRestart" class="btn btn-ghost" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:14px;font-size:14px;color:var(--text);margin-bottom:10px;text-align:left"><span style="color:var(--teal);display:flex">'+I.gear+'</span> Re-run first-time setup</button>'
    +'<button id="setPrivacy" class="btn btn-ghost" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:14px;font-size:14px;color:var(--text);margin-bottom:18px;text-align:left"><span style="color:var(--teal);display:flex">'+I.shield+'</span> Privacy</button>'
    +'<div class="label" style="margin-bottom:8px">Backup &amp; data</div>'
    +'<div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:'+bs.color+';margin-bottom:10px"><span style="width:8px;height:8px;border-radius:99px;background:'+bs.color+';flex-shrink:0"></span>'+bs.text+'</div>'
    +'<div style="font-size:12px;color:var(--dim);margin-bottom:12px;line-height:1.5">Your data lives only on this device. Back it up regularly — if you clear your browser or delete the app without a backup, it\u2019s gone for good. Copy backup is the most reliable.</div>'
    +'<button id="bkCopy" class="btn btn-teal" style="display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 16px;border-radius:14px;font-size:14px;margin-bottom:10px"><span style="display:flex">'+I.copy+'</span> Copy backup to clipboard</button>'
    +'<button id="bkPaste" class="btn btn-ghost" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:14px;font-size:14px;color:var(--text);margin-bottom:10px;text-align:left"><span style="color:var(--orange);display:flex">'+I.up+'</span> Restore from pasted text</button>'
    +'<div style="height:1px;background:var(--line);margin:6px 0 12px"></div>'
    +'<button id="bkDown" class="btn btn-ghost" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:14px;font-size:14px;color:var(--text);margin-bottom:10px;text-align:left"><span style="color:var(--teal);display:flex">'+I.down+'</span> Download backup file (.json)</button>'
    +'<button id="csvExp" class="btn btn-ghost" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:14px;font-size:14px;color:var(--text);margin-bottom:10px;text-align:left"><span style="color:var(--teal);display:flex">'+I.down+'</span> Export transactions (.csv)</button>'
    +'<button id="bkUp" class="btn btn-ghost" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:14px;font-size:14px;color:var(--text);margin-bottom:10px;text-align:left"><span style="color:var(--orange);display:flex">'+I.up+'</span> Restore from file</button>'
    +'<button id="resetActuals" class="btn btn-ghost" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:14px;font-size:14px;color:var(--text);margin-bottom:10px;text-align:left"><span style="color:var(--teal);display:flex">'+I.copy+'</span> Clear transactions ('+monthShort(mk)+') — keep plan</button>'
    +'<button id="mDel" class="btn btn-ghost" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:14px;font-size:14px;color:var(--red);margin-bottom:10px;text-align:left"><span style="display:flex">'+I.warn+'</span> Clear '+monthName(mk)+' only</button>'
    +'<div style="height:1px;background:var(--line);margin:6px 0 12px"></div>'
    +'<button id="startOverAll" class="btn btn-ghost" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:14px;font-size:14px;color:var(--red);text-align:left"><span style="display:flex">'+I.left+'</span> Start over — back to welcome</button>'
    +'<div style="font-size:11px;color:var(--dim);margin-top:8px;line-height:1.5">Erases everything and returns to the welcome screen so you can pick a fresh start. Grab a backup first if you want to keep this data.</div>');

  const backupText=()=>JSON.stringify({...S,exported:new Date().toISOString()});

  document.querySelectorAll("[data-themeset]").forEach(b=>b.onclick=()=>{
    S.theme=b.dataset.themeset;applyTheme();save();
    document.querySelectorAll("[data-themeset]").forEach(x=>{
      const on=x.dataset.themeset===S.theme;
      x.style.background=on?"var(--tealsoft)":"transparent";
      x.style.color=on?"var(--teal)":"var(--dim)";
    });
  });

  const obR=document.getElementById("obRestart");if(obR)obR.onclick=()=>{closeModal();startOnboarding();};
  const sPay=document.getElementById("setPaycheck");if(sPay)sPay.onclick=()=>{closeModal();openPaycheckSettings();};
  const sBl=document.getElementById("setBills");if(sBl)sBl.onclick=()=>{closeModal();tab="bills";render();};
  const sDb=document.getElementById("setDebts");if(sDb)sDb.onclick=()=>{closeModal();tab="debt";render();};
  const sPr=document.getElementById("setPrivacy");if(sPr)sPr.onclick=()=>{closeModal();openPrivacy();};

  document.getElementById("bkCopy").onclick=async()=>{
    const txt=backupText();
    try{
      await navigator.clipboard.writeText(txt);
      S.lastBackup=Date.now();save();toast("Backup copied — paste it somewhere safe");
    }catch(e){
      // clipboard API blocked on file:// too — fall back to a selectable textarea
      openCopyFallback(txt);
    }
  };

  document.getElementById("bkPaste").onclick=()=>openPasteRestore();

  const ra=document.getElementById("resetActuals");
  if(ra)ra.onclick=()=>{
    const m=M();if(m){m.groups.forEach(g=>g.items.forEach(i=>{i.actual=0;i.txns=[];}));}
    closeModal();commit();toast("Transactions cleared for "+monthName(mk));
  };
  document.getElementById("bkDown").onclick=()=>{
    try{
      const blob=new Blob([JSON.stringify({...S,exported:new Date().toISOString()},null,2)],{type:"application/json"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);
      a.download="budget-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();
      URL.revokeObjectURL(a.href);S.lastBackup=Date.now();save();toast("Backup downloaded");
    }catch(e){toast("Download blocked — use Copy backup instead","var(--red)");}
  };
  document.getElementById("bkUp").onclick=()=>document.getElementById("fileInput").click();
  document.getElementById("csvExp").onclick=()=>{
    const rows=[["Month","Category","Line","Date","Amount","Note","Recurring"]];
    Object.keys(S.months).sort().forEach(k=>{
      const m=S.months[k];if(!m||!m.groups)return;
      m.groups.forEach(g=>g.items.forEach(i=>(i.txns||[]).forEach(x=>{
        rows.push([k,g.name,i.name,x.date||"",x.amount,x.note||"",i.recurring?"yes":"no"]);
      })));
    });
    if(rows.length<=1){toast("No transactions to export yet","var(--orange)");return;}
    const csvEsc=v=>{v=String(v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
    const csv=rows.map(r=>r.map(csvEsc).join(",")).join("\n");
    try{
      const blob=new Blob([csv],{type:"text/csv"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);
      a.download="allotted-transactions-"+new Date().toISOString().slice(0,10)+".csv";a.click();
      URL.revokeObjectURL(a.href);toast("Exported "+(rows.length-1)+" transactions to CSV");
    }catch(e){toast("Download blocked here — try from the installed app","var(--red)");}
  };
  document.getElementById("mDel").onclick=()=>{
    delete S.months[mk];closeModal();commit();toast(monthName(mk)+" cleared","var(--orange)");
  };

  let confirmWipe=false;
  const soAll=document.getElementById("startOverAll");
  if(soAll)soAll.onclick=()=>{
    if(!confirmWipe){
      confirmWipe=true;
      soAll.innerHTML='<span style="display:flex">'+I.warn+'</span> Tap again to erase everything';
      soAll.style.background="var(--redsoft)";
      soAll.style.borderColor="var(--red)";
      return;
    }
    S.months={};S.bills=[];S.debts=[];S.settings=defaultSettings();S.lastBackup=null;tab="budget";
    const now=new Date();mk=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
    closeModal();commit();toast("Starting fresh — pick an option to begin");
  };
}

function applyBackup(text){
  try{
    const d=JSON.parse(text.trim());
    if(!d.months)throw 0;
    adoptState(d);
    migrate();
    closeModal();commit();toast("Backup restored");
    return true;
  }catch(e){toast("That text isn't a valid backup","var(--red)");return false;}
}

function openCopyFallback(txt){
  sheet("Copy your backup",
    '<div style="font-size:13px;color:var(--dim);margin-bottom:12px;line-height:1.5">Tap inside, select all, and copy. Paste it into Notes or email it to yourself.</div>'
    +'<textarea id="bkArea" readonly style="width:100%;height:160px;background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:13px;color:var(--text);padding:12px;font-family:monospace;font-size:11px;outline:none;resize:none">'+esc(txt)+'</textarea>'
    +'<button id="bkSelAll" class="btn btn-teal" style="margin-top:12px">Select all</button>');
  const area=document.getElementById("bkArea");
  document.getElementById("bkSelAll").onclick=()=>{
    area.focus();area.select();
    try{document.execCommand("copy");toast("Copied to clipboard");}catch(e){toast("Selected — now press Ctrl/Cmd+C");}
    S.lastBackup=Date.now();save();
  };
}

function openPasteRestore(){
  sheet("Restore from text",
    '<div style="font-size:13px;color:var(--dim);margin-bottom:12px;line-height:1.5">Paste your backup text below and tap Restore. This replaces everything currently in the app.</div>'
    +'<textarea id="rsArea" placeholder="Paste backup text here…" style="width:100%;height:160px;background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:13px;color:var(--text);padding:12px;font-family:monospace;font-size:11px;outline:none;resize:none"></textarea>'
    +'<button id="rsGo" class="btn btn-teal" style="margin-top:12px">Restore</button>');
  document.getElementById("rsGo").onclick=()=>{
    const v=document.getElementById("rsArea").value;
    if(!v.trim()){toast("Paste your backup text first","var(--orange)");return;}
    applyBackup(v);
  };
}

// ================= events =================
function bind(){
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render();});
  document.querySelectorAll("[data-mnav]").forEach(b=>b.onclick=()=>{
    const dir=parseInt(b.dataset.mnav);
    mk=shiftMonth(mk,dir);
    // moving forward into an empty month → auto-carry the latest prior plan
    if(dir>0 && !S.months[mk]){
      const src=latestBefore(mk);
      if(src){S.months[mk]=cloneForward(src);save();}
    }
    render();
  });
  const sb=document.getElementById("settingsBtn");if(sb)sb.onclick=openSettings;
  const mpk=document.getElementById("mpick");if(mpk)mpk.onclick=openMonthPicker;
  document.querySelectorAll("[data-reorder]").forEach(b=>b.onclick=openReorder);
  document.querySelectorAll("[data-edit]").forEach(el=>el.onclick=()=>{
    const p=el.dataset.edit.split(":");
    if(p[0]==="item")openEditEntry("item",p[1],p[2]);
    else openEditEntry(p[0],p[1],p[1]);
  });
  document.querySelectorAll("[data-add]").forEach(el=>el.onclick=()=>{
    const p=el.dataset.add.split(":");
    if(p[0]==="item")openAddEntry("item",p[1]);
    else openAddEntry(p[0]);
  });
  document.querySelectorAll("[data-gdel]").forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const m=M();if(!m)return;
    const g=m.groups.find(x=>x.id===el.dataset.gdel);
    if(g&&g.items.length){toast("Delete the lines inside "+g.name+" first","var(--orange)");return;}
    m.groups=m.groups.filter(x=>x.id!==el.dataset.gdel);commit();
  });
  document.querySelectorAll("[data-goto]").forEach(el=>el.onclick=()=>{mk=el.dataset.goto;tab="budget";render();});
  document.querySelectorAll("[data-txn]").forEach(el=>el.onclick=()=>{const p=el.dataset.txn.split(":");openTxn(p[0],p[1]);});
  document.querySelectorAll("[data-gtxn]").forEach(el=>el.onclick=()=>openGroupTxns(el.dataset.gtxn));
  document.querySelectorAll("[data-paid]").forEach(el=>el.onclick=e=>{e.stopPropagation();const p=el.dataset.paid.split(":");markPaid(p[0],p[1]);});
  const pa=document.getElementById("payAllRec");if(pa)pa.onclick=payAllRecurring;
  const lt=document.getElementById("logTxn");if(lt)lt.onclick=openTxnPicker;
  const as=document.getElementById("addSpend");if(as)as.onclick=openAddSpend;
  const wob=document.getElementById("wOnboard");if(wob)wob.onclick=startOnboarding;
  const wbl=document.getElementById("wBlank");if(wbl)wbl.onclick=()=>{S.months[mk]=blankMonth();S.settings.onboardingCompleted=true;tab="dashboard";commit();};
  const wi=document.getElementById("wImport");if(wi)wi.onclick=openPasteRestore;
  const so=document.getElementById("startOver");if(so)so.onclick=()=>{delete S.months[mk];commit();};
  const cp=document.getElementById("copyPrev");
  if(cp)cp.onclick=()=>{
    const src=latestBefore(mk);
    if(!src)return;
    S.months[mk]=cloneForward(src);
    commit();toast("Plan carried over — actuals reset to zero");
  };
  const st=document.getElementById("startTemplate");
  if(st)st.onclick=()=>{S.months[mk]=templateMonth();commit();};
  // --- v2: bills ---
  const ab=document.getElementById("addBill");if(ab)ab.onclick=()=>openBillEdit();
  document.querySelectorAll("[data-billedit]").forEach(el=>el.onclick=()=>openBillEdit(el.dataset.billedit));
  document.querySelectorAll("[data-billpay]").forEach(el=>el.onclick=e=>{e.stopPropagation();const p=el.dataset.billpay.split(":");markPaid(p[0],p[1]);});
  document.querySelectorAll("[data-billunpay]").forEach(el=>el.onclick=e=>{e.stopPropagation();const p=el.dataset.billunpay.split(":");unpayBill(p[0],p[1]);});
  // --- v2: debts ---
  const adb=document.getElementById("addDebt");if(adb)adb.onclick=()=>openDebtEdit();
  document.querySelectorAll("[data-debtedit]").forEach(el=>el.onclick=()=>openDebtEdit(el.dataset.debtedit));
  document.querySelectorAll("[data-strat]").forEach(el=>el.onclick=()=>{S.debtPlan=S.debtPlan||{strategy:"avalanche",extra:0};S.debtPlan.strategy=el.dataset.strat;commit();});
  const ee=document.getElementById("editExtra");if(ee)ee.onclick=openExtraEdit;
  // --- v2: dashboard quick actions ---
  const dl=document.getElementById("dashLog");if(dl)dl.onclick=openTxnPicker;
  const dbv=document.getElementById("dashBills");if(dbv)dbv.onclick=()=>{tab="bills";render();};
  const ddt=document.getElementById("dashDebt");if(ddt)ddt.onclick=()=>{tab="debt";render();};
  // --- v2: more menu ---
  const mb=document.getElementById("moreBack");if(mb)mb.onclick=()=>{tab="more";render();};
  const my=document.getElementById("mYear");if(my)my.onclick=()=>{tab="year";render();};
  const md=document.getElementById("mBills");if(md)md.onclick=()=>{tab="bills";render();};
  const mw=document.getElementById("mWeekly");if(mw)mw.onclick=()=>{tab="weekly";render();};
  const ms=document.getElementById("mSettings");if(ms)ms.onclick=openSettings;
  const mp=document.getElementById("mPrivacy");if(mp)mp.onclick=openPrivacy;
}

document.getElementById("fileInput").addEventListener("change",e=>{
  const f=e.target.files&&e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{const d=JSON.parse(r.result);if(!d.months)throw 0;adoptState(d);migrate();closeModal();commit();toast("Backup restored");}
    catch(err){toast("That file doesn't look like a valid backup","var(--red)");}
  };
  r.readAsText(f);e.target.value="";
});

// desktop keyboard nav: ← / → switch months, Esc closes a sheet
document.addEventListener("keydown",e=>{
  if(document.getElementById("modal").innerHTML){if(e.key==="Escape")closeModal();return;}
  const tag=(e.target.tagName||"").toUpperCase();
  if(tag==="INPUT"||tag==="SELECT"||tag==="TEXTAREA")return;
  if(e.key==="ArrowLeft"){mk=shiftMonth(mk,-1);render();}
  else if(e.key==="ArrowRight"){
    mk=shiftMonth(mk,1);
    if(!S.months[mk]){const src=latestBefore(mk);if(src){S.months[mk]=cloneForward(src);save();}}
    render();
  }
});

// ================= go =================
load();
save();
render();
function showIntro(){
  if(document.getElementById("intro"))return;
  const el=document.createElement("div");el.id="intro";
  el.innerHTML='<svg class="ilogo" viewBox="0 0 100 100" width="90" height="90" aria-label="Allotted logo">'
    +'<line class="s1" x1="50" y1="20" x2="25" y2="81" stroke="var(--teal)" stroke-width="11" stroke-linecap="round"/>'
    +'<line class="s2" x1="50" y1="20" x2="75" y2="81" stroke="var(--orange)" stroke-width="11" stroke-linecap="round"/>'
    +'<line class="s3" x1="37" y1="57" x2="63" y2="57" stroke="var(--teal)" stroke-width="9" stroke-linecap="round"/>'
    +'</svg><div class="iw">Allotted</div><div class="it">Give every dollar a job</div>';
  document.body.appendChild(el);
  let done=false;
  const hide=()=>{if(done)return;done=true;el.classList.add("out");setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},560);};
  el.addEventListener("click",hide);
  setTimeout(hide,2600);
}
showIntro();
setTimeout(()=>{
  const week=7*86400000;
  const hasData=Object.keys(S.months).length>1||Object.values(S.months).some(m=>totals(m).actual>0);
  if(hasData&&(!S.lastBackup||Date.now()-S.lastBackup>week)){
    toast("Tip: grab a backup (⚙ → Download backup) — your data lives in this browser only","var(--orange)");
  }
},1500);
</script>
