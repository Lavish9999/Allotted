const incomeSheet=()=>sheet("Add income",`${field("name","Name","Take-home pay","text","Take-home pay")}${field("amount","Amount","","number","4200")}<button class="btn primary full" data-act="saveIncome">Save</button>`),savingsSheet=()=>sheet("Add savings",`${field("name","Name","Emergency fund","text","Emergency fund")}${field("amount","Amount","","number","600")}<button class="btn primary full" data-act="saveSavings">Save</button>`),categorySheet=()=>sheet("Add category",`${field("name","Category name","","text","Housing")}<button class="btn primary full" data-act="saveCategory">Save</button>`),itemSheet=gid=>{let g=state.groups.find(x=>x.id===gid);if(!g)return;sheet("Add line",`${field("name","Name","","text","Groceries")}${field("amount","Budget amount","","number","300")}${select("kind","Type","flex",[["flex","Flexible spending"],["bill","Recurring bill"]])}${field("dueDay","Due day for bills","","number","15")}<button class="btn primary full" data-act="saveItem" data-group="${g.id}">Save</button>`)}
function logTxnSheet(){let opts=allItems().filter(i=>i.kind!=="bill").map(i=>[i.id,`${i.groupName} · ${i.name}`]);sheet("Log transaction",`${opts.length?select("item","Category",opts[0]?.[0]||"",opts):`<div class="help">Add a flexible spending line first.</div>`}${field("amount","Amount","","number","45")}${field("note","Note optional","","text","Publix")}${field("date","Date",today(),"date")}<button class="btn primary full" data-act="saveTxn">Log transaction</button>`)}function payItemSheet(id){let i=itemById(id);if(!i)return;let left=itemLeft(i);sheet("Pay bill",`<div class="help">${esc(i.name)} has ${money0(left)} left this month.</div><button class="btn primary full" data-act="quickPayFull" data-id="${i.id}">Mark paid in full</button><div style="height:10px"></div>${field("amount","Partial payment amount",left||"","number","50")}${field("date","Date",today(),"date")}<button class="btn ghost full" data-act="saveBillPay" data-id="${i.id}">Save partial payment</button>`)}function quickPaySheet(){let bills=allItems().filter(i=>i.kind==="bill"&&itemLeft(i)>0);sheet("Pay recurring bill",`${bills.length?bills.map(i=>`<div class="row" style="padding-left:0;padding-right:0"><div><div class="rowTitle strong">${esc(i.name)}</div><div class="rowSub">${money0(itemLeft(i))} left · due day ${i.dueDay||1}</div></div><button class="pill pay" data-act="payItem" data-id="${i.id}">Pay</button></div>`).join(""):empty("All bills paid","Nothing needs a payment right now.")}`)}
function groupTxSheet(id){let g=state.groups.find(x=>x.id===id);if(!g)return;let ids=new Set(g.items.map(i=>i.id)),tx=txnsForMonth().filter(t=>ids.has(t.itemId)).sort((a,b)=>b.date.localeCompare(a.date)),s=groupStats(g);sheet(g.name,`<div class="help">${money(s.spent)} spent of ${money0(s.budget)} · ${money0(s.left)} left</div><div class="kicker" style="margin:10px 0">${monthName(state.month)} · ${tx.length} transactions</div>${tx.length?tx.map(t=>{let i=itemById(t.itemId);return `<div class="row" style="padding-left:0;padding-right:0"><div><div class="rowTitle strong">${money(t.amount)} · ${esc(t.note||i?.name||"Transaction")}</div><div class="rowSub"><span style="color:var(--teal);font-weight:900">${esc(i?.name||"Line")}</span> · ${t.date}</div></div><span class="chev">›</span></div>`}).join(""):empty("No transactions","Transactions will show here.")}`)}function itemTxSheet(id){let i=itemById(id);if(!i)return;let tx=txnsForMonth().filter(t=>t.itemId===id).sort((a,b)=>b.date.localeCompare(a.date));sheet(i.name,`<div class="help">${money(spentForItem(id))} spent of ${money0(i.budget)} · ${money0(itemLeft(i))} left</div>${tx.length?tx.map(t=>`<div class="row" style="padding-left:0;padding-right:0"><div><div class="rowTitle strong">${money(t.amount)} · ${esc(t.note||i.name)}</div><div class="rowSub">${t.date}</div></div><span class="chev">›</span></div>`).join(""):empty("No transactions","Transactions will show here.")}${i.kind==="bill"?`<button class="btn primary full" style="margin-top:12px" data-act="payItem" data-id="${i.id}">Pay bill</button>`:`<button class="btn primary full" style="margin-top:12px" data-act="logTxn">+ Log transaction</button>`}`)}
function settingsSheet(){sheet("Settings",`<div class="stack"><button class="btn ghost" data-act="toggleTheme">${state.theme==="light"?"Switch to dark mode":"Switch to light mode"}</button><button class="btn" data-act="backup">Download backup</button><button class="btn" data-act="demo">Load sample budget</button><button class="btn danger" data-act="reset">Reset app</button></div>`)}function exportBackup(){let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:"application/json"}));a.download="allotted-backup-"+today()+".json";a.click()}function toast(m){let t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),1600)}
function act(a,d={}){if(a==="close")return closeSheet();if(a==="openOnboarding")return onboardingSheet(false);if(a==="scratch")return onboardingSheet(true);if(a==="restore")return alert("Backup restore can be added when packaging the app.");if(a==="demo"){seed();toast("Sample loaded");return render()}if(a==="addOnboardCat"){let inp=$("#customCatName"),name=(inp?.value||"").trim();if(!name)return;let cats=getCustomCats();if(!cats.some(c=>c.toLowerCase()===name.toLowerCase()))cats.push(name);setCustomCats(cats);if(inp)inp.value="";return}if(a==="removeOnboardCat"){let cats=getCustomCats();cats.splice(Number(d.index),1);setCustomCats(cats);return}if(a==="finishOnboarding"){let income=num($("#income").value),template=$("#template")?.value||"simple",cats=getCustomCats();state=blank();state.income=income?[{id:uid(),name:"Take-home pay",amount:income}]:[];applyTemplate(template);cats.forEach(n=>{if(!state.groups.some(g=>g.name.toLowerCase()===n.toLowerCase()))state.groups.push({id:uid(),name:n,items:[]})});state.tab="budget";closeSheet();toast("Budget created");return render()}if(a==="prevMonth"){state.month=shiftMonth(state.month,-1);return render()}if(a==="nextMonth"){state.month=shiftMonth(state.month,1);return render()}if(a==="settings")return settingsSheet();if(a==="toggleTheme"){state.theme=state.theme==="light"?"dark":"light";toast(state.theme==="light"?"Light mode on":"Dark mode on");return render()}if(a==="backup"){exportBackup();return}if(a==="reset"){if(confirm("Erase local Allotted data?")){localStorage.removeItem(KEY);state=blank();return render()}return}if(a==="addIncome")return incomeSheet();if(a==="saveIncome"){state.income.push({id:uid(),name:$("#name").value||"Income",amount:num($("#amount").value)});closeSheet();return render()}if(a==="addSavings")return savingsSheet();if(a==="saveSavings"){state.savings.push({id:uid(),name:$("#name").value||"Savings",amount:num($("#amount").value)});closeSheet();return render()}if(a==="addCategory")return categorySheet();if(a==="saveCategory"){state.groups.push({id:uid(),name:$("#name").value||"New Category",items:[]});closeSheet();return render()}if(a==="addItem")return itemSheet(d.group);if(a==="saveItem"){let g=state.groups.find(x=>x.id===d.group);if(g)g.items.push({id:uid(),name:$("#name").value||"Line",budget:num($("#amount").value),kind:$("#kind").value,dueDay:num($("#dueDay").value)||1});closeSheet();return render()}if(a==="viewGroupTx")return groupTxSheet(d.group);if(a==="viewItemTx")return itemTxSheet(d.id);if(a==="logTxn")return logTxnSheet();if(a==="saveTxn"){state.txns.push({id:uid(),itemId:$("#item").value,amount:num($("#amount").value),date:$("#date").value||today(),type:"spend",note:$("#note").value||""});closeSheet();toast("Transaction logged");return render()}if(a==="quickPay")return quickPaySheet();if(a==="payItem")return payItemSheet(d.id);if(a==="quickPayFull"){let i=itemById(d.id);if(i){let left=itemLeft(i);if(left>0)state.txns.push({id:uid(),itemId:i.id,amount:left,date:today(),type:"bill",note:"Paid in full"})}closeSheet();toast("Bill paid");return render()}if(a==="saveBillPay"){let i=itemById(d.id);if(i){let amt=Math.min(num($("#amount").value),itemLeft(i));if(amt>0)state.txns.push({id:uid(),itemId:i.id,amount:amt,date:$("#date").value||today(),type:"bill",note:i.name})}closeSheet();toast("Payment saved");return render()}}
load();render();
})();
</script></body></html>
