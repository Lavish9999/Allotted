<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Allotted</title>
<meta name="description" content="Allotted — private manual budgeting that protects bill money and shows what is safe to spend.">
<meta name="theme-color" content="#0A0D0E">
<style>
:root{
  --bg:#0A0D0E;
  --paper:#F4F1E8;
  --ink:#101616;
  --muted:#687579;
  --subtle:#DCD7CA;
  --line:rgba(16,22,22,.14);
  --teal:#2DD4BF;
  --teal-dark:#0F766E;
  --amber:#F0A53B;
  --red:#E96363;
  --green:#36B37E;
  --night:#111719;
  --night2:#172024;
  --white:#FAFAF6;
  --shadow:rgba(0,0,0,.32);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--paper);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;letter-spacing:-.012em}
body{padding-bottom:calc(92px + env(safe-area-inset-bottom))}
button,input,select{font:inherit}
button{border:0;cursor:pointer;color:inherit;background:none}
input,select{width:100%;border:0;outline:none;background:rgba(255,255,255,.08);color:var(--paper);border-radius:14px;padding:13px 14px}
input[type=number]{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
#app{min-height:100vh}

/* Completely different layout: wallet/ledger, not card dashboard */
.shell{max-width:1040px;margin:0 auto}
.top{padding:calc(18px + env(safe-area-inset-top)) 16px 10px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.logo{width:42px;height:42px;flex:0 0 auto;filter:drop-shadow(0 12px 22px rgba(0,0,0,.28))}
.brandText b{display:block;font-size:18px;font-weight:950;line-height:1;letter-spacing:-.05em}
.brandText span{display:block;font-size:10.5px;color:rgba(244,241,232,.58);font-weight:850;text-transform:uppercase;letter-spacing:.12em;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.month{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:999px;padding:5px}
.month button{width:30px;height:30px;border-radius:50%;font-size:22px;color:rgba(244,241,232,.72)}
.month strong{font-size:12px;min-width:105px;text-align:center}

.wallet{padding:8px 16px 0}
.safePanel{
  background:
    linear-gradient(180deg,rgba(244,241,232,.96),rgba(232,225,208,.96));
  color:var(--ink);
  border-radius:34px 34px 10px 10px;
  padding:26px 22px 22px;
  box-shadow:0 28px 70px var(--shadow);
  position:relative;
  overflow:hidden;
}
.safePanel:before{
  content:"";position:absolute;right:-70px;top:-70px;width:210px;height:210px;border-radius:50%;
  background:radial-gradient(circle,rgba(45,212,191,.42),transparent 63%);
}
.safePanel>*{position:relative}
.kicker{font-size:11px;font-weight:950;text-transform:uppercase;letter-spacing:.16em;color:var(--muted)}
.safeAmount{font-size:clamp(56px,16vw,112px);font-weight:980;letter-spacing:-.10em;line-height:.86;margin:12px 0 8px}
.safeCopy{font-size:15px;line-height:1.48;color:#405054;max-width:560px}
.walletStrips{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(16,22,22,.10);border-radius:0 0 34px 34px;overflow:hidden;box-shadow:0 20px 56px var(--shadow)}
.strip{background:rgba(244,241,232,.90);color:var(--ink);padding:16px 14px;min-height:86px}
.strip span{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.14em;font-weight:950;color:#687579}
.strip b{display:block;font-size:22px;margin-top:7px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:-.05em}
.strip small{display:block;margin-top:4px;color:#6B7678;font-size:11.5px;line-height:1.25}

.actionRail{padding:15px 16px 4px;display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px}
.action{border-radius:20px;padding:15px 14px;background:var(--night2);border:1px solid rgba(255,255,255,.08);box-shadow:0 14px 34px rgba(0,0,0,.24);font-weight:950;text-align:left}
.action.primary{background:linear-gradient(135deg,var(--teal),#12A594);color:#062C27}
.action span{display:block;font-size:11px;color:inherit;opacity:.66;margin-top:3px;font-weight:800}

.page{padding:10px 16px 0}
.ledger{
  background:var(--paper);
  color:var(--ink);
  border-radius:28px;
  box-shadow:0 22px 58px var(--shadow);
  overflow:hidden;
  margin-bottom:14px;
}
.ledgerHead{padding:18px 18px 14px;border-bottom:1px dashed rgba(16,22,22,.22);display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
.ledgerTitle{font-size:20px;font-weight:950;letter-spacing:-.05em}
.ledgerSub{font-size:12.5px;color:#6A7477;line-height:1.4;margin-top:4px}
.ledgerBody{padding:5px 18px 16px}
.line{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:13px 0;border-bottom:1px solid rgba(16,22,22,.10)}
.line:last-child{border-bottom:0}
.lineName{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lineMeta{font-size:12px;color:#6A7477;margin-top:3px;line-height:1.3}
.money{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:950;white-space:nowrap}
.badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 8px;font-size:10.5px;font-weight:950;text-transform:uppercase;letter-spacing:.08em;background:rgba(16,22,22,.07);color:#5D696C}
.badge.teal{background:rgba(45,212,191,.16);color:#0F766E}.badge.red{background:rgba(233,99,99,.14);color:#B64040}.badge.amber{background:rgba(240,165,59,.18);color:#9A651C}.badge.green{background:rgba(54,179,126,.14);color:#147A52}

.sectionLabel{padding:18px 2px 8px;font-size:11px;text-transform:uppercase;letter-spacing:.16em;font-weight:950;color:rgba(244,241,232,.58)}
.stack{display:grid;gap:10px}
.planRow{background:var(--night2);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:15px}
.planTop{display:flex;justify-content:space-between;gap:12px;align-items:center}
.planTop b{font-size:15px}
.planTop .money{color:var(--paper)}
.progress{height:7px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:10px}
.progress i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--teal),#6EE7B7);width:0%}
.quickForm{display:grid;gap:10px}
.formRow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{border-radius:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);padding:13px 14px;font-weight:950;display:inline-flex;justify-content:center;align-items:center;gap:8px}
.btn.primary{background:linear-gradient(135deg,var(--teal),#12A594);color:#062C27;border-color:transparent}
.btn.dark{background:var(--night);color:var(--paper)}
.btn.danger{background:rgba(233,99,99,.13);color:#FF9D9D;border-color:rgba(233,99,99,.26)}

.nav{position:fixed;left:0;right:0;bottom:calc(13px + env(safe-area-inset-bottom));z-index:30;display:flex;justify-content:center;pointer-events:none}
.navInner{pointer-events:auto;background:rgba(10,13,14,.84);border:1px solid rgba(255,255,255,.10);backdrop-filter:blur(20px);box-shadow:0 18px 54px rgba(0,0,0,.55);border-radius:999px;padding:6px;display:flex;gap:4px}
.nav button{border-radius:999px;color:rgba(244,241,232,.58);padding:10px 12px;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:950}
.nav button.on{background:var(--paper);color:var(--ink)}
.nav svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav span{display:none}.nav button.on span{display:inline}

.sheetBg{position:fixed;inset:0;background:rgba(0,0,0,.68);backdrop-filter:blur(6px);z-index:60;display:flex;align-items:flex-end;justify-content:center}
.sheet{width:min(520px,100%);max-height:88vh;overflow:auto;background:#101618;border:1px solid rgba(255,255,255,.10);border-radius:30px 30px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -20px 70px rgba(0,0,0,.55)}
.handle{width:44px;height:5px;border-radius:999px;background:rgba(255,255,255,.18);margin:0 auto 14px}
.sheetTitle{font-size:20px;font-weight:950;margin-bottom:14px}
.field{display:block;margin-bottom:12px}.field span{display:block;font-size:12px;font-weight:900;color:rgba(244,241,232,.58);margin-bottom:6px}
.empty{padding:22px;text-align:center;color:#6A7477}.empty b{display:block;color:var(--ink);font-size:17px;margin-bottom:5px}
.welcome{min-height:100vh;display:grid;place-items:center;padding:28px 16px}
.welcomeBox{width:min(620px,100%);text-align:center}
.welcomeMark{width:110px;height:110px;margin:0 auto 16px}
.welcome h1{font-size:clamp(44px,12vw,86px);font-weight:980;letter-spacing:-.095em;line-height:.88}
.welcome p{max-width:470px;margin:14px auto 24px;color:rgba(244,241,232,.68);line-height:1.55}
.welcomeActions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.copyLine{font-size:11px;color:rgba(244,241,232,.42);margin-top:14px}
@media(min-width:820px){
  .deskGrid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px;align-items:start}
  .wallet{padding-top:14px}
}
@media(max-width:720px){
  .walletStrips{grid-template-columns:1fr}
  .actionRail{grid-template-columns:1fr 1fr}.actionRail .primary{grid-column:1/-1}
  .formRow{grid-template-columns:1fr}
  .month strong{min-width:82px}
  .brandText span{max-width:150px}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal"></div>
<input id="fileInput" type="file" accept="application/json,.json" style="display:none">

<script>
const KEY="allotted-wallet-ledger-v1";
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today=()=>new Date().toISOString().slice(0,10);
const monthNow=()=>today().slice(0,7);
const fmt=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(Number(n)||0);
const fmt2=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2,maximumFractionDigits:2}).format(Number(n)||0);
const num=v=>Number(String(v??"").replace(/[$,]/g,""))||0;
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
function mName(k){const[y,m]=k.split("-").map(Number);return new Date(y,m-1,1).toLocaleDateString("en-US",{month:"short",year:"numeric"})}
function shift(k,n){const[y,m]=k.split("-").map(Number);const d=new Date(y,m-1+n,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function daysInMonth(k){const[y,m]=k.split("-").map(Number);return new Date(y,m,0).getDate()}
function daysLeft(k){const d=k===monthNow()?new Date().getDate():1;return Math.max(1,daysInMonth(k)-d+1)}
function dateForBill(b,k=state.month){const[y,m]=k.split("-").map(Number);const day=Math.min(num(b.dueDay)||1,new Date(y,m,0).getDate());return `${k}-${String(day).padStart(2,"0")}`}
function dObj(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)}
function diff(a,b){return Math.ceil((dObj(b)-dObj(a))/86400000)}
function emblem(size=42,cls="logo"){return `<svg class="${cls}" viewBox="0 0 96 96" role="img" aria-label="Allotted" style="width:${size}px;height:${size}px"><defs><linearGradient id="bg${size}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#121720"/><stop offset="100%" stop-color="#070A0F"/></linearGradient><linearGradient id="gl${size}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.14)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></linearGradient></defs><rect x="4" y="4" width="88" height="88" rx="22" fill="url(#bg${size})" stroke="rgba(255,255,255,.1)"/><rect x="5" y="5" width="86" height="86" rx="21" fill="url(#gl${size})" opacity=".55"/><path d="M30 67 L44 24" stroke="#2DD4BF" stroke-width="6.5" stroke-linecap="round"/><path d="M65 67 L51 24" stroke="#F0A53B" stroke-width="6.5" stroke-linecap="round"/><path d="M38.5 48 H56" stroke="#2DD4BF" stroke-width="6" stroke-linecap="round"/></svg>`}
function glyph(n){return {
home:`<svg viewBox="0 0 24 24"><path d="M4 11.5 12 4l8 7.5"></path><path d="M6.5 10.5V20h11v-9.5"></path></svg>`,
plan:`<svg viewBox="0 0 24 24"><path d="M4 7h16"></path><path d="M4 12h16"></path><path d="M4 17h11"></path></svg>`,
spend:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"></circle><path d="M12 8v8"></path><path d="M8 12h8"></path></svg>`,
bills:`<svg viewBox="0 0 24 24"><path d="M7 3.5h10v17H7z"></path><path d="M9.5 8h5"></path><path d="M9.5 12h5"></path><path d="M9.5 16h3"></path></svg>`,
more:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.8"></circle><circle cx="5" cy="12" r="1.8"></circle><circle cx="19" cy="12" r="1.8"></circle></svg>`
}[n]}
function blank(){return{month:monthNow(),tab:"home",income:[],bills:[],cats:[],txns:[],debts:[],pay:{freq:"biweekly",next:"",amount:0},billView:"upcoming"}}
let state=blank();
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function load(){try{state={...blank(),...JSON.parse(localStorage.getItem(KEY)||"{}")}}catch(e){state=blank()}}
function hasData(){return state.income.length||state.bills.length||state.cats.length||state.txns.length}
function demo(){state=blank();state.income=[{id:uid(),name:"Take-home pay",amount:5600}];state.pay={freq:"biweekly",next:today().slice(0,8)+"20",amount:2800};state.bills=[
{id:uid(),name:"Rent",amount:2237,dueDay:1,paid:{}},{id:uid(),name:"Car payment",amount:650,dueDay:15,paid:{}},{id:uid(),name:"Insurance",amount:220,dueDay:18,paid:{}},{id:uid(),name:"Phone",amount:145,dueDay:24,paid:{}}
];state.cats=[
{id:uid(),name:"Emergency fund",amount:300,type:"save"},{id:uid(),name:"Groceries",amount:650,type:"flex"},{id:uid(),name:"Gas",amount:240,type:"flex"},{id:uid(),name:"Eating out",amount:220,type:"flex"},{id:uid(),name:"Household",amount:180,type:"flex"}
];const g=state.cats.find(c=>c.name==="Groceries"), gas=state.cats.find(c=>c.name==="Gas"), e=state.cats.find(c=>c.name==="Eating out");state.txns=[{id:uid(),date:today(),type:"flex",cat:g.id,amount:87,note:"Publix"},{id:uid(),date:today(),type:"flex",cat:gas.id,amount:42,note:"Gas"},{id:uid(),date:today(),type:"flex",cat:e.id,amount:18,note:"Lunch"}];render()}
const flex=()=>state.cats.filter(c=>c.type==="flex"), saveCats=()=>state.cats.filter(c=>c.type==="save");
const txMonth=()=>state.txns.filter(t=>String(t.date).slice(0,7)===state.month);
function spentCat(id){return txMonth().filter(t=>t.cat===id&&t.type==="flex").reduce((s,t)=>s+num(t.amount),0)}
function paid(b){return !!(b.paid&&b.paid[state.month])}
function totals(){const income=state.income.reduce((s,i)=>s+num(i.amount),0), locked=state.bills.reduce((s,b)=>s+num(b.amount),0), savings=saveCats().reduce((s,c)=>s+num(c.amount),0), flexPlan=flex().reduce((s,c)=>s+num(c.amount),0), flexSpent=txMonth().filter(t=>t.type==="flex").reduce((s,t)=>s+num(t.amount),0), flexLeft=flexPlan-flexSpent, left=income-locked-savings-flexPlan, unpaid=state.bills.filter(b=>!paid(b)).reduce((s,b)=>s+num(b.amount),0);return{income,locked,savings,flexPlan,flexSpent,flexLeft,left,unpaid,safe:Math.max(0,flexLeft/daysLeft(state.month)),days:daysLeft(state.month)}}
function billList(){const base=state.month===monthNow()?today():state.month+"-01";return state.bills.map(b=>({...b,due:dateForBill(b),days:diff(base,dateForBill(b)),isPaid:paid(b)})).sort((a,b)=>a.days-b.days)}
function warning(){const t=totals(), overdue=billList().find(b=>!b.isPaid&&b.days<0), due=billList().find(b=>!b.isPaid&&b.days<=3);if(t.left<0)return["red","Overassigned",`You assigned ${fmt(Math.abs(t.left))} more than income.`];if(overdue)return["red","Bill overdue",`${overdue.name} is overdue.`];if(due)return["amber","Bill due soon",`${due.name} is due ${due.days===0?"today":"in "+due.days+" days"}.`];if(t.left>0)return["amber","Unassigned cash",`${fmt(t.left)} still needs a job.`];return["green","On plan","Bill money is protected and every dollar has a job."]}
function top(){return `<div class="top"><div class="brand">${emblem(42)}<div class="brandText"><b>Allotted</b><span>Private manual budget</span></div></div><div class="month"><button data-act="prev">‹</button><strong>${mName(state.month)}</strong><button data-act="next">›</button></div></div>`}
function nav(){const tabs=[["home","Today"],["plan","Plan"],["spend","Spend"],["bills","Bills"],["more","More"]];return `<div class="nav"><div class="navInner">${tabs.map(t=>`<button data-tab="${t[0]}" class="${state.tab===t[0]?"on":""}">${glyph(t[0])}<span>${t[1]}</span></button>`).join("")}</div></div>`}
function render(){if(!hasData())return welcome();let html=`<div class="shell">${top()}`;if(state.tab==="home")html+=home();if(state.tab==="plan")html+=plan();if(state.tab==="spend")html+=spend();if(state.tab==="bills")html+=bills();if(state.tab==="more")html+=more();html+=`</div>${nav()}`;$("#app").innerHTML=html;bind();save()}
function welcome(){$("#app").innerHTML=`<section class="welcome"><div class="welcomeBox">${emblem(110,"welcomeMark")}<h1>Budget without the noise.</h1><p>Lock bill money first. Plan flexible spending second. Then see one clear safe-to-spend number — without connecting a bank.</p><div class="welcomeActions"><button class="btn primary" data-act="setup">Build my budget</button><button class="btn" data-act="demo">Try demo</button></div><button class="btn" style="margin-top:10px;width:100%" data-act="import">Restore backup</button><div class="copyLine">No account • No ads • Data stays local</div></div></section>`;bind()}
function home(){const t=totals(), w=warning(), bills=billList().filter(b=>!b.isPaid).slice(0,4);return `<div class="wallet"><div class="safePanel"><div class="kicker">Safe to spend today</div><div class="safeAmount">${fmt(t.safe)}</div><div class="safeCopy">Calculated only from flexible spending. Bill money, savings, and unassigned cash stay off limits.</div></div><div class="walletStrips"><div class="strip"><span>Bill money locked</span><b>${fmt(t.locked)}</b><small>Protected before spending</small></div><div class="strip"><span>Spend pool left</span><b>${fmt(t.flexLeft)}</b><small>${t.days} days left</small></div><div class="strip"><span>Left to assign</span><b>${fmt(t.left)}</b><small>${t.left===0?"Every dollar has a job":"Give this money a job"}</small></div></div></div><div class="actionRail"><button class="action primary" data-act="log">Log spending<span>Fast manual entry</span></button><button class="action" data-act="check">Can I buy?<span>Quick decision</span></button><button class="action" data-tab="bills">Bills<span>Runway</span></button></div><main class="page deskGrid"><section><div class="ledger"><div class="ledgerHead"><div><div class="ledgerTitle">${esc(w[1])}</div><div class="ledgerSub">${esc(w[2])}</div></div><span class="badge ${w[0]}">${w[0]==="green"?"Good":w[0]==="red"?"Risk":"Check"}</span></div></div><div class="ledger"><div class="ledgerHead"><div><div class="ledgerTitle">Upcoming bills</div><div class="ledgerSub">What needs to be handled next.</div></div><span class="badge teal">${fmt(t.unpaid)} unpaid</span></div><div class="ledgerBody">${bills.length?bills.map(billLine).join(""):empty("No bills due","Add recurring bills to build your runway.")}</div></div></section><aside>${miniPaycheck()}</aside></main>`}
function miniPaycheck(){return `<div class="ledger"><div class="ledgerHead"><div><div class="ledgerTitle">Paycheck view</div><div class="ledgerSub">${state.pay.next?`Next check: ${state.pay.next}`:"Add payday to show bills before next check."}</div></div></div><div class="ledgerBody"><div class="line"><div><div class="lineName">Pay amount</div><div class="lineMeta">Manual estimate</div></div><div class="money">${fmt(state.pay.amount)}</div></div><button class="btn dark" style="width:100%;margin-top:10px" data-act="pay">Edit paycheck</button></div></div>`}
function plan(){const t=totals();return `<main class="page"><div class="ledger"><div class="ledgerHead"><div><div class="ledgerTitle">Your money plan</div><div class="ledgerSub">Income minus locked bills, savings, and flexible spending.</div></div><span class="badge ${t.left<0?"red":t.left===0?"green":"amber"}">${t.left===0?"Complete":t.left<0?"Over":"Unassigned"}</span></div><div class="ledgerBody"><div class="line"><div><div class="lineName">Income</div></div><div class="money">${fmt(t.income)}</div></div><div class="line"><div><div class="lineName">Locked bills</div></div><div class="money">${fmt(t.locked)}</div></div><div class="line"><div><div class="lineName">Savings</div></div><div class="money">${fmt(t.savings)}</div></div><div class="line"><div><div class="lineName">Flexible spending</div></div><div class="money">${fmt(t.flexPlan)}</div></div></div></div><div class="actionRail" style="padding:0 0 12px"><button class="action primary" data-act="income">Add income<span>Money coming in</span></button><button class="action" data-act="bill">Add bill<span>Lock it</span></button><button class="action" data-act="cat">Add category<span>Plan spend</span></button></div><div class="sectionLabel">Flexible spending</div><div class="stack">${flex().map(catBlock).join("")||nightEmpty("No flexible categories","Add groceries, gas, eating out, or personal.")}</div><div class="sectionLabel">Savings</div><div class="stack">${saveCats().map(catBlock).join("")||nightEmpty("No savings goals","Add an emergency fund or sinking fund.")}</div></main>`}
function spend(){const t=totals(), rec=txMonth().filter(x=>x.type==="flex").slice().reverse().slice(0,10);return `<main class="page"><div class="wallet" style="padding:0 0 14px"><div class="safePanel"><div class="kicker">Spend screen</div><div class="safeAmount">${fmt(t.safe)}</div><div class="safeCopy">Safe today from ${fmt(t.flexLeft)} remaining flexible spending.</div></div></div><div class="actionRail" style="padding:0 0 12px"><button class="action primary" data-act="log">Log spending<span>Add purchase</span></button><button class="action" data-act="check">Can I buy?<span>Check first</span></button></div><div class="deskGrid"><div class="ledger"><div class="ledgerHead"><div><div class="ledgerTitle">Recent spending</div><div class="ledgerSub">Manual tracking, quick review.</div></div></div><div class="ledgerBody">${rec.length?rec.map(txLine).join(""):empty("No spending logged","Log your first purchase to update safe-to-spend.")}</div></div><div><div class="sectionLabel">Category health</div><div class="stack">${flex().map(catBlock).join("")}</div></div></div></main>`}
function bills(){const list=billList(), arr=(state.billView==="paid"?list.filter(b=>b.isPaid):list.filter(b=>!b.isPaid));return `<main class="page"><div class="ledger"><div class="ledgerHead"><div><div class="ledgerTitle">Bill runway</div><div class="ledgerSub">Bills are protected before flexible spending.</div></div><button class="btn dark" data-act="bill">Add bill</button></div><div class="ledgerBody"><div class="line"><div><div class="lineName">Locked this month</div></div><div class="money">${fmt(totals().locked)}</div></div><div class="line"><div><div class="lineName">Unpaid remaining</div></div><div class="money">${fmt(totals().unpaid)}</div></div></div></div><div style="display:flex;gap:10px;margin-bottom:12px"><button class="btn ${state.billView!=="paid"?"primary":""}" data-view="upcoming" style="flex:1">Upcoming</button><button class="btn ${state.billView==="paid"?"primary":""}" data-view="paid" style="flex:1">Paid</button></div><div class="ledger"><div class="ledgerBody">${arr.length?arr.map(billLine).join(""):empty(state.billView==="paid"?"No paid bills":"No upcoming bills",state.billView==="paid"?"Mark a bill paid when handled.":"Add bills to build your runway.")}</div></div></main>`}
function more(){return `<main class="page"><div class="stack"><button class="planRow" data-act="pay"><div class="planTop"><b>Paycheck settings</b><span class="badge teal">Plan</span></div><div class="lineMeta">Set payday and amount.</div></button><button class="planRow" data-act="backup"><div class="planTop"><b>Export backup</b><span class="badge">Data</span></div><div class="lineMeta">Save a local JSON backup.</div></button><button class="planRow" data-act="import"><div class="planTop"><b>Restore backup</b><span class="badge">Import</span></div><div class="lineMeta">Restore from a file.</div></button><button class="planRow" data-act="csv"><div class="planTop"><b>CSV export</b><span class="badge">Sheet</span></div><div class="lineMeta">Export transactions.</div></button><button class="planRow" data-act="reset"><div class="planTop"><b>Clear all data</b><span class="badge red">Danger</span></div><div class="lineMeta">Erase local data on this device.</div></button></div></main>`}
function empty(t,s){return `<div class="empty"><b>${esc(t)}</b>${esc(s)}</div>`}
function nightEmpty(t,s){return `<div class="planRow"><b>${esc(t)}</b><div class="lineMeta">${esc(s)}</div></div>`}
function billLine(b){const status=b.isPaid?"Paid":b.days<0?`${Math.abs(b.days)} days late`:b.days===0?"Due today":`Due in ${b.days} days`;return `<div class="line"><div><div class="lineName">${esc(b.name)}</div><div class="lineMeta">${b.due} • ${status}</div></div><div style="text-align:right"><div class="money">${fmt(b.amount)}</div><button class="badge ${b.isPaid?"":"teal"}" style="margin-top:7px" data-act="${b.isPaid?"unpay":"paybill"}" data-id="${b.id}">${b.isPaid?"Undo":"Paid"}</button></div></div>`}
function txLine(t){const c=state.cats.find(x=>x.id===t.cat);return `<div class="line"><div><div class="lineName">${esc(t.note||c?.name||"Spending")}</div><div class="lineMeta">${t.date} • ${esc(c?.name||"Category")}</div></div><div class="money">-${fmt(t.amount)}</div></div>`}
function catBlock(c){const spent=spentCat(c.id), left=num(c.amount)-spent, pct=c.amount?Math.min(100,spent/num(c.amount)*100):0;return `<div class="planRow"><div class="planTop"><b>${esc(c.name)}</b><span class="money">${fmt(left)}</span></div><div class="lineMeta">${fmt(spent)} spent of ${fmt(c.amount)}</div><div class="progress"><i style="width:${pct}%"></i></div></div>`}
function sheet(title,body){$("#modal").innerHTML=`<div class="sheetBg" id="bg"><div class="sheet" onclick="event.stopPropagation()"><div class="handle"></div><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><div class="sheetTitle">${esc(title)}</div><button class="btn" data-act="close">Close</button></div>${body}</div></div>`;$("#bg").onclick=e=>{if(e.target.id==="bg")close()};bind()}
function close(){$("#modal").innerHTML=""}
const field=(id,l,v="",type="text",ph="")=>`<label class="field"><span>${l}</span><input id="${id}" type="${type}" ${type==="number"?'inputmode="decimal"':''} value="${esc(v)}" placeholder="${esc(ph)}"></label>`;
const select=(id,l,v,opts)=>`<label class="field"><span>${l}</span><select id="${id}">${opts.map(o=>`<option value="${esc(o[0])}" ${String(o[0])===String(v)?"selected":""}>${esc(o[1])}</option>`).join("")}</select></label>`;
function setup(){sheet("Build your budget",`${field("si","Monthly income","","number","5600")}<button class="btn primary" style="width:100%" data-act="saveSetup">Start</button>`)}
function addIncome(){sheet("Add income",`${field("n","Name","Take-home pay")}${field("a","Amount","","number","3200")}<button class="btn primary" style="width:100%" data-act="saveIncome">Save</button>`)}
function addBill(){sheet("Add bill",`${field("n","Bill name","","text","Rent")}${field("a","Amount","","number","1200")}${field("d","Due day","","number","1")}<button class="btn primary" style="width:100%" data-act="saveBill">Save</button>`)}
function addCat(){sheet("Add category",`${field("n","Category name","","text","Groceries")}${field("a","Monthly amount","","number","400")}${select("t","Type","flex",[["flex","Flexible spending"],["save","Savings"]])}<button class="btn primary" style="width:100%" data-act="saveCat">Save</button>`)}
function logSpend(){sheet("Log spending",`${field("a","Amount","","number","45")}${select("c","Category",flex()[0]?.id||"",flex().map(c=>[c.id,c.name]))}${field("note","Note","","text","Publix")}<button class="btn primary" style="width:100%" data-act="saveSpend">Log</button>`)}
function buyCheck(){sheet("Can I buy this?",`${field("a","Purchase amount","","number","75")}${select("c","Category",flex()[0]?.id||"",flex().map(c=>[c.id,c.name]))}<button class="btn primary" style="width:100%" data-act="runCheck">Check</button><div id="result"></div>`)}
function paycheck(){sheet("Paycheck settings",`${field("next","Next payday",state.pay.next,"date")}${field("amount","Pay amount",state.pay.amount,"number")}<button class="btn primary" style="width:100%" data-act="savePay">Save</button>`)}
function backup(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:"application/json"}));a.download="allotted-backup-"+today()+".json";a.click()}
function csv(){const rows=[["date","category","note","amount"]].concat(state.txns.map(t=>[t.date,state.cats.find(c=>c.id===t.cat)?.name||"",t.note||"",t.amount]));const blob=new Blob([rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\n")],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="allotted-transactions.csv";a.click()}
function bind(){$$("[data-tab]").forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()});$$("[data-view]").forEach(b=>b.onclick=()=>{state.billView=b.dataset.view;render()});$$("[data-act]").forEach(b=>b.onclick=()=>act(b.dataset.act,b.dataset))}
function act(a,d){if(a==="close")return close();if(a==="demo")return demo();if(a==="setup")return setup();if(a==="saveSetup"){state=blank();state.income=[{id:uid(),name:"Take-home pay",amount:num($("#si").value)}];close();return render()}if(a==="prev"){state.month=shift(state.month,-1);return render()}if(a==="next"){state.month=shift(state.month,1);return render()}if(a==="income")return addIncome();if(a==="saveIncome"){state.income.push({id:uid(),name:$("#n").value||"Income",amount:num($("#a").value)});close();return render()}if(a==="bill")return addBill();if(a==="saveBill"){state.bills.push({id:uid(),name:$("#n").value||"Bill",amount:num($("#a").value),dueDay:num($("#d").value)||1,paid:{}});close();return render()}if(a==="cat")return addCat();if(a==="saveCat"){state.cats.push({id:uid(),name:$("#n").value||"Category",amount:num($("#a").value),type:$("#t").value});close();return render()}if(a==="log")return logSpend();if(a==="saveSpend"){state.txns.push({id:uid(),date:today(),type:"flex",cat:$("#c").value,amount:num($("#a").value),note:$("#note").value});close();return render()}if(a==="check")return buyCheck();if(a==="runCheck"){const c=state.cats.find(x=>x.id===$("#c").value), amount=num($("#a").value), left=num(c?.amount)-spentCat(c?.id), ok=amount<=left&&amount<=totals().flexLeft;$("#result").innerHTML=`<div class="ledger" style="margin-top:12px"><div class="ledgerHead"><div><div class="ledgerTitle">${ok?"Yes, it fits.":"No, not safely."}</div><div class="ledgerSub">${ok?`After this, ${esc(c?.name)} has ${fmt(left-amount)} left.`:`${esc(c?.name||"Category")} only has ${fmt(left)} left. Bill money stays locked.`}</div></div></div></div>`;return}if(a==="pay")return paycheck();if(a==="savePay"){state.pay.next=$("#next").value;state.pay.amount=num($("#amount").value);close();return render()}if(a==="paybill"){const b=state.bills.find(x=>x.id===d.id);if(b){b.paid=b.paid||{};b.paid[state.month]=today();state.txns.push({id:uid(),date:today(),type:"bill",bill:b.id,amount:b.amount,note:b.name})}return render()}if(a==="unpay"){const b=state.bills.find(x=>x.id===d.id);if(b?.paid)delete b.paid[state.month];return render()}if(a==="backup")return backup();if(a==="csv")return csv();if(a==="import"){$("#fileInput").click();return}if(a==="reset"){if(confirm("Erase all Allotted data?")){localStorage.removeItem(KEY);state=blank();render()}return}}
$("#fileInput").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state={...blank(),...JSON.parse(r.result)};save();render()}catch(err){alert("Could not restore backup.")}};r.readAsText(f);e.target.value=""});
load();render();
</script>
</body>
</html>
