:root{--bg:#07100f;--panel:#101b1a;--panel2:#142321;--line:#263633;--text:#f6fbf9;--muted:#9aa9a5;--teal:#34d6c5;--gold:#f2b35f;--green:#6ee795;--blue:#82aaff;--red:#ff7777;--shadow:0 22px 56px rgba(0,0,0,.42)}[data-theme=light]{--bg:#f4f7f6;--panel:#fff;--panel2:#eef5f3;--line:#d8e3e0;--text:#10201d;--muted:#687773;--teal:#0d9488;--gold:#b96a12;--green:#15803d;--blue:#2563eb;--red:#dc2626;--shadow:0 18px 38px rgba(24,43,39,.12)}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(780px 420px at 50% -180px,rgba(52,214,197,.22),transparent 64%),linear-gradient(180deg,#081211,var(--bg));color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif}[data-theme=light] body{background:radial-gradient(780px 420px at 50% -180px,rgba(13,148,136,.14),transparent 64%),var(--bg)}body{padding-bottom:calc(122px + env(safe-area-inset-bottom))}button,input,textarea,select{font:inherit}button{border:0;cursor:pointer}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.045);color:var(--text);padding:14px;outline:none}.top{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:calc(14px + env(safe-area-inset-top)) 16px 13px;background:rgba(7,16,15,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}[data-theme=light] .top{background:rgba(244,247,246,.92)}.brand{display:flex;align-items:center;gap:11px}.logo{width:40px;height:40px;border-radius:12px;background:#08110f;display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.1)}.logo svg{width:30px}.brand b{font-size:21px;letter-spacing:-.02em}.small{font-size:13px;line-height:1.42}.muted{color:var(--muted)}.wrap{max-width:980px;margin:auto;padding:14px 14px 28px}.month{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:13px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:1 flow:hidden;margin-top:14px}.progress i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--teal),var(--green));width:0}.empty{text-align:center;color:var(--muted);padding:28px 12px;line-height:1.45}.click{cursor:pointer}.nav{position:fixed;left:0;right:0;bottom:calc(15px + env(safe-area-inset-bottom));z-index:20;display:flex;justify-content:center;pointer-events:none}.navin{pointer-events:auto;display:flex;gap:4px;padding:6px;border:1px solid var(--line);border-radius:999px;background:rgba(16,27,26,.92);backdrop-filter:blur(18px);box-shadow:0 20px 48px rgba(0,0,0,.45)}[data-theme=light] .navin{background:rgba(255,255,255,.94)}.nav button{background:transparent;color:var(--muted);border-radius:999px;padding:11px 13px;font-size:13px;font-weight:950}.nav .on{color:var(--teal);background:rgba(52,214,197,.14);box-shadow:inset 0 0 0 1px rgba(52,214,197,.28)}.fab{position:fixed;right:16px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:22;width:58px;height:58px;border-radius:22px;background:linear-gradient(135deg,var(--teal),#18b9a8);color:#032825;font-size:31px;font-weight:950;box-shadow:0 18px 42px rgba(0,0,0,.38)}.sheetBg{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.66);display:flex;align-items:flex-end;justify-content:center}.sheet{width:100%;max-width:540px;max-height:88vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:24px 24px 0 0;padding:22px 19px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -22px 60px rgba(0,0,0,.48)}.field{display:block;margin-bottom:12px}.field span{display:block;margin-bottom:7px;color:var(--muted);font-size:13px}.toast{position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:70;max-width:90vw;background:var(--panel);border:1px solid var(--teal);padding:12px 15px;border-radius:14px;font-weight:950;box-shadow:var(--shadow)}.notice{border-radius:15px;border:1px solid rgba(255,119,119,.28);background:rgba(255,119,119,.11);color:var(--red);padding:12px}@media(max-width:760px){.grid{grid-template-columns:1fr}.span12,.span8,.span6,.span4{grid-column:span 1}.actions{grid-template-columns:1fr 1fr}.metric{font-size:38px}.metric.sm{font-size:27px}.nav button{padding:10px 11px}.top .small{max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}}@media(max-width:390px){.actions{grid-template-columns:1fr}.nav button{font-size:12px;padding:10px 9px}}
</style>

<body>
<header class="top"><div class="brand"><div class="logo"><svg viewBox="0 0 100 100" aria-label="Allotted"><line x1="50" y1="18" x2="25" y2="82" stroke="var(--teal)" stroke-width="12" stroke-linecap="round"/><line x1="50" y1="18" x2="75" y2="82" stroke="var(--gold)" stroke-width="12" stroke-linecap="round"/><line x1="37" y1="57" x2="63" y2="57" stroke="var(--teal)" stroke-width="9" stroke-linecap="round"/></svg></div><div><b>Allotted</b><div class="small muted">Give every dollar a job</div></div></div><button id="settingsBtn" class="btn ghost">Settings</button></header>
<div id="app"></div><div id="modal"></div><input id="fileInput" type="file" accept=".json,application/json" hidden>
<script>
const KEY="budget-app-v1",SCHEMA=7,$=s=>document.querySelector(s),fmt=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(+n||0),fmt2=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(+n||0),cash=v=>{v=parseFloat(v);return isNaN(v)?0:Math.max(0,v)},uid=()=>"i"+Date.now().toString(36)+Math.random().toString(36).slice(2,7),safe=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));let tab="home",mk=new Date().toISOString().slice(0,7),broken=false,warning="";
function settings(){return{onboardingCompleted:false,monthlyIncome:0,savingsGoal:0,nextPayday:"",payAmount:0,payFrequency:"biweekly",customDays:14}}function base(){return{schemaVersion:SCHEMA,months:{},debts:[],debtPlan:{strategy:"avalanche",extra:0},settings:settings(),theme:"dark",lastBackup:null,lastLog:null}}let S=base();
function line(name,planned,recurring,dueDay){return{id:uid(),name:name||"Line",planned:cash(planned),actual:0,txns:[],recurring:!!recurring,dueDay:dueDay||""}}function blank(){return{income:[{id:uid(),name:"Take-home pay",amount:0}],savings:[{id:uid(),name:"Savings",amount:0}],groups:[{id:uid(),name:"Bills",items:[]},{id:uid(),name:"Spending",items:[]}]}};
function theme(){document.documentElement.dataset.theme=S.theme||"dark"}function adopt(d){if(!d||typeof d!="object")return;S={...base(),...S};if(d.months)S.months=d.months;if(Array.isArray(d.debts))S.debts=d.debts;if(d.debtPlan)S.debtPlan={strategy:d.debtPlan.strategy||"avalanche",extra:cash(d.debtPlan.extra)};if(d.settings)S.settings={...settings(),...d.settings};if(d.theme)S.theme=d.theme;if(d.lastBackup)S.lastBackup=d.lastBackup;if(d.lastLog)S.lastLog=d.lastLog}function recalc(i){i.actual=(i.txns||[]).reduce((s,t)=>s+cash(t.amount),0)}function migrate(){S.settings={...settings(),...(S.settings||{})};S.months=S.months||{};Object.values(S.months).forEach(m=>{m.income=Array.isArray(m.income)?m.income:[];m.savings=Array.isArray(m.savings)?m.savings:[];m.groups=Array.isArray(m.groups)?m.groups:[];if(!m.income.length)m.income=[{id:uid(),name:"Take-home pay",amount:cash(S.settings.monthlyIncome)}];if(!m.savings.length)m.savings=[{id:uid(),name:"Savings",amount:cash(S.settings.savingsGoal)}];if(!m.groups.length)m.groups=[{id:uid(),name:"Bills",items:[]},{id:uid(),name:"Spending",items:[]}];m.income.forEach(x=>{x.id=x.id||uid();x.amount=cash(x.amount);x.name=x.name||"Income"});m.savings.forEach(x=>{x.id=x.id||uid();x.amount=cash(x.amount);x.name=x.name||"Savings"});m.groups.forEach(g=>{g.id=g.id||uid();g.name=g.name||"Group";g.items=Array.isArray(g.items)?g.items:[];g.items.forEach(i=>{i.id=i.id||uid();i.name=i.name||"Line";i.planned=cash(i.planned);i.txns=Array.isArray(i.txns)?i.txns:[];i.txns=i.txns.map(t=>({id:t.id||uid(),amount:cash(t.amount),date:t.date||mk+"-01",note:t.note||""}));recalc(i)})})});if(Object.keys(S.months).length)S.settings.onboardingCompleted=true;theme()}function load(){try{let raw=localStorage.getItem(KEY);if(raw)adopt(JSON.parse(raw))}catch(e){broken=true;warning="Saved data could not be read. Restore a backup before changing anything."}migrate()}function save(){try{localStorage.setItem(KEY,JSON.stringify(S));return true}catch(e){broken=true;warning="This device could not save your budget. Copy a backup now.";return false}}function commit(){let ok=save();render();if(!ok)toast(warning)}
function M(){return S.months[mk]}function ensure(){if(!S.months[mk])S.months[mk]=blank();return S.months[mk]}function monthName(k){let [y,m]=k.split("-").map(Number);return new Date(y,m-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"})}function monthShort(k){let [y,m]=k.split("-").map(Number);return new Date(y,m-1,1).toLocaleDateString("en-US",{month:"short",year:"numeric"})}function shift(k,n){let [y,m]=k.split("-").map(Number),d=new Date(y,m-1+n,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}function clone(m){let c=JSON.parse(JSON.stringify(m));c.income.forEach(x=>x.id=uid());c.savings.forEach(x=>x.id=uid());c.groups.forEach(g=>{g.id=uid();g.items.forEach(i=>{i.id=uid();i.actual=0;i.txns=[]})});return c}function navMonth(k,carry){let prev=mk;mk=k;if(carry&&!S.months[mk]){let src=Object.keys(S.months).filter(x=>x<mk).sort().pop();if(src){S.months[mk]=clone(S.months[src]);save();toast("Copied "+monthShort(src)+" plan",()=>{delete S.months[mk];mk=prev;commit()})}}render()}
function totals(m){if(!m)return{income:0,savings:0,planned:0,actual:0,remaining:0,available:0};let income=m.income.reduce((s,x)=>s+cash(x.amount),0),savings=m.savings.reduce((s,x)=>s+cash(x.amount),0),planned=m.groups.reduce((s,g)=>s+g.items.reduce((a,i)=>a+cash(i.planned),0),0),actual=m.groups.reduce((s,g)=>s+g.items.reduce((a,i)=>a+cash(i.actual),0),0);return{income,savings,planned,actual,remaining:income-savings-planned,available:income-savings-actual}}function items(m){let a=[];(m?.groups||[]).forEach(g=>g.items.forEach(i=>a.push({g,item:i})));return a}function find(gid,iid){let g=ensure().groups.find(x=>x.id==gid),i=g?.items.find(x=>x.id==iid);return{g,i}}function bills(){return items(ensure()).filter(x=>x.item.recurring)}function paid(i){return cash(i.planned)>0&&cash(i.actual)>=cash(i.planned)-.01}function billState(i){if(paid(i))return["done","Paid"];if(!i.dueDay)return["needs","Needs due date"];let [y,m]=mk.split("-").map(Number),d=new Date(y,m-1,Math.min(31,+i.dueDay||1)),today=new Date(),t=new Date(today.getFullYear(),today.getMonth(),today.getDate()),diff=Math.ceil((d-t)/86400000);if(diff<0)return["bad","Overdue"];if(diff==0)return["needs","Due today"];return[diff<=7?"needs":"muted",diff<=7?"Due in "+diff+"d":"Due "+d.toLocaleDateString("en-US",{month:"short",day:"numeric"})]}function health(m){let t=totals(m),b=bills().length,sp=items(m).filter(x=>!x.item.recurring).length,checks=[["Income added",t.income>0],["Bills planned",b>0],["Spending buckets",sp>0],["Dollars assigned",t.income>0&&t.remaining>=0&&t.planned>0]],score=checks.filter(x=>x[1]).length;return{score,checks}}
function nav(){let a=[["home","Home"],["budget","Budget"],["spend","Spend"],["bills","Bills"],["more","More"]];return `<nav class="nav"><div class="navin">${a.map(x=>`<button data-tab="${x[0]}" class="${tab==x[0]?"on":""}">${x[1]}</button>`).join("")}</div></nav><button id="fab" class="fab">+</button>`}function monthBar(){return `<div class="month"><button class="btn ghost" data-move="-1">Prev</button><button id="pickMonth" class="btn">${monthName(mk)}</button><button class="btn ghost" data-move="1">Next</button></div>`}
function render(){if(!S.settings.onboardingCompleted&&!Object.keys(S.months).length){$("#app").innerHTML=`<main class="wrap"><section class="card hero"><div class="label">Private budget</div><div class="metric">Start with income.</div><p class="muted">Then add bills and spending buckets. Allotted keeps your budget on this device.</p><div class="stack" style="margin-top:16px"><button id="guided" class="btn primary">Guided setup</button><button id="blank" class="btn">Start blank month</button><button id="restoreWelcome" class="btn ghost">Restore backup</button></div></section></main>${nav()}`;bind();return}$("#app").innerHTML=`<main class="wrap">${broken?`<div class="notice">${safe(warning)}</div>`:""}${monthBar()}${({home:homeView,budget:budgetView,spend:spendView,bills:billsView,more:moreView}[tab]||homeView)()}</main>${nav()}`;bind()}
function homeView(){let m=ensure(),t=totals(m),h=health(m),pct=t.planned?Math.min(100,Math.round(t.actual/t.planned*100)):0;return `<div class="grid"><section class="card hero span8"><div class="label">Safe to spend</div><div class="metric">${fmt(t.available)}</div><p class="muted">Income minus savings and real spending this month.</p><div class="progress"><i style="width:${pct}%"></i></div><div class="stack" style="margin-top:14px"><button id="homeIncome" class="btn primary">${t.income?"Edit income":"Add income first"}</button><button id="homeSpend" class="btn">Log spending</button></div></section><section class="card span4"><div class="label">Budget health</div><div class="metric sm">${h.score}/4 ready</div>${h.checks.map(c=>`<div class="row"><span>${c[0]}</span><b class="${c[1]?"done":"needs"}">${c[1]?"Done":"Next"}</b></div>`).join("")}</section><section class="card span12"><div class="label">Start your month</div><div class="actions"><button id="actIncome" class="action income"><b>1. Add income</b><span class="small muted">Paychecks or take-home pay.</span></button><button id="actBills" class="action bill"><b>2. Add bills</b><span class="small muted">Rent, phone, car, subscriptions.</span></button><button id="actSpend" class="action spend"><b>3. Plan spending</b><span class="small muted">Groceries, gas, food, fun.</span></button><button id="actAssign" class="action"><b>4. Assign all dollars</b><span class="small muted">Remaining should land near $0.</span></button></div></section><section class="card income span4"><div class="label">Income</div><div class="metric sm">${fmt(t.income)}</div></section><section class="card bill span4"><div class="label">Planned</div><div class="metric sm">${fmt(t.planned+t.savings)}</div></section><section class="card spend span4"><div class="label">Spent</div><div class="metric sm">${fmt(t.actual)}</div></section></div>`}
function rows(list,type){return list.length?list.map(x=>`<div class="row click" data-money="${type}:${x.id}"><div><b>${safe(x.name)}</b><div class="small muted">Tap to edit</div></div><div class="money">${fmt(x.amount)}</div></div>`).join(""):`<div class="empty">Add ${type} first.</div>`}function groupCard(g){let isBill=/bill/i.test(g.name);return `<section class="card ${isBill?"bill":"spend"} span6"><div class="row"><div><b>${safe(g.name)}</b><div class="small muted">${fmt(g.items.reduce((s,i)=>s+cash(i.planned),0))} planned</div></div><button class="btn" data-addline="${g.id}">${isBill?"Add bill":"Add line"}</button></div>${g.items.length?g.items.map(i=>`<div class="row click" data-line="${g.id}:${i.id}"><div><b>${safe(i.name)}</b><div class="small muted">${i.recurring?"Bill":"Spending"}${i.dueDay?" due "+safe(i.dueDay):""}</div></div><div style="text-align:right"><div class="money">${fmt(i.planned)}</div><div class="small muted">spent ${fmt(i.actual)}</div></div></div>`).join(""):`<div class="empty">${isBill?"Add your recurring bills here.":"Add spending buckets here."}</div>`}</section>`}function budgetView(){let m=ensure(),t=totals(m);return `<div class="grid"><section class="card hero span12"><div class="label">Monthly plan</div><div class="metric sm">${fmt(t.remaining)} left to assign</div><p class="muted">Income minus savings, bills, and planned spending.</p></section><section class="card income span6"><div class="row"><div><b>Income</b><div class="small muted">${fmt(t.income)} total</div></div><button id="addIncome" class="btn primary">Add income</button></div>${rows(m.income,"income")}</section><section class="card span6"><div class="row"><div><b>Savings</b><div class="small muted">${fmt(t.savings)} planned</div></div><button id="addSavings" class="btn">Add savings</button></div>${rows(m.savings,"savings")}</section>${m.groups.map(groupCard).join("")}</div>`}
function spendView(){let m=ensure(),tx=[];items(m).forEach(x=>(x.item.txns||[]).forEach(t=>tx.push({...t,gid:x.g.id,iid:x.item.id,cat:x.g.name,line:x.item.name})));tx.sort((a,b)=>(b.date||"").localeCompare(a.date||""));return `<div class="grid"><section class="card spend span12"><div class="row"><div><div class="label">Spend</div><div class="metric sm">${fmt(totals(m).actual)}</div><p class="small muted">Log real spending when money leaves your account.</p></div><button id="addTxn" class="btn primary">Log spending</button></div></section><section class="card span12">${tx.length?tx.map(t=>`<div class="row click" data-txn="${t.gid}:${t.iid}:${t.id}"><div><b>${safe(t.line)}</b><div class="small muted">${safe(t.cat)} - ${safe(t.date)}</div></div><div class="money">${fmt2(t.amount)}</div></div>`).join(""):`<div class="empty">No spending logged yet.</div>`}</section></div>`}function billsView(){let b=bills();return `<div class="grid"><section class="card bill span12"><div class="row"><div><div class="label">Bills</div><p class="muted">Add recurring bills and tap Pay when they clear.</p></div><button id="addBill" class="btn primary">Add bill</button></div></section><section class="card span12">${b.length?b.map(x=>{let st=billState(x.item);return `<div class="row"><div><b>${safe(x.item.name)}</b><div class="small ${st[0]}">${st[1]}</div></div><div style="text-align:right"><div class="money">${fmt(x.item.planned)}</div><button class="btn ghost" data-pay="${x.g.id}:${x.item.id}">${paid(x.item)?"Undo":"Pay"}</button></div></div>`}).join(""):`<div class="empty">No bills yet. Add rent, phone, insurance, subscriptions, and loan payments.</div>`}</section></div>`}
function moreView(){let age=S.lastBackup?Math.floor((Date.now()-S.lastBackup)/86400000):null;return `<div class="grid"><section class="card span12"><div class="label">Data and settings</div><div class="stack"><button id="themeToggle" class="btn">Theme: ${S.theme=="light"?"Light":"Dark"}</button><button id="copyBackup" class="btn primary">Copy private backup</button><button id="restoreBackup" class="btn">Restore backup</button><button id="downloadBackup" class="btn">Download backup file</button><button id="wipeMonth" class="btn warn">Clear ${monthShort(mk)}</button></div><p class="small muted">Last backup: ${age==null?"never":age==0?"today":age+" days ago"}. Allotted uses device storage, no account required.</p></section></div>`}
function field(id,label,val,type="text"){return `<label class="field"><span>${label}</span><input id="${id}" type="${type}" value="${safe(val||"")}"></label>`}function sheet(title,body){$("#modal").innerHTML=`<div class="sheetBg" data-close="1"><div class="sheet"><h2>${title}</h2>${body}<button id="closeSheet" class="btn ghost" style="margin-top:12px">Close</button></div></div>`;$("#closeSheet").onclick=close;$(".sheetBg").onclick=e=>{if(e.target.dataset.close)close()}}function close(){$("#modal").innerHTML=""}function toast(msg,undo){document.querySelectorAll(".toast").forEach(x=>x.remove());let el=document.createElement("div");el.className="toast";el.innerHTML=safe(msg)+(undo?' <button id="undoToast" class="btn ghost">Undo</button>':"");document.body.appendChild(el);if(undo)$("#undoToast").onclick=()=>{el.remove();undo()};setTimeout(()=>el.remove(),undo?6500:3200)}
function openMoney(type,idv){let m=ensure(),list=m[type],x=idv?list.find(v=>v.id==idv):null;sheet((x?"Edit ":"Add ")+(type=="income"?"income":"savings"),field("mName","Name",x?.name||(type=="income"?"Take-home pay":"Savings"))+field("mAmount","Amount",x?.amount||"","number")+`<button id="saveMoney" class="btn primary">Save</button>${x?'<button id="deleteMoney" class="btn warn">Delete</button>':""}`);$("#saveMoney").onclick=()=>{let o=x||{id:uid()};o.name=$("#mName").value.trim()||(type=="income"?"Income":"Savings");o.amount=cash($("#mAmount").value);if(!x)list.push(o);if(type=="income")S.settings.monthlyIncome=totals(m).income;if(type=="savings")S.settings.savingsGoal=totals(m).savings;close();commit()};let d=$("#deleteMoney");if(d)d.onclick=()=>{m[type]=list.filter(v=>v.id!=idv);close();commit()}}function openLine(gid,iid,asBill){let m=ensure(),g=m.groups.find(x=>x.id==gid)||m.groups[0],i=iid?g.items.find(x=>x.id==iid):null;sheet(i?"Edit line":"Add line",field("lName","Name",i?.name||"")+field("lPlan","Planned amount",i?.planned||"","number")+field("lDue","Due day for bills",i?.dueDay||"","number")+`<label class="row" style="border:0"><span>Recurring bill</span><input id="lBill" type="checkbox" style="width:auto" ${(i?.recurring||asBill)?"checked":""}></label><button id="saveLine" class="btn primary">Save</button>${i?'<button id="deleteLine" class="btn warn">Delete</button>':""}`);$("#saveLine").onclick=()=>{let o=i||line("",0,false);o.name=$("#lName").value.trim()||"Line";o.planned=cash($("#lPlan").value);o.dueDay=$("#lDue").value||"";o.recurring=$("#lBill").checked;if(!i)g.items.push(o);close();commit()};let d=$("#deleteLine");if(d)d.onclick=()=>{g.items=g.items.filter(x=>x.id!=iid);close();commit()}}
function openTxn(ref){let opts=items(ensure()).filter(x=>!x.item.recurring||true);if(!opts.length){tab="budget";render();toast("Add a budget line first");return}let gid="",iid="",tid="",src=null,tx=null;if(ref){[gid,iid,tid]=ref.split(":");src=find(gid,iid);tx=src.i?.txns.find(x=>x.id==tid)}let selected=tx?gid+":"+iid:(S.lastLog?S.lastLog.gid+":"+S.lastLog.iid:opts[0].g.id+":"+opts[0].item.id);sheet(tx?"Edit spending":"Log spending",`<label class="field"><span>Budget line</span><select id="txLine">${opts.map(x=>`<option value="${x.g.id}:${x.item.id}" ${x.g.id+":"+x.item.id==selected?"selected":""}>${safe(x.g.name)} - ${safe(x.item.name)}</option>`).join("")}</select></label>`+field("txAmount","Amount",tx?.amount||"","number")+field("txDate","Date",tx?.date||new Date().toISOString().slice(0,10),"date")+field("txNote","Note",tx?.note||"")+`<button id="saveTxn" class="btn primary">Save spending</button>${tx?'<button id="deleteTxn" class="btn warn">Delete transaction</button>':""}`);$("#saveTxn").onclick=()=>{let [ng,ni]=$("#txLine").value.split(":"),dest=find(ng,ni),o=tx||{id:uid()};o.amount=cash($("#txAmount").value);o.date=$("#txDate").value||new Date().toISOString().slice(0,10);o.note=$("#txNote").value||"";if(tx&&src.i){src.i.txns=src.i.txns.filter(x=>x.id!=tid);recalc(src.i)}dest.i.txns.push(o);recalc(dest.i);S.lastLog={gid:ng,iid:ni};close();commit()};let d=$("#deleteTxn");if(d)d.onclick=()=>{src.i.txns=src.i.txns.filter(x=>x.id!=tid);recalc(src.i);close();commit()}}function pay(gid,iid){let i=find(gid,iid).i;if(!i)return;if(paid(i)){i.txns=[];i.actual=0}else{i.txns=[{id:uid(),date:new Date().toISOString().slice(0,10),amount:i.planned,note:"Bill paid"}];recalc(i)}commit()}
function backup(){return JSON.stringify({...S,exportedAt:new Date().toISOString()},null,2)}async function copyBackup(){let txt=backup();try{await navigator.clipboard.writeText(txt);S.lastBackup=Date.now();save();toast("Private backup copied")}catch(e){sheet("Copy backup",`<textarea readonly style="height:190px">${safe(txt)}</textarea>`)}}function downloadBackup(){let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([backup()],{type:"application/json"}));a.download="allotted-backup.json";a.click();S.lastBackup=Date.now();save()}function restoreText(txt){try{let d=JSON.parse(txt.trim());if(!d.months)throw 0;if(!confirm("Restore this backup and replace current Allotted data?"))return;S=base();adopt(d);migrate();close();commit();toast("Backup restored")}catch(e){toast("That is not a valid Allotted backup")}}function openRestore(){sheet("Restore backup",`<textarea id="restoreArea" style="height:180px"></textarea><button id="restoreGo" class="btn primary">Restore</button>`);$("#restoreGo").onclick=()=>restoreText($("#restoreArea").value)}function guided(){sheet("Guided setup",field("obIncome","Monthly take-home income","","number")+field("obSavings","Monthly savings goal","","number")+field("obBills","Monthly bills total","","number")+field("obCats","Spending buckets","Groceries, Gas, Restaurants, Fun")+`<button id="finishGuide" class="btn primary">Build my budget</button>`);$("#finishGuide").onclick=()=>{let income=cash($("#obIncome").value),sav=cash($("#obSavings").value),bill=cash($("#obBills").value),cats=$("#obCats").value.split(",").map(x=>x.trim()).filter(Boolean),m=blank();m.income[0].amount=income;m.savings[0].amount=sav;if(bill)m.groups[0].items=[line("Monthly bills",bill,true,1)];let left=Math.max(0,income-sav-bill),each=cats.length?Math.floor(left/cats.length):0;m.groups[1].items=cats.map((c,i)=>line(c,i==cats.length-1?left-each*(cats.length-1):each,false));S.months[mk]=m;S.settings.monthlyIncome=income;S.settings.savingsGoal=sav;S.settings.onboardingCompleted=true;close();commit()}}
function addMenu(){sheet("Add",`<div class="stack"><button id="mi" class="btn primary">Add income</button><button id="mb" class="btn">Add bill</button><button id="ms" class="btn">Add spending bucket</button><button id="mt" class="btn">Log spending</button></div>`);$("#mi").onclick=()=>{close();openMoney("income")};$("#mb").onclick=()=>{close();openLine(ensure().groups[0].id,null,true)};$("#ms").onclick=()=>{close();openLine(ensure().groups[1].id)};$("#mt").onclick=()=>{close();openTxn()}}
function bind(){document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});document.querySelectorAll("[data-move]").forEach(b=>b.onclick=()=>navMonth(shift(mk,+b.dataset.move),+b.dataset.move>0));let p=$("#pickMonth");if(p)p.onclick=()=>{let v=prompt("Go to month YYYY-MM",mk);if(/^\d{4}-\d{2}$/.test(v||""))navMonth(v,true)};let f=$("#fab");if(f)f.onclick=addMenu;let g=$("#guided");if(g)g.onclick=guided;let bl=$("#blank");if(bl)bl.onclick=()=>{S.months[mk]=blank();S.settings.onboardingCompleted=true;commit();openMoney("income")};let rw=$("#restoreWelcome");if(rw)rw.onclick=openRestore;["homeIncome","actIncome","addIncome"].forEach(id=>{let e=$("#"+id);if(e)e.onclick=()=>openMoney("income")});["homeSpend","addTxn"].forEach(id=>{let e=$("#"+id);if(e)e.onclick=()=>openTxn()});let ab=$("#actBills");if(ab)ab.onclick=()=>{tab="bills";render()};let as=$("#actSpend");if(as)as.onclick=()=>{tab="budget";render()};let aa=$("#actAssign");if(aa)aa.onclick=()=>{tab="budget";render()};let sv=$("#addSavings");if(sv)sv.onclick=()=>openMoney("savings");document.querySelectorAll("[data-money]").forEach(b=>b.onclick=()=>{let [t,i]=b.dataset.money.split(":");openMoney(t,i)});document.querySelectorAll("[data-addline]").forEach(b=>b.onclick=()=>openLine(b.dataset.addline,null,/bill/i.test(find(b.dataset.addline,"").g?.name||"")));document.querySelectorAll("[data-line]").forEach(b=>b.onclick=()=>{let [g,i]=b.dataset.line.split(":");openLine(g,i)});let bb=$("#addBill");if(bb)bb.onclick=()=>openLine(ensure().groups[0].id,null,true);document.querySelectorAll("[data-pay]").forEach(b=>b.onclick=()=>{let [g,i]=b.dataset.pay.split(":");pay(g,i)});document.querySelectorAll("[data-txn]").forEach(b=>b.onclick=()=>openTxn(b.dataset.txn));let th=$("#themeToggle");if(th)th.onclick=()=>{S.theme=S.theme=="light"?"dark":"light";theme();commit()};let cb=$("#copyBackup");if(cb)cb.onclick=copyBackup;let rb=$("#restoreBackup");if(rb)rb.onclick=openRestore;let db=$("#downloadBackup");if(db)db.onclick=downloadBackup;let wm=$("#wipeMonth");if(wm)wm.onclick=()=>{if(confirm("Clear "+monthName(mk)+"?")){delete S.months[mk];commit()}}}
$("#settingsBtn").onclick=()=>{tab="more";render()};$("#fileInput").onchange=e=>{let f=e.target.files&&e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>restoreText(String(r.result||""));r.readAsText(f);e.target.value=""};load();if(!broken)save();render();
</script>
</body>
