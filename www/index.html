<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"><title>Allotted</title><meta name="description" content="Allotted - give every dollar a job. A private zero-based budgeting app."><meta name="theme-color" content="#080d0e"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Allotted"><link rel="apple-touch-icon" href="icon-180.png"><link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"><link rel="manifest" href="manifest.webmanifest"><style>

ckground:linear-gradient(135deg,rgba(53,213,196,.17),rgba(239,179,93,.06)),var(--card)}.income{border-color:rgba(98,224,144,.32)}.bill{border-color:rgba(239,179,93,.32)}.spend{border-color:rgba(125,168,255,.28)}.label{font-size:12px;text-transform:uppercase;letter-spacing:.18em;font-weight:900;color:var(--muted);margin-bottom:8px}.metric{font-size:36px;font-weight:950;line-height:1}.metric.sm{font-size:25px}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}.row:last-child{border-bottom:0}.btn{border-radius:14px;padding:13px 15px;font-weight:900;color:var(--text);background:rgba(255,255,255,.055);border:1px solid var(--line)}.btn.primary{background:linear-gradient(135deg,var(--teal),#19b7a6);color:#042b27;border:0}.btn.warn{background:rgba(255,120,120,.13);color:var(--red)}.btn.ghost{background:transparent}.stack{display:grid;gap:11px}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:13px}.action{text-align:left;border:1px solid var(--line);border-radius:16px;padding:14px;background:rgba(255,255,255,.045);color:var(--text)}.action b{display:block;margin-bottom:4px}.empty{padding:24px 10px;text-align:center;color:var(--muted);line-height:1.5}.money{font-weight:950;font-variant-numeric:tabular-nums}.click{cursor:pointer}.nav{position:fixed;left:0;right:0;bottom:calc(16px + env(safe-area-inset-bottom));z-index:20;display:flex;justify-content:center;pointer-events:none}.navin{pointer-events:auto;display:flex;gap:4px;padding:6px;border:1px solid var(--line);border-radius:999px;background:rgba(17,26,27,.92);backdrop-filter:blur(18px);box-shadow:0 18px 44px rgba(0,0,0,.42)}[data-theme=light] .navin{background:rgba(255,255,255,.94)}.nav button{background:transparent;color:var(--muted);border-radius:999px;padding:11px 13px;font-size:13px;font-weight:950}.nav .on{background:rgba(53,213,196,.14);color:var(--teal);box-shadow:inset 0 0 0 1px rgba(53,213,196,.24)}.fab{position:fixed;right:17px;bottom:calc(88px + env(safe-area-inset-bottom));z-index:21;width:58px;height:58px;border-radius:22px;font-size:30px;font-weight:950;background:linear-gradient(135deg,var(--teal),#19b7a6);color:#042b27}.sheetBg{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.64);display:flex;align-items:flex-end;justify-content:center}.sheet{width:100%;max-width:530px;max-height:88vh;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:24px 24px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom))}.sheet h2{margin-bottom:14px}.field{display:block;margin-bottom:12px}.field span{display:block;color:var(--muted);font-size:13px;margin-bottom:7px}.toast{position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:60;background:var(--card);border:1px solid var(--teal);padding:12px 15px;border-radius:14px;font-weight:900}.dangerNote{background:rgba(255,120,120,.13);border:1px solid rgba(255,120,120,.25);color:var(--red);border-radius:14px;padding:12px}@media(max-width:760px){.grid{grid-template-columns:1fr}.span12,.span8,.span6,.span4{grid-column:span 1}.actions{grid-template-columns:1fr}.card{padding:16px}.metric{font-size:33px}.nav button{padding:10px 11px}}
</style></head><body><header class="top"><div class="brand"><svg class="logo" viewBox="0 0 100 100" aria-label="Allotted"><line x1="50" y1="18" x2="25" y2="82" stroke="var(--teal)" stroke-width="12" stroke-linecap="round"/><line x1="50" y1="18" x2="75" y2="82" stroke="var(--amber)" stroke-width="12" stroke-linecap="round"/><line x1="37" y1="57" x2="63" y2="57" stroke="var(--teal)" stroke-width="9" stroke-linecap="round"/></svg><div><b>Allotted</b><div class="small muted">Give every dollar a job</div></div></div><button id="settingsBtn" class="btn ghost">Settings</button></header><div id="app"></div><div id="modal"></div><input type="file" id="fileInput" accept=".json,application/json" style="display:none"><script>
const KEY="budget-app-v1",SCHEMA=6,fmt=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(Number(n)||0),fmtC=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(Number(n)||0),esc=s=>String(s??"").replace(/[&<>\"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const money=v=>{v=parseFloat(v);return isNaN(v)?0:Math.max(0,v)},id=()=>"i"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);let tab="dashboard",mk=new Date().toISOString().slice(0,7),storageBroken=false,storageWarning="";
function defaultSettings(){return{onboardingCompleted:false,paycheckMode:false,payFrequency:"biweekly",customDays:14,nextPayday:"",payAmount:0,monthlyIncome:0,savingsGoal:0}}function defaultState(){return{schemaVersion:SCHEMA,months:{},debts:[],debtPlan:{strategy:"avalanche",extra:0},settings:defaultSettings(),lastBackup:null,theme:"dark",lastLog:null}}let S=defaultState();
function item(name,planned,recurring,dueDay){return{id:id(),name,planned:money(planned),actual:0,txns:[],recurring:!!recurring,dueDay:dueDay||null}}function blankMonth(){return{income:[{id:id(),name:"Take-home pay",amount:0}],savings:[{id:id(),name:"Savings",amount:0}],groups:[{id:id(),name:"Bills",items:[]},{id:id(),name:"Spending",items:[]}]}}function starterMonth(){return blankMonth()}
function setTheme(){document.documentElement.setAttribute("data-theme",S.theme||"dark")}function adoptState(d){if(!d||typeof d!=="object")return;S={...defaultState(),...S};if(d.months)S.months=d.months;if(Array.isArray(d.debts))S.debts=d.debts;if(d.debtPlan)S.debtPlan={strategy:d.debtPlan.strategy||"avalanche",extra:money(d.debtPlan.extra)};if(d.settings)S.settings={...defaultSettings(),...d.settings};if(d.lastBackup!==undefined)S.lastBackup=d.lastBackup;if(d.theme)S.theme=d.theme;if(d.lastLog)S.lastLog=d.lastLog}
function recalcItem(i){i.actual=(i.txns||[]).reduce((s,t)=>s+money(t.amount),0)}function migrate(){S.settings={...defaultSettings(),...(S.settings||{})};S.debts=Array.isArray(S.debts)?S.debts:[];S.debtPlan=S.debtPlan||{strategy:"avalanche",extra:0};Object.keys(S.months||{}).forEach(k=>{let m=S.months[k];m.income=Array.isArray(m.income)?m.income:[];m.savings=Array.isArray(m.savings)?m.savings:[];m.groups=Array.isArray(m.groups)?m.groups:[];if(!m.income.length)m.income=[{id:id(),name:"Take-home pay",amount:money(S.settings.monthlyIncome)}];if(!m.savings.length)m.savings=[{id:id(),name:"Savings",amount:money(S.settings.savingsGoal)}];m.income.forEach(x=>{x.id=x.id||id();x.name=x.name||"Income";x.amount=money(x.amount)});m.savings.forEach(x=>{x.id=x.id||id();x.name=x.name||"Savings";x.amount=money(x.amount)});m.groups.forEach(g=>{g.id=g.id||id();g.name=g.name||"Group";g.items=Array.isArray(g.items)?g.items:[];g.items.forEach(i=>{i.id=i.id||id();i.name=i.name||"Line";i.planned=money(i.planned);i.txns=Array.isArray(i.txns)?i.txns:[];i.txns=i.txns.map(t=>({id:t.id||id(),date:t.date||k+"-01",amount:money(t.amount),note:t.note||""}));recalcItem(i)})})});S.debts=S.debts.map(d=>({id:d.id||id(),name:d.name||"Debt",balance:money(d.balance),minPayment:money(d.minPayment),apr:money(d.apr),dueDay:d.dueDay||null}));if(Object.keys(S.months).length)S.settings.onboardingCompleted=true;setTheme()}
function load(){try{let raw=localStorage.getItem(KEY);if(raw)adoptState(JSON.parse(raw))}catch(e){storageBroken=true;storageWarning="Allotted could not read saved data. Restore a backup before making changes."}migrate()}function save(){try{localStorage.setItem(KEY,JSON.stringify(S));storageBroken=false;return true}catch(e){storageBroken=true;storageWarning="Allotted could not save on this device. Copy a private backup now.";return false}}function commit(){let ok=save();render();if(!ok)toast(storageWarning,"bad")}
function M(){return S.months[mk]||null}function ensureMonth(){if(!S.months[mk])S.months[mk]=blankMonth();return S.months[mk]}function monthName(k){let a=k.split("-").map(Number);return new Date(a[0],a[1]-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"})}function monthShort(k){let a=k.split("-").map(Number);return new Date(a[0],a[1]-1,1).toLocaleDateString("en-US",{month:"short",year:"numeric"})}function shiftMonth(k,n){let a=k.split("-").map(Number),d=new Date(a[0],a[1]-1+n,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}function latestBefore(k){let keys=Object.keys(S.months).filter(x=>x<k).sort();return keys[keys.length-1]||null}function cloneForward(k){let m=JSON.parse(JSON.stringify(S.months[k]));m.income.forEach(x=>x.id=id());m.savings.forEach(x=>x.id=id());m.groups.forEach(g=>{g.id=id();g.items.forEach(i=>{i.id=id();i.actual=0;i.txns=[]})});return m}function selectMonth(k,carry){let old=mk;mk=k;if(carry&&!S.months[mk]){let src=latestBefore(mk);if(src){S.months[mk]=cloneForward(src);save();toast("Copied "+monthShort(src)+" into "+monthShort(mk),"good",()=>{delete S.months[mk];mk=old;commit()})}}render()}
function totals(m){if(!m)return{income:0,savings:0,planned:0,actual:0,remaining:0,available:0};let income=m.income.reduce((s,x)=>s+money(x.amount),0),savings=m.savings.reduce((s,x)=>s+money(x.amount),0),planned=m.groups.reduce((s,g)=>s+g.items.reduce((a,i)=>a+money(i.planned),0),0),actual=m.groups.reduce((s,g)=>s+g.items.reduce((a,i)=>a+money(i.actual),0),0);return{income,savings,planned,actual,remaining:income-savings-planned,available:income-savings-actual}}function allItems(m){let out=[];(m?.groups||[]).forEach(g=>g.items.forEach(i=>out.push({g,item:i})));return out}function findItem(m,gid,iid){let g=(m?.groups||[]).find(x=>x.id===gid),i=g?(g.items||[]).find(x=>x.id===iid):null;return{g,i}}function billItems(m){return allItems(m).filter(x=>x.item.recurring)}function todayLocal(){let d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate())}function itemPaid(i){return money(i.planned)>0&&money(i.actual)>=money(i.planned)-.01}
function billStatus(i,monthKey){if(itemPaid(i))return{cls:"good",label:"Paid"};let a=(monthKey||mk).split("-").map(Number),due=i.dueDay?new Date(a[0],a[1]-1,Math.min(31,parseInt(i.dueDay)||1)):null;if(!due)return{cls:"warn",label:"Set due date"};let diff=Math.ceil((due-todayLocal())/86400000);if(diff<0)return{cls:"bad",label:"Overdue"};if(diff===0)return{cls:"warn",label:"Due today"};return{cls:diff<=7?"warn":"",label:diff<=7?"Due in "+diff+"d":"Due "+due.toLocaleDateString("en-US",{month:"short",day:"numeric"})}}function billOccurrencesBetween(from,to){let out=[];billItems(M()).forEach(x=>{if(!x.item.dueDay)return;let a=mk.split("-").map(Number),d=new Date(a[0],a[1]-1,Math.min(31,parseInt(x.item.dueDay)||1));if(d>=from&&d<=to)out.push({date:d,item:x.item,amount:x.item.planned,paid:itemPaid(x.item)})});return out}
function safeUntilPayday(){return null}function debtPayoff(){let ds=S.debts.map(d=>({...d,balance:money(d.balance),apr:money(d.apr),minPayment:money(d.minPayment)})).filter(d=>d.balance),m=0,int=0,extra=money(S.debtPlan.extra);while(ds.some(d=>d.balance>.01)&&m<600){m++;ds.forEach(d=>{let x=d.balance*(d.apr/100/12);d.balance+=x;int+=x});ds.sort(S.debtPlan.strategy==="snowball"?(a,b)=>a.balance-b.balance:(a,b)=>b.apr-a.apr);ds.forEach((d,ix)=>{let p=Math.min(d.balance,d.minPayment+(ix?0:extra));d.balance-=p})}return{months:m,interest:int,order:[]}}
function toast(msg,type,undo){document.querySelectorAll(".toast").forEach(x=>x.remove());let el=document.createElement("div");el.className="toast";el.innerHTML=esc(msg)+(undo?' <button id="undoToast" class="btn ghost">Undo</button>':"");document.body.appendChild(el);if(undo)document.getElementById("undoToast").onclick=()=>{el.remove();undo()};setTimeout(()=>el.remove(),undo?6500:3200)}function field(i,l,v,t="text"){return'<label class="field"><span>'+l+'</span><input id="'+i+'" type="'+t+'" value="'+esc(v||"")+'"></label>'}function sheet(t,b){modal.innerHTML='<div class="sheetBg" data-close="1"><div class="sheet"><h2>'+t+'</h2>'+b+'<button id="closeSheet" class="btn ghost" style="margin-top:12px">Close</button></div></div>';closeSheet.onclick=closeModal;document.querySelector(".sheetBg").onclick=e=>{if(e.target.dataset.close)closeModal()}}function closeModal(){modal.innerHTML=""}
function nav(){let n=[['dashboard','Home'],['budget','Budget'],['track','Spend'],['bills','Bills'],['more','More']];return'<nav class="nav"><div class="navin">'+n.map(x=>'<button data-tab="'+x[0]+'" class="'+(tab===x[0]?'on':'')+'">'+x[1]+'</button>').join("")+'</div></nav><button id="fab" class="fab">+</button>'}function backupReminder(){let t=totals(M()),age=S.lastBackup?Math.floor((Date.now()-S.lastBackup)/86400000):999;if(!Object.keys(S.months).length||!(t.income||t.planned||t.actual||S.debts.length)||age<=7)return"";return'<section class="card span12"><div class="row"><div><b>Backup reminder</b><div class="small muted">Your data is only on this device.</div></div><button id="dashBackup" class="btn">Back up</button></div></section>'}
function render(){let app=document.getElementById("app");if(!S.settings.onboardingCompleted&&!Object.keys(S.months).length){app.innerHTML='<main class="wrap"><section class="card hero"><div class="label">Private budget</div><h1>Start with income. Then give every dollar a job.</h1><p class="muted" style="margin:10px 0 16px">Add income first, then bills, then spending buckets.</p><div class="stack"><button id="startGuided" class="btn primary">Guided setup</button><button id="startBlank" class="btn">Start blank month</button><button id="restoreWelcome" class="btn ghost">Restore backup</button></div></section></main>'+nav();bind();return}app.innerHTML='<main class="wrap">'+(storageBroken?'<div class="dangerNote">'+esc(storageWarning)+'</div>':'')+monthBar()+({dashboard:renderDashboard,budget:renderBudget,track:renderTrack,bills:renderBills,more:renderMore,debt:renderDebt}[tab]||renderDashboard)()+'</main>'+nav();bind()}function monthBar(){return'<div class="row" style="border:0;margin-bottom:12px"><button class="btn ghost" data-mnav="-1">Prev</button><button class="btn" id="pickMonth">'+monthName(mk)+'</button><button class="btn ghost" data-mnav="1">Next</button></div>'}
function renderDashboard(){let m=ensureMonth(),t=totals(m),pct=t.planned?Math.min(100,Math.round(t.actual/t.planned*100)):0;return'<div class="grid">'+backupReminder()+'<section class="card hero span8"><div class="label">Safe to spend</div><div class="metric">'+fmt(t.available)+'</div><p class="muted" style="margin-top:8px">Income minus savings and actual spending for this month.</p><div style="height:8px;background:rgba(255,255,255,.08);border-radius:99px;margin-top:15px"><div style="height:100%;width:'+pct+'%;background:var(--teal);border-radius:99px"></div></div><div class="stack" style="margin-top:14px"><button id="dashAddIncome" class="btn primary">'+(t.income?'Edit income':'Add income first')+'</button><button id="dashLogSpend" class="btn">Log spending</button></div></section><section class="card span4"><div class="label">Remaining to assign</div><div class="metric sm" style="color:'+(t.remaining<0?'var(--red)':'var(--teal)')+'">'+fmt(t.remaining)+'</div><p class="small muted">Income minus savings, bills, and planned spending.</p></section><section class="card span12"><div class="label">Start your month</div><div class="actions"><button id="startIncome" class="action income"><b>1. Add income</b><span class="small muted">Paychecks or take-home pay.</span></button><button id="startBills" class="action bill"><b>2. Add bills</b><span class="small muted">Rent, phone, insurance.</span></button><button id="startSpending" class="action spend"><b>3. Plan spending</b><span class="small muted">Groceries, gas, fun.</span></button></div></section><section class="card income span4"><div class="label">Income</div><div class="metric sm">'+fmt(t.income)+'</div></section><section class="card bill span4"><div class="label">Planned</div><div class="metric sm">'+fmt(t.planned)+'</div></section><section class="card spend span4"><div class="label">Spent</div><div class="metric sm">'+fmt(t.actual)+'</div></section><section class="card span6"><b>Quick actions</b><div class="stack" style="margin-top:12px"><button id="quickLog" class="btn primary">Log spending</button><button id="quickBudget" class="btn">Open budget</button><button id="quickBills" class="btn">View bills</button></div></section><section class="card span6"><div class="label">Upcoming bills</div>'+renderUpcomingBills()+'</section></div>'}function renderUpcomingBills(){let occ=billOccurrencesBetween(todayLocal(),new Date(todayLocal().getTime()+14*86400000)).filter(o=>!o.paid);return occ.length?occ.map(o=>'<div class="row"><b>'+esc(o.item.name)+'</b><span class="money">'+fmt(o.amount)+'</span></div>').join(""):'<div class="empty">No unpaid bills due in the next 14 days.</div>'}
function moneyRows(k){let r=ensureMonth()[k];return r.length?r.map(x=>'<div class="row click" data-editmoney="'+k+':'+x.id+'"><div><b>'+esc(x.name)+'</b><div class="small muted">Tap to edit</div></div><div class="money">'+fmt(x.amount)+'</div></div>').join(""):'<div class="empty">Add your '+k+' first.</div>'}function renderBudget(){let m=ensureMonth(),t=totals(m);return'<div class="grid"><section class="card hero span12"><div class="label">Monthly budget</div><div class="metric sm">'+fmt(t.remaining)+' left to assign</div><p class="small muted">Add income first, then assign dollars to savings, bills, and spending.</p></section><section class="card income span6"><div class="row"><div><b>Income</b><div class="small muted">'+fmt(t.income)+' total</div></div><button id="addIncome" class="btn primary">Add income</button></div>'+moneyRows("income")+'</section><section class="card span6"><div class="row"><div><b>Savings</b><div class="small muted">'+fmt(t.savings)+' planned</div></div><button id="addSavings" class="btn">Add savings</button></div>'+moneyRows("savings")+'</section>'+m.groups.map(g=>'<section class="card '+(/bill/i.test(g.name)?'bill':'spend')+' span6"><div class="row"><div><b>'+esc(g.name)+'</b><div class="small muted">'+fmt(g.items.reduce((s,i)=>s+money(i.planned),0))+' planned</div></div><button class="btn" data-additem="'+g.id+'">Add line</button></div>'+(g.items.length?g.items.map(i=>'<div class="row click" data-edititem="'+g.id+':'+i.id+'"><div><b>'+esc(i.name)+'</b><div class="small muted">'+(i.recurring?'Bill':'Spending')+(i.dueDay?' due '+i.dueDay:'')+'</div></div><div><div class="money">'+fmt(i.planned)+'</div><div class="small muted">spent '+fmt(i.actual)+'</div></div></div>').join(""):'<div class="empty">No lines yet. Add a bill or spending bucket here.</div>')+'</section>').join("")+'<section class="span12"><button id="addGroup" class="btn">Add group</button></section></div>'}
function renderTrack(){let m=ensureMonth(),tx=[];allItems(m).forEach(x=>(x.item.txns||[]).forEach(t=>tx.push({...t,cat:x.g.name,line:x.item.name,gid:x.g.id,iid:x.item.id})));tx.sort((a,b)=>(b.date||"").localeCompare(a.date||""));return'<div class="grid"><section class="card spend span12"><div class="row"><div><div class="label">Spend</div><div class="metric sm">'+fmt(totals(m).actual)+'</div><p class="small muted">Tap a transaction to edit or delete it.</p></div><button id="addTxn" class="btn primary">Log spending</button></div></section><section class="card span12">'+(tx.length?tx.map(t=>'<div class="row click" data-edittxn="'+t.gid+':'+t.iid+':'+t.id+'"><div><b>'+esc(t.line)+'</b><div class="small muted">'+esc(t.cat)+' - '+esc(t.date||"")+'</div></div><div class="money">'+fmtC(t.amount)+'</div></div>').join(""):'<div class="empty">No spending logged yet. Tap Log spending when money leaves your account.</div>')+'</section></div>'}
function renderBills(){let b=billItems(ensureMonth());return'<div class="grid"><section class="card bill span12"><div class="row"><div><div class="label">Bills</div><p class="muted">Bills are recurring budget lines. Paying one logs a transaction.</p></div><button id="addBill" class="btn primary">Add bill</button></div></section><section class="card span12">'+(b.length?b.map(x=>{let st=billStatus(x.item,mk);return'<div class="row"><div><b>'+esc(x.item.name)+'</b><div class="small muted">'+st.label+'</div></div><div style="text-align:right"><div class="money">'+fmt(x.item.planned)+'</div><button class="btn ghost" data-paybill="'+x.g.id+':'+x.item.id+'">'+(itemPaid(x.item)?'Undo':'Pay')+'</button></div></div>'}).join(""):'<div class="empty">No bills yet. Add rent, phone, subscriptions, or anything recurring.</div>')+'</section></div>'}function renderMore(){return'<div class="grid"><section class="card span12"><div class="stack"><button id="goDebt" class="btn">Debt payoff</button><button id="goSettings" class="btn">Settings and backup</button><button id="goPrivacy" class="btn">Privacy</button></div></section></div>'}function renderDebt(){let r=debtPayoff();return'<div class="grid"><section class="card span12"><div class="row"><div><div class="label">Debt payoff</div><div class="metric sm">'+(r.months?Math.floor(r.months/12)+' yr '+r.months%12+' mo':'No debt')+'</div><p class="small muted">Estimated interest: '+fmtC(r.interest)+'</p></div><button id="addDebt" class="btn primary">Add debt</button></div><button data-strat="avalanche" class="btn">Avalanche</button> <button data-strat="snowball" class="btn">Snowball</button><button id="extraDebt" class="btn" style="margin-top:10px">Extra payment: '+fmt(S.debtPlan.extra)+'</button></section><section class="card span12">'+(S.debts.length?S.debts.map(d=>'<div class="row click" data-editdebt="'+d.id+'"><b>'+esc(d.name)+'</b><span class="money">'+fmt(d.balance)+'</span></div>').join(""):'<div class="empty">Add debts to compare payoff plans.</div>')+'</section></div>'}
function openSettings(){let age=S.lastBackup?Math.floor((Date.now()-S.lastBackup)/86400000):null;sheet("Settings and backup",'<div class="stack"><button id="themeToggle" class="btn">Theme: '+(S.theme==="light"?"Light":"Dark")+'</button><button id="paySettings" class="btn">Income and paycheck</button><div class="dangerNote">Data is stored only on this device. Create private backups often.</div><button id="copyBackup" class="btn primary">Copy private backup</button><button id="downloadBackup" class="btn">Download backup file</button><button id="restoreText" class="btn">Restore from pasted text</button><button id="restoreFile" class="btn">Restore from file</button><div class="small muted">Last backup: '+(age===null?"never":age===0?"today":age+" days ago")+'</div><button id="clearTxns" class="btn warn">Clear '+monthShort(mk)+' transactions</button><button id="clearMonth" class="btn warn">Clear '+monthShort(mk)+' plan</button><button id="startOverAll" class="btn warn">Start over completely</button></div>');bindSettings()}function openPrivacy(){sheet("Your privacy",'<p class="muted">Allotted has no accounts, no bank connection, no analytics, no ads, and no network calls during normal use. Your budget, bills, debts, and transactions stay on this device.</p>')}
function bindSettings(){themeToggle.onclick=()=>{S.theme=S.theme==="light"?"dark":"light";setTheme();commit();openSettings()};paySettings.onclick=openPaySettings;copyBackup.onclick=copyBackupNow;downloadBackup.onclick=downloadBackupNow;restoreText.onclick=openPasteRestore;restoreFile.onclick=()=>fileInput.click();clearTxns.onclick=()=>{if(!confirm("Clear all transactions for "+monthName(mk)+"? Your planned amounts stay."))return;let snap=JSON.stringify(M());M().groups.forEach(g=>g.items.forEach(i=>{i.txns=[];i.actual=0}));closeModal();commit();toast("Transactions cleared","warn",()=>{S.months[mk]=JSON.parse(snap);commit()})};clearMonth.onclick=()=>{if(!confirm("Clear the entire "+monthName(mk)+" plan?"))return;delete S.months[mk];closeModal();commit()};startOverAll.onclick=()=>{if(!confirm("Erase everything in Allotted on this device?"))return;S=defaultState();closeModal();commit()}}
function openPaySettings(){let s=S.settings;sheet("Income and paycheck",field("mincome","Monthly take-home income",s.monthlyIncome,"number")+field("sgoal","Monthly savings goal",s.savingsGoal,"number")+field("nextPay","Next payday",s.nextPayday,"date")+field("payAmt","Pay amount",s.payAmount,"number")+'<button id="savePay" class="btn primary">Save</button>');savePay.onclick=()=>{s.monthlyIncome=money(mincome.value);s.savingsGoal=money(sgoal.value);s.nextPayday=nextPay.value;s.payAmount=money(payAmt.value);s.paycheckMode=!!(s.nextPayday||s.payAmount);closeModal();commit()}}
function backupPayload(){return JSON.stringify({...S,exportedAt:new Date().toISOString()},null,2)}async function copyBackupNow(){let txt=backupPayload();try{await navigator.clipboard.writeText(txt);S.lastBackup=Date.now();save();toast("Private backup copied","good")}catch(e){sheet("Copy backup",'<textarea id="copyArea" readonly style="height:190px">'+esc(txt)+'</textarea>')}}function downloadBackupNow(){let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([backupPayload()],{type:"application/json"}));a.download="allotted-backup.json";a.click();S.lastBackup=Date.now();save()}function applyBackup(text,skipConfirm){try{let d=JSON.parse(text.trim());if(!d.months)throw 0;if(!skipConfirm&&!confirm("Restore this backup and replace everything currently in Allotted?"))return false;S=defaultState();adoptState(d);migrate();closeModal();commit();toast("Backup restored","good");return true}catch(e){toast("That is not a valid Allotted backup","bad");return false}}function openPasteRestore(){sheet("Restore backup",'<textarea id="restoreArea" style="height:170px"></textarea><button id="restoreGo" class="btn primary">Restore</button>');restoreGo.onclick=()=>applyBackup(restoreArea.value)}
function startOnboarding(){sheet("Quick setup",field("obIncome","Monthly take-home income","","number")+field("obSavings","Monthly savings goal","","number")+field("obBills","Monthly bills total","","number")+field("obCats","Spending categories","Groceries, Restaurants, Gas, Fun")+'<button id="finishOb" class="btn primary">Build my first budget</button>');finishOb.onclick=()=>{let income=money(obIncome.value),sav=money(obSavings.value),bills=money(obBills.value),cats=obCats.value.split(",").map(x=>x.trim()).filter(Boolean),m=blankMonth();m.income[0].amount=income;m.savings[0].amount=sav;m.groups[0].items=[item("Monthly bills",bills,true,1)];let left=Math.max(0,income-sav-bills),each=cats.length?Math.floor(left/cats.length):0;m.groups[1].items=cats.map((c,i)=>item(c,i===cats.length-1?left-each*(cats.length-1):each,false));S.months[mk]=m;S.settings.monthlyIncome=income;S.settings.savingsGoal=sav;S.settings.onboardingCompleted=true;closeModal();commit()}}
function openMoney(k,idv){let m=ensureMonth(),list=m[k],x=idv?list.find(v=>v.id===idv):null;sheet((x?"Edit ":"Add ")+(k==="income"?"income":"savings"),field("moneyName","Name",x?.name||(k==="income"?"Take-home pay":"Savings"))+field("moneyAmt","Amount",x?.amount||"","number")+'<button id="saveMoney" class="btn primary">Save</button>'+(x?'<button id="deleteMoney" class="btn warn">Delete</button>':""));saveMoney.onclick=()=>{let o=x||{id:id()};o.name=moneyName.value.trim()||(k==="income"?"Income":"Savings");o.amount=money(moneyAmt.value);if(!x)list.push(o);if(k==="income")S.settings.monthlyIncome=totals(m).income;if(k==="savings")S.settings.savingsGoal=totals(m).savings;closeModal();commit()};let d=document.getElementById("deleteMoney");if(d)d.onclick=()=>{m[k]=list.filter(v=>v.id!==idv);closeModal();commit()}}
function openLine(gid,iid,makeBill){let m=ensureMonth(),g=m.groups.find(x=>x.id===gid)||m.groups[0],i=iid?g.items.find(x=>x.id===iid):null;sheet(i?"Edit line":"Add line",field("lnName","Name",i?.name||"")+field("lnPlanned","Planned amount",i?.planned||"","number")+field("lnDue","Due day for bills",i?.dueDay||"","number")+'<label class="row" style="border:0"><span>Recurring bill</span><input id="lnRec" type="checkbox" style="width:auto" '+((i?.recurring||makeBill)?"checked":"")+"></label><button id=\"saveLine\" class=\"btn primary\">Save</button>"+(i?'<button id="deleteLine" class="btn warn">Delete</button>':""));saveLine.onclick=()=>{let o=i||item("",0,false);o.name=lnName.value.trim()||"Line";o.planned=money(lnPlanned.value);o.recurring=lnRec.checked;o.dueDay=lnDue.value||null;if(!i)g.items.push(o);closeModal();commit()};let d=document.getElementById("deleteLine");if(d)d.onclick=()=>{g.items=g.items.filter(x=>x.id!==iid);closeModal();commit()}}
function openTxn(ref){let m=ensureMonth(),choices=allItems(m);if(!choices.length){toast("Add a budget line first","warn");tab="budget";render();return}let gid="",iid="",tid="",tx=null,source=null;if(ref){[gid,iid,tid]=ref.split(":");source=findItem(m,gid,iid);tx=source.i?.txns.find(x=>x.id===tid)}let selected=tx?gid+":"+iid:(S.lastLog?S.lastLog.gid+":"+S.lastLog.iid:"");sheet(tx?"Edit transaction":"Log spending",'<label class="field"><span>Line</span><select id="txLine">'+choices.map(x=>'<option value="'+x.g.id+':'+x.item.id+'" '+((x.g.id+':'+x.item.id)===selected?"selected":"")+'>'+esc(x.g.name)+" - "+esc(x.item.name)+"</option>").join("")+"</select></label>"+field("txAmt","Amount",tx?.amount||"","number")+field("txDate","Date",tx?.date||new Date().toISOString().slice(0,10),"date")+field("txNote","Note",tx?.note||"")+'<button id="saveTxn" class="btn primary">Save spending</button>'+(tx?'<button id="deleteTxn" class="btn warn">Delete transaction</button>':""));saveTxn.onclick=()=>{let [ngid,niid]=txLine.value.split(":"),n=findItem(m,ngid,niid),o=tx||{id:id()};o.amount=money(txAmt.value);o.date=txDate.value||new Date().toISOString().slice(0,10);o.note=txNote.value||"";if(tx&&source.i){source.i.txns=source.i.txns.filter(x=>x.id!==tid);recalcItem(source.i)}n.i.txns.push(o);recalcItem(n.i);S.lastLog={gid:ngid,iid:niid};closeModal();commit()};let d=document.getElementById("deleteTxn");if(d)d.onclick=()=>{if(!confirm("Delete this transaction?"))return;source.i.txns=source.i.txns.filter(x=>x.id!==tid);recalcItem(source.i);closeModal();commit()}}
function payBill(gid,iid){let i=findItem(ensureMonth(),gid,iid).i;if(!i)return;if(itemPaid(i)){i.txns=[];i.actual=0}else{i.txns=[{id:id(),date:new Date().toISOString().slice(0,10),amount:i.planned,note:"Bill paid"}];recalcItem(i)}commit()}function openDebt(idv){let d=idv?S.debts.find(x=>x.id===idv):null;sheet(d?"Edit debt":"Add debt",field("dn","Name",d?.name||"")+field("db","Balance",d?.balance||"","number")+field("dm","Minimum payment",d?.minPayment||"","number")+field("da","APR",d?.apr||"","number")+'<button id="saveDebt" class="btn primary">Save</button>');saveDebt.onclick=()=>{let o=d||{id:id()};o.name=dn.value||"Debt";o.balance=money(db.value);o.minPayment=money(dm.value);o.apr=money(da.value);if(!d)S.debts.push(o);closeModal();commit()}}
function openAddMenu(){sheet("Add something",'<div class="stack"><button id="menuIncome" class="btn primary">Add income</button><button id="menuBill" class="btn">Add bill</button><button id="menuSpend" class="btn">Add spending line</button><button id="menuTxn" class="btn">Log spending</button></div>');menuIncome.onclick=()=>{closeModal();openMoney("income")};menuBill.onclick=()=>{closeModal();openLine(ensureMonth().groups[0].id,null,true)};menuSpend.onclick=()=>{closeModal();openLine(ensureMonth().groups[1].id)};menuTxn.onclick=()=>{closeModal();openTxn()}}
function bind(){document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});document.querySelectorAll("[data-mnav]").forEach(b=>b.onclick=()=>selectMonth(shiftMonth(mk,parseInt(b.dataset.mnav)),parseInt(b.dataset.mnav)>0));let pm=document.getElementById("pickMonth");if(pm)pm.onclick=()=>{let v=prompt("Go to month YYYY-MM",mk);if(/^\d{4}-\d{2}$/.test(v||""))selectMonth(v,true)};let fab=document.getElementById("fab");if(fab)fab.onclick=openAddMenu;let sg=document.getElementById("startGuided");if(sg)sg.onclick=startOnboarding;let sb=document.getElementById("startBlank");if(sb)sb.onclick=()=>{S.months[mk]=blankMonth();S.settings.onboardingCompleted=true;commit();openMoney("income")};let rw=document.getElementById("restoreWelcome");if(rw)rw.onclick=openPasteRestore;["dashAddIncome","startIncome"].forEach(x=>{let e=document.getElementById(x);if(e)e.onclick=()=>openMoney("income")});let dl=document.getElementById("dashLogSpend");if(dl)dl.onclick=()=>openTxn();let ql=document.getElementById("quickLog");if(ql)ql.onclick=()=>openTxn();let qb=document.getElementById("quickBudget");if(qb)qb.onclick=()=>{tab="budget";render()};let qbi=document.getElementById("quickBills");if(qbi)qbi.onclick=()=>{tab="bills";render()};let stbi=document.getElementById("startBills");if(stbi)stbi.onclick=()=>{tab="bills";render()};let stsp=document.getElementById("startSpending");if(stsp)stsp.onclick=()=>{tab="budget";render()};let dbk=document.getElementById("dashBackup");if(dbk)dbk.onclick=copyBackupNow;let ag=document.getElementById("addGroup");if(ag)ag.onclick=()=>{let n=prompt("Group name");if(n){ensureMonth().groups.push({id:id(),name:n,items:[]});commit()}};let ai=document.getElementById("addIncome");if(ai)ai.onclick=()=>openMoney("income");let as=document.getElementById("addSavings");if(as)as.onclick=()=>openMoney("savings");document.querySelectorAll("[data-editmoney]").forEach(b=>b.onclick=()=>{let p=b.dataset.editmoney.split(":");openMoney(p[0],p[1])});document.querySelectorAll("[data-additem]").forEach(b=>b.onclick=()=>openLine(b.dataset.additem));document.querySelectorAll("[data-edititem]").forEach(b=>b.onclick=()=>{let p=b.dataset.edititem.split(":");openLine(p[0],p[1])});let at=document.getElementById("addTxn");if(at)at.onclick=()=>openTxn();document.querySelectorAll("[data-edittxn]").forEach(b=>b.onclick=()=>openTxn(b.dataset.edittxn));let ab=document.getElementById("addBill");if(ab)ab.onclick=()=>openLine(ensureMonth().groups[0].id,null,true);document.querySelectorAll("[data-paybill]").forEach(b=>b.onclick=()=>{let p=b.dataset.paybill.split(":");payBill(p[0],p[1])});let gd=document.getElementById("goDebt");if(gd)gd.onclick=()=>{tab="debt";render()};let gs=document.getElementById("goSettings");if(gs)gs.onclick=openSettings;let gp=document.getElementById("goPrivacy");if(gp)gp.onclick=openPrivacy;let ad=document.getElementById("addDebt");if(ad)ad.onclick=()=>openDebt();document.querySelectorAll("[data-editdebt]").forEach(b=>b.onclick=()=>openDebt(b.dataset.editdebt));document.querySelectorAll("[data-strat]").forEach(b=>b.onclick=()=>{S.debtPlan.strategy=b.dataset.strat;commit()});let ex=document.getElementById("extraDebt");if(ex)ex.onclick=()=>{let v=prompt("Extra payment per month",S.debtPlan.extra);if(v!==null){S.debtPlan.extra=money(v);commit()}}}
settingsBtn.onclick=openSettings;document.getElementById("fileInput").addEventListener("change",e=>{let f=e.target.files&&e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>applyBackup(String(r.result||""));r.readAsText(f);e.target.value=""});document.addEventListener("keydown",e=>{if(modal.innerHTML){if(e.key==="Escape")closeModal();return}if(["INPUT","TEXTAREA","SELECT"].includes((e.target.tagName||"").toUpperCase()))return;if(e.key==="ArrowLeft")selectMonth(shiftMonth(mk,-1),false);if(e.key==="ArrowRight")selectMonth(shiftMonth(mk,1),true)});load();if(!storageBroken)save();render();if(storageBroken)setTimeout(()=>toast(storageWarning,"bad"),700);
</script></body></html>
