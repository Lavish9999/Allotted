
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Allotted Hybrid Merge</title>
<meta name="theme-color" content="#05070B">
<style>
:root{
  --bg:#05070B; --bg2:#0A0E14; --panel:#0E141D; --panel2:#121A25;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
  --text:#F5F7FA; --soft:#D3DAE2; --muted:#8591A0;
  --teal:#22E2D2; --blue:#45A7FF; --green:#35D27C; --orange:#FFAE4A; --purple:#AA8BFF; --red:#FF6A6A;
  --shadow:rgba(0,0,0,.34); --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter","Segoe UI",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:
radial-gradient(900px 520px at 14% -12%,rgba(34,226,210,.16),transparent 55%),
radial-gradient(860px 520px at 86% -6%,rgba(69,167,255,.12),transparent 50%),
linear-gradient(180deg,var(--bg),var(--bg2) 40%,var(--bg));
font-family:var(--font);color:var(--text);letter-spacing:-.018em}
body{padding-bottom:calc(104px + env(safe-area-inset-bottom));overflow-x:hidden}
button,input,select,textarea{font:inherit}
button{border:0;background:transparent;color:inherit;cursor:pointer;touch-action:manipulation}
input,select,textarea{
  width:100%;border:1px solid var(--line);outline:0;background:rgba(255,255,255,.04);color:var(--text);
  border-radius:18px;padding:15px 14px;font-size:16px
}
input:focus,select:focus,textarea:focus{box-shadow:0 0 0 5px rgba(34,226,210,.14);border-color:rgba(34,226,210,.28)}
input[type=number]{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
#app{min-height:100vh}
.shell{max-width:430px;margin:0 auto}
.top{
  position:sticky;top:0;z-index:30;padding:calc(14px + env(safe-area-inset-top)) 16px 10px;
  background:linear-gradient(180deg,rgba(5,7,11,.95),rgba(5,7,11,.82),rgba(5,7,11,0));
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px)
}
.topBar{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.logo{width:34px;height:34px;filter:drop-shadow(0 10px 22px rgba(0,0,0,.28))}
.brand b{display:block;font-size:17px;font-weight:900;letter-spacing:-.055em;line-height:1}
.brand span{display:block;font-size:11px;color:var(--muted);font-weight:780;margin-top:4px}
.iconBtn{width:38px;height:38px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.05);display:grid;place-items:center;color:var(--soft)}
.iconBtn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round}
.monthRow{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:12px}
.monthTitle{font-size:18px;font-weight:900;letter-spacing:-.05em;min-width:145px;text-align:center}
.page{padding:0 16px 18px}
.hero{
  border-radius:30px;padding:18px;background:
  radial-gradient(340px 220px at 15% 0%,rgba(34,226,210,.12),transparent 58%),
  linear-gradient(180deg,rgba(10,16,24,.96),rgba(8,11,17,.96));
  border:1px solid var(--line);box-shadow:0 22px 60px var(--shadow);margin-bottom:14px
}
.heroGrid{display:grid;grid-template-columns:1.15fr .85fr;gap:10px;align-items:end}
.kicker{font-size:12px;color:var(--soft);font-weight:850;letter-spacing:.16em;text-transform:uppercase}
.bigMoney{font-size:68px;font-weight:960;letter-spacing:-.11em;line-height:.88;color:var(--teal);margin-top:6px}
.subline{font-size:13px;color:var(--muted);line-height:1.4;margin-top:6px}
.sideStats{display:grid;gap:7px;justify-items:end}
.sideStats div{font-size:13px;color:var(--soft);display:flex;gap:8px}
.sideStats b{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:15px;color:var(--text)}
.heroRule{height:1px;background:var(--line);margin:16px -18px 0}
.safeCard{
  border-radius:26px;padding:18px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.02));
  border:1px solid var(--line);box-shadow:inset 0 1px 0 rgba(255,255,255,.04);margin:14px 0
}
.safeCard .kicker{text-align:center}
.safeNum{text-align:center;font-size:54px;font-weight:950;letter-spacing:-.10em;color:var(--teal);line-height:.95;margin-top:7px}
.safeCopy{text-align:center;color:var(--muted);font-size:13px;line-height:1.4;margin-top:7px}
.stack{display:grid;gap:10px}
.btn{
  min-height:52px;border-radius:18px;padding:14px 16px;border:1px solid var(--line);
  background:rgba(255,255,255,.04);color:var(--text);font-weight:860;display:flex;align-items:center;justify-content:center;gap:9px
}
.btn.primary{background:linear-gradient(180deg,color-mix(in srgb,var(--teal) 86%,white 14%),var(--teal));color:#062A2A;border-color:transparent;box-shadow:0 14px 32px rgba(34,226,210,.18)}
.btn.ghost{background:transparent;border-color:rgba(34,226,210,.32);color:var(--teal)}
.btn.success{background:rgba(53,210,124,.12);color:var(--green);border-color:rgba(53,210,124,.22)}
.btn.danger{background:rgba(255,106,106,.12);color:var(--red);border-color:rgba(255,106,106,.22)}
.btn.small{min-height:36px;border-radius:999px;padding:8px 13px;font-size:12px}
.card,.groupCard{
  border-radius:24px;background:linear-gradient(180deg,rgba(18,24,34,.95),rgba(12,17,25,.95));
  border:1px solid var(--line);box-shadow:0 18px 46px rgba(0,0,0,.22);margin-bottom:14px;overflow:hidden
}
.cardPad{padding:16px}
.cardHeader{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.title{font-size:17px;font-weight:900;letter-spacing:-.04em;line-height:1.15}
.sub{font-size:12.5px;color:var(--muted);line-height:1.36}
.list{display:grid}
.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:13px 16px;border-top:1px solid var(--line)}
.row:first-child{border-top:0}
.rowTitle{font-size:14px;font-weight:830;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rowSub{font-size:12px;color:var(--muted);line-height:1.34;margin-top:3px}
.money{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:920;letter-spacing:-.05em;white-space:nowrap}
.addLine{color:var(--teal);font-size:12px;font-weight:880;letter-spacing:.01em}
.sectionHdr{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;background:linear-gradient(90deg,rgba(255,255,255,.035),rgba(255,255,255,.015))}
.sectionHdr b{font-size:14px;font-weight:920;letter-spacing:.03em}
.sectionHdr .rightMeta{font-size:13px;color:var(--soft);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.groupTop{padding:14px 16px 12px;background:linear-gradient(90deg,rgba(255,255,255,.04),rgba(255,255,255,.015));display:grid;gap:9px}
.groupHead{display:flex;align-items:center;justify-content:space-between;gap:10px}
.groupHead b{font-size:17px;font-weight:900;letter-spacing:-.04em}
.groupHead .right{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--soft);font-size:14px;font-weight:900}
.groupHead .right strong{color:var(--teal)}
.bar{height:7px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden}
.bar i{display:block;height:100%;border-radius:inherit;background:var(--bar,var(--teal));width:var(--w,0%)}
.rowActions{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.pill{min-height:34px;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:860;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--soft)}
.pill.pay{background:rgba(34,226,210,.10);color:var(--teal);border-color:rgba(34,226,210,.24)}
.pill.manage{background:rgba(255,255,255,.05)}
.pill.green{background:rgba(53,210,124,.12);color:var(--green);border-color:rgba(53,210,124,.22)}
.pill.danger{background:rgba(255,106,106,.12);color:var(--red);border-color:rgba(255,106,106,.22)}
.tag{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:10.5px;font-weight:860;background:rgba(255,255,255,.05);color:var(--soft);margin-left:6px}
.tag.bill{background:rgba(69,167,255,.12);color:var(--blue)}
.tag.due{background:rgba(255,174,74,.12);color:var(--orange)}
.tag.paid{background:rgba(53,210,124,.12);color:var(--green)}
.tag.save{background:rgba(170,139,255,.13);color:var(--purple)}
.nav{position:fixed;left:0;right:0;bottom:calc(14px + env(safe-area-inset-bottom));display:flex;justify-content:center;pointer-events:none;z-index:40}
.navInner{pointer-events:auto;display:flex;gap:4px;background:rgba(10,14,20,.86);border:1px solid var(--line);border-radius:999px;padding:6px;box-shadow:0 24px 64px rgba(0,0,0,.42);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px)}
.nav button{min-width:98px;display:flex;align-items:center;justify-content:center;gap:7px;color:var(--muted);padding:11px 12px;border-radius:999px;font-size:12px;font-weight:840}
.nav button.on{background:rgba(34,226,210,.12);color:var(--teal);box-shadow:inset 0 0 0 1px rgba(34,226,210,.22),0 0 0 1px rgba(34,226,210,.08)}
.nav button svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round}
.sheetOverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:60;display:flex;align-items:flex-end;justify-content:center}
.sheet{width:min(440px,100%);max-height:90vh;overflow:auto;background:linear-gradient(180deg,rgba(12,17,25,.98),rgba(8,12,18,.98));border:1px solid var(--line2);border-radius:28px 28px 0 0;padding:16px 16px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -24px 80px rgba(0,0,0,.48)}
.handle{width:40px;height:5px;border-radius:999px;background:var(--line2);margin:2px auto 12px}
.sheetTop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.sheetTop h2{font-size:20px;font-weight:920;letter-spacing:-.055em}
.close{width:38px;height:38px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--line);font-size:24px;line-height:1;color:var(--soft)}
.field{display:block;margin-bottom:12px}.field span{display:block;font-size:12px;color:var(--muted);font-weight:780;margin-bottom:6px}
.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.help{border-radius:18px;padding:13px;background:rgba(34,226,210,.08);border:1px solid rgba(34,226,210,.16);font-size:12.5px;color:var(--soft);line-height:1.4;margin-bottom:12px}
.empty{text-align:center;padding:20px 12px;color:var(--muted);line-height:1.4}
.empty b{display:block;color:var(--text);font-size:16px;margin-bottom:5px}
.toast{position:fixed;left:50%;bottom:calc(92px + env(safe-area-inset-bottom));transform:translateX(-50%);background:rgba(245,247,250,.98);color:#0A0E14;padding:12px 16px;border-radius:999px;font-weight:900;z-index:80;box-shadow:0 18px 48px rgba(0,0,0,.34);white-space:nowrap;max-width:calc(100vw - 28px)}
@media(max-width:380px){.heroGrid{grid-template-columns:1fr}.bigMoney{font-size:58px}.nav button{min-width:82px}.monthTitle{min-width:128px}}

/* =========================================================
   HYBRID FIX — light mode + clickable Track/category drilldowns
   ========================================================= */
:root[data-theme="light"]{
  --bg:#F5F5F7;
  --bg2:#FFFFFF;
  --panel:#FFFFFF;
  --panel2:#F2F4F7;
  --line:rgba(0,0,0,.08);
  --line2:rgba(0,0,0,.14);
  --text:#111113;
  --soft:#3A3A3C;
  --muted:#7A7F88;
  --shadow:rgba(0,0,0,.12);
}
:root[data-theme="light"] html,
:root[data-theme="light"] body,
html[data-theme="light"] body{
  background:
    radial-gradient(900px 520px at 14% -12%,rgba(34,226,210,.12),transparent 55%),
    radial-gradient(860px 520px at 86% -6%,rgba(69,167,255,.10),transparent 50%),
    linear-gradient(180deg,var(--bg),var(--bg2) 44%,var(--bg))!important;
  color:var(--text)!important;
}
html[data-theme="light"] .top{
  background:linear-gradient(180deg,rgba(245,245,247,.96),rgba(245,245,247,.82),rgba(245,245,247,0))!important;
}
html[data-theme="light"] .hero{
  background:
    radial-gradient(340px 220px at 15% 0%,rgba(34,226,210,.16),transparent 58%),
    linear-gradient(180deg,rgba(255,255,255,.96),rgba(246,248,251,.96))!important;
  box-shadow:0 22px 54px rgba(0,0,0,.10)!important;
}
html[data-theme="light"] .card,
html[data-theme="light"] .groupCard{
  background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(246,248,251,.96))!important;
  box-shadow:0 18px 44px rgba(0,0,0,.10)!important;
}
html[data-theme="light"] .sectionHdr,
html[data-theme="light"] .groupTop{
  background:linear-gradient(90deg,rgba(0,0,0,.025),rgba(0,0,0,.008))!important;
}
html[data-theme="light"] .safeCard,
html[data-theme="light"] .btn,
html[data-theme="light"] .pill,
html[data-theme="light"] .iconBtn{
  background:rgba(0,0,0,.035);
}
html[data-theme="light"] .sheet{
  background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(246,248,251,.98))!important;
}
html[data-theme="light"] .navInner{
  background:rgba(255,255,255,.86)!important;
  box-shadow:0 24px 64px rgba(0,0,0,.16)!important;
}
html[data-theme="light"] .rowTitle,
html[data-theme="light"] .title,
html[data-theme="light"] .brand b,
html[data-theme="light"] .monthTitle{
  color:#111113!important;
}
html[data-theme="light"] .toast{
  background:#111113!important;
  color:#F5F5F7!important;
}
.groupTop.clickable,
.sectionHdr.clickable,
.row.clickable{
  cursor:pointer;
}
.groupTop.clickable:active,
.sectionHdr.clickable:active,
.row.clickable:active{
  transform:scale(.995);
}
.chev{
  color:var(--muted);
  font-size:18px;
  font-weight:900;
  margin-left:5px;
}
.groupTxSummary{
  border-radius:20px;
  padding:13px;
  background:rgba(34,226,210,.08);
  border:1px solid rgba(34,226,210,.16);
  margin-bottom:12px;
}
.groupTxSummary b{
  display:block;
  font-size:18px;
  font-weight:920;
  letter-spacing:-.045em;
}
.groupTxSummary span{
  display:block;
  margin-top:4px;
  color:var(--muted);
  font-size:12.5px;
  line-height:1.35;
}
button,[data-act],[data-tab]{
  pointer-events:auto!important;
  touch-action:manipulation!important;
}


/* =========================================================
   ONBOARDING + ADD CATEGORY UPDATE
   ========================================================= */
.onboarding{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:calc(26px + env(safe-area-inset-top)) 16px calc(26px + env(safe-area-inset-bottom));
}
.onboardPanel{
  width:min(430px,100%);
  border-radius:34px;
  padding:26px 18px;
  background:
    radial-gradient(320px 240px at 20% 0%,rgba(34,226,210,.15),transparent 58%),
    linear-gradient(180deg,rgba(18,24,34,.96),rgba(10,14,20,.96));
  border:1px solid var(--line);
  box-shadow:0 28px 78px rgba(0,0,0,.38);
  text-align:center;
}
html[data-theme="light"] .onboardPanel{
  background:
    radial-gradient(320px 240px at 20% 0%,rgba(34,226,210,.15),transparent 58%),
    linear-gradient(180deg,rgba(255,255,255,.96),rgba(246,248,251,.96))!important;
}
.onboardLogo{
  width:88px;
  height:88px;
  margin:0 auto 14px;
  filter:drop-shadow(0 18px 32px rgba(0,0,0,.24));
}
.onboardPanel h1{
  font-size:clamp(38px,11vw,64px);
  line-height:.9;
  font-weight:960;
  letter-spacing:-.105em;
  margin-bottom:12px;
}
.onboardPanel p{
  color:var(--soft);
  line-height:1.5;
  font-size:14.5px;
  max-width:340px;
  margin:0 auto 18px;
}
.onboardSteps{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
  margin:16px 0;
  text-align:left;
}
.onboardStep{
  border-radius:18px;
  background:rgba(255,255,255,.045);
  border:1px solid var(--line);
  padding:13px;
}
html[data-theme="light"] .onboardStep{background:rgba(0,0,0,.035)}
.onboardStep b{
  display:block;
  font-size:13px;
  color:var(--text);
}
.onboardStep span{
  display:block;
  color:var(--muted);
  font-size:12px;
  margin-top:3px;
  line-height:1.35;
}
.templatePick{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:12px;
}
.templatePick button{
  min-height:88px;
  text-align:left;
  border-radius:18px;
  background:rgba(255,255,255,.045);
  border:1px solid var(--line);
  padding:13px;
}
html[data-theme="light"] .templatePick button{background:rgba(0,0,0,.035)}
.templatePick button.on{
  border-color:rgba(34,226,210,.42);
  box-shadow:0 0 0 5px rgba(34,226,210,.11);
}
.templatePick b{
  display:block;
  font-size:14px;
  font-weight:900;
}
.templatePick span{
  display:block;
  margin-top:4px;
  color:var(--muted);
  font-size:11.5px;
  line-height:1.3;
}
.categoryToolbar{
  margin-bottom:14px;
}
.categoryToolbar .btn{
  min-height:44px;
}


/* =========================================================
   ONBOARDING CUSTOM CATEGORIES
   ========================================================= */
.customCatBox{
  border-radius:20px;
  padding:13px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
  margin-bottom:12px;
}
html[data-theme="light"] .customCatBox{
  background:rgba(0,0,0,.035);
}
.customCatBox b{
  display:block;
  font-size:14px;
  font-weight:900;
  margin-bottom:4px;
}
.customCatBox p{
  color:var(--muted);
  font-size:12px;
  line-height:1.35;
  margin-bottom:10px;
}
.customCatInputRow{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:8px;
  align-items:center;
}
.customCatInputRow .btn{
  min-height:48px;
  white-space:nowrap;
}
.customCatList{
  display:flex;
  gap:7px;
  flex-wrap:wrap;
  margin-top:10px;
}
.customCatChip{
  display:inline-flex;
  align-items:center;
  gap:7px;
  border-radius:999px;
  padding:7px 10px;
  background:rgba(34,226,210,.10);
  border:1px solid rgba(34,226,210,.20);
  color:var(--teal);
  font-size:12px;
  font-weight:850;
}
.customCatChip button{
  color:inherit;
  font-size:15px;
  line-height:1;
}

</style>
</head>
<body>
<div id="app"></div>
<div id="sheetRoot"></div>
<script>
(function(){
"use strict";
const KEY="allotted.hybrid.merge.v2.onboarding";
const $=s=>document.querySelector(s);
const $$=s=>Array.from(document.querySelectorAll(s));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const today=()=>new Date().toISOString().slice(0,10);
const monthKey=()=>today().slice(0,7);
const num=v=>Number(String(v??"").replace(/[$,]/g,""))||0;
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
const money=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(Number(n)||0);
function monthName(k){const[y,m]=k.split("-").map(Number);return new Date(y,m-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"})}
function shiftMonth(k,n){const[y,m]=k.split("-").map(Number);const d=new Date(y,m-1+n,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function daysInMonth(k){const[y,m]=k.split("-").map(Number);return new Date(y,m,0).getDate()}
function dayIndex(k){return k===monthKey()?new Date().getDate():1}
function daysLeft(k){return Math.max(1,daysInMonth(k)-dayIndex(k)+1)}
function dateObj(s){const[y,m,d]=String(s).split("-").map(Number);return new Date(y,(m||1)-1,d||1)}
function daysBetween(a,b){return Math.ceil((dateObj(b)-dateObj(a))/86400000)}
function logo(size=34){

function allItems(){return state.groups.flatMap(g=>g.items.map(i=>({...i,groupId:g.id,groupName:g.name})))}
function itemById(id){return allItems().find(i=>i.id===id)}
function txnsForMonth(){return state.txns.filter(t=>String(t.date).slice(0,7)===state.month)}
function spentForItem(id){return txnsForMonth().filter(t=>t.itemId===id).reduce((s,t)=>s+num(t.amount),0)}
function txnsCount(id){return txnsForMonth().filter(t=>t.itemId===id).length}
function itemLeft(item){return Math.max(0,num(item.budget)-spentForItem(item.id))}
function billDate(item){const[y,m]=state.month.split("-").map(Number);const d=Math.min(num(item.dueDay)||1,new Date(y,m,0).getDate());return `${state.month}-${String(d).padStart(2,"0")}`}
function billBaseDate(){return state.month===monthKey()?today():state.month+"-01"}
function billStatus(item){const spent=spentForItem(item.id),left=itemLeft(item),due=billDate(item),days=daysBetween(billBaseDate(),due);return{spent,left,due,days,paid:left<=0}}
function groupStats(group){
  const budget=group.items.reduce((s,i)=>s+num(i.budget),0);
  const spent=group.items.reduce((s,i)=>s+spentForItem(i.id),0);
  const left=Math.max(0,budget-spent);
  const pct=budget?Math.min(100,spent/budget*100):0;
  return{budget,spent,left,pct}
}
function calc(){
  const income=state.income.reduce((s,i)=>s+num(i.amount),0);
  const savings=state.savings.reduce((s,i)=>s+num(i.amount),0);
  const items=allItems();
  const plannedSpend=items.reduce((s,i)=>s+num(i.budget),0);
  const planned=plannedSpend+savings;
  const spent=txnsForMonth().reduce((s,t)=>s+num(t.amount),0);
  const flex=items.filter(i=>i.kind!=="bill");
  const flexBudget=flex.reduce((s,i)=>s+num(i.budget),0);
  const flexSpent=flex.reduce((s,i)=>s+spentForItem(i.id),0);
  const leftToSpend=Math.max(0,flexBudget-flexSpent);
  const safe=Math.max(0,Math.round(leftToSpend/daysLeft(state.month)));
  const unallocated=income-planned;
  const savingsRate=income?Math.round((savings/income)*100):0;
  return{income,savings,plannedSpend,planned,spent,leftToSpend,safe,unallocated,savingsRate,flexBudget,flexSpent}
}

  const txs=txnsForGroup(groupId);
  const s=groupStats(g);
  sheet(`${g.name} transactions`,`<div class="groupTxSummary"><b>${money(s.spent)} spent</b><span>${money(s.left)} left of ${money(s.budget)} planned this month.</span></div>${txs.length?txs.map(t=>{const item=itemById(t.itemId);return `<div class="row"><div><div class="rowTitle">${esc(t.note||item?.name||"Transaction")}</div><div class="rowSub">${t.date} · ${esc(item?.name||"Line")} · ${esc(t.type==="bill"?"bill payment":"spending")}</div></div><div class="money">-${money(t.amount)}</div></div>`}).join(""):`<div class="empty"><b>No transactions</b>Transactions for ${esc(g.name)} will show here.</div>`}<button class="btn primary" style="margin-top:12px" data-act="logTxn">+ Log transaction</button>`);
}
function itemTransactionsSheet(itemId){
  const item=itemById(itemId);
  if(!item)return;
  const txs=txnsForItem(itemId);
  const spent=spentForItem(itemId), left=itemLeft(item);
  sheet(`${item.name} transactions`,`<div class="groupTxSummary"><b>${money(spent)} spent</b><span>${money(left)} left of ${money(item.budget)} planned this month.</span></div>${txs.length?txs.map(t=>`<div class="row"><div><div class="rowTitle">${esc(t.note||item.name)}</div><div class="rowSub">${t.date} · ${esc(t.type==="bill"?"bill payment":"spending")}</div></div><div class="money">-${money(t.amount)}</div></div>`).join(""):`<div class="empty"><b>No transactions</b>Transactions for ${esc(item.name)} will show here.</div>`}${item.kind==="bill"?`<button class="btn primary" style="margin-top:12px" data-act="payItem" data-id="${item.id}">Pay bill</button>`:`<button class="btn primary" style="margin-top:12px" data-act="logTxn">+ Log transaction</button>`}`);
}

function render(){
  normalize();
  if(!hasBudgetData()){
    $("#app").innerHTML=onboardingHTML();
    bind();
    save();
    return;
  }
  let html=`<div class="shell">${topHTML()}<main class="page">${state.tab==='budget'?renderBudget():state.tab==='track'?renderTrack():renderMore()}</main>${navHTML()}</div>`;
  $("#app").innerHTML=html;
  bind();
  save();
}
function bind(){
  const clicker=e=>{
    const template=e.target.closest("[data-template]");
    if(template){
      e.preventDefault();e.stopPropagation();
      const input=$("#onboardTemplate");
      if(input)input.value=template.dataset.template;
      $$("[data-template]").forEach(x=>x.classList.remove("on"));
      template.classList.add("on");
      return;
    }
    const actEl=e.target.closest("[data-act]");
    if(actEl){e.preventDefault();e.stopPropagation();act(actEl.dataset.act,actEl.dataset);return}
    const tabEl=e.target.closest("[data-tab]");
    if(tabEl){e.preventDefault();e.stopPropagation();state.tab=tabEl.dataset.tab;render();return}
  };
  const app=$("#app"); if(app)app.onclick=clicker;
  const sheetRoot=$("#sheetRoot"); if(sheetRoot)sheetRoot.onclick=e=>{if(e.target.classList && e.target.classList.contains("sheetOverlay")){closeSheet();return} clicker(e);}
  $$("[data-act]").forEach(el=>el.onclick=e=>{e.preventDefault();e.stopPropagation();act(el.dataset.act,el.dataset)});
  $$("[data-tab]").forEach(el=>el.onclick=e=>{e.preventDefault();e.stopPropagation();state.tab=el.dataset.tab;render()});
  $$("[data-template]").forEach(el=>el.onclick=e=>{e.preventDefault();e.stopPropagation();const input=$("#onboardTemplate");if(input)input.value=el.dataset.template;$$("[data-template]").forEach(x=>x.classList.remove("on"));el.classList.add("on")});
  const custom=$("#customCatName"); if(custom)custom.onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();act("addOnboardCategory",{})}};
}
function sheet(title,body){$("#sheetRoot").innerHTML=`<div class="sheetOverlay"><div class="sheet"><div class="handle"></div><div class="sheetTop"><h2>${esc(title)}</h2><button class="close" data-act="close">×</button></div>${body}</div></div>`;bind();renderOnboardCustomCats()}
function closeSheet(){$("#sheetRoot").innerHTML=""}
function field(id,label,val="",type="text",ph=""){return `<label class="field"><span>${label}</span><input id="${id}" type="${type}" value="${esc(val)}" placeholder="${esc(ph)}" ${type==="number"?'inputmode="decimal"':''}></label>`}
function select(id,label,val,opts){return `<label class="field"><span>${label}</span><select id="${id}">${opts.map(([v,l])=>`<option value="${esc(v)}" ${String(v)===String(val)?'selected':''}>${esc(l)}</option>`).join("")}</select></label>`}
function incomeSheet(id){
  const i=state.income.find(x=>x.id===id);
  sheet(i?"Manage income":"Add income",`${field("name","Name",i?.name||"Take-home pay","text","Take-home pay")}${field("amount","Amount",i?.amount||"","number","4200")}
  <button class="btn primary" data-act="${i?'saveIncomeEdit':'saveIncome'}" ${i?`data-id="${i.id}"`:''}>${i?'Save changes':'Save income'}</button>${i?`<button class="btn danger" style="margin-top:10px" data-act="deleteIncome" data-id="${i.id}">Delete income</button>`:''}`)
}
function savingsSheet(id){
  const i=state.savings.find(x=>x.id===id);
  sheet(i?"Manage savings line":"Add savings line",`${field("name","Name",i?.name||"Emergency fund","text","Emergency fund")}${field("amount","Amount",i?.amount||"","number","600")}
  <button class="btn primary" data-act="${i?'saveSavingsEdit':'saveSavings'}" ${i?`data-id="${i.id}"`:''}>${i?'Save changes':'Save line'}</button>${i?`<button class="btn danger" style="margin-top:10px" data-act="deleteSavings" data-id="${i.id}">Delete line</button>`:''}`)
}
function itemSheet(groupId,id){
  const g=state.groups.find(x=>x.id===groupId); if(!g) return;
  const i=g.items.find(x=>x.id===id);
  sheet(i?"Manage line":"Add line",
    `${field("name","Name",i?.name||"","text",i?.kind==='bill'?"Utilities":"Groceries")}
     ${field("amount","Budget",i?.budget||"","number","180")}
     ${select("kind","Type",i?.kind||"flex",[["flex","Flexible spending"],["bill","Recurring bill"]])}
     ${field("dueDay","Due day for bills",i?.dueDay||"","number","18")}
     <button class="btn primary" data-act="${i?'saveItemEdit':'saveItem'}" data-group="${g.id}" ${i?`data-id="${i.id}"`:''}>${i?'Save changes':'Save line'}</button>
     ${i?`<button class="btn danger" style="margin-top:10px" data-act="deleteItem" data-group="${g.id}" data-id="${i.id}">Delete line</button>`:''}`
  )
}
function logTxnSheet(){
  const opts=allItems().filter(i=>i.kind!=="bill").map(i=>[i.id,`${i.groupName} • ${i.name}`]);
  sheet("Log a transaction",`${opts.length?select("itemId","Category",opts[0]?.[0]||"",opts):`<div class="help">Add a flexible spending line first.</div>`}${field("amount","Amount","","number","45")}${field("note","Note optional","","text","Publix")}${field("date","Date",today(),"date")}
  <button class="btn primary" data-act="saveTxn">Log transaction</button>`)
}
function payItemSheet(id){
  const item=itemById(id); if(!item) return;
  const b=billStatus(item);
  sheet("Pay recurring bill",`<div class="help">${esc(item.name)} has ${money(b.left)} remaining this month. You can mark the rest paid or enter a partial amount.</div>
  <button class="btn success" data-act="quickPayFull" data-id="${item.id}">Mark paid in full</button>
  <div style="height:10px"></div>
  ${field("amount","Partial payment amount",b.left||"","number","50")}${field("date","Date",today(),"date")}
  <button class="btn primary" data-act="saveBillPay" data-id="${item.id}">Save payment</button>`)
}
function quickPaySheet(){
  const bills=allItems().filter(i=>i.kind==="bill" && billStatus(i).left>0);
  sheet("Choose a bill to pay",`${bills.length?bills.map(i=>{const b=billStatus(i); return `<div class="row" style="padding-left:0;padding-right:0"><div><div class="rowTitle">${esc(i.name)}</div><div class="rowSub">${money(b.left)} remaining · due day ${i.dueDay||1}</div></div><button class="pill pay" data-act="payItem" data-id="${i.id}">Pay</button></div>`}).join(""):`<div class="empty"><b>All recurring bills are paid</b>Nothing needs a payment right now.</div>`}`)
}
function settingsSheet(){
  sheet("Settings",`<div class="stack"><button class="btn ghost" data-act="toggleTheme">${state.theme==="light"?"Switch to dark mode":"Switch to light mode"}</button><button class="btn" data-act="privacy">Privacy</button><button class="btn" data-act="backup">Export backup</button></div>`)
}
function privacySheet(){sheet("Privacy",`<div class="help">Allotted stores your data locally in this browser. No bank login. No account required.</div><button class="btn" data-act="close">Done</button>`)}
function exportBackup(){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:"application/json"}));
  a.download="allotted-hybrid-backup-"+today()+".json";
  a.click();
}
function toast(msg){const t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),1600)}
function act(a,d={}){
  if(a==="close") return closeSheet();

  if(a==="demo"){seed();toast("Demo loaded");return render()}
  if(a==="openOnboarding") return onboardingSheet();
  if(a==="addOnboardCategory"){
    const input=$("#customCatName");
    const name=(input?.value||"").trim();
    if(!name)return;
    const cats=getOnboardCustomCats();
    if(!cats.some(c=>c.toLowerCase()===name.toLowerCase()))cats.push(name);
    setOnboardCustomCats(cats);
    if(input)input.value="";
    return;
  }
  if(a==="removeOnboardCategory"){
    const cats=getOnboardCustomCats();
    cats.splice(Number(d.index),1);
    setOnboardCustomCats(cats);
    return;
  }
  if(a==="finishOnboarding"){
    const income=num($("#onboardIncome").value);
    const template=$("#onboardTemplate")?.value||"simple";
    state=blank();
    state.income=income>0?[{id:uid(),name:"Take-home pay",amount:income}]:[];
    applyOnboardingTemplate(template);
    addCustomCategoriesFromOnboarding();
    state.tab="budget";
    closeSheet();
    toast("Budget created");
    return render();
  }
  if(a==="addCategory") return categorySheet();
  if(a==="manageCategory") return categorySheet(d.id);
  if(a==="saveCategory"){state.groups.push({id:uid(),name:$("#catName").value||"New category",items:[]});closeSheet();toast("Category added");return render()}
  if(a==="saveCategoryEdit"){const g=state.groups.find(x=>x.id===d.id);if(g)g.name=$("#catName").value||"Category";closeSheet();toast("Category updated");return render()}
  if(a==="deleteCategory"){state.groups=state.groups.filter(g=>g.id!==d.id);state.txns=state.txns.filter(t=>itemById(t.itemId));closeSheet();toast("Category deleted");return render()}
  if(a==="toggleTheme"){state.theme=state.theme==="light"?"dark":"light";applyTheme();toast(state.theme==="light"?"Light mode on":"Dark mode on");return render()}

  if(a==="prevMonth"){state.month=shiftMonth(state.month,-1); return render()}
  if(a==="nextMonth"){state.month=shiftMonth(state.month,1); return render()}
  if(a==="settings") return settingsSheet();

  if(a==="viewGroupTx") return groupTransactionsSheet(d.group);
  if(a==="viewItemTx") return itemTransactionsSheet(d.id);
  if(a==="toggleTheme"){state.theme=state.theme==="light"?"dark":"light";applyTheme();toast(state.theme==="light"?"Light mode on":"Dark mode on");return render()}

  if(a==="addIncome") return incomeSheet();
  if(a==="manageIncome") return incomeSheet(d.id);
  if(a==="saveIncome"){state.income.push({id:uid(),name:$("#name").value||"Income",amount:num($("#amount").value)}); closeSheet(); toast("Income added"); return render()}
  if(a==="saveIncomeEdit"){const i=state.income.find(x=>x.id===d.id); if(i){i.name=$("#name").value||"Income"; i.amount=num($("#amount").value)} closeSheet(); toast("Income updated"); return render()}
  if(a==="deleteIncome"){state.income=state.income.filter(x=>x.id!==d.id); closeSheet(); toast("Income deleted"); return render()}
  if(a==="addSavings") return savingsSheet();
  if(a==="manageSavings") return savingsSheet(d.id);
  if(a==="saveSavings"){state.savings.push({id:uid(),name:$("#name").value||"Savings",amount:num($("#amount").value)}); closeSheet(); toast("Savings line added"); return render()}
  if(a==="saveSavingsEdit"){const i=state.savings.find(x=>x.id===d.id); if(i){i.name=$("#name").value||"Savings"; i.amount=num($("#amount").value)} closeSheet(); toast("Savings updated"); return render()}
  if(a==="deleteSavings"){state.savings=state.savings.filter(x=>x.id!==d.id); closeSheet(); toast("Savings deleted"); return render()}
  if(a==="addItem") return itemSheet(d.group);
  if(a==="manageItem") return itemSheet(d.group,d.id);
  if(a==="saveItem"){const g=state.groups.find(x=>x.id===d.group); if(g){g.items.push({id:uid(),name:$("#name").value||"Line",budget:num($("#amount").value),kind:$("#kind").value,dueDay:num($("#dueDay").value)||1})} closeSheet(); toast("Line added"); return render()}
  if(a==="saveItemEdit"){const g=state.groups.find(x=>x.id===d.group), i=g?.items.find(x=>x.id===d.id); if(i){i.name=$("#name").value||"Line"; i.budget=num($("#amount").value); i.kind=$("#kind").value; i.dueDay=num($("#dueDay").value)||1} closeSheet(); toast("Line updated"); return render()}
  if(a==="deleteItem"){const g=state.groups.find(x=>x.id===d.group); if(g){g.items=g.items.filter(x=>x.id!==d.id)} state.txns=state.txns.filter(t=>t.itemId!==d.id); closeSheet(); toast("Line deleted"); return render()}
  if(a==="logTxn") return logTxnSheet();
  if(a==="saveTxn"){state.txns.push({id:uid(),itemId:$("#itemId").value,amount:num($("#amount").value),date:$("#date").value||today(),type:"spend",note:$("#note").value||""}); closeSheet(); toast("Transaction logged"); return render()}
  if(a==="quickPay") return quickPaySheet();
  if(a==="payItem") return payItemSheet(d.id);
  if(a==="quickPayFull"){const item=itemById(d.id); if(item){const amt=itemLeft(item); if(amt>0) state.txns.push({id:uid(),itemId:item.id,amount:amt,date:today(),type:"bill",note:item.name})} closeSheet(); toast("Bill marked paid"); return render()}
  if(a==="saveBillPay"){const item=itemById(d.id); if(item){const amt=Math.min(num($("#amount").value), itemLeft(item)); if(amt>0) state.txns.push({id:uid(),itemId:item.id,amount:amt,date:$("#date").value||today(),type:"bill",note:item.name})} closeSheet(); toast("Payment saved"); return render()}
  if(a==="privacy") return privacySheet();
  if(a==="backup"){exportBackup(); toast("Backup downloaded"); return}
  if(a==="resetDemo"){seed(); toast("Demo reset"); return render()}
}
load(); render();
})();
</script>
</body>
</html>
