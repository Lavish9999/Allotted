<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Allotted 2.0</title>
<meta name="description" content="Allotted — know what you can safely spend without touching bill money.">
<meta name="theme-color" content="#F5F5F7">
<style>
:root{
  color-scheme:light dark;
  --bg:#F5F5F7;
  --bg2:#FFFFFF;
  --text:#111113;
  --soft:#3A3A3C;
  --muted:#8A8A8E;
  --line:rgba(0,0,0,.075);
  --line2:rgba(0,0,0,.13);
  --card:rgba(255,255,255,.78);
  --card2:rgba(255,255,255,.56);
  --glass:rgba(248,248,250,.78);
  --input:rgba(118,118,128,.10);
  --blue:#007AFF;
  --green:#34C759;
  --orange:#FF9F0A;
  --red:#FF453A;
  --purple:#AF52DE;
  --teal:#00A693;
  --shadow:rgba(0,0,0,.10);
  --shadow2:rgba(0,0,0,.18);
  --radius:28px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter","Segoe UI",system-ui,sans-serif;
}
[data-theme="dark"]{
  color-scheme:dark;
  --bg:#000000;
  --bg2:#0B0B0D;
  --text:#F5F5F7;
  --soft:#D1D1D6;
  --muted:#8E8E93;
  --line:rgba(255,255,255,.10);
  --line2:rgba(255,255,255,.16);
  --card:rgba(28,28,30,.78);
  --card2:rgba(44,44,46,.62);
  --glass:rgba(28,28,30,.78);
  --input:rgba(118,118,128,.18);
  --blue:#0A84FF;
  --green:#30D158;
  --orange:#FFB340;
  --red:#FF6961;
  --purple:#BF5AF2;
  --teal:#2DD4BF;
  --shadow:rgba(0,0,0,.42);
  --shadow2:rgba(0,0,0,.62);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);letter-spacing:-.018em}
body{
  padding-bottom:calc(98px + env(safe-area-inset-bottom));
  background:
    radial-gradient(900px 520px at 50% -150px,rgba(0,122,255,.12),transparent 66%),
    linear-gradient(180deg,var(--bg),var(--bg2) 42%,var(--bg));
  overflow-x:hidden;
}
button,input,select,textarea{font:inherit}
button{border:0;background:transparent;color:inherit;cursor:pointer;touch-action:manipulation}
input,select,textarea{
  width:100%;
  border:0;
  outline:0;
  color:var(--text);
  background:var(--input);
  border-radius:17px;
  padding:14px 15px;
  font-size:16px;
}
input::placeholder{color:var(--muted)}
input:focus,select:focus,textarea:focus{box-shadow:0 0 0 5px rgba(0,122,255,.14)}
input[type=number]{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}

#app{min-height:100vh}
.shell{max-width:1060px;margin:0 auto}
.top{
  position:sticky;
  top:0;
  z-index:30;
  padding:calc(12px + env(safe-area-inset-top)) 14px 10px;
  background:linear-gradient(180deg,var(--bg),color-mix(in srgb,var(--bg) 78%,transparent),transparent);
  backdrop-filter:blur(26px);
  -webkit-backdrop-filter:blur(26px);
}
.topInner{max-width:1060px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.logo{width:42px;height:42px;filter:drop-shadow(0 10px 20px var(--shadow));flex:0 0 auto}
.brand b{display:block;font-size:18px;font-weight:900;letter-spacing:-.055em;line-height:1}
.brand span{display:block;font-size:11px;color:var(--muted);font-weight:650;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px}
.monthSwitch{display:flex;align-items:center;gap:4px;background:var(--glass);border:1px solid var(--line);border-radius:999px;padding:5px;box-shadow:0 10px 30px var(--shadow);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px)}
.monthSwitch button{width:30px;height:30px;border-radius:999px;font-size:22px;line-height:1;color:var(--soft)}
.monthSwitch strong{font-size:12.5px;font-weight:760;min-width:106px;text-align:center}

.page{padding:10px 14px 0}
.heroCard{
  position:relative;
  overflow:hidden;
  border-radius:36px;
  padding:22px;
  background:linear-gradient(160deg,var(--card),color-mix(in srgb,var(--card) 76%,rgba(0,122,255,.18) 24%));
  border:1px solid var(--line);
  box-shadow:0 24px 60px var(--shadow2),inset 0 1px 0 rgba(255,255,255,.24);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  margin-bottom:14px;
}
.heroCard:before{
  content:"";
  position:absolute;
  width:310px;height:310px;border-radius:50%;
  right:-130px;top:-130px;
  background:radial-gradient(circle,rgba(0,122,255,.18),transparent 66%);
  pointer-events:none;
}
.heroCard>*{position:relative}
.kicker{font-size:13px;color:var(--muted);font-weight:760;margin-bottom:7px}
.safeAmount{font-size:clamp(58px,14vw,104px);font-weight:900;letter-spacing:-.11em;line-height:.9}
.safeAmount small{font-size:16px;letter-spacing:-.02em;color:var(--muted);font-weight:750;margin-left:5px}
.heroText{font-size:14.5px;color:var(--soft);line-height:1.45;margin-top:12px;max-width:580px}
.heroGrid{display:grid;grid-template-columns:minmax(0,1fr) 168px;gap:18px;align-items:center}
.scoreRing{
  width:168px;aspect-ratio:1;border-radius:38px;padding:9px;
  background:conic-gradient(from 0deg,var(--scoreColor) 0 var(--scoreDeg),var(--input) var(--scoreDeg) 360deg);
  box-shadow:inset 0 0 0 1px var(--line);
}
.scoreInner{
  width:100%;height:100%;border-radius:31px;background:color-mix(in srgb,var(--card) 88%,var(--bg) 12%);
  display:grid;place-content:center;text-align:center;
}
.scoreInner b{font-size:42px;font-weight:900;letter-spacing:-.08em}
.scoreInner span{font-size:11px;color:var(--muted);font-weight:760;margin-top:3px}
.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:17px}
.btn{
  min-height:44px;border-radius:17px;padding:12px 15px;background:var(--card2);border:1px solid var(--line);
  color:var(--text);font-weight:780;display:inline-flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 8px 22px rgba(0,0,0,.04);
}
.btn.primary{background:linear-gradient(180deg,color-mix(in srgb,var(--blue) 88%,white 12%),var(--blue));color:white;border-color:transparent;box-shadow:0 16px 32px rgba(0,122,255,.22)}
.btn.danger{background:rgba(255,69,58,.13);color:var(--red);border-color:rgba(255,69,58,.24)}
.btn.full{width:100%}.btn.small{min-height:34px;border-radius:13px;padding:8px 11px;font-size:12px}.btn.flat{background:transparent;box-shadow:none}
.statStrip{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:15px}
.stat{
  background:var(--input);
  border:1px solid transparent;
  border-radius:19px;
  padding:12px;
}
.stat b{display:block;font-size:16px;font-weight:860;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:-.05em}
.stat span{display:block;font-size:11px;color:var(--muted);font-weight:720;margin-top:4px}

.grid{display:grid;gap:12px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:17px;
  box-shadow:0 16px 42px var(--shadow),inset 0 1px 0 rgba(255,255,255,.22);
  backdrop-filter:blur(28px);
  -webkit-backdrop-filter:blur(28px);
  margin-bottom:12px;
}
.cardHeader{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.title{font-size:17px;font-weight:860;letter-spacing:-.04em;line-height:1.15}
.sub{font-size:12.5px;color:var(--muted);line-height:1.38}
.list{display:grid}
.row{
  display:grid;
  grid-template-columns:42px minmax(0,1fr) auto;
  gap:11px;
  align-items:center;
  padding:13px 0;
  border-bottom:1px solid var(--line);
}
.row:last-child{border-bottom:0}
.icon{
  width:42px;height:42px;border-radius:15px;background:var(--input);display:grid;place-items:center;color:var(--blue)
}
.icon svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round}
.rowTitle{font-weight:800;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rowSub{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.money{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:880;letter-spacing:-.05em;white-space:nowrap}
.tag{display:inline-flex;align-items:center;border-radius:999px;padding:5px 8px;font-size:10.5px;font-weight:800;background:var(--input);color:var(--soft)}
.tag.blue{background:rgba(0,122,255,.13);color:var(--blue)}
.tag.green{background:rgba(52,199,89,.14);color:var(--green)}
.tag.orange{background:rgba(255,159,10,.14);color:var(--orange)}
.tag.red{background:rgba(255,69,58,.14);color:var(--red)}
.bar{height:6px;border-radius:999px;background:var(--input);overflow:hidden;margin-top:9px}
.bar i{display:block;height:100%;border-radius:inherit;background:var(--bar,var(--blue));width:var(--w,0%)}

.segment{display:flex;background:var(--input);border-radius:18px;padding:5px;gap:5px;margin-bottom:12px}
.segment button{flex:1;padding:10px;border-radius:13px;color:var(--muted);font-weight:780;font-size:13px}
.segment button.on{background:var(--card);color:var(--text);box-shadow:0 8px 20px var(--shadow)}

.nav{position:fixed;left:0;right:0;bottom:calc(12px + env(safe-area-inset-bottom));z-index:40;display:flex;justify-content:center;pointer-events:none}
.navInner{
  pointer-events:auto;display:flex;gap:3px;background:var(--glass);border:1px solid var(--line);border-radius:999px;padding:6px;
  box-shadow:0 18px 54px var(--shadow2);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)
}
.nav button{display:flex;align-items:center;gap:7px;color:var(--muted);border-radius:999px;padding:10px 12px;font-size:12px;font-weight:780}
.nav button.on{background:var(--text);color:var(--bg);box-shadow:0 8px 18px var(--shadow)}
[data-theme="dark"] .nav button.on{background:#F5F5F7;color:#111113}
.nav svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.15;stroke-linecap:round;stroke-linejoin:round}
.nav span{display:none}.nav button.on span{display:inline}

.sheetOverlay{position:fixed;inset:0;background:rgba(0,0,0,.44);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:70;display:flex;align-items:flex-end;justify-content:center}
.sheet{
  width:min(540px,100%);max-height:88vh;overflow:auto;background:color-mix(in srgb,var(--bg2) 90%,transparent);
  border:1px solid var(--line2);border-radius:30px 30px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));
  box-shadow:0 -22px 80px var(--shadow2);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)
}
.handle{width:42px;height:5px;border-radius:999px;background:var(--line2);margin:0 auto 14px}
.sheetTop{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.sheetTop h2{font-size:20px;font-weight:880;letter-spacing:-.05em}
.close{width:38px;height:38px;border-radius:999px;background:var(--input);color:var(--muted);font-size:24px;line-height:1}
.field{display:block;margin-bottom:12px}.field span{display:block;font-size:12px;color:var(--muted);font-weight:760;margin-bottom:6px}
.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.empty{text-align:center;padding:24px 12px;color:var(--muted);line-height:1.38}.empty b{display:block;color:var(--text);font-size:16px;margin-bottom:5px}

.welcome{min-height:100vh;display:grid;place-items:center;padding:calc(24px + env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));background:radial-gradient(720px 460px at 50% 18%,rgba(0,122,255,.13),transparent 66%),var(--bg)}
.welcomeBox{width:min(690px,100%);text-align:center}
.welcomePanel{
  background:linear-gradient(160deg,var(--card),color-mix(in srgb,var(--card) 78%,rgba(0,122,255,.16) 22%));
  border:1px solid var(--line);border-radius:40px;padding:34px 22px;box-shadow:0 28px 78px var(--shadow2);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
}
.heroLogo{width:108px;height:108px;filter:drop-shadow(0 18px 36px var(--shadow));margin-bottom:14px}
.welcome h1{font-size:clamp(44px,11vw,82px);font-weight:930;letter-spacing:-.105em;line-height:.88;margin:0 0 12px}
.welcome p{color:var(--soft);font-size:15px;line-height:1.55;max-width:510px;margin:0 auto 22px}
.promise{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}
.promiseItem{background:var(--card2);border:1px solid var(--line);border-radius:22px;padding:14px;text-align:left}
.promiseItem b{display:block;font-size:13px}.promiseItem span{display:block;font-size:11.5px;color:var(--muted);line-height:1.35;margin-top:4px}
.templateGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.templateCard{
  min-height:102px;text-align:left;display:flex;flex-direction:column;align-items:flex-start;gap:7px;padding:15px;border-radius:20px;
  background:var(--card2);border:1px solid var(--line);box-shadow:0 8px 22px var(--shadow)
}
.templateCard strong{font-size:15px;font-weight:850}.templateCard span{font-size:12px;color:var(--muted);line-height:1.35}.templateCard em{margin-top:auto;font-style:normal;font-size:10.5px;font-weight:820;color:var(--blue);background:rgba(0,122,255,.13);border-radius:999px;padding:5px 8px}
.moreGroupTitle{font-size:12px;font-weight:850;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin:18px 4px 8px}
.moreGroup{background:var(--card);border:1px solid var(--line);border-radius:24px;overflow:hidden;margin-bottom:12px;box-shadow:0 12px 34px var(--shadow)}
.moreRow{width:100%;display:grid;grid-template-columns:42px minmax(0,1fr) 16px;gap:12px;align-items:center;text-align:left;padding:15px;border-bottom:1px solid var(--line)}
.moreRow:last-child{border-bottom:0}.moreRow b{font-size:15px}.moreRow span{display:block;color:var(--muted);font-size:12px;margin-top:3px}
.toast{position:fixed;left:50%;bottom:calc(92px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:90;background:var(--text);color:var(--bg);border-radius:999px;padding:12px 16px;font-weight:800;box-shadow:0 16px 44px var(--shadow2);max-width:calc(100vw - 32px);white-space:nowrap}
@media(max-width:760px){
  .heroGrid{grid-template-columns:1fr}.scoreRing{width:100%;aspect-ratio:auto;border-radius:24px;padding:1px;background:var(--card2)}.scoreInner{min-height:92px;border-radius:23px}
  .grid.two,.grid.three,.promise,.templateGrid{grid-template-columns:1fr}
  .statStrip{grid-template-columns:1fr}
  .formGrid{grid-template-columns:1fr}
  .actions{display:grid;grid-template-columns:1fr 1fr}.actions .primary{grid-column:1/-1}
  .monthSwitch strong{min-width:84px}
  .brand span{max-width:150px}
  .page{padding-left:12px;padding-right:12px}
}


/* Premium centered duotone icons */
.icon{
  display:flex!important;
  align-items:center!important;
  justify-content:center!important;
  width:44px!important;
  height:44px!important;
  min-width:44px!important;
  padding:0!important;
  border-radius:16px!important;
  background:linear-gradient(180deg,rgba(0,122,255,.13),rgba(0,122,255,.065))!important;
  color:var(--blue)!important;
  border:1px solid rgba(0,122,255,.13)!important;
}
.icon svg{
  display:block!important;
  width:23px!important;
  height:23px!important;
  min-width:23px!important;
  min-height:23px!important;
  margin:0!important;
  transform:none!important;
  overflow:visible!important;
}
.icon .softFill{fill:currentColor!important;opacity:.16!important;stroke:none!important}
.icon .mainFill{fill:currentColor!important;opacity:.92!important;stroke:none!important}
.icon .line,.icon .lineThick{
  fill:none!important;
  stroke:currentColor!important;
  stroke-linecap:round!important;
  stroke-linejoin:round!important;
  opacity:.95!important;
}
.icon .line{stroke-width:1.85!important}
.icon .lineThick{stroke-width:2.35!important}
.moreGroup .moreRow:nth-child(3n+1) .icon{background:linear-gradient(180deg,rgba(0,122,255,.13),rgba(0,122,255,.065))!important;color:var(--blue)!important;border-color:rgba(0,122,255,.13)!important}
.moreGroup .moreRow:nth-child(3n+2) .icon{background:linear-gradient(180deg,rgba(0,166,147,.14),rgba(0,166,147,.065))!important;color:var(--teal)!important;border-color:rgba(0,166,147,.13)!important}
.moreGroup .moreRow:nth-child(3n) .icon{background:linear-gradient(180deg,rgba(175,82,222,.13),rgba(175,82,222,.065))!important;color:var(--purple)!important;border-color:rgba(175,82,222,.13)!important}
.row:nth-child(2n) .icon{background:linear-gradient(180deg,rgba(0,166,147,.14),rgba(0,166,147,.065))!important;color:var(--teal)!important;border-color:rgba(0,166,147,.13)!important}
.nav svg{
  display:block!important;
  width:18px!important;
  height:18px!important;
  margin:0!important;
}
.nav .softFill{fill:currentColor;opacity:.18;stroke:none}
.nav .mainFill{fill:currentColor;opacity:.95;stroke:none}
.nav .line,.nav .lineThick{fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
.nav .line{stroke-width:1.85}.nav .lineThick{stroke-width:2.25}

</style>
</head>
<body>
<div id="app"></div>
<div id="sheetRoot"></div>
<input type="file" id="fileInput" accept=".json,application/json" style="display:none">
<script>
(function(){
"use strict";
const KEY="allotted.v2.fresh";
const $=s=>document.querySelector(s);
const $$=s=>Array.from(document.querySelectorAll(s));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const today=()=>new Date().toISOString().slice(0,10);
const monthNow=()=>today().slice(0,7);
const money=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(Number(n)||0);
const money2=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2,maximumFractionDigits:2}).format(Number(n)||0);
const num=v=>Number(String(v??"").replace(/[$,]/g,""))||0;
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
function monthName(k){const[y,m]=k.split("-").map(Number);return new Date(y,m-1,1).toLocaleDateString("en-US",{month:"short",year:"numeric"})}
function shiftMonth(k,n){const[y,m]=k.split("-").map(Number);const d=new Date(y,m-1+n,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function dim(k){const[y,m]=k.split("-").map(Number);return new Date(y,m,0).getDate()}
function dayLeft(k){const d=k===monthNow()?new Date().getDate():1;return Math.max(1,dim(k)-d+1)}
function dateObj(s){const[y,m,d]=String(s).split("-").map(Number);return new Date(y,(m||1)-1,d||1)}
function daysBetween(a,b){return Math.ceil((dateObj(b)-dateObj(a))/(86400000))}
function logo(size=42,cls="logo"){return `<svg class="${cls}" viewBox="0 0 96 96" aria-label="Allotted emblem" role="img" style="width:${size}px;height:${size}px"><defs><linearGradient id="lbg${size}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#121720"/><stop offset="100%" stop-color="#070A0F"/></linearGradient><linearGradient id="lgl${size}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.14)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></linearGradient></defs><rect x="4" y="4" width="88" height="88" rx="22" fill="url(#lbg${size})" stroke="rgba(255,255,255,.11)"/><rect x="5" y="5" width="86" height="86" rx="21" fill="url(#lgl${size})" opacity=".55"/><path d="M30 67 L44 24" stroke="#2DD4BF" stroke-width="6.5" stroke-linecap="round"/><path d="M65 67 L51 24" stroke="#F0A53B" stroke-width="6.5" stroke-linecap="round"/><path d="M38.5 48 H56" stroke="#2DD4BF" stroke-width="6" stroke-linecap="round"/></svg>`}

function blank(){return{theme:"light",month:monthNow(),tab:"today",income:[],bills:[],cats:[],txns:[],debts:[],settings:{setup:false,nextPayday:"",payAmount:0},activityView:"all",billView:"upcoming"}}
let state=blank();
function normalize(){const b=blank();state={...b,...(state||{})};state.income=Array.isArray(state.income)?state.income:[];state.bills=Array.isArray(state.bills)?state.bills:[];state.cats=Array.isArray(state.cats)?state.cats:[];state.txns=Array.isArray(state.txns)?state.txns:[];state.debts=Array.isArray(state.debts)?state.debts:[];state.settings={...b.settings,...(state.settings||{})};state.theme=state.theme||"light";state.month=state.month||monthNow();state.tab=["today","plan","activity","more"].includes(state.tab)?state.tab:"today"}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){}applyTheme()}
function load(){try{state=JSON.parse(localStorage.getItem(KEY)||"null")||blank()}catch(e){state=blank()}normalize();applyTheme()}
function applyTheme(){document.documentElement.setAttribute("data-theme",state.theme||"light");const meta=document.querySelector('meta[name="theme-color"]');if(meta)meta.setAttribute("content",state.theme==="dark"?"#000000":"#F5F5F7")}
function hasData(){return state.settings.setup || state.income.length || state.bills.length || state.cats.length || state.txns.length}
function monthTxns(){return state.txns.filter(t=>String(t.date).slice(0,7)===state.month)}
function flexCats(){return state.cats.filter(c=>c.type==="spend")}
function saveCats(){return state.cats.filter(c=>c.type==="save")}
function spentCat(id){return monthTxns().filter(t=>t.type==="spend"&&t.cat===id).reduce((s,t)=>s+num(t.amount),0)}
function billDate(b,k=state.month){const[y,m]=k.split("-").map(Number);const d=Math.min(num(b.dueDay)||1,new Date(y,m,0).getDate());return `${k}-${String(d).padStart(2,"0")}`}
function billPaid(b){return !!(b.paid&&b.paid[state.month])}
function calc(){const income=state.income.reduce((s,i)=>s+num(i.amount),0), bills=state.bills.reduce((s,b)=>s+num(b.amount),0), savings=saveCats().reduce((s,c)=>s+num(c.amount),0), spendPlan=flexCats().reduce((s,c)=>s+num(c.amount),0), spendSpent=monthTxns().filter(t=>t.type==="spend").reduce((s,t)=>s+num(t.amount),0), spendLeft=spendPlan-spendSpent, unassigned=income-bills-savings-spendPlan, billsLeft=state.bills.filter(b=>!billPaid(b)).reduce((s,b)=>s+num(b.amount),0), safe=Math.max(0,spendLeft/dayLeft(state.month));return{income,bills,savings,spendPlan,spendSpent,spendLeft,unassigned,billsLeft,safe,days:dayLeft(state.month)}}
function billsInfo(){const base=state.month===monthNow()?today():state.month+"-01";return state.bills.map(b=>({...b,date:billDate(b),days:daysBetween(base,billDate(b)),paid:billPaid(b)})).sort((a,b)=>a.days-b.days)}
function status(){const c=calc(), overdue=billsInfo().find(b=>!b.paid&&b.days<0), due=billsInfo().find(b=>!b.paid&&b.days<=3);if(c.unassigned<0)return{kind:"red",title:"Over budget",text:`You assigned ${money(Math.abs(c.unassigned))} more than income.`};if(overdue)return{kind:"red",title:"Bill overdue",text:`${overdue.name} is past due.`};if(due)return{kind:"orange",title:"Bill due soon",text:`${due.name} is ${due.days===0?"due today":"due in "+due.days+" days"}.`};if(c.unassigned>0)return{kind:"orange",title:"Money left to plan",text:`Assign ${money(c.unassigned)} to bills, spending, or savings.`};return{kind:"green",title:"On track",text:"Bills are protected and spending is planned."}}
function pulse(){const c=calc();let score=90;if(c.unassigned<0)score-=35;if(c.spendLeft<0)score-=35;if(c.billsLeft>0)score-=8;score=Math.max(0,Math.min(99,score));return{score,deg:score*3.6,color:score>74?"var(--green)":score>49?"var(--orange)":"var(--red)"}}
function top(){return `<header class="top"><div class="topInner"><div class="brand">${logo(42)}<div><b>Allotted</b><span>Safe spending, bills protected</span></div></div><div class="monthSwitch"><button data-act="prev">‹</button><strong>${monthName(state.month)}</strong><button data-act="next">›</button></div></div></header>`}
function nav(){const tabs=[["today","Today"],["plan","Plan"],["activity","Activity"],["more","More"]];return `<nav class="nav"><div class="navInner">${tabs.map(t=>`<button data-tab="${t[0]}" class="${state.tab===t[0]?"on":""}">${icon(t[0])}<span>${t[1]}</span></button>`).join("")}</div></nav>`}
function render(){normalize();if(!hasData()){welcome();return}let html=`<div class="shell">${top()}<main class="page">`;if(state.tab==="today")html+=todayHTML();if(state.tab==="plan")html+=planHTML();if(state.tab==="activity")html+=activityHTML();if(state.tab==="more")html+=moreHTML();html+=`</main></div>${nav()}`;$("#app").innerHTML=html;bind();save()}
function welcome(){$("#app").innerHTML=`<section class="welcome"><div class="welcomeBox"><div class="welcomePanel">${logo(108,"heroLogo")}<h1>Budget without the noise.</h1><p>Allotted protects bill money first, then shows what you can safely spend today. Private, manual, and simple enough to actually use.</p><div class="promise"><div class="promiseItem"><b>Safe to spend</b><span>One daily number you can trust.</span></div><div class="promiseItem"><b>Bills protected</b><span>Rent, car, utilities stay separate.</span></div><div class="promiseItem"><b>No bank login</b><span>Your budget stays on your device.</span></div></div><div class="grid two"><button class="btn primary full" data-act="setup">Build my budget</button><button class="btn full" data-act="demo">Try demo</button></div><button class="btn flat full" style="margin-top:10px" data-act="import">Restore backup</button></div></div></section>`;bind()}
function todayHTML(){const c=calc(), s=status(), p=pulse(), upcoming=billsInfo().filter(b=>!b.paid).slice(0,3), recent=monthTxns().filter(t=>t.type==="spend").slice().reverse().slice(0,3);return `<section class="heroCard"><div class="heroGrid"><div><div class="kicker">Safe to spend today</div><div class="safeAmount">${money(c.safe)}<small>/ day</small></div><div class="heroText">${s.title}. ${s.text}</div><div class="actions"><button class="btn primary" data-act="log">Log spending</button><button class="btn" data-act="check">Can I buy this?</button><button class="btn" data-tab="plan">Edit plan</button></div></div><div class="scoreRing" style="--scoreDeg:${p.deg}deg;--scoreColor:${p.color}"><div class="scoreInner"><b>${p.score}</b><span>Budget score</span></div></div></div><div class="statStrip"><div class="stat"><b>${money(c.billsLeft)}</b><span>Bills left</span></div><div class="stat"><b>${money(c.spendLeft)}</b><span>Spending left</span></div><div class="stat"><b>${money(c.unassigned)}</b><span>Unassigned</span></div></div></section><div class="grid two"><div class="card"><div class="cardHeader"><div><div class="title">Upcoming bills</div><div class="sub">Next things due.</div></div><button class="btn small" data-act="addBill">Add</button></div><div class="list">${upcoming.length?upcoming.map(billRow).join(""):empty("No bills yet","Add bills to protect that money first.")}</div></div><div class="card"><div class="cardHeader"><div><div class="title">Recent spending</div><div class="sub">Last few entries.</div></div><button class="btn small" data-tab="activity">See all</button></div><div class="list">${recent.length?recent.map(txRow).join(""):empty("No spending yet","Log a purchase to update safe-to-spend.")}</div></div></div>`}
function planHTML(){const c=calc();return `<section class="heroCard"><div class="heroGrid"><div><div class="kicker">Monthly plan</div><div class="safeAmount">${money(c.unassigned)}<small> left</small></div><div class="heroText">${c.unassigned===0?"Every dollar has a job.":c.unassigned>0?"Assign what is left to bills, spending, or savings.":"You assigned more than your income."}</div><div class="actions"><button class="btn primary" data-act="addIncome">Add income</button><button class="btn" data-act="addBill">Add bill</button><button class="btn" data-act="addCat">Add category</button></div></div><div class="card" style="margin:0"><div class="row"><span class="icon">${icon("income")}</span><div><div class="rowTitle">Income</div><div class="rowSub">Money coming in</div></div><div class="money">${money(c.income)}</div></div><div class="row"><span class="icon">${icon("bill")}</span><div><div class="rowTitle">Bills</div><div class="rowSub">Protected money</div></div><div class="money">${money(c.bills)}</div></div><div class="row"><span class="icon">${icon("spend")}</span><div><div class="rowTitle">Spending</div><div class="rowSub">Flexible money</div></div><div class="money">${money(c.spendPlan)}</div></div><div class="row"><span class="icon">${icon("save")}</span><div><div class="rowTitle">Savings</div><div class="rowSub">Goals and buffers</div></div><div class="money">${money(c.savings)}</div></div></div></div></section><div class="grid two"><div class="card"><div class="cardHeader"><div><div class="title">Income</div><div class="sub">Take-home pay.</div></div><button class="btn small" data-act="addIncome">Add</button></div>${state.income.length?state.income.map(incomeRow).join(""):empty("No income","Add monthly take-home pay.")}</div><div class="card"><div class="cardHeader"><div><div class="title">Bills</div><div class="sub">Fixed expenses.</div></div><button class="btn small" data-act="addBill">Add</button></div>${state.bills.length?state.bills.map(billPlanRow).join(""):empty("No bills","Add rent, car, utilities, and subscriptions.")}</div></div><div class="grid two"><div class="card"><div class="cardHeader"><div><div class="title">Spending</div><div class="sub">Flexible categories.</div></div><button class="btn small" data-act="addCat" data-type="spend">Add</button></div>${flexCats().length?flexCats().map(catRow).join(""):empty("No spending categories","Add groceries, gas, food, and personal.")}</div><div class="card"><div class="cardHeader"><div><div class="title">Savings</div><div class="sub">Goals and buffers.</div></div><button class="btn small" data-act="addCat" data-type="save">Add</button></div>${saveCats().length?saveCats().map(catRow).join(""):empty("No savings goals","Add emergency fund or sinking funds.")}</div></div>`}
function activityHTML(){const c=calc();let rows=monthTxns().slice().reverse();if(state.activityView==="spend")rows=rows.filter(t=>t.type==="spend");if(state.activityView==="bill")rows=rows.filter(t=>t.type==="bill");return `<section class="heroCard"><div class="heroGrid"><div><div class="kicker">Activity</div><div class="safeAmount">${money(c.spendLeft)}<small> left</small></div><div class="heroText">Your flexible spending left this month. Bills stay separate.</div><div class="actions"><button class="btn primary" data-act="log">Log spending</button><button class="btn" data-act="check">Can I buy this?</button></div></div></div></section><div class="segment"><button data-view="all" class="${state.activityView==="all"?"on":""}">All</button><button data-view="spend" class="${state.activityView==="spend"?"on":""}">Spending</button><button data-view="bill" class="${state.activityView==="bill"?"on":""}">Bills</button></div><div class="grid two"><div class="card"><div class="cardHeader"><div><div class="title">Transactions</div><div class="sub">This month.</div></div></div>${rows.length?rows.map(txRow).join(""):empty("No activity","Log spending or mark a bill paid.")}</div><div class="card"><div class="cardHeader"><div><div class="title">Categories</div><div class="sub">Progress by category.</div></div></div>${flexCats().length?flexCats().map(catRow).join(""):empty("No categories","Add spending categories in Plan.")}</div></div>`}
function moreHTML(){return `<div class="card"><div class="cardHeader"><div><div class="title">More</div><div class="sub">Advanced tools stay here so the budget stays simple.</div></div></div></div><div class="moreGroupTitle">Planning</div><div class="moreGroup"><button class="moreRow" data-act="pay"><span class="icon">${icon("pay")}</span><div><b>Paycheck settings</b><span>Plan around your next payday.</span></div><span>›</span></button><button class="moreRow" data-act="debt"><span class="icon">${icon("debt")}</span><div><b>Debt payoff</b><span>Track balances and extra payoff.</span></div><span>›</span></button></div><div class="moreGroupTitle">Data</div><div class="moreGroup"><button class="moreRow" data-act="backup"><span class="icon">${icon("backup")}</span><div><b>Backup</b><span>Save a copy of your budget.</span></div><span>›</span></button><button class="moreRow" data-act="import"><span class="icon">${icon("restore")}</span><div><b>Restore</b><span>Import a backup file.</span></div><span>›</span></button><button class="moreRow" data-act="csv"><span class="icon">${icon("csv")}</span><div><b>Export CSV</b><span>Download spending history.</span></div><span>›</span></button></div><div class="moreGroupTitle">App</div><div class="moreGroup"><button class="moreRow" data-act="theme"><span class="icon">${icon("look")}</span><div><b>Appearance</b><span>Switch to ${state.theme==="dark"?"light":"dark"} mode.</span></div><span>›</span></button><button class="moreRow" data-act="privacy"><span class="icon">${icon("privacy")}</span><div><b>Privacy</b><span>No account. No bank login. Local data.</span></div><span>›</span></button><button class="moreRow" data-act="reset"><span class="icon">${icon("lock")}</span><div><b>Reset app</b><span>Erase local data on this device.</span></div><span>›</span></button></div>`}
function empty(t,s){return `<div class="empty"><b>${esc(t)}</b><br>${esc(s)}</div>`}
function incomeRow(i){return `<div class="row"><span class="icon">${icon("income")}</span><div><div class="rowTitle">${esc(i.name)}</div><div class="rowSub">Income</div></div><div class="money">${money(i.amount)}</div></div>`}
function billRow(b){const label=b.paid?"Paid":b.days<0?`${Math.abs(b.days)} days late`:b.days===0?"Due today":`Due in ${b.days} days`;const cls=b.paid?"green":b.days<0?"red":b.days<=3?"orange":"blue";return `<div class="row"><span class="icon">${icon("bill")}</span><div><div class="rowTitle">${esc(b.name)}</div><div class="rowSub">${b.date} • <span class="tag ${cls}">${label}</span></div></div><div style="text-align:right"><div class="money">${money(b.amount)}</div><button class="tag ${b.paid?"":"blue"}" data-act="${b.paid?"unpayBill":"payBill"}" data-id="${b.id}" style="margin-top:7px">${b.paid?"Undo":"Paid"}</button></div></div>`}
function billPlanRow(b){return `<div class="row"><span class="icon">${icon("bill")}</span><div><div class="rowTitle">${esc(b.name)}</div><div class="rowSub">Due day ${b.dueDay||1}</div></div><div class="money">${money(b.amount)}</div></div>`}
function catRow(c){const spent=c.type==="spend"?spentCat(c.id):0,left=num(c.amount)-spent,pct=c.amount?Math.min(100,spent/num(c.amount)*100):0;return `<div class="row"><span class="icon">${icon(c.type==="save"?"save":"spend")}</span><div><div class="rowTitle">${esc(c.name)}</div><div class="rowSub">${c.type==="save"?"Goal":"Spent"} ${money(spent)} of ${money(c.amount)}</div><div class="bar"><i style="--w:${pct}%;--bar:${pct>90?"var(--red)":pct>70?"var(--orange)":"var(--blue)"}"></i></div></div><div class="money">${money(left)}</div></div>`}
function txRow(t){const c=state.cats.find(x=>x.id===t.cat), b=state.bills.find(x=>x.id===t.bill);return `<div class="row"><span class="icon">${icon(t.type==="bill"?"bill":"spend")}</span><div><div class="rowTitle">${esc(t.note||b?.name||c?.name||"Transaction")}</div><div class="rowSub">${t.date} • ${esc(c?.name||b?.name||t.type)}</div></div><div class="money">-${money(t.amount)}</div></div>`}
function bind(){$$("[data-act]").forEach(el=>el.onclick=()=>act(el.dataset.act,el.dataset));$$("[data-tab]").forEach(el=>el.onclick=()=>{state.tab=el.dataset.tab;render()});$$("[data-view]").forEach(el=>el.onclick=()=>{state.activityView=el.dataset.view;render()})}
function sheet(title,body){$("#sheetRoot").innerHTML=`<div class="sheetOverlay" data-close="1"><div class="sheet" onclick="event.stopPropagation()"><div class="handle"></div><div class="sheetTop"><h2>${esc(title)}</h2><button class="close" data-act="close">×</button></div>${body}</div></div>`;$(".sheetOverlay").onclick=e=>{if(e.target.dataset.close)closeSheet()};bind()}
function closeSheet(){$("#sheetRoot").innerHTML=""}
function field(id,label,val="",type="text",ph=""){return `<label class="field"><span>${label}</span><input id="${id}" type="${type}" value="${esc(val)}" placeholder="${esc(ph)}" ${type==="number"?'inputmode="decimal"':''}></label>`}
function select(id,label,val,opts){return `<label class="field"><span>${label}</span><select id="${id}">${opts.map(o=>`<option value="${esc(o[0])}" ${String(val)===String(o[0])?"selected":""}>${esc(o[1])}</option>`).join("")}</select></label>`}
function setupSheet(){sheet("Build your budget",`${field("setupIncome","Monthly take-home income","","number","5600")}${select("setupTemplate","Starting point","simple",[["simple","Simple Budget"],["family","Family Budget"],["paycheck","Paycheck Planner"],["debt","Debt Focus"],["blank","Start Blank"]])}<div class="formGrid">${field("setupPayday","Next payday optional","","date")}${field("setupPay","Paycheck amount optional","","number","2800")}</div><button class="btn primary full" data-act="finishSetup">Create budget</button>`)}
function applyTemplate(name){if(name==="blank")return;const addBill=(n,a,d)=>state.bills.push({id:uid(),name:n,amount:a,dueDay:d,paid:{}}), addCat=(n,a,type)=>state.cats.push({id:uid(),name:n,amount:a,type});if(name==="simple"){addBill("Rent / Mortgage",0,1);addBill("Utilities",0,10);addBill("Phone",0,15);addCat("Groceries",0,"spend");addCat("Gas",0,"spend");addCat("Eating Out",0,"spend");addCat("Personal",0,"spend");addCat("Emergency Fund",0,"save")}if(name==="family"){addBill("Rent / Mortgage",0,1);addBill("Car Payment",0,5);addBill("Insurance",0,12);addCat("Groceries",0,"spend");addCat("Baby / Kids",0,"spend");addCat("Household",0,"spend");addCat("Family",0,"spend");addCat("Savings",0,"save")}if(name==="paycheck"){addBill("Rent / Mortgage",0,1);addBill("Phone",0,15);addBill("Insurance",0,20);addCat("Food",0,"spend");addCat("Gas",0,"spend");addCat("Safe Spending",0,"spend");addCat("Buffer",0,"save")}if(name==="debt"){addBill("Minimum Payments",0,7);addBill("Rent / Mortgage",0,1);addCat("Groceries",0,"spend");addCat("Gas",0,"spend");addCat("Extra Debt Payment",0,"save");addCat("Emergency Fund",0,"save")}}
function loadDemo(){state=blank();state.settings.setup=true;state.income=[{id:uid(),name:"Take-home pay",amount:5600}];state.settings.nextPayday=today().slice(0,8)+"20";state.settings.payAmount=2800;state.bills=[{id:uid(),name:"Rent",amount:2237,dueDay:1,paid:{}},{id:uid(),name:"Car payment",amount:650,dueDay:15,paid:{}},{id:uid(),name:"Insurance",amount:220,dueDay:18,paid:{}},{id:uid(),name:"Phone",amount:145,dueDay:24,paid:{}}];state.cats=[{id:uid(),name:"Groceries",amount:650,type:"spend"},{id:uid(),name:"Gas",amount:240,type:"spend"},{id:uid(),name:"Eating Out",amount:220,type:"spend"},{id:uid(),name:"Personal",amount:160,type:"spend"},{id:uid(),name:"Emergency Fund",amount:300,type:"save"}];const g=state.cats[0],gas=state.cats[1],eat=state.cats[2];state.txns=[{id:uid(),date:today(),type:"spend",cat:g.id,amount:87,note:"Groceries"},{id:uid(),date:today(),type:"spend",cat:gas.id,amount:42,note:"Gas"},{id:uid(),date:today(),type:"spend",cat:eat.id,amount:18,note:"Lunch"}];toast("Demo loaded");render()}
function incomeSheet(){sheet("Add income",`${field("iName","Name","Take-home pay")}${field("iAmount","Monthly amount","","number","3200")}<button class="btn primary full" data-act="saveIncome">Save income</button>`)}
function billSheet(){sheet("Add bill",`${field("bName","Bill name","","text","Rent")}${field("bAmount","Amount","","number","1200")}${field("bDay","Due day","","number","1")}<button class="btn primary full" data-act="saveBill">Save bill</button>`)}
function catSheet(type="spend"){sheet("Add category",`${field("cName","Name","", "text", type==="save"?"Emergency Fund":"Groceries")}${field("cAmount","Monthly amount","","number","300")}${select("cType","Type",type,[["spend","Spending"],["save","Savings"]])}<button class="btn primary full" data-act="saveCat">Save category</button>`)}
function logSheet(){sheet("Log spending",`${field("tAmount","Amount","","number","45")}${select("tCat","Category",flexCats()[0]?.id||"",flexCats().map(c=>[c.id,c.name]))}${field("tNote","Note optional","","text","Publix")}<button class="btn primary full" data-act="saveSpend">Log spending</button>`)}
function checkSheet(){sheet("Can I buy this?",`${field("xAmount","Purchase amount","","number","75")}${select("xCat","Category",flexCats()[0]?.id||"",flexCats().map(c=>[c.id,c.name]))}<button class="btn primary full" data-act="runCheck">Check</button><div id="checkResult" style="margin-top:12px"></div>`)}
function paySheet(){sheet("Paycheck settings",`${field("pDate","Next payday",state.settings.nextPayday,"date")}${field("pAmount","Paycheck amount",state.settings.payAmount,"number")}<button class="btn primary full" data-act="savePay">Save paycheck</button>`)}
function privacySheet(){sheet("Privacy",`<div class="row"><span class="icon">${icon("privacy")}</span><div><div class="rowTitle">No bank login</div><div class="rowSub">Allotted is manual by design.</div></div></div><div class="row"><span class="icon">${icon("lock")}</span><div><div class="rowTitle">Local data</div><div class="rowSub">Your budget stays on this device unless exported.</div></div></div><div class="row"><span class="icon">${icon("restore")}</span><div><div class="rowTitle">You control backups</div><div class="rowSub">Export and restore when you want.</div></div></div>`)}
function debtSheet(){sheet("Debt payoff",`${field("dName","Debt name","","text","Credit Card")}${field("dBalance","Balance","","number","1800")}${field("dMin","Minimum payment","","number","65")}<button class="btn primary full" data-act="saveDebt">Save debt</button>${state.debts.map(d=>`<div class="row"><span class="icon">${icon("spend")}</span><div><div class="rowTitle">${esc(d.name)}</div><div class="rowSub">Minimum ${money(d.min)}</div></div><div class="money">${money(d.balance)}</div></div>`).join("")}`)}
function exportBackup(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:"application/json"}));a.download="allotted-backup-"+today()+".json";a.click()}
function exportCSV(){const rows=[["date","type","category","note","amount"]].concat(state.txns.map(t=>[t.date,t.type,state.cats.find(c=>c.id===t.cat)?.name||state.bills.find(b=>b.id===t.bill)?.name||"",t.note||"",t.amount]));const blob=new Blob([rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\n")],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="allotted-transactions-"+today()+".csv";a.click()}
function toast(msg){let t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),1700)}
function act(a,d={}){if(a==="close")return closeSheet();if(a==="setup")return setupSheet();if(a==="demo")return loadDemo();if(a==="prev"){state.month=shiftMonth(state.month,-1);return render()}if(a==="next"){state.month=shiftMonth(state.month,1);return render()}if(a==="finishSetup"){state=blank();state.settings.setup=true;state.income=[{id:uid(),name:"Take-home pay",amount:num($("#setupIncome").value)}];state.settings.nextPayday=$("#setupPayday").value;state.settings.payAmount=num($("#setupPay").value);applyTemplate($("#setupTemplate").value);closeSheet();toast("Budget created");return render()}if(a==="addIncome")return incomeSheet();if(a==="saveIncome"){state.income.push({id:uid(),name:$("#iName").value||"Income",amount:num($("#iAmount").value)});closeSheet();return render()}if(a==="addBill")return billSheet();if(a==="saveBill"){state.bills.push({id:uid(),name:$("#bName").value||"Bill",amount:num($("#bAmount").value),dueDay:num($("#bDay").value)||1,paid:{}});closeSheet();return render()}if(a==="addCat")return catSheet(d.type||"spend");if(a==="saveCat"){state.cats.push({id:uid(),name:$("#cName").value||"Category",amount:num($("#cAmount").value),type:$("#cType").value});closeSheet();return render()}if(a==="log")return logSheet();if(a==="saveSpend"){state.txns.push({id:uid(),date:today(),type:"spend",cat:$("#tCat").value,amount:num($("#tAmount").value),note:$("#tNote").value});closeSheet();return render()}if(a==="check")return checkSheet();if(a==="runCheck"){const amount=num($("#xAmount").value), c=state.cats.find(x=>x.id===$("#xCat").value), left=num(c?.amount)-spentCat(c?.id), ok=amount<=left&&amount<=calc().spendLeft;$("#checkResult").innerHTML=`<div class="card" style="margin:0"><div class="title">${ok?"Yes, it fits.":"No, not safely."}</div><div class="sub">${ok?`After this, ${esc(c?.name)} has ${money(left-amount)} left.`:`${esc(c?.name||"This category")} only has ${money(left)} left. Bill money stays protected.`}</div></div>`;return}if(a==="payBill"){const b=state.bills.find(x=>x.id===d.id);if(b){b.paid=b.paid||{};b.paid[state.month]=today();state.txns.push({id:uid(),date:today(),type:"bill",bill:b.id,amount:b.amount,note:b.name})}return render()}if(a==="unpayBill"){const b=state.bills.find(x=>x.id===d.id);if(b?.paid)delete b.paid[state.month];state.txns=state.txns.filter(t=>!(t.type==="bill"&&t.bill===d.id&&String(t.date).slice(0,7)===state.month));return render()}if(a==="pay")return paySheet();if(a==="savePay"){state.settings.nextPayday=$("#pDate").value;state.settings.payAmount=num($("#pAmount").value);closeSheet();return render()}if(a==="debt")return debtSheet();if(a==="saveDebt"){state.debts.push({id:uid(),name:$("#dName").value||"Debt",balance:num($("#dBalance").value),min:num($("#dMin").value)});closeSheet();return render()}if(a==="backup")return exportBackup();if(a==="csv")return exportCSV();if(a==="import"){$("#fileInput").click();return}if(a==="privacy")return privacySheet();if(a==="theme"){state.theme=state.theme==="dark"?"light":"dark";return render()}if(a==="reset"){if(confirm("Erase all Allotted data on this device?")){localStorage.removeItem(KEY);state=blank();render()}return}}
$("#fileInput").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);normalize();save();render();toast("Backup restored")}catch(err){alert("Could not restore backup.")}};r.readAsText(f);e.target.value=""});
load();render();
})();
</script>
</body>
</html>
