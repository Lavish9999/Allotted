function mergeCloudStates(local,remote,tombs){let notices=[],out=JSON.parse(JSON.stringify(local));if(!remote)return{state:out,notices};

["income","savings"].forEach(kind=>{let map={};(lm[kind]||[]).forEach(x=>map[x.id]=1);(rm[kind]||[]).forEach(x=>{if(!map[x.id])lm[kind].push(x)})});
let localItems={};(lm.groups||[]).forEach(g=>(g.items||[]).forEach(i=>localItems[i.id]=i));
(rm.groups||[]).forEach(rg=>{let lg=(lm.groups||[]).find(g=>g.name===rg.name)||lm.groups[0];(rg.items||[]).forEach(ri=>{if(dead[ri.id])return;let li=localItems[ri.id];
if(!li){lg.items.push(ri);return}
let seen={};(li.txns||[]).forEach(t=>seen[t.id]=1);(ri.txns||[]).forEach(t=>{if(!seen[t.id]&&!dead[t.id])li.txns.push(t)});

Object.values(out.months).forEach(m=>(m.groups||[]).forEach(g=>{g.items=(g.items||[]).filter(i=>!dead[i.id]);g.items.forEach(i=>{i.txns=(i.txns||[]).filter(t=>!dead[t.id]);recalcItem(i)})}));
let dmap={};out.debts.forEach(d=>dmap[d.id]=d);
(remote.debts||[]).forEach(rd=>{if(dead[rd.id])return;let ld=dmap[rd.id];if(!ld){out.debts.push(rd);return}if((rd.updatedAt||0)>(ld.updatedAt||0)){Object.assign(ld,rd);notices.push("Used newer copy of debt "+(rd.name||""))}});

if(!u)return'<section class=panel><div class=empty><b>Sign in to use Cloud Sync</b><br>Your budget backs up to your account and follows you to a new phone.<br><br><button class="btn primary" data-ptab=account>Go to Account</button></div></section>';
let st=c.syncStatus,chip=st==="ok"?'<span class="chip good">Backed up</span>':st==="pending"?'<span class="chip warn">Changes not synced</span>':st==="syncing"?'<span class="chip warn">Syncing...</span>':st==="error"?'<span class="chip bad">Error</span>':'<span class=pill>Off</span>';
return'<section class=panel><div class=row><div class=rowMain><div class="bubble mint">@</div><div class=meta><b>'+esc(u.email)+'</b><span class="small muted">'+(mock?"Test mode cloud (stored on this device)":"Live cloud")+'</span></div></div><span class="chip good">Signed in</span></div>'
+'<div class=row><div class=meta><b>Cloud Sync</b><span class="small muted">'+(c.syncEnabled?"On"+(S.cloud.household?" - shared with your household":""):"Off - your budget stays only on this device")+'</span></div><button id=csToggle class="btn miniBtn'+(c.syncEnabled?" on":"")+'">'+(c.syncEnabled?"Turn off":"Turn on")+'</button></div>'
+'<div class=row><div class=meta><b>Last synced</b><span class="small muted">'+relTime(c.lastSyncedAt)+'</span></div>'+chip+'</div>'
+'<div class=row style="border:0"><div class=meta><b>Backup status</b><span class="small muted">'+(c.lastSyncedAt?"Cloud copy from "+relTime(c.lastSyncedAt):"No cloud copy yet")+'</span></div><button id=csNow class="btn primary miniBtn">Sync now</button></div>'
+(c.lastError?'<div class="chip bad" style="margin-top:8px">'+esc(c.lastError)+'</div>':"")
+(c.notices&&c.notices.length?'<div class=label style="margin-top:12px">Sync notices</div>'+c.notices.slice(0,3).map(n=>'<div class="small muted" style="padding:4px 0">'+esc(n.msg)+' - '+relTime(n.at)+'</div>').join("")+'<button id=csClearNotices class="btn ghost miniBtn" style="margin-top:6px">Clear notices</button>':"")+'</section>'}
function pCloudPreview(){return'<section class=panel>'+sampleChip()+'<div class=row><div class=rowMain><div class="bubble mint">@</div><div class=meta><b>taylor@parkers.home</b><span class="small muted">Signed in</span></div></div><span class="chip good">Backed up</span></div><div class=row><div class=meta><b>Cloud Sync</b><span class="small muted">On - shared with your household</span></div><button class="btn miniBtn on">Turn off</button></div><div class=row style="border:0"><div class=meta><b>Last synced</b><span class="small muted">2h ago</span></div><button class="btn primary miniBtn">Sync now</button></div></section>'}
function pCloudScreen(){return'<div class=screen>'+pHeader("Premium tool","Cloud Sync","Back up your budget to your account and keep every device in step.")+premiumGate(pCloudFull,pCloudPreview())+'</div>'}
function pHouseFull(){let u=currentUser(),h=S.cloud.household;
if(!u)return'<section class=panel><div class=empty><b>Sign in to share a household</b><br>You and your partner budget from the same plan - bills, income, spending, subscriptions, debts, and notes.<br><br><button class="btn primary" data-ptab=account>Go to Account</button></div></section>';
if(!h)return'<section class=panel><div class=sectionHead><div><div class=label>Start fresh</div><div class=title>Create your household</div></div></div>'+field("hhName","Household name","")+'<button id=hhCreate class="btn primary" style="width:100%;margin-top:10px">Create household</button><p class="small muted" style="margin:10px 0 0">You get an invite code to share with your partner.</p></section>'
+'<section class=panel><div class=sectionHead><div><div class=label>Or join</div><div class=title>Enter an invite code</div></div></div>'+field("hhCode","Invite code","")+'<button id=hhJoin class=btn style="width:100%;margin-top:10px">Join household</button><p class="small muted" style="margin:10px 0 0">Ask your partner to open Household Sharing and read you their 8-character code.</p></section>';
return'<section class=panel><div class=sectionHead><div><div class=label>Household</div><div class=title>'+esc(h.name)+'</div></div><span class="chip good">'+(h.role==="owner"?"Owner":"Member")+'</span></div>'
+'<div class=row><div class=meta><b>Invite code</b><span class="small muted">Share it so your partner can join</span></div><span class=pill style="font-size:16px;letter-spacing:.12em">'+esc(h.inviteCode||"")+'</span></div>'
+'<div class=row style="border:0"><div class=meta><b>Shared budget</b><span class="small muted">Bills, income, spending, subscriptions, debts, and notes sync to everyone here when Cloud Sync is on. New items and edits are tagged with each member\'s account.</span></div><button class="btn miniBtn" data-ptab=pcloud>Cloud Sync</button></div></section>'
+'<section class=panel><div class=sectionHead><div><div class=label>Members</div><div class=title>'+h.members.length+' in household</div></div><button id=hhRefresh class="btn miniBtn">Refresh</button></div>'+h.members.map((m,i)=>'<div class=row'+(i===h.members.length-1?' style="border:0"':'')+'><div class=rowMain><div class="bubble '+(m.role==="owner"?"mint":"lav")+'">'+esc(String(m.email||"?").slice(0,1).toUpperCase())+'</div><div class=meta><b>'+esc(m.email)+'</b><span class="small muted">'+(m.role==="owner"?"Owner":"Member")+' - joined '+relTime(m.joinedAt)+'</span></div></div>'+(m.id===u.id?'<span class=pill>You</span>':"")+'</div>').join("")+'</section>'
+'<section class=panel><button id=hhLeave class="btn warn" style="width:100%">Leave household</button><p class="small muted" style="margin:8px 0 0">Leaving keeps a full copy of the budget on this device.</p></section>'}
function pHousePreview(){return'<section class=panel>'+sampleChip()+'<div class=sectionHead><div><div class=label>Household</div><div class=title>The Parkers</div></div><span class="chip good">Owner</span></div><div class=row><div class=meta><b>Invite code</b><span class="small muted">Share it so your partner can join</span></div><span class=pill style="font-size:16px;letter-spacing:.12em">MK4Q7T2A</span></div><div class=row><div class=rowMain><div class="bubble mint">T</div><div class=meta><b>taylor@parkers.home</b><span class="small muted">Owner - joined 3d ago</span></div></div><span class=pill>You</span></div><div class=row style="border:0"><div class=rowMain><div class="bubble lav">A</div><div class=meta><b>alex@parkers.home</b><span class="small muted">Member - joined 2d ago</span></div></div></div></section>'}
function pHouseScreen(){return'<div class=screen>'+pHeader("Premium tool","Household Sharing","One budget for both of you - invite your partner with a code.")+premiumGate(pHouseFull,pHousePreview())+'</div>'}
function cloudBind(){let ga=$("#goAccount");if(ga)ga.onclick=()=>{tab="account";render()};
document.querySelectorAll("[data-acmode]").forEach(b=>b.onclick=()=>{acMode=b.dataset.acmode;acError="";render()});
let sub=$("#acSubmit");if(sub)sub.onclick=()=>{if(acBusy)return;let em=$("#acEmail")?$("#acEmail").value:"",pw=$("#acPass")?$("#acPass").value:"";acBusy=true;acError="";render();(acMode==="signup"?AuthService.signUp(em,pw):AuthService.signIn(em,pw)).then(()=>{acBusy=false;toast(acMode==="signup"?"Account created":"Signed in");render()}).catch(e=>{acBusy=false;acError=(e&&e.message)||"Something went wrong";render()})};
let fg=$("#acForgot");if(fg)fg.onclick=()=>{let em=$("#acEmail")?$("#acEmail").value:"";AuthService.resetPassword(em).then(r=>toast(r&&r.message?r.message:"Password reset requested"))};
let so=$("#acSignOut");if(so)so.onclick=()=>AuthService.signOut().then(()=>toast("Signed out"));
let ct=$("#csToggle");if(ct)ct.onclick=()=>{if(S.cloud.syncEnabled)SyncService.disable();else if(!SyncService.enable())toast(!currentUser()?"Sign in first":!isPremium()?"Cloud Sync is a Premium feature":"Cloud is not configured yet");};
let cn=$("#csNow");if(cn)cn.onclick=()=>{if(S.cloud.syncEnabled)SyncService.syncNow();else toast("Turn on Cloud Sync first")};
let cc=$("#csClearNotices");if(cc)cc.onclick=()=>{S.cloud.notices=[];save();render()};
let hc=$("#hhCreate");if(hc)hc.onclick=()=>HouseholdService.create($("#hhName")?$("#hhName").value:"").then(()=>toast("Household created")).catch(e=>toast((e&&e.message)||"Could not create household"));
let hj=$("#hhJoin");if(hj)hj.onclick=()=>HouseholdService.join($("#hhCode")?$("#hhCode").value:"").then(()=>toast("Joined household")).catch(e=>toast((e&&e.message)||"Could not join household"));
let hr=$("#hhRefresh");if(hr)hr.onclick=()=>HouseholdService.refresh().then(()=>{toast("Members updated");render()});
let hl=$("#hhLeave");if(hl)hl.onclick=()=>{if(confirm("Leave this household? Your local budget stays on this device."))HouseholdService.leave().then(()=>toast("Left household"))}}
/* ===== End Allotted Cloud ===== */

function bind(){document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});document.querySelectorAll("[data-mnav]").forEach(b=>b.onclick=()=>selectMonth(shiftMonth(mk,parseInt(b.dataset.mnav)),parseInt(b.dataset.mnav)>0));let p=$("#pickMonth");if(p)p.onclick=()=>{let v=prompt("Go to month YYYY-MM",mk);if(v&&v.length===7)selectMonth(v,true)};let f=$("#fab");if(f)f.onclick=addMenu;let rw=$("#restoreWelcome");if(rw)rw.onclick=openPasteRestore;let obNext=$("#obNext");if(obNext)obNext.onclick=()=>{if(obStep===1){ob.month=$("#obMonth").value||mk;ob.income=money($("#obIncome").value)}if(obStep===4)ob.savings=money($("#obSavings").value);obStep++;render()};let obBill=$("#obAddBill");if(obBill)obBill.onclick=()=>{let name=$("#obBillName").value||"Fixed payment",amount=money($("#obBillAmount").value),dueDate=$("#obBillDue").value||"",dueDay=dueDate?(+dueDate.slice(8,10)||null):null,repeat=$("#obBillRepeat").value||"monthly";if(amount)ob.bills.push({name,amount,dueDay,dueDate,repeat});render()};let obEnv=$("#obAddEnv");if(obEnv)obEnv.onclick=()=>{let name=$("#obEnvName").value||"Spending category",amount=money($("#obEnvAmount").value);if(amount)ob.envelopes.push({name,amount});render()};let obStarter=$("#obStarter");if(obStarter)obStarter.onclick=()=>{let names=ob.envelopes.map(e=>e.name.toLowerCase());starterCategories().forEach(e=>{if(!names.includes(e.name.toLowerCase()))ob.envelopes.push(e)});render()};let obFinish=$("#obFinish");if(obFinish)obFinish.onclick=finishOnboarding;let dl=$("#dashLogSpend");if(dl)dl.onclick=()=>openTxn();let di=$("#dashAddIncome");if(di)di.onclick=()=>openMoney("income");let mv=$("#moveMoney");if(mv)mv.onclick=openMoveMoney;let ex=$("#explainSafe");if(ex)ex.onclick=openSafeMath;let ss=$("#startSpending");if(ss)ss.onclick=()=>{tab="budget";render()};let dbk=$("#dashBackup");if(dbk)dbk.onclick=copyBackup;let ai=$("#addIncome");if(ai)ai.onclick=()=>openMoney("income");let as=$("#addSavings");if(as)as.onclick=()=>openMoney("savings");let starters=$("#starterCategories");if(starters)starters.onclick=addStarterCategories;document.querySelectorAll("[data-editmoney]").forEach(b=>b.onclick=()=>{let p=b.dataset.editmoney.split(":");openMoney(p[0],p[1])});document.querySelectorAll("[data-additem]").forEach(b=>b.onclick=()=>{let g=ensureMonth().groups.find(x=>x.id===b.dataset.additem);g&&/bill/i.test(g.name)?openAddBillsFlow(g.id):openLine(b.dataset.additem)});document.querySelectorAll("[data-edititem]").forEach(b=>b.onclick=()=>{let p=b.dataset.edititem.split(":");openLine(p[0],p[1])});document.querySelectorAll("[data-openitem]").forEach(b=>b.onclick=()=>{let p=b.dataset.openitem.split(":");openCategory(p[0],p[1])});let at=$("#addTxn");if(at)at.onclick=()=>openTxn();document.querySelectorAll("[data-edittxn]").forEach(b=>b.onclick=()=>openTxn(b.dataset.edittxn));let ab=$("#addBill");if(ab)ab.onclick=()=>{let g=ensureMonth().groups.find(x=>/bill/i.test(x.name))||ensureMonth().groups[0];tab==="bills"||tab==="budget"?openAddBillsFlow(g.id):openLine(g.id,null,true)};document.querySelectorAll("[data-paybill]").forEach(b=>b.onclick=()=>{let p=b.dataset.paybill.split(":");payBill(p[0],p[1])});let gd=$("#goDebt");if(gd)gd.onclick=()=>{tab="debt";render()};let gs=$("#goSettings");if(gs)gs.onclick=openSettings;let gp=$("#goPrivacy");if(gp)gp.onclick=openPrivacy;let rs=$("#restartSetup");if(rs)rs.onclick=restartSetup;let ad=$("#addDebt");if(ad)ad.onclick=()=>openDebt();document.querySelectorAll("[data-editdebt]").forEach(b=>b.onclick=()=>openDebt(b.dataset.editdebt));let cb=$("#copyBackup");if(cb)cb.onclick=copyBackup;let rt=$("#restoreText");if(rt)rt.onclick=openPasteRestore;premiumBind()}
$("#settingsBtn").onclick=openSettings;
document.getElementById("fileInput").addEventListener("change",e=>{let f=e.target.files&&e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>applyBackup(String(r.result||""));r.readAsText(f);e.target.value=""});
load();if(!storageBroken)save();render();if(window.AllottedIAP&&typeof window.AllottedIAP.getStatus==="function")setTimeout(()=>SubscriptionManager.refreshStatus(),0);
</script>
