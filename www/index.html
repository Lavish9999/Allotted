function renderTxnStep(){let d=txnDraft,choices=allItems(ensureMonth()),picked=choices.find(x=>x.g.id+":"+x.item.id===d.line),body="";if(d.step===1)body='<div class=spendFlow><div class=label>Step 1 of 4</div><div class=title>How much did you spend?</div><input id=txAmt type=number value="'+esc(d.amount)+'" placeholder="0.00" class=amountPad><div class=choice><span><b>Category</b><br><span class="small muted">You can change this next</span></span><b>'+esc(picked?.item.name||"Choose")+'</b></div><button id=txNext class="btn primary">Continue</button></div>';if(d.step===2)body='<div class=spendFlow><div class=label>Step 2 of 4</div><div class=title>Confirm or change category</div><p class=subtitle>Everyday purchases usually go against flexible spending.</p><div class=choiceGrid>'+choices.map(x=>{let v=x.g.id+":"+x.item.id;return'<button class="choice '+(d.line===v?"on":"")+'" data-txchoice="'+v+'"><span><b>'+esc(x.item.name)+'</b><br><span class="small muted">'+(x.item.recurring?paymentLabel(x.item):"Flexible spending")+'</span></span><b>'+fmt(x.item.planned-x.item.actual)+'</b></button>'}).join("")+'</div><button id=txNext class="btn primary">Add note</button></div>';if(d.step===3)body='<div class=spendFlow><div class=label>Step 3 of 4</div><div class=title>Anything to remember?</div>'+field("txDate","Date",d.date,"date")+field("txNote","Note",d.note)+'<button id=txNext class="btn primary">Review</button></div>';if(d.step===4){let found=choices.find(x=>x.g.id+":"+x.item.id===d.line);body='<div class=spendFlow><div class=label>Step 4 of 4</div><div class=title>Confirm expense</div><div class=surface><div class=row><span>Amount</span><b>'+fmtC(d.amount)+'</b></div><div class=row><span>Counts against</span><b>'+esc(found?.item.name||"Category")+'</b></div><div class=row><span>Type</span><b>'+(found?.item.recurring?paymentLabel(found.item):"Flexible spending")+'</b></div><div class=row><span>Date</span><b>'+esc(d.date)+'</b></div></div><button id=txSave class="btn primary">'+(d.editing?"Save expense":"Log expense")+'</button>'+(d.editing?'<button id=deleteTxn class="btn warn">Delete transaction</button>':"")+'</div>'}sheet(d.editing?"Edit expense":"Add expense",body);let n=$("#txNext");if(n)n.onclick=()=>{if(d.step===1)d.amount=money($("#txAmt").value);if(d.step===3){d.date=$("#txDate").value||new Date().toISOString().slice(0,10);d.note=$("#txNote").value||""}d.step++;renderTxnStep()};document.querySelectorAll("[data-txchoice]").forEach(b=>b.onclick=()=>{d.line=b.dataset.txchoice;d.step=3;renderTxnStep()});let saveBtn=$("#txSave");if(saveBtn)saveBtn.onclick=saveTxnDraft;let del=$("#deleteTxn");if(del)del.onclick=()=>{if(confirm("Delete this transaction?")){let [gid,iid,tid]=d.ref.split(":");let src=findItem(ensureMonth(),gid,iid);src.i.txns=src.i.txns.filter(x=>x.id!==tid);recalcItem(src.i);closeModal();commit()}}}
function saveTxnDraft(){let d=txnDraft,[ng,ni]=d.line.split(":"),dest=findItem(ensureMonth(),ng,ni),o=d.tx||{id:id()};o.amount=money(d.amount);o.date=d.date||new Date().toISOString().slice(0,10);o.note=d.note||"";if(d.editing&&d.source?.i){let [, , tid]=d.ref.split(":");d.source.i.txns=d.source.i.txns.filter(x=>x.id!==tid);recalcItem(d.source.i)}dest.i.txns=dest.i.txns||[];dest.i.txns.push(o);recalcItem(dest.i);S.lastLog={gid:ng,iid:ni};closeModal();commit()}
function openMoveMoney(){let items=envelopeItems(ensureMonth());if(items.length<2){toast("Add two flexible spending categories first");return}sheet("Move money",'<p class=subtitle>Move money only between flexible spending categories. Fixed payments stay separate because they have due dates.</p><label class=field><span class=small>From category</span><select id=mvFrom>'+items.map(x=>'<option value='+x.g.id+':'+x.item.id+'>'+esc(x.item.name)+'</option>').join("")+'</select></label><label class=field><span class=small>To category</span><select id=mvTo>'+items.map(x=>'<option value='+x.g.id+':'+x.item.id+'>'+esc(x.item.name)+'</option>').join("")+'</select></label>'+field("mvAmt","Amount","","number")+'<button id=mvGo class="btn primary">Move money</button>');$("#mvGo").onclick=()=>{let [fg,fi]=$("#mvFrom").value.split(":"),[tg,ti]=$("#mvTo").value.split(":"),from=findItem(ensureMonth(),fg,fi).i,to=findItem(ensureMonth(),tg,ti).i,amt=money($("#mvAmt").value);if(!from||!to||from===to||!amt)return toast("Choose two categories");from.planned=Math.max(0,from.planned-amt);to.planned+=amt;markPlanChange();closeModal();commit()}}
function payBill(gid,iid){let i=findItem(ensureMonth(),gid,iid).i;if(!i)return;if(itemPaid(i)){i.txns=[];i.actual=0}else{i.txns=[{id:id(),date:new Date().toISOString().slice(0,10),amount:i.planned,note:"Bill paid"}];recalcItem(i)}commit()}
function openDebt(idv){let d=idv?S.debts.find(x=>x.id===idv):null;sheet(d?"Edit debt":"Add debt",field("dn","Name",d?.name||"")+field("db","Balance",d?.balance||"","number")+field("dm","Minimum payment",d?.minPayment||"","number")+field("da","APR",d?.apr||"","number")+'<button id=saveDebt class="btn primary">Save</button>');$("#saveDebt").onclick=()=>{let o=d||{id:id()};o.name=$("#dn").value||"Debt";o.balance=money($("#db").value);o.minPayment=money($("#dm").value);o.apr=money($("#da").value);if(!d)S.debts.push(o);closeModal();commit()}}
function addMenu(){sheet("Quick add",'<div class=screen><button id=menuTxn class="btn primary">Add spend</button><button id=menuIncome class=btn>Add income</button><button id=menuSpend class=btn>New spending category</button><button id=menuBill class=btn>New fixed payment</button></div>');$("#menuTxn").onclick=()=>{closeModal();openTxn()};$("#menuIncome").onclick=()=>{closeModal();openMoney("income")};$("#menuSpend").onclick=()=>{closeModal();let g=ensureMonth().groups.find(x=>!/bill/i.test(x.name))||ensureMonth().groups[0];openLine(g.id)};$("#menuBill").onclick=()=>{closeModal();let g=ensureMonth().groups.find(x=>/bill/i.test(x.name))||ensureMonth().groups[0];openAddBillsFlow(g.id)}}
function bind(){document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});document.querySelectorAll("[data-mnav]").forEach(b=>b.onclick=()=>selectMonth(shiftMonth(mk,parseInt(b.dataset.mnav)),parseInt(b.dataset.mnav)>0));let p=$("#pickMonth");if(p)p.onclick=()=>{let v=prompt("Go to month YYYY-MM",mk);if(v&&v.length===7)selectMonth(v,true)};let f=$("#fab");if(f)f.onclick=addMenu;let rw=$("#restoreWelcome");if(rw)rw.onclick=openPasteRestore;let obNext=$("#obNext");if(obNext)obNext.onclick=()=>{if(obStep===1){ob.month=$("#obMonth").value||mk;ob.income=money($("#obIncome").value)}if(obStep===4)ob.savings=money($("#obSavings").value);obStep++;render()};let obBill=$("#obAddBill");if(obBill)obBill.onclick=()=>{let name=$("#obBillName").value||"Fixed payment",amount=money($("#obBillAmount").value),dueDate=$("#obBillDue").value||"",dueDay=dueDate?(+dueDate.slice(8,10)||null):null,repeat=$("#obBillRepeat").value||"monthly";if(amount)ob.bills.push({name,amount,dueDay,dueDate,repeat});render()};let obEnv=$("#obAddEnv");if(obEnv)obEnv.onclick=()=>{let name=$("#obEnvName").value||"Spending category",amount=money($("#obEnvAmount").value);if(amount)ob.envelopes.push({name,amount});render()};let obStarter=$("#obStarter");if(obStarter)obStarter.onclick=()=>{let names=ob.envelopes.map(e=>e.name.toLowerCase());starterCategories().forEach(e=>{if(!names.includes(e.name.toLowerCase()))ob.envelopes.push(e)});render()};let obFinish=$("#obFinish");if(obFinish)obFinish.onclick=finishOnboarding;let dl=$("#dashLogSpend");if(dl)dl.onclick=()=>openTxn();let di=$("#dashAddIncome");if(di)di.onclick=()=>openMoney("income");let mv=$("#moveMoney");if(mv)mv.onclick=openMoveMoney;let ex=$("#explainSafe");if(ex)ex.onclick=openSafeMath;let ss=$("#startSpending");if(ss)ss.onclick=()=>{tab="budget";render()};let dbk=$("#dashBackup");if(dbk)dbk.onclick=copyBackup;let ai=$("#addIncome");if(ai)ai.onclick=()=>openMoney("income");let as=$("#addSavings");if(as)as.onclick=()=>openMoney("savings");let starters=$("#starterCategories");if(starters)starters.onclick=addStarterCategories;document.querySelectorAll("[data-editmoney]").forEach(b=>b.onclick=()=>{let p=b.dataset.editmoney.split(":");openMoney(p[0],p[1])});document.querySelectorAll("[data-additem]").forEach(b=>b.onclick=()=>{let g=ensureMonth().groups.find(x=>x.id===b.dataset.additem);g&&/bill/i.test(g.name)?openAddBillsFlow(g.id):openLine(b.dataset.additem)});document.querySelectorAll("[data-edititem]").forEach(b=>b.onclick=()=>{let p=b.dataset.edititem.split(":");openLine(p[0],p[1])});document.querySelectorAll("[data-openitem]").forEach(b=>b.onclick=()=>{let p=b.dataset.openitem.split(":");openCategory(p[0],p[1])});let at=$("#addTxn");if(at)at.onclick=()=>openTxn();document.querySelectorAll("[data-edittxn]").forEach(b=>b.onclick=()=>openTxn(b.dataset.edittxn));let ab=$("#addBill");if(ab)ab.onclick=()=>{let g=ensureMonth().groups.find(x=>/bill/i.test(x.name))||ensureMonth().groups[0];tab==="bills"||tab==="budget"?openAddBillsFlow(g.id):openLine(g.id,null,true)};document.querySelectorAll("[data-paybill]").forEach(b=>b.onclick=()=>{let p=b.dataset.paybill.split(":");payBill(p[0],p[1])});let gd=$("#goDebt");if(gd)gd.onclick=()=>{tab="debt";render()};let gs=$("#goSettings");if(gs)gs.onclick=openSettings;let gp=$("#goPrivacy");if(gp)gp.onclick=openPrivacy;let rs=$("#restartSetup");if(rs)rs.onclick=restartSetup;let ad=$("#addDebt");if(ad)ad.onclick=()=>openDebt();document.querySelectorAll("[data-editdebt]").forEach(b=>b.onclick=()=>openDebt(b.dataset.editdebt));let cb=$("#copyBackup");if(cb)cb.onclick=copyBackup;let rt=$("#restoreText");if(rt)rt.onclick=openPasteRestore}
$("#settingsBtn").onclick=openSettings;
document.getElementById("fileInput").addEventListener("change",e=>{let f=e.target.files&&e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>applyBackup(String(r.result||""));r.readAsText(f);e.target.value=""});
load();if(!storageBroken)save();render();
</script>
