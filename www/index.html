<style>
:root{
  --bg:#0B0E10; --card:rgba(255,255,255,.035); --cardb:rgba(255,255,255,.07);
  --inset:rgba(255,255,255,.05); --line:rgba(255,255,255,.08);
  --text:#EDF1F2; --dim:#8C979C;
  --sheet:#13171A; --nav:rgba(19,23,26,.88); --inputbg:rgba(0,0,0,.3);
  --hover:rgba(255,255,255,.04); --track:rgba(255,255,255,.06); --handle:rgba(255,255,255,.15);
  --vignette:rgba(0,0,0,.55);
  --teal:#2DD4BF; --tealsoft:rgba(45,212,191,.14); --tealb:rgba(45,212,191,.35);
  --orange:#F59B45; --orangesoft:rgba(245,155,69,.14); --orangeb:rgba(245,155,69,.35);
  --red:#F87171; --redsoft:rgba(248,113,113,.12);
  --purple:#A78BFA; --purplesoft:rgba(167,139,250,.14);
}
[data-theme="light"]{
  --bg:#F2F5F6; --card:rgba(0,0,0,.022); --cardb:rgba(0,0,0,.10);
  --inset:rgba(0,0,0,.04); --line:rgba(0,0,0,.10);
  --text:#15201F; --dim:#5A696C;
  --sheet:#FFFFFF; --nav:rgba(255,255,255,.92); --inputbg:rgba(0,0,0,.045);
  --hover:rgba(0,0,0,.035); --track:rgba(0,0,0,.07); --handle:rgba(0,0,0,.18);
  --vignette:rgba(0,0,0,.05);
  --teal:#0D9488; --tealsoft:rgba(13,148,136,.12); --tealb:rgba(13,148,136,.40);
  --orange:#C2710C; --orangesoft:rgba(194,113,12,.12); --orangeb:rgba(194,113,12,.40);
  --red:#DC2626; --redsoft:rgba(220,38,38,.10);
  --purple:#7C3AED; --purplesoft:rgba(124,58,237,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:
    radial-gradient(135% 105% at 50% 22%, transparent 60%, var(--vignette) 100%),
    var(--bg);
  background-attachment:fixed;
  color:var(--text);font-family:-apple-system,BlinkMacSystemFont,system-ui,'Segoe UI',Roboto,sans-serif;min-height:100vh;padding-bottom:calc(110px + env(safe-area-inset-bottom));letter-spacing:-.005em}
.mono{font-family:ui-monospace,'SF Mono',Menlo,Monaco,monospace}
button{transition:transform .12s ease,opacity .15s ease;font-family:inherit;cursor:pointer}
button:active{transform:scale(.96)}
.wrap{max-width:1240px;margin:0 auto;padding:16px}
.narrow{max-width:700px;margin:0 auto}
/* spreadsheet-style category grid */
.sheet-grid{display:grid;grid-template-columns:1fr;gap:10px;align-items:start}
@media(min-width:720px){.sheet-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1040px){.sheet-grid{grid-template-columns:1fr 1fr 1fr}}
.gcard{background:var(--card);border:1px solid var(--cardb);border-radius:14px;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.05);transition:border-color .2s ease,transform .2s ease}
@media(hover:hover){.gcard:hover{border-color:var(--tealb);transform:translateY(-1px)}}
.ghead{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--hover);border-bottom:1px solid var(--line)}
.ghead .gname{font-weight:800;font-size:13.5px}
.ghead .gtot{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;font-weight:700;color:var(--dim)}
.grow{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px;min-height:34px}
.grow:hover{background:var(--hover)}
.grow .gn{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}
.grow .gv{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-weight:700;white-space:nowrap}
.gadd{width:100%;text-align:left;background:none;border:none;color:var(--teal);font-size:11.5px;font-weight:700;padding:7px 12px;display:flex;align-items:center;gap:5px}
.gspent{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:10px;margin-top:2px}
.card{background:var(--card);border:1px solid var(--cardb);border-radius:22px;padding:18px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 8px 24px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.06);margin-bottom:14px}
.label{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:7px}
.btn{border:none;border-radius:14px;padding:14px 0;font-weight:800;font-size:15px;width:100%}
.btn-teal{background:linear-gradient(135deg,#2DD4BF,#14B8A6);color:#062C27;box-shadow:0 6px 20px rgba(45,212,191,.25)}
.btn-ghost{background:var(--inset);border:1px solid var(--line);color:var(--dim);font-weight:700}
.field{display:block;margin-bottom:13px}
.field span{display:block;color:var(--dim);font-size:12px;margin-bottom:6px;font-weight:500}
.field input{width:100%;background:var(--inputbg);border:1px solid var(--line);border-radius:13px;color:var(--text);padding:12px 14px;font-size:15px;outline:none}
input[type=number]{font-family:ui-monospace,'SF Mono',Menlo,monospace}
.header{position:relative;overflow:hidden;padding:calc(22px + env(safe-area-inset-top)) 20px 20px;border-bottom:1px solid var(--line)}
.glow1,.glow2{display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-12px)}to{opacity:1;transform:translate(-50%,0)}}
.fade-up{animation:fadeUp .45s ease both}
button{transition:transform .08s ease,opacity .15s ease}
button:active{transform:scale(.97)}
.grow,.irow,.gcard,[data-goto],[data-edit]{transition:background .15s ease}
.grow:active,.irow:active,[data-goto]:active{background:var(--hover)}
.card,.gcard{animation:fadeUp .4s ease both}
.nav{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));left:0;right:0;display:flex;justify-content:center;z-index:40;pointer-events:none}
.nav-inner{display:flex;gap:2px;background:var(--nav);backdrop-filter:blur(18px);border:1px solid var(--cardb);border-radius:99px;padding:5px;box-shadow:0 12px 40px rgba(0,0,0,.55);pointer-events:auto}
.nav button{display:flex;align-items:center;gap:7px;border:none;background:transparent;color:var(--dim);border-radius:99px;padding:10px 13px;font-size:12.5px;font-weight:800}
.nav button.on{background:var(--tealsoft);color:var(--teal);padding:10px 16px;box-shadow:0 0 0 1px var(--tealb),0 4px 16px rgba(45,212,191,.20)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:50;transition:padding-bottom .2s ease}
.sheet{background:var(--sheet);border:1px solid var(--cardb);border-radius:26px 26px 0 0;padding:22px 22px calc(22px + env(safe-area-inset-bottom));width:100%;max-width:460px;max-height:88vh;overflow-y:auto;box-shadow:0 -10px 50px rgba(0,0,0,.6);animation:fadeUp .3s ease}
.handle{width:40px;height:4px;background:var(--handle);border-radius:99px;margin:0 auto 16px}
.sheet h3{font-size:18px;font-weight:800;margin-bottom:18px}
.toast{position:fixed;top:calc(env(safe-area-inset-top) + 14px);left:50%;transform:translateX(-50%);background:rgba(19,23,26,.95);backdrop-filter:blur(12px);color:#EDF1F2;border-radius:16px;padding:13px 20px;font-size:14px;font-weight:700;z-index:60;box-shadow:0 10px 40px rgba(0,0,0,.6);max-width:90%;animation:toastIn .3s ease}
.irow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.irow:last-of-type{border-bottom:none}
.minibar{height:4px;background:var(--track);border-radius:99px;overflow:hidden;margin-top:6px}
.minibar>div{height:100%;border-radius:99px;transition:width .55s cubic-bezier(.22,1,.36,1);box-shadow:inset 0 1px 0 rgba(255,255,255,.28)}
.addline{background:none;border:none;color:var(--teal);font-size:12.5px;font-weight:700;padding:10px 0 0;display:flex;align-items:center;gap:5px}
.seg{display:flex;gap:6px;background:var(--inputbg);border-radius:13px;padding:5px;margin-bottom:16px}
.seg button{flex:1;border:none;border-radius:10px;padding:9px 0;font-size:13px;font-weight:800;background:transparent;color:var(--dim)}
svg text{font-family:ui-monospace,'SF Mono',Menlo,monospace}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.ob-sub{color:var(--dim);font-size:13.5px;line-height:1.6;margin-bottom:18px}
.ob-chips{display:flex;flex-wrap:wrap;gap:8px}
.ob-chip{background:var(--inset);border:1px solid var(--line);color:var(--text);padding:9px 14px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer}
.ob-chip.on{background:var(--tealsoft);border-color:var(--tealb);color:var(--teal)}
.ob-in{background:var(--inputbg);border:1px solid var(--line);border-radius:11px;color:var(--text);padding:11px 12px;font-size:14px;outline:none}
.ob-in:focus{border-color:var(--tealb)}
.ob-billrow{display:flex;gap:7px;align-items:center;margin-bottom:8px}
.ob-del{background:var(--inset);border:none;color:var(--dim);border-radius:9px;padding:8px;display:flex;flex-shrink:0;cursor:pointer}
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--inputbg);border:1px solid var(--line);border-radius:13px;padding:13px 14px;font-size:14px;font-weight:600;color:var(--text)}
.toggle-row input[type=checkbox]{appearance:none;-webkit-appearance:none;width:46px;height:28px;border-radius:99px;background:var(--track);position:relative;flex-shrink:0;cursor:pointer;transition:background .18s}
.toggle-row input[type=checkbox]:checked{background:var(--teal)}
.toggle-row input[type=checkbox]::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:99px;background:#fff;transition:transform .18s}
.toggle-row input[type=checkbox]:checked::after{transform:translateX(18px)}
.dd-menu{margin-top:8px;background:var(--inputbg);border:1px solid var(--line);border-radius:13px;max-height:240px;overflow:auto;padding:5px}
.dd-row{display:block;width:100%;text-align:left;background:none;border:none;color:var(--text);font-family:inherit;font-size:14.5px;font-weight:600;padding:11px 12px;border-radius:9px;cursor:pointer}
.dd-row:hover,.dd-row:active{background:var(--tealsoft);color:var(--teal)}
.catopt{display:block;width:100%;text-align:left;background:var(--inputbg);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:11px 14px;font-size:14px;cursor:pointer}
.catopt.on{background:var(--tealsoft);border-color:var(--tealb);color:var(--teal)}

/* clean-mode polish */
details > summary::-webkit-details-marker{display:none}
details > summary::marker{content:""}
@media(max-width:520px){.sheet-grid[style*="1fr 1fr"]{grid-template-columns:1fr!important}}
/* standout edition */
.hero-safe{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--tealsoft),var(--card));border-color:var(--tealb)}
.hero-safe:before{content:"";position:absolute;inset:-45% -20% auto auto;width:180px;height:180px;border-radius:999px;background:radial-gradient(circle,rgba(45,212,191,.18),transparent 65%);pointer-events:none}
.focus-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.focus-tile{background:var(--inset);border:1px solid var(--line);border-radius:15px;padding:12px}
.focus-tile .ft-label{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;font-weight:850;margin-bottom:5px}
.focus-tile .ft-value{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:20px;font-weight:950;letter-spacing:-.03em}
.pulse-ring{width:64px;height:64px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:conic-gradient(var(--teal) var(--pulse),var(--track) 0);box-shadow:0 0 0 1px var(--line) inset}
.pulse-ring span{width:49px;height:49px;border-radius:999px;background:var(--sheet);display:flex;align-items:center;justify-content:center;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:16px;font-weight:950;color:var(--text)}
.smart-row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
.smart-row:last-child{border-bottom:none}
.smart-dot{width:8px;height:8px;border-radius:999px;flex:0 0 auto;margin-top:4px}
.action-strip{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:9px;margin:0 0 14px}
.action-strip .btn{padding:13px 0;font-size:13.5px}
.afford-result{border:1px solid var(--line);background:var(--inset);border-radius:16px;padding:14px;margin-top:12px}
@media(max-width:520px){.action-strip{grid-template-columns:1fr 1fr}.action-strip .primary-wide{grid-column:1/-1}.focus-grid{grid-template-columns:1fr 1fr}}

<body>
<div id="app"></div>
<div id="modal"></div>
<input type="file" id="fileInput" accept=".json,application/json" style="display:none">

<script>
// ================= data =================
const KEY="budget-app-v1";
const fmt=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n);
const fmtC=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(n);
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
let uid=0; const nid=()=>"i"+Date.now()+"-"+(uid++);
const ordinal=n=>{n=parseInt(n)||0;const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);};

function templateMonth(){
  const it=(name,planned,rec)=>({id:nid(),name,planned:planned||0,actual:0,txns:[],recurring:!!rec});
  return {
    income:[{id:nid(),name:"Take-home pay",amount:0}],
    savings:[{id:nid(),name:"Savings",amount:0}],
    groups:[
      {id:nid(),name:"Housing",items:[it("Rent / Mortgage",0,true)]},
      {id:nid(),name:"Utilities",items:[it("Electric",0,true),it("Water",0,true),it("Internet",0,true)]},
      {id:nid(),name:"Food",items:[it("Groceries",0),it("Restaurants",0)]},
      {id:nid(),name:"Transportation",items:[it("Car payment",0,true),it("Insurance",0,true),it("Gas / Fuel",0)]},
      {id:nid(),name:"Subscriptions",items:[it("Streaming",0,true)]},
      {id:nid(),name:"Health",items:[it("Gym",0,true)]},
      {id:nid(),name:"Other",items:[]},
    ],
  };
}

function blankMonth(){
  return {
    income:[{id:nid(),name:"Take-home pay",amount:0}],
    savings:[{id:nid(),name:"Savings",amount:0}],
    groups:[{id:nid(),name:G_FIXED,items:[]},{id:nid(),name:G_FLEX,items:[]},{id:nid(),name:G_OTHER,items:[]}],
  };
}

const CURRENT_SCHEMA=3;
function defaultSettings(){
  return {onboardingCompleted:false,paycheckMode:false,budgetMode:"monthly",billsView:"upcoming",payFrequency:"biweekly",nextPayday:"",payAmount:0,monthlyIncome:0,savingsGoal:0,customDays:14,weeklyLimit:0,txnSearch:""};
}
let S={schemaVersion:CURRENT_SCHEMA,months:{},bills:[],debts:[],paychecks:[],moveHistory:[],settings:defaultSettings(),lastBackup:null,theme:"dark",lastLog:null};
let mk=new Date().toISOString().slice(0,7); // selected month "YYYY-MM"
let tab="dashboard";

// merge a stored/backup object into live state without dropping known keys
function adoptState(d){
  if(!d||typeof d!=="object")return;
  if(d.months)S.months=d.months;
  if(Array.isArray(d.bills))S.bills=d.bills;
  if(Array.isArray(d.debts))S.debts=d.debts;
  if(Array.isArray(d.paychecks))S.paychecks=d.paychecks;
  if(Array.isArray(d.moveHistory))S.moveHistory=d.moveHistory;
  if(d.settings&&typeof d.settings==="object")S.settings={...defaultSettings(),...d.settings};
  if(d.lastBackup!==undefined)S.lastBackup=d.lastBackup;
  if(d.theme)S.theme=d.theme;
  if(d.lastLog)S.lastLog=d.lastLog;
  if(typeof d.schemaVersion==="number")S.schemaVersion=d.schemaVersion;
}

function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw)adoptState(JSON.parse(raw));
  }catch(e){}
  applyTheme();
  migrate();
}
function applyTheme(){
  document.documentElement.setAttribute("data-theme",S.theme||"dark");
  const mc=document.querySelector('meta[name="theme-color"]');
  if(mc)mc.setAttribute("content",S.theme==="light"?"#F2F5F6":"#0B0E10");
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
// ---- spend buckets: recurring => Fixed Bills, flexible => Flexible Spending, fallback => Other ----
const G_FIXED="Fixed Bills", G_FLEX="Flexible Spending", G_OTHER="Other";
const FIXED_HINTS=["rent","mortgage","car payment","car insurance","insurance","phone","internet","utilit","electric","water","subscription","loan","streaming","cable","gym","membership"];
function looksFixed(name){const n=(name||"").toLowerCase();return FIXED_HINTS.some(h=>n.includes(h));}
function itemBucket(i){
  if(i.recurring||(i.dueDay>0))return G_FIXED;
  if(i.bucket===G_OTHER)return G_OTHER;
  return G_FLEX;
}
// reorganize a month's spend into the three canonical buckets (idempotent)
function normalizeBuckets(m){
  if(!m||!m.groups)return;
  const all=[];
  m.groups.forEach(g=>g.items.forEach(i=>{
    // remember items the user had explicitly parked in "Other"
    if(g.name===G_OTHER && !i.recurring && !(i.dueDay>0) && !i.bucket) i.bucket=G_OTHER;
    all.push(i);
  }));
  const keep=name=>{const g=m.groups.find(x=>x.name===name);return {id:(g&&g.id)||nid(),name,items:[]};};
  const fixed=keep(G_FIXED), flex=keep(G_FLEX), other=keep(G_OTHER);
  all.forEach(i=>{const b=itemBucket(i);(b===G_FIXED?fixed:b===G_OTHER?other:flex).items.push(i);});
  m.groups=[fixed,flex,other];
}
// add an item into whichever bucket it belongs to (creating the bucket if needed)
function placeItem(m,item){
  const target=itemBucket(item);
  let g=m.groups.find(x=>x.name===target);
  if(!g){g={id:nid(),name:target,items:[]};m.groups.push(g);}
  g.items.push(item);
}
function commit(){const m=M();if(m){normalizeBuckets(m);syncBillsFromBudget(m);}save();render();}

const M=()=>S.months[mk]||null;

// keep an item's cached spent total in sync with its transaction list
function recalcItem(i){i.actual=(i.txns||[]).reduce((s,x)=>s+(parseFloat(x.amount)||0),0);}

function normName(s){return String(s||"").trim().toLowerCase();}
function getFixedGroup(m){
  if(!m)return null;
  normalizeBuckets(m);
  let g=m.groups.find(x=>x.name===G_FIXED);
  if(!g){g={id:nid(),name:G_FIXED,items:[]};m.groups.unshift(g);}
  return g;
}
function findBillByItem(i){
  if(!i)return null;
  if(i.billId){const b=(S.bills||[]).find(x=>x.id===i.billId);if(b)return b;}
  return (S.bills||[]).find(b=>normName(b.name)===normName(i.name) && (!i.dueDay||!b.dueDay||parseInt(b.dueDay)===parseInt(i.dueDay)));
}
function syncBillsFromBudget(m){
  if(!m||!m.groups)return;
  S.bills=S.bills||[];
  normalizeBuckets(m);
  const fg=m.groups.find(g=>g.name===G_FIXED);
  if(!fg)return;
  fg.items.forEach(i=>{
    if(!i.recurring && !(i.dueDay>0))return;
    let b=findBillByItem(i);
    if(!b){
      b={id:nid(),name:i.name,amount:i.planned||0,dueDay:i.dueDay||1,category:G_FIXED,recurring:true,notes:"",paid:{}};
      S.bills.push(b);
    }
    i.billId=b.id;
    if(!b.paid||typeof b.paid!=="object")b.paid={};
    if(!b.amount && i.planned)b.amount=i.planned;
    if(!b.dueDay && i.dueDay)b.dueDay=i.dueDay;
  });
}
function syncBillToBudget(b,monthKey){
  const m=S.months[monthKey||mk]; if(!m||!b)return;
  const fg=getFixedGroup(m);
  let i=fg.items.find(x=>x.billId===b.id) || fg.items.find(x=>normName(x.name)===normName(b.name));
  if(!i){
    i={id:nid(),billId:b.id,name:b.name,planned:b.amount||0,actual:0,txns:[],recurring:true,dueDay:b.dueDay||1};
    fg.items.push(i);
  }else{
    i.billId=b.id;i.name=b.name;i.planned=b.amount||0;i.recurring=true;i.dueDay=b.dueDay||1;
    if(!Array.isArray(i.txns))i.txns=[];
    recalcItem(i);
  }
}
function removeBillFromBudget(id){
  Object.values(S.months).forEach(m=>m&&m.groups&&m.groups.forEach(g=>g.items.forEach(i=>{if(i.billId===id)i.billId=undefined;})));
}
function findFixedItemForBill(b,monthKey){
  const m=S.months[monthKey||mk]; if(!m||!b)return null;
  const fg=getFixedGroup(m);
  return fg.items.find(i=>i.billId===b.id) || fg.items.find(i=>normName(i.name)===normName(b.name));
}
function addBillPaymentToBudget(b,dateStr,amount){
  const key=(dateStr||new Date().toISOString().slice(0,10)).slice(0,7);
  if(!S.months[key]){const src=latestBefore(key);S.months[key]=src?cloneForward(src):blankMonth();}
  syncBillToBudget(b,key);
  const i=findFixedItemForBill(b,key); if(!i)return;
  i.txns=i.txns||[];
  if(i.txns.some(x=>x.billId===b.id && (x.date||"").slice(0,7)===key))return;
  i.txns.push({id:nid(),date:dateStr||new Date().toISOString().slice(0,10),amount:amount||b.amount||0,note:"Bill payment",type:"bill",billId:b.id});
  recalcItem(i);
}
function removeBillPaymentFromBudget(b,monthKey){
  const i=findFixedItemForBill(b,monthKey||mk); if(!i)return;
  i.txns=(i.txns||[]).filter(x=>x.billId!==b.id);
  recalcItem(i);
}

// upgrade older data: turn a bare "actual" number into a transaction list, seed v2 keys
function migrate(){
  // schema v1 groundwork: ensure every item has a txn list
  Object.keys(S.months).forEach(k=>{
    const m=S.months[k];if(!m||!m.groups)return;
    m.groups.forEach(g=>g.items.forEach(i=>{
      if(!Array.isArray(i.txns)){
        i.txns=(i.actual>0)?[{id:nid(),date:k+"-01",amount:i.actual,note:"opening balance"}]:[];
      }
      recalcItem(i);
    }));
    normalizeBuckets(m); // organize into Fixed Bills / Flexible Spending / Other
  });
  Object.keys(S.months).forEach(k=>syncBillsFromBudget(S.months[k]));
  // schema v2: first-class bills/debts + settings (paycheck, onboarding)
  if(!Array.isArray(S.bills))S.bills=[];
  if(!Array.isArray(S.debts))S.debts=[];
  if(!Array.isArray(S.paychecks))S.paychecks=[];
  if(!Array.isArray(S.moveHistory))S.moveHistory=[];
  S.settings=(S.settings&&typeof S.settings==="object")?{...defaultSettings(),...S.settings}:defaultSettings();
  S.bills.forEach(b=>{if(!b.paid||typeof b.paid!=="object")b.paid={};});
  S.debts.forEach(d=>{if(d.strategy===undefined)d.strategy="snowball";if(d.extraPayment===undefined)d.extraPayment=0;});
  // anyone who already has budget data is an existing user — never show them onboarding
  if(Object.keys(S.months).length>0)S.settings.onboardingCompleted=true;
  S.schemaVersion=CURRENT_SCHEMA;
}

// most recent month at or before key k that actually has data
function latestBefore(k){
  const keys=Object.keys(S.months).filter(x=>x<k).sort();
  return keys.length?keys[keys.length-1]:null;
}
// deep-clone a month's PLAN forward: fresh ids, actuals zeroed, spent-history cleared
function cloneForward(srcKey){
  const src=S.months[srcKey];
  const copy=JSON.parse(JSON.stringify(src));
  copy.income.forEach(i=>i.id=nid());
  copy.savings.forEach(i=>i.id=nid());
  copy.groups.forEach(g=>{g.id=nid();g.items.forEach(i=>{i.id=nid();i.actual=0;i.txns=[];});});
  return copy;
}
function monthName(k){const[y,m]=k.split("-").map(Number);return new Date(y,m-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});}
function monthShort(k){const[y,m]=k.split("-").map(Number);return new Date(y,m-1,1).toLocaleDateString("en-US",{month:"short"});}
function shiftMonth(k,n){const[y,m]=k.split("-").map(Number);const d=new Date(y,m-1+n,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}

function totals(m){
  if(!m)return{income:0,savings:0,planned:0,actual:0,remaining:0,rate:0};
  const income=m.income.reduce((s,i)=>s+(i.amount||0),0);
  const savings=m.savings.reduce((s,i)=>s+(i.amount||0),0);
  const planned=m.groups.reduce((s,g)=>s+g.items.reduce((a,i)=>a+(i.planned||0),0),0);
  const actual=m.groups.reduce((s,g)=>s+g.items.reduce((a,i)=>a+(i.actual||0),0),0);
  return{income,savings,planned,actual,remaining:income-savings-planned,rate:income>0?savings/income*100:0};
}

// true if a month is freshly started with nothing entered yet (safe to discard)
function monthUntouched(m){
  if(!m)return true;
  const t=totals(m);
  const txns=m.groups.reduce((s,g)=>s+g.items.reduce((a,i)=>a+((i.txns||[]).length),0),0);
  return t.income===0&&t.savings===0&&t.planned===0&&t.actual===0&&txns===0;
}

// ================= ui helpers =================
function toast(msg,color,action){
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const t=document.createElement("div");t.className="toast";t.style.border="1px solid "+(color||"var(--teal)");
  if(action){
    t.style.display="flex";t.style.alignItems="center";
    const span=document.createElement("span");span.textContent=msg;t.appendChild(span);
    const b=document.createElement("button");b.textContent=action.label;
    b.style.cssText="margin-left:16px;background:none;border:none;color:var(--teal);font-weight:800;font-size:13.5px;font-family:inherit;cursor:pointer;text-decoration:underline;flex-shrink:0";
    b.onclick=()=>{t.remove();action.fn();};
    t.appendChild(b);
  }else{
    t.textContent=msg;
  }
  document.body.appendChild(t);setTimeout(()=>t.remove(),action?7000:3500);
}

let _kbL=null;
function _kbSync(){
  const mbg=document.getElementById("mbg");if(!mbg||!window.visualViewport)return;
  const kb=Math.max(0,window.innerHeight-window.visualViewport.height-window.visualViewport.offsetTop);
  mbg.style.paddingBottom=kb+"px";
  const sh=mbg.querySelector(".sheet");if(sh)sh.style.maxHeight=(window.visualViewport.height-24)+"px";
}
function closeModal(){
  if(_kbL&&window.visualViewport){window.visualViewport.removeEventListener("resize",_kbL);window.visualViewport.removeEventListener("scroll",_kbL);_kbL=null;}
  document.getElementById("modal").innerHTML="";
}
function sheet(title,body){
  document.getElementById("modal").innerHTML=
    '<div class="modal-bg" id="mbg"><div class="sheet" onclick="event.stopPropagation()">'
    +'<div class="handle"></div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><h3 style="margin:0">'+title+'</h3>'
    +'<button id="mclose" style="background:var(--inset);border:none;color:var(--dim);padding:7px;border-radius:99px;display:flex">'+I.x+'</button></div>'
    +body+'</div></div>';
  document.getElementById("mbg").onclick=e=>{if(e.target.id==="mbg")closeModal();};
  document.getElementById("mclose").onclick=closeModal;
  if(window.visualViewport){_kbL=_kbSync;window.visualViewport.addEventListener("resize",_kbL);window.visualViewport.addEventListener("scroll",_kbL);}
}
function fieldHTML(id,label,val,type,ph,hint){
  let v=val??"";
  if(type==="number"&&(v===0||v==="0"))v="";
  const onf=(type==="number")?' onfocus="this.select()"':'';
  return '<label class="field"><span>'+label+'</span><input id="'+id+'" type="'+(type||"text")+'" '+(type==="number"?'inputmode="decimal" ':'')+'value="'+esc(v)+'" placeholder="'+(ph||"")+'"'+onf+'>'+(hint?'<span style="font-size:11px;margin-top:4px;margin-bottom:0;color:var(--dim);display:block">'+hint+'</span>':'')+'</label>';
}

function openMonthPicker(){
  const MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  let py=Number(mk.slice(0,4));

    return '<div id="mpBody">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
      +'<button id="mpPrev" style="background:var(--inset);border:1px solid var(--line);color:var(--dim);border-radius:99px;width:36px;height:36px;display:flex;align-items:center;justify-content:center">'+I.left+'</button>'
      +'<div style="font-weight:800;font-size:19px" class="mono">'+py+'</div>'
      +'<button id="mpNext" style="background:var(--inset);border:1px solid var(--line);color:var(--dim);border-radius:99px;width:36px;height:36px;display:flex;align-items:center;justify-content:center">'+I.right+'</button></div>'
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px">'

    document.getElementById("mpPrev").onclick=()=>{py--;refresh();};

  }
  function refresh(){document.getElementById("mpBody").outerHTML=body();wire();}
  sheet("Jump to month",body());
  wire();
}

function render(){
  const m=M(), t=totals(m);
  const noData=Object.keys(S.months).length===0;
  let html=headerHTML(t,m);
  html+='<div class="wrap fade-up">';
  if(noData) html+=welcomeHTML();
  else if(tab==="dashboard") html+=dashboardHTML(m,t);
  else if(tab==="budget") html+=m?budgetHTML(m,t):emptyMonthHTML();
  else if(tab==="track") html+=m?trackHTML(m,t):emptyMonthHTML();
  else if(tab==="bills") html+=billsHTML();
  else if(tab==="more") html+=moreHTML();
  else if(tab==="debt") html+=debtsHTML();
  else if(tab==="weekly") html+=weeklyReviewHTML();
  else if(tab==="year") html+=yearHTML();
  else html+=dashboardHTML(m,t);
  html+='</div>';
  if(!noData){
    const on=x=>tab===x?"on":"";
    const moreActive=["more","debt","weekly","year"].includes(tab);
    html+='<div class="nav"><div class="nav-inner">'
    +'<button data-tab="dashboard" class="'+on("dashboard")+'">'+I.home+(tab==="dashboard"?'<span>Home</span>':'')+'</button>'
    +'<button data-tab="budget" class="'+on("budget")+'">'+I.wallet+(tab==="budget"?'<span>Budget</span>':'')+'</button>'
    +'<button data-tab="track" class="'+on("track")+'">'+I.list+(tab==="track"?'<span>Spend</span>':'')+'</button>'
    +'<button data-tab="bills" class="'+on("bills")+'">'+I.receipt+(tab==="bills"?'<span>Bills</span>':'')+'</button>'
    +'<button data-tab="more" class="'+(moreActive?"on":"")+'">'+I.grid+(moreActive?'<span>More</span>':'')+'</button>'
    +'</div></div>';
  }
  document.getElementById("app").innerHTML=html;
  bind();
  animateHero();
}

// ================= onboarding (first-time setup) =================
let OB=null;
const OB_BILLS=[{name:"Rent / Mortgage",day:1},{name:"Car payment",day:5},{name:"Car insurance",day:10},{name:"Phone",day:15},{name:"Internet",day:20},{name:"Electric",day:25}];
const OB_CATS=["Groceries","Gas","Eating out","Fun","Clothes","Household","Kids","Health"];

function startOnboarding(){
  OB={step:1,income:"",freq:"biweekly",payday:"",pay:"",bills:[],cats:["Groceries","Gas","Eating out","Fun"],goal:""};
  obRender();
}
function obNav(back,lastLabel,hideSkip){
  return '<div style="display:flex;gap:10px;margin-top:20px">'
    +(back?'<button id="obBack" class="btn btn-ghost" style="flex:0 0 auto;width:auto;padding:14px 22px;color:var(--text)">Back</button>':'')
    +'<button id="obNext" class="btn btn-teal" style="flex:1 1 auto;width:auto;min-width:0">'+(lastLabel||"Next")+'</button></div>'
    +(hideSkip?'':'<button id="obSkip" class="btn btn-ghost" style="color:var(--dim);margin-top:10px;font-size:13px">Skip setup</button>');
}
function obIncome(){
  return '<div class="ob-sub">Start with your income. About how much money comes in each month, after taxes?</div>'
    +fieldHTML("obIncome","Monthly take-home income",OB.income,"number","e.g. 3200","A rough number is fine \u2014 you can change it later.")
    +obNav(false);
}
function obPay(){
  const opts=[["weekly","Weekly"],["biweekly","Every 2 weeks"],["semimonthly","Twice a month"],["monthly","Monthly"],["custom","Custom"]];
  const chips=opts.map(o=>'<button data-obfreq="'+o[0]+'" class="ob-chip'+(OB.freq===o[0]?" on":"")+'">'+o[1]+'</button>').join("");
  return '<div class="ob-sub">This helps Allotted show what you can spend until your next payday. You can skip this for now.</div>'
    +'<div class="ob-chips" style="margin-bottom:16px">'+chips+'</div>'
    +fieldHTML("obPayday","Next payday",OB.payday,"date","")
    +fieldHTML("obPay","Amount per paycheck (optional)",OB.pay,"number","e.g. 1600")
    +'<button id="obSkipStep" class="btn btn-ghost" style="color:var(--teal);border:1px solid var(--tealb);margin-top:2px;margin-bottom:2px">Skip \u2014 I don\u2019t need paycheck planning</button>'
    +obNav(true,"Next",true);
}
function obBills(){
  const have=OB.bills.map(b=>(b.name||"").toLowerCase());
  const sugg=OB_BILLS.filter(b=>!have.includes(b.name.toLowerCase()))
    .map(b=>'<button data-obaddbill="'+esc(b.name)+'|'+b.day+'" class="ob-chip">+ '+esc(b.name)+'</button>').join("");
  const rows=OB.bills.map((b,i)=>
    '<div class="ob-billrow">'
    +'<input id="obBn'+i+'" value="'+esc(b.name||"")+'" placeholder="Bill name" class="ob-in" style="flex:2;min-width:0">'
    +'<input id="obBa'+i+'" value="'+esc(b.amount||"")+'" inputmode="decimal" placeholder="$" class="ob-in" style="flex:1;min-width:0">'
    +'<input id="obBd'+i+'" value="'+esc(b.day||"")+'" inputmode="numeric" placeholder="Day" class="ob-in" style="width:52px;flex:0 0 auto">'
    +'<button data-obdelbill="'+i+'" class="ob-del">'+I.x+'</button></div>').join("");
  return '<div class="ob-sub">Add bills you know are coming \u2014 rent, car payment, phone, subscriptions. Tap one below to add it, then set the amount and due day.</div>'
    +(OB.bills.length?'<div class="label" style="margin-bottom:8px">Added \u00b7 '+OB.bills.length+'</div>'+rows+'<div style="height:14px"></div>':'')
    +(sugg?'<div style="font-size:12px;color:var(--dim);margin-bottom:8px">'+(OB.bills.length?'Add more:':'Tap to add:')+'</div><div class="ob-chips" style="margin-bottom:14px">'+sugg+'</div>':'')
    +'<button id="obAddBill" class="addline" style="margin-top:2px">'+I.plus+' Add a custom bill</button>'
    +obNav(true);
}
function obCats(){
  const chips=OB_CATS.map(c=>'<button data-obcat="'+esc(c)+'" class="ob-chip'+(OB.cats.includes(c)?" on":"")+'">'+esc(c)+'</button>').join("");
  const custom=OB.cats.filter(c=>!OB_CATS.includes(c)).map(c=>'<button data-obcat="'+esc(c)+'" class="ob-chip on">'+esc(c)+' &times;</button>').join("");
  return '<div class="ob-sub">Add spending categories like groceries, gas, food, clothes, or fun. Tap to add or remove.</div>'
    +'<div class="ob-chips" style="margin-bottom:12px">'+chips+custom+'</div>'
    +'<div style="display:flex;gap:8px"><input id="obNewCat" placeholder="Add your own" class="ob-in" style="flex:1;min-width:0"><button id="obAddCat" class="btn btn-ghost" style="width:auto;flex:0 0 auto;padding:11px 18px;color:var(--text)">Add</button></div>'
    +obNav(true);
}
function freqLabel(f){return {weekly:"Weekly",biweekly:"Every 2 weeks",semimonthly:"Twice a month",monthly:"Monthly",custom:"Custom"}[f]||"Every 2 weeks";}
function obReview(){
  const income=parseFloat(OB.income)||0;
  const bills=OB.bills.filter(b=>b.name&&b.name.trim());
  const billSum=bills.reduce((s,b)=>s+(parseFloat(b.amount)||0),0);
  const cats=OB.cats.filter(c=>c&&c.trim());
  const sumRow=(label,val,c)=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)"><span style="color:var(--dim);font-size:13px">'+label+'</span><span style="font-weight:700;font-size:13.5px;color:'+(c||"var(--text)")+'">'+val+'</span></div>';
  return '<div class="ob-sub">Here\u2019s what Allotted will set up. You can change anything later.</div>'
    +'<div style="margin-bottom:18px">'
    +sumRow("Monthly income",income?fmt(income):"\u2014",income?"var(--teal)":"var(--dim)")
    +sumRow("Paycheck planning",OB.payday?("On \u00b7 "+freqLabel(OB.freq)):"Off")
    +sumRow("Bills",bills.length?(bills.length+" \u00b7 "+fmt(billSum)+"/mo"):"None yet")
    +sumRow("Spending categories",cats.length?cats.join(", "):"Just \u201cOther\u201d")
    +'</div>'
    +fieldHTML("obGoal","Monthly savings goal (optional)",OB.goal,"number","e.g. 200","")
    +obNav(true,"Done \u2014 build my budget");
}
function obRender(){
  const titles=["Add your monthly income","Want paycheck planning?","Add your bills","Choose spending categories","Review your setup"];
  const top='<div style="text-align:center;margin-bottom:16px">'
    +'<div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);font-weight:700;margin-bottom:10px">Step '+OB.step+' of 5</div>'
    +'<div style="display:flex;gap:6px;justify-content:center">'
    +[1,2,3,4,5].map(i=>'<span style="width:7px;height:7px;border-radius:99px;background:'+(i<=OB.step?'var(--teal)':'var(--line)')+'"></span>').join("")
    +'</div></div>';
  let body="";
  if(OB.step===1)body=obIncome();
  else if(OB.step===2)body=obPay();
  else if(OB.step===3)body=obBills();
  else if(OB.step===4)body=obCats();
  else body=obReview();
  sheet(titles[OB.step-1],top+body);
  obWire();
}
// pull the current step's inputs into OB before any navigation/re-render
function obReadStep(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:undefined;};
  if(OB.step===1){const v=g("obIncome");if(v!==undefined)OB.income=v;}
  else if(OB.step===2){const a=g("obPayday");if(a!==undefined)OB.payday=a;const b=g("obPay");if(b!==undefined)OB.pay=b;}
  else if(OB.step===3){OB.bills.forEach((bl,i)=>{const n=g("obBn"+i),am=g("obBa"+i),dy=g("obBd"+i);if(n!==undefined)bl.name=n;if(am!==undefined)bl.amount=am;if(dy!==undefined)bl.day=dy;});}
  else if(OB.step===5){const v=g("obGoal");if(v!==undefined)OB.goal=v;}
}
function obNext(){obReadStep();if(OB.step<5){OB.step++;obRender();}else obFinish();}
function obBack(){obReadStep();if(OB.step>1){OB.step--;obRender();}}
function obSkip(){closeModal();OB=null;S.months[mk]=blankMonth();S.settings.onboardingCompleted=true;tab="dashboard";commit();}
function obWire(){
  const nx=document.getElementById("obNext");if(nx)nx.onclick=obNext;
  const bk=document.getElementById("obBack");if(bk)bk.onclick=obBack;
  const sk=document.getElementById("obSkip");if(sk)sk.onclick=obSkip;
  const sks=document.getElementById("obSkipStep");if(sks)sks.onclick=()=>{OB.payday="";OB.pay="";obNext();};
  document.querySelectorAll("[data-obfreq]").forEach(b=>b.onclick=()=>{obReadStep();OB.freq=b.dataset.obfreq;obRender();});
  document.querySelectorAll("[data-obaddbill]").forEach(b=>b.onclick=()=>{obReadStep();const p=b.dataset.obaddbill.split("|");OB.bills.push({name:p[0],amount:"",day:parseInt(p[1])||1});obRender();});
  const ab=document.getElementById("obAddBill");if(ab)ab.onclick=()=>{obReadStep();OB.bills.push({name:"",amount:"",day:""});obRender();};
  document.querySelectorAll("[data-obdelbill]").forEach(b=>b.onclick=()=>{obReadStep();OB.bills.splice(parseInt(b.dataset.obdelbill),1);obRender();});
  document.querySelectorAll("[data-obcat]").forEach(b=>b.onclick=()=>{const c=b.dataset.obcat;OB.cats=OB.cats.includes(c)?OB.cats.filter(x=>x!==c):OB.cats.concat(c);obRender();});
  const ac=document.getElementById("obAddCat");if(ac)ac.onclick=()=>{const e=document.getElementById("obNewCat");const v=(e?e.value:"").trim();if(v&&!OB.cats.includes(v))OB.cats.push(v);obRender();};
}
function obFinish(){
  obReadStep();
  const income=parseFloat(OB.income)||0, goal=parseFloat(OB.goal)||0;
  const cleanBills=OB.bills.filter(b=>b.name&&b.name.trim());
  // build the first month from the answers
  const month={
    income:[{id:nid(),name:"Take-home pay",amount:income}],
    savings:[{id:nid(),name:"Savings",amount:goal}],
    groups:[]
  };
  // selected spending categories are flexible -> Flexible Spending; Fixed Bills starts empty
  const catItems=OB.cats.filter(c=>c&&c.trim()).map(c=>({id:nid(),name:c.trim(),planned:0,actual:0,txns:[],recurring:false}));
  month.groups.push({id:nid(),name:G_FIXED,items:[]});
  month.groups.push({id:nid(),name:G_FLEX,items:catItems});
  month.groups.push({id:nid(),name:G_OTHER,items:[]});
  S.months[mk]=month;
  // bills live in the first-class Bills list only (not duplicated as budget envelopes)
  S.bills=cleanBills.map(b=>({id:nid(),name:b.name.trim(),amount:parseFloat(b.amount)||0,dueDay:Math.min(31,Math.max(1,parseInt(b.day)||1)),category:"",recurring:true,notes:"",paid:{}}));
  // settings
  S.settings.onboardingCompleted=true;
  S.settings.monthlyIncome=income;
  S.settings.savingsGoal=goal;
  S.settings.payFrequency=OB.freq||"biweekly";
  S.settings.nextPayday=OB.payday||"";
  S.settings.payAmount=parseFloat(OB.pay)||0;
  closeModal();OB=null;tab="dashboard";commit();
  toast("Done \u2014 your first budget is ready");
}

let heroState={key:null,val:null};
function animateHero(){
  const el=document.getElementById("heroNum");
  if(!el){heroState={key:null,val:null};return;}
  const to=parseFloat(el.dataset.to), key=el.dataset.key;
  const reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  if(reduce||heroState.key!==key||heroState.val===null||isNaN(to)){
    heroState={key,val:isNaN(to)?0:to};return; // new view or reduced motion → no count
  }
  if(Math.abs(heroState.val-to)<0.5){heroState.val=to;return;}
  const from=heroState.val, start=performance.now(), dur=460;
  heroState.val=to;
  const step=now=>{
    let p=Math.min((now-start)/dur,1); p=1-Math.pow(1-p,3);
    const v=from+(to-from)*p;
    if(el.dataset.to!==String(to))return; // a newer render superseded this
    el.textContent=fmt(v);
    if(p<1)requestAnimationFrame(step); else el.textContent=fmt(to);
  };
  requestAnimationFrame(step);
}

function pacingNote(){
  const now=new Date();
  const curKey=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  if(mk!==curKey)return "";
  const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  return "day "+now.getDate()+" of "+dim;
}

// "Safe to spend today": flexible (non-recurring) money left, spread over days remaining.
// Bills (recurring) are committed, so they're excluded from the daily pool.
function safeToSpend(m){
  if(!m)return null;
  const now=new Date();
  const curKey=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  if(mk!==curKey)return null; // only meaningful for the live month
  const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const daysLeft=Math.max(1,dim-now.getDate()+1);
  let pool=0,flexPlanned=0,flexSpent=0;
  m.groups.forEach(g=>g.items.forEach(i=>{
    if(itemBucket(i)!==G_FLEX)return;
    flexPlanned+=(i.planned||0);
    flexSpent+=(i.actual||0);
    pool+=(i.planned||0)-(i.actual||0);
  }));
  if(flexPlanned<=0)return null;
  return {perDay:Math.max(0,pool)/daysLeft,pool:pool,daysLeft:daysLeft,flexPlanned:flexPlanned,flexSpent:flexSpent,over:pool<-0.5};
}

function openTxn(gid,iid){
  const m=M();if(!m)return;
  const g=m.groups.find(x=>x.id===gid);const i=g&&g.items.find(x=>x.id===iid);
  if(!i)return;
  const today=new Date().toISOString().slice(0,10);
  const rem=(i.planned||0)-(i.actual||0);
  const rows=(i.txns||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(x=>
    '<div class="irow" data-txedit="'+x.id+'" style="cursor:pointer">'
    +'<div><div style="font-weight:700;font-size:13.5px" class="mono">'+fmtC(x.amount)+(x.note?' <span style="color:var(--dim);font-weight:400;font-family:inherit">· '+esc(x.note)+'</span>':'')+'</div>'
    +'<div class="mono" style="font-size:11px;color:var(--dim);margin-top:2px">'+esc(x.date||'')+'</div></div>'
    +'<span style="color:var(--dim);opacity:.5;display:flex">'+I.right+'</span></div>'
  ).join("")||'<div style="color:var(--dim);font-size:12.5px;padding:6px 0">No transactions yet this month.</div>';
  sheet("Log to "+esc(i.name),
    '<div class="mono" style="font-size:12.5px;color:'+(rem<0?"var(--red)":"var(--dim)")+';margin-bottom:14px">'+fmt(rem)+' left of '+fmt(i.planned||0)+' planned</div>'
    +'<div style="display:flex;gap:10px"><div style="flex:1.1">'+fieldHTML("t_amt","Amount ($)","","number","0")+'</div><div style="flex:1">'+fieldHTML("t_date","Date","","date")+'</div></div>'
    +fieldHTML("t_note","Note (optional)","","text","e.g. Publix")
    +'<label class="field"><span>Transaction type</span><select id="t_type" style="width:100%;background:var(--inputbg);border:1px solid var(--line);border-radius:13px;color:var(--text);padding:12px 14px;font-size:15px;outline:none"><option value="flex">Flexible spending transaction</option><option value="bill">Bill payment</option><option value="savings">Savings transfer</option><option value="income">Income adjustment</option></select></label>'
    +'<button id="tSave" class="btn btn-teal" style="margin-bottom:6px">Log transaction</button>'
    +'<div style="height:1px;background:var(--line);margin:16px 0 10px"></div>'
    +'<div class="label" style="margin-bottom:6px">'+monthName(mk)+'</div>'+rows);
  document.getElementById("t_date").value=today;
  document.getElementById("t_amt").focus();
  document.getElementById("tSave").onclick=()=>{
    const amt=parseFloat(document.getElementById("t_amt").value);
    if(isNaN(amt)||amt===0){toast("Enter an amount","var(--orange)");return;}
    i.txns=i.txns||[];
    i.txns.push({id:nid(),date:document.getElementById("t_date").value||today,amount:amt,note:document.getElementById("t_note").value||"",type:(document.getElementById("t_type")&&document.getElementById("t_type").value)||"flex"});
    recalcItem(i);const nrem=(i.planned||0)-i.actual;
    closeModal();commit();
    toast("Logged "+fmtC(amt)+" · "+fmt(nrem)+" left in "+i.name,nrem<0?"var(--orange)":"var(--teal)");
  };
  document.querySelectorAll("[data-txedit]").forEach(b=>b.onclick=()=>openTxnEdit(gid,iid,b.dataset.txedit));
}

function openTxnEdit(gid,iid,txid,back){
  const m=M();if(!m)return;
  const g=m.groups.find(x=>x.id===gid);const i=g&&g.items.find(x=>x.id===iid);
  const x=i&&(i.txns||[]).find(t=>t.id===txid);
  if(!x)return;
  const ret=back||(()=>openTxn(gid,iid));
  sheet("Edit transaction",
    '<div style="display:flex;gap:10px"><div style="flex:1.1">'+fieldHTML("x_amt","Amount ($)",x.amount,"number","0")+'</div><div style="flex:1">'+fieldHTML("x_date","Date",x.date||"","date")+'</div></div>'
    +fieldHTML("x_note","Note (optional)",x.note||"","text","e.g. Publix")
    +'<label class="field"><span>Transaction type</span><select id="x_type" style="width:100%;background:var(--inputbg);border:1px solid var(--line);border-radius:13px;color:var(--text);padding:12px 14px;font-size:15px;outline:none"><option value="flex">Flexible spending transaction</option><option value="bill">Bill payment</option><option value="savings">Savings transfer</option><option value="income">Income adjustment</option></select></label>'
    +'<button id="xSave" class="btn btn-teal" style="margin-bottom:10px">Save changes</button>'
    +'<button id="xDup" class="btn btn-ghost" style="display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:10px;color:var(--teal);border-color:var(--tealb)">'+I.repeat+' Log this again today</button>'
    +'<button id="xDel" class="btn" style="background:var(--redsoft);border:1px solid rgba(248,113,113,.3);color:var(--red);font-size:13.5px">Delete transaction</button>');
  const xt=document.getElementById("x_type");if(xt)xt.value=x.type||"flex";
  document.getElementById("xSave").onclick=()=>{
    const amt=parseFloat(document.getElementById("x_amt").value);
    if(isNaN(amt)||amt===0){toast("Enter an amount","var(--orange)");return;}
    x.amount=amt;x.date=document.getElementById("x_date").value||x.date;x.note=document.getElementById("x_note").value||"";x.type=(document.getElementById("x_type")&&document.getElementById("x_type").value)||x.type||"flex";
    recalcItem(i);commit();ret();
  };
  document.getElementById("xDup").onclick=()=>{
    i.txns=i.txns||[];
    i.txns.push({id:nid(),date:new Date().toISOString().slice(0,10),amount:x.amount,note:x.note||""});
    recalcItem(i);commit();
    toast("Logged "+fmtC(x.amount)+" again · "+esc(i.name),"var(--teal)");
    ret();
  };
  document.getElementById("xDel").onclick=()=>{
    i.txns=(i.txns||[]).filter(t=>t.id!==txid);recalcItem(i);commit();ret();
  };
}

function openGroupTxns(gid){
  const m=M();if(!m)return;
  const g=m.groups.find(x=>x.id===gid);
  if(!g)return;
  const gp=g.items.reduce((s,i)=>s+(i.planned||0),0);
  const ga=g.items.reduce((s,i)=>s+(i.actual||0),0);
  const rem=gp-ga;
  let entries=[];
  g.items.forEach(i=>(i.txns||[]).forEach(x=>entries.push({iid:i.id,item:i.name,x:x})));
  entries.sort((a,b)=>(b.x.date||"").localeCompare(a.x.date||""));
  const rows=entries.map(e=>
    '<div class="irow" data-gtxedit="'+e.iid+':'+e.x.id+'" style="cursor:pointer">'
    +'<div><div style="font-weight:700;font-size:13.5px" class="mono">'+fmtC(e.x.amount)+(e.x.note?' <span style="color:var(--dim);font-weight:400;font-family:inherit">· '+esc(e.x.note)+'</span>':'')+'</div>'
    +'<div style="font-size:11px;margin-top:2px"><span style="color:var(--teal);font-weight:600">'+esc(e.item)+'</span><span class="mono" style="color:var(--dim)"> · '+esc(e.x.date||'')+'</span></div></div>'
    +'<span style="color:var(--dim);opacity:.5;display:flex">'+I.right+'</span></div>'
  ).join("")||'<div style="color:var(--dim);font-size:12.5px;padding:6px 0">No transactions in this category yet this month.</div>';
  sheet(esc(g.name),
    '<div class="mono" style="font-size:12.5px;color:'+(rem<0?"var(--red)":"var(--dim)")+';margin-bottom:14px">'+fmt(ga)+' spent of '+fmt(gp)+' · '+fmt(rem)+' left</div>'
    +'<div class="label" style="margin-bottom:6px">'+monthName(mk)+' · '+entries.length+' transaction'+(entries.length!==1?'s':'')+'</div>'
    +rows);
  document.querySelectorAll("[data-gtxedit]").forEach(b=>b.onclick=()=>{const p=b.dataset.gtxedit.split(":");openTxnEdit(gid,p[0],p[1],()=>openGroupTxns(gid));});
}

function markPaid(gid,iid){
  const m=M();if(!m)return;
  const g=m.groups.find(x=>x.id===gid);const i=g&&g.items.find(x=>x.id===iid);
  if(!i)return;
  const due=(i.planned||0)-(i.actual||0);
  if(due<=0.5){toast(i.name+" is already at plan","var(--orange)");return;}
  i.txns=i.txns||[];
  const tx={id:nid(),date:new Date().toISOString().slice(0,10),amount:due,note:"Paid in full"};
  i.txns.push(tx);
  recalcItem(i);lastBulkPay={mk,batch:[{gid,iid,txid:tx.id}]};commit();
  toast("Paid "+fmtC(due)+" · "+esc(i.name),"var(--teal)",{label:"Undo",fn:undoBulkPay});
}

let lastBulkPay=null;
function undoBulkPay(){
  if(!lastBulkPay)return;
  const m=S.months[lastBulkPay.mk];
  if(m){lastBulkPay.batch.forEach(b=>{const g=m.groups.find(x=>x.id===b.gid);const i=g&&g.items.find(x=>x.id===b.iid);if(i){i.txns=(i.txns||[]).filter(t=>t.id!==b.txid);recalcItem(i);}});}
  lastBulkPay=null;
  commit();toast("Undone — marked unpaid again","var(--orange)");
}
function payAllRecurring(){
  const m=M();if(!m)return;
  let batch=[],sum=0;const today=new Date().toISOString().slice(0,10);
  m.groups.forEach(g=>g.items.forEach(i=>{
    const due=(i.planned||0)-(i.actual||0);
    if(i.recurring&&due>0.5){i.txns=i.txns||[];const tx={id:nid(),date:today,amount:due,note:"Paid in full"};i.txns.push(tx);recalcItem(i);batch.push({gid:g.id,iid:i.id,txid:tx.id});sum+=due;}
  }));
  if(!batch.length){toast("No recurring bills due","var(--orange)");return;}
  lastBulkPay={mk,batch};
  commit();toast("Logged "+batch.length+" bill"+(batch.length>1?'s':'')+" · "+fmtC(sum)+" paid","var(--teal)",{label:"Undo",fn:undoBulkPay});
}

function openTxnPicker(){
  const m=M();if(!m)return;
  const cats=m.groups.filter(g=>g.items.length);
  if(!cats.length){toast("Add spending categories on the Budget tab first","var(--orange)");return;}
  const today=new Date().toISOString().slice(0,10);
  const sel="width:100%;background:var(--inputbg);border:1px solid var(--line);border-radius:13px;color:var(--text);padding:12px 14px;font-size:15px;outline:none;-webkit-appearance:none;appearance:none";
  let defGid=cats.find(g=>g.name===G_FLEX)?.id||cats[0].id,defIid=null;
  if(S.lastLog){
    const lg=cats.find(g=>g.id===S.lastLog.gid);
    if(lg){defGid=lg.id;const li=lg.items.find(x=>x.id===S.lastLog.iid);if(li)defIid=li.id;}
  }
  const lineOpts=(gid,selIid)=>{const g=m.groups.find(x=>x.id===gid);return (g?g.items:[]).map((i,ii)=>'<option value="'+i.id+'"'+((selIid?i.id===selIid:ii===0)?' selected':'')+'>'+esc(i.name)+'</option>').join("");};
  const rn=recentNotes(6);
  const chipRow=rn.length?'<div class="ob-chips" id="p_chips" style="margin:-4px 0 14px">'+rn.map(x=>'<button type="button" data-pnote="'+esc(x)+'" class="ob-chip" style="padding:7px 12px;font-size:12.5px">'+esc(x)+'</button>').join("")+'</div>':'';
  sheet("Log a transaction",
    '<label class="field"><span>Category</span><select id="p_cat" style="'+sel+'">'+cats.map(g=>'<option value="'+g.id+'"'+(g.id===defGid?' selected':'')+'>'+esc(g.name)+'</option>').join("")+'</select></label>'
    +'<label class="field"><span>Line</span><select id="p_line" style="'+sel+'">'+lineOpts(defGid,defIid)+'</select></label>'
    +'<div style="display:flex;gap:10px"><div style="flex:1.1">'+fieldHTML("p_amt","Amount ($)","","number","0")+'</div><div style="flex:1">'+fieldHTML("p_date","Date","","date")+'</div></div>'
    +fieldHTML("p_note","Note (optional)","","text","e.g. Publix")
    +'<label class="field"><span>Transaction type</span><select id="p_type" style="width:100%;background:var(--inputbg);border:1px solid var(--line);border-radius:13px;color:var(--text);padding:12px 14px;font-size:15px;outline:none"><option value="flex">Flexible spending transaction</option><option value="bill">Bill payment</option><option value="savings">Savings transfer</option><option value="income">Income adjustment</option></select></label>'
    +chipRow
    +'<button id="pSave" class="btn btn-teal">Log transaction</button>');
  document.getElementById("p_date").value=today;
  document.querySelectorAll("[data-pnote]").forEach(b=>b.onclick=()=>{document.getElementById("p_note").value=b.dataset.pnote;});
  const catEl=document.getElementById("p_cat");
  catEl.onchange=()=>{document.getElementById("p_line").innerHTML=lineOpts(catEl.value,null);};
  const finishLog=(g,i,amt,note,date,type)=>{
    i.txns=i.txns||[];
    i.txns.push({id:nid(),date:date||today,amount:amt,note:note,type:type});
    recalcItem(i);const nrem=(i.planned||0)-i.actual;
    S.lastLog={gid:g.id,iid:i.id};
    closeModal();commit();
    toast("Logged "+fmtC(amt)+" · "+fmt(nrem)+" left in "+i.name,nrem<0?"var(--orange)":"var(--teal)");
  };
  document.getElementById("pSave").onclick=()=>{
    const g=m.groups.find(x=>x.id===catEl.value);
    const i=g&&g.items.find(x=>x.id===document.getElementById("p_line").value);
    if(!i){toast("Pick a line","var(--orange)");return;}
    const amt=parseFloat(document.getElementById("p_amt").value);
    if(isNaN(amt)||amt===0){toast("Enter an amount","var(--orange)");return;}
    const note=document.getElementById("p_note").value||"";
    const type=(document.getElementById("p_type")&&document.getElementById("p_type").value)||"flex";
    const date=document.getElementById("p_date").value||today;
    const match=findMatchingUnpaidBill(amt,note||i.name);
    if(match){
      sheet("Is this a bill payment?",
        '<div style="font-size:13.5px;color:var(--dim);line-height:1.55;margin-bottom:16px">This looks like <b style="color:var(--text)">'+esc(match.name)+'</b> for <span class="mono" style="color:var(--text)">'+fmtC(match.amount||0)+'</span>. Marking it as a bill keeps it out of flexible spending.</div>'
        +'<button id="billMatchYes" class="btn btn-teal" style="margin-bottom:10px">Yes, mark bill paid</button>'
        +'<button id="billMatchNo" class="btn btn-ghost" style="color:var(--text)">No, log separately</button>');
      document.getElementById("billMatchYes").onclick=()=>{markBillPaidState(match.id,date);closeModal();commit();toast("Marked "+match.name+" paid","var(--teal)");};
      document.getElementById("billMatchNo").onclick=()=>finishLog(g,i,amt,note,date,type);
      return;
    }
    finishLog(g,i,amt,note,date,type);
  };
}

function donutHTML(m){
  if(!m)return "";
  const palette=["#2DD4BF","#F59B45","#A78BFA","#60A5FA","#F472B6","#34D399","#FBBF24","#F87171","#818CF8","#22D3EE"];
  let cats=[];
  m.groups.forEach(g=>{const sp=g.items.reduce((s,i)=>s+(i.actual||0),0);if(sp>0.005)cats.push({name:g.name,spent:sp});});
  cats.sort((a,b)=>b.spent-a.spent);
  const total=cats.reduce((s,c)=>s+c.spent,0);
  if(total<=0||!cats.length)return "";
  let off=0,segs="",legend="";
  cats.forEach((c,idx)=>{
    const col=palette[idx%palette.length];
    const pct=c.spent/total*100;
    segs+='<circle cx="18" cy="18" r="15.915" fill="none" stroke="'+col+'" stroke-width="4.2" stroke-dasharray="'+pct.toFixed(2)+' '+(100-pct).toFixed(2)+'" stroke-dashoffset="'+(-off).toFixed(2)+'" transform="rotate(-90 18 18)"/>';
    off+=pct;
    legend+='<div style="display:flex;align-items:center;justify-content:space-between;font-size:12.5px;padding:3.5px 0">'
      +'<span style="display:flex;align-items:center;gap:7px;min-width:0"><span style="width:9px;height:9px;border-radius:2px;background:'+col+';flex-shrink:0"></span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(c.name)+'</span></span>'
      +'<span class="mono" style="color:var(--dim);flex-shrink:0;margin-left:10px">'+fmt(c.spent)+' · '+pct.toFixed(0)+'%</span></div>';
  });
  return '<div class="card" style="margin-top:14px"><div class="label" style="margin-bottom:14px">'+monthName(mk)+' spending by category</div>'
    +'<div style="display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap">'
    +'<div style="position:relative;width:130px;height:130px;flex-shrink:0">'
    +'<svg viewBox="0 0 36 36" width="130" height="130">'+segs+'</svg>'
    +'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none">'
    +'<div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em">Spent</div>'
    +'<div class="mono" style="font-size:17px;font-weight:800">'+fmt(total)+'</div></div></div>'
    +'<div style="flex:1 1 200px;max-width:300px;min-width:170px">'+legend+'</div>'
    +'</div></div>';
}

function yearHTML(){
  const year=mk.slice(0,4);
  let h='<div class="narrow">'+moreBackBtn("Year view")+'<div class="label" style="margin-bottom:12px">'+year+' at a glance</div>';
  const keys=[];for(let i=1;i<=12;i++)keys.push(year+"-"+String(i).padStart(2,"0"));
  const maxInc=Math.max(...keys.map(k=>totals(S.months[k]).income),1);
  let yInc=0,ySav=0,ySpent=0;
  h+='<div class="card">';
  keys.forEach(k=>{
    const m=S.months[k];const t=totals(m);
    yInc+=t.income;ySav+=t.savings;ySpent+=t.actual;
    const cur=k===mk;
    h+='<div data-goto="'+k+'" style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer'+(cur?';background:var(--tealsoft);margin:0 -10px;padding-left:10px;padding-right:10px;border-radius:10px':'')+'">'
      +'<div style="width:36px;font-size:12.5px;font-weight:700;color:'+(cur?"var(--teal)":m?"var(--text)":"var(--dim)")+'">'+monthShort(k)+'</div>'
      +'<div style="flex:1;height:8px;background:var(--track);border-radius:99px;overflow:hidden;position:relative">'
      +(m?'<div style="position:absolute;left:0;top:0;bottom:0;width:'+(t.income/maxInc*100)+'%;background:var(--cardb);border-radius:99px"></div>'
        +'<div style="position:absolute;left:0;top:0;bottom:0;width:'+(Math.min(t.actual,t.income)/maxInc*100)+'%;background:var(--orange);border-radius:99px;opacity:.85"></div>'
        +'<div style="position:absolute;left:0;top:0;bottom:0;width:'+(Math.min(t.savings,t.income)/maxInc*100)+'%;background:var(--teal);border-radius:99px"></div>':'')
      +'</div>'
      +'<div class="mono" style="width:120px;text-align:right;font-size:11.5px;color:var(--dim)">'+(m?fmt(t.actual)+' / '+fmt(t.income):'—')+'</div></div>';
  });
  h+='<div style="display:flex;gap:14px;margin-top:12px;font-size:11px;color:var(--dim)">'
    +'<span><span style="display:inline-block;width:8px;height:8px;background:var(--teal);border-radius:2px;margin-right:5px"></span>saved</span>'
    +'<span><span style="display:inline-block;width:8px;height:8px;background:var(--orange);border-radius:2px;margin-right:5px"></span>spent (actual)</span>'
    +'<span><span style="display:inline-block;width:8px;height:8px;background:var(--cardb);border-radius:2px;margin-right:5px"></span>income</span></div>'
    +'</div>';
  h+='<div style="display:flex;gap:10px;flex-wrap:wrap">'
    +'<div class="card" style="flex:1;min-width:128;padding:14px 16px;margin-bottom:0"><div style="color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:600">Income YTD</div><div class="mono" style="font-size:19px;font-weight:700">'+fmt(yInc)+'</div></div>'
    +'<div class="card" style="flex:1;min-width:128;padding:14px 16px;margin-bottom:0"><div style="color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:600">Spent YTD</div><div class="mono" style="font-size:19px;font-weight:700;color:var(--orange)">'+fmt(ySpent)+'</div></div>'
    +'<div class="card" style="flex:1;min-width:128;padding:14px 16px;margin-bottom:0"><div style="color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:600">Saved YTD</div><div class="mono" style="font-size:19px;font-weight:700;color:var(--teal)">'+fmt(ySav)+'</div></div>'
    +'</div>';
  h+=donutHTML(M());
  h+='</div>';
  return h;
}

// ================= modals =================
function openEditEntry(kind,gid,iid){
  const m=M();if(!m)return;
  let item,isSpend=false;
  if(kind==="income")item=m.income.find(x=>x.id===iid||x.id===gid);
  else if(kind==="savings")item=m.savings.find(x=>x.id===iid||x.id===gid);
  else{const g=m.groups.find(x=>x.id===gid);item=g&&g.items.find(x=>x.id===iid);isSpend=true;}
  if(!item)return;
  sheet("Edit line",
    fieldHTML("e_name","Name",item.name)
    +(isSpend
      ?fieldHTML("e_planned","Planned ($)",item.planned,"number","0","Log spending from the Spend tab")
       +catSegHTML(itemBucket(item))
       +'<div id="e_dueWrap" style="display:'+(itemBucket(item)===G_FIXED?"block":"none")+'">'+fieldHTML("e_due","Due day of month (optional)",item.dueDay||"","number","1")+'</div>'
       +'<button id="e_roll" type="button" class="btn btn-ghost" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;margin-bottom:4px;color:var(--text);font-size:14px"><span style="display:flex;align-items:center;gap:8px">'+I.up+' Roll over unused money</span><span id="e_rollState" style="font-weight:800;color:'+(item.rollover?'var(--teal)':'var(--dim)')+'">'+(item.rollover?'ON':'OFF')+'</span></button>'
       +'<div style="font-size:11px;color:var(--dim);margin-bottom:13px;line-height:1.5">On: leftover carries into next month (good for car maintenance, Christmas, clothes). Off: resets each month (groceries, gas, fun).</div>'

function itemExistsByName(arr,name){return arr.some(i=>normName(i.name)===normName(name));}
function applyBudgetTemplate(key){

  const fg=getFixedGroup(m); let flex=m.groups.find(g=>g.name===G_FLEX); if(!flex){flex={id:nid(),name:G_FLEX,items:[]};m.groups.push(flex);}

function openReorder(){
  const m=M();
  if(!m||!m.groups.length){toast("No categories to reorder yet");return;}
  function rows(){
    return m.groups.map((g,idx)=>
      '<div class="rerow" data-gid="'+g.id+'" style="display:flex;align-items:center;gap:6px;background:var(--inset);border:1px solid var(--line);border-radius:13px;padding:11px 10px 11px 4px;margin-bottom:8px;user-select:none;-webkit-user-select:none">'
      +'<span class="rehandle" style="color:var(--dim);display:flex;padding:5px 6px;cursor:grab;touch-action:none">'+I.drag+'</span>'
      +'<span style="flex:1;font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(g.name)+'</span>'
      +'<button data-reup="'+g.id+'"'+(idx===0?' disabled':'')+' style="background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:9px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;opacity:'+(idx===0?'.25':'1')+'">'+I.chevUp+'</button>'
      +'<button data-redown="'+g.id+'"'+(idx===m.groups.length-1?' disabled':'')+' style="background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:9px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;opacity:'+(idx===m.groups.length-1?'.25':'1')+'">'+I.chevDown+'</button>'
      +'</div>').join("");
  }
  sheet("Reorder categories",
    '<div style="color:var(--dim);font-size:12.5px;line-height:1.5;margin-bottom:14px">Drag the handle, or tap the arrows. Applies to '+monthName(mk)+'.</div>'
    +'<div id="relist">'+rows()+'</div>');
  function commitFromDOM(){
    const ids=[...document.querySelectorAll("#relist .rerow")].map(r=>r.dataset.gid);
    m.groups.sort((a,b)=>ids.indexOf(a.id)-ids.indexOf(b.id));
    save();render();
  }
  function rebuild(){const l=document.getElementById("relist");if(l){l.innerHTML=rows();wire();}}
  function wire(){
    document.querySelectorAll("[data-reup]").forEach(b=>b.onclick=()=>{
      const i=m.groups.findIndex(g=>g.id===b.dataset.reup);
      if(i>0){const a=m.groups;[a[i-1],a[i]]=[a[i],a[i-1]];save();render();rebuild();}
    });
    document.querySelectorAll("[data-redown]").forEach(b=>b.onclick=()=>{
      const i=m.groups.findIndex(g=>g.id===b.dataset.redown);
      if(i>=0&&i<m.groups.length-1){const a=m.groups;[a[i+1],a[i]]=[a[i],a[i+1]];save();render();rebuild();}
    });
    const list=document.getElementById("relist");
    list.querySelectorAll(".rehandle").forEach(h=>{
      h.onpointerdown=(e)=>{
        e.preventDefault();
        const drag=h.closest(".rerow");
        let baseY=e.clientY;
        drag.style.transition="none";drag.style.position="relative";drag.style.zIndex="20";
        drag.style.boxShadow="0 10px 28px rgba(0,0,0,.55)";drag.style.opacity=".97";
        const move=(ev)=>{
          drag.style.transform="translateY("+(ev.clientY-baseY)+"px)";
          const dRect=drag.getBoundingClientRect(),dMid=dRect.top+dRect.height/2;
          for(const r of [...list.querySelectorAll(".rerow")]){
            if(r===drag)continue;
            const rect=r.getBoundingClientRect(),mid=rect.top+rect.height/2;
            const rAfter=!!(drag.compareDocumentPosition(r)&Node.DOCUMENT_POSITION_FOLLOWING);
            if(rAfter&&dMid>mid){list.insertBefore(drag,r.nextSibling);baseY=ev.clientY;drag.style.transform="translateY(0)";break;}
            if(!rAfter&&dMid<mid){list.insertBefore(drag,r);baseY=ev.clientY;drag.style.transform="translateY(0)";break;}
          }
        };
        const up=()=>{
          document.removeEventListener("pointermove",move);
          document.removeEventListener("pointerup",up);
          drag.style.transition="";drag.style.transform="";drag.style.position="";
          drag.style.zIndex="";drag.style.boxShadow="";drag.style.opacity="";
          commitFromDOM();rebuild();
        };
        document.addEventListener("pointermove",move);
        document.addEventListener("pointerup",up);
      };
    });
  }
  wire();
}

// ================= v2 features: paycheck, bills, dashboard, debts, review =================
function todayLocal(){const n=new Date();return new Date(n.getFullYear(),n.getMonth(),n.getDate());}
function parseYMD(s){if(!s)return null;const p=String(s).split("-").map(Number);if(p.length<3||!p[0])return null;return new Date(p[0],p[1]-1,p[2]);}
function ymKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function dayDiff(a,b){return Math.round((b-a)/86400000);}
function clampDay(y,m,day){return Math.min(day||1,daysInMonth(y,m));}
function dateLabel(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}

function monthParts(key){const p=key.split("-").map(Number);return {y:p[0],m:p[1]-1};}
function currentMonthRange(){const p=monthParts(mk);return {start:new Date(p.y,p.m,1),end:new Date(p.y,p.m,daysInMonth(p.y,p.m))};}
function moneyBreakdown(m){
  const t=totals(m);
  let fixed=0,flexPlan=0,flexSpent=0,other=0;
  if(m&&m.groups)m.groups.forEach(g=>g.items.forEach(i=>{
    const b=itemBucket(i);
    if(b===G_FIXED)fixed+=(i.planned||0);
    else if(b===G_FLEX){flexPlan+=(i.planned||0);flexSpent+=(i.actual||0);}
    else other+=(i.planned||0);
  }));
  const planned=t.savings+fixed+flexPlan+other;
  return {income:t.income,savings:t.savings,fixed,flexPlan,flexSpent,flexLeft:flexPlan-flexSpent,other,planned,left:t.income-planned,actual:t.actual,rate:t.rate};
}
function zeroStatus(m){
  const b=moneyBreakdown(m);
  if(!m||b.income<=0)return {label:"Add income to start",sub:"Give every dollar a job once income is entered.",color:"var(--dim)",state:"empty"};
  if(b.left>0.5)return {label:fmt(b.left)+" still needs a job",sub:"Assign it to bills, savings, or flexible spending.",color:"var(--orange)",state:"left"};
  if(b.left<-0.5)return {label:"You assigned "+fmt(-b.left)+" more than income",sub:"Trim a category so the plan matches your income.",color:"var(--red)",state:"over"};
  return {label:"Every dollar has a job",sub:"Income is fully assigned.",color:"var(--teal)",state:"good"};
}
function categoryHealth(i){
  const planned=(i.planned||0),actual=(i.actual||0);
  if(planned<=0)return {label:"Not planned",color:"var(--dim)",bg:"var(--inset)",pct:0};
  const pct=actual/planned*100;
  if(pct>=100)return {label:"Over budget",color:"var(--red)",bg:"var(--redsoft)",pct};
  if(pct>=70)return {label:"Getting close",color:"var(--orange)",bg:"var(--orangesoft)",pct};
  return {label:"On track",color:"var(--teal)",bg:"var(--tealsoft)",pct};
}
function healthPill(i){const h=categoryHealth(i);return '<span style="font-size:10.5px;font-weight:800;color:'+h.color+';background:'+h.bg+';padding:2px 7px;border-radius:99px;white-space:nowrap">'+h.label+'</span>';}
function warningCards(area,m,t){
  const out=[]; const b=moneyBreakdown(m); const zs=zeroStatus(m);
  const push=(severity,text)=>out.push({severity,text,color:severity==="danger"?"var(--red)":severity==="caution"?"var(--orange)":"var(--teal)",bg:severity==="danger"?"var(--redsoft)":severity==="caution"?"var(--orangesoft)":"var(--tealsoft)"});
  if(zs.state==="over")push("danger",zs.label);
  else if(zs.state==="left" && area!=="track")push("info",zs.label);
  const unpaid=(S.bills||[]).filter(x=>billStatus(x).state!=="paid");
  const unpaidTotal=unpaid.reduce((s,x)=>s+(x.amount||0),0);
  if(unpaidTotal>0 && (area==="dashboard"||area==="bills"))push("caution","You have "+fmt(unpaidTotal)+" in unpaid bills left.");
  if(area==="track" && b.fixed>0)push("info","Your safe-to-spend number assumes you do not touch bill money.");
  const sp=S.settings.paycheckMode?safeUntilPayday():null;
  if(sp&&!sp.needPay&&sp.over)push("danger","You are "+fmt(-sp.left)+" short if all bills hit before your next paycheck.");
  if(m)m.groups.forEach(g=>g.items.forEach(i=>{
    if(itemBucket(i)!==G_FLEX||!(i.planned>0))return;
    const pct=(i.actual||0)/(i.planned||1)*100;
    if(pct>=100)push("danger",esc(i.name)+" is over budget.");
    else if(pct>=70)push("caution",esc(i.name)+" is using "+Math.round(pct)+"% of its flexible budget.");
  }));
  if(S.settings.paycheckMode){const bb=billsBeforePayday();if(bb&&bb.unpaid.length)push("caution","This paycheck has "+bb.unpaid.length+" unpaid bill"+(bb.unpaid.length>1?"s":"")+" before the next payday.");}

// --- paycheck engine ---
const PERIODS_PER_MONTH={weekly:4.345,biweekly:2.17,semimonthly:2,monthly:1,custom:30/14};
function nextPaydayDate(){
  const s=S.settings; if(!s.payFrequency||!s.nextPayday)return null;
  const anchor=parseYMD(s.nextPayday); if(!anchor)return null;
  const today=todayLocal();
  let d=new Date(anchor);
  const step=()=>{
    if(s.payFrequency==="weekly")d.setDate(d.getDate()+7);
    else if(s.payFrequency==="biweekly")d.setDate(d.getDate()+14);
    else if(s.payFrequency==="custom")d.setDate(d.getDate()+(parseInt(s.customDays)||14));
    else if(s.payFrequency==="monthly")d.setMonth(d.getMonth()+1);
    else if(s.payFrequency==="semimonthly")d.setDate(d.getDate()+15);
  };
  let guard=0;
  while(d<today&&guard<800){step();guard++;}
  return d;
}
function paydayInfo(){
  const next=nextPaydayDate(); if(!next)return null;
  const today=todayLocal();
  const s=S.settings;
  let prev=new Date(next);
  if(s.payFrequency==="weekly")prev.setDate(prev.getDate()-7);
  else if(s.payFrequency==="biweekly")prev.setDate(prev.getDate()-14);
  else if(s.payFrequency==="custom")prev.setDate(prev.getDate()-(parseInt(s.customDays)||14));
  else if(s.payFrequency==="monthly")prev.setMonth(prev.getMonth()-1);
  else if(s.payFrequency==="semimonthly")prev.setDate(prev.getDate()-15);
  const start=prev<today?today:prev; // period we care about starts no earlier than today's paycheck window
  return {next,prev,daysUntil:Math.max(0,dayDiff(today,next)),periodStart:prev,today};
}
// every bill occurrence (paid or not) with a due date inside [from, to]
function billOccurrencesBetween(from,to){
  const out=[];
  (S.bills||[]).forEach(b=>{
    // check the months spanned by the window
    let y=from.getFullYear(),mo=from.getMonth();
    const endY=to.getFullYear(),endMo=to.getMonth();
    let guard=0;
    while((y<endY||(y===endY&&mo<=endMo))&&guard<24){
      const dd=clampDay(y,mo,b.dueDay);
      const occ=new Date(y,mo,dd);
      if(occ>=from&&occ<=to){
        const key=y+"-"+String(mo+1).padStart(2,"0");
        out.push({bill:b,date:occ,monthKey:key,paid:!!(b.paid&&b.paid[key])});
      }
      mo++; if(mo>11){mo=0;y++;} guard++;
    }
  });
  return out.sort((a,b)=>a.date-b.date);
}
function billsBeforePayday(){
  const pi=paydayInfo(); if(!pi)return null;
  const occ=billOccurrencesBetween(pi.today,pi.next);
  const unpaid=occ.filter(o=>!o.paid);
  return {occ,unpaid,total:occ.reduce((s,o)=>s+(o.bill.amount||0),0),unpaidTotal:unpaid.reduce((s,o)=>s+(o.bill.amount||0),0),info:pi};
}
// flexible (non-bill) spending logged within a date window, from budget envelopes
function flexibleSpentBetween(from,to){
  let sum=0;
  Object.values(S.months).forEach(m=>{if(!m||!m.groups)return;m.groups.forEach(g=>g.items.forEach(i=>{
    if(i.recurring)return; // recurring envelopes mirror bills; exclude to avoid double count
    (i.txns||[]).forEach(x=>{const d=parseYMD(x.date);if(d&&d>=from&&d<=to)sum+=(parseFloat(x.amount)||0);});
  }));});
  return sum;
}
// rollover: unused (or overspent) money carried from prior months for a category, by name
function rolloverCarry(monthKey,gName,iName,depth){
  depth=depth||0; if(depth>240)return 0;
  const prevKey=latestBefore(monthKey); if(!prevKey)return 0;
  const pm=S.months[prevKey]; if(!pm||!pm.groups)return 0;
  const pg=pm.groups.find(g=>g.name===gName); if(!pg)return 0;
  const pi=pg.items.find(it=>it.name===iName); if(!pi||!pi.rollover)return 0;
  return (pi.planned||0)+rolloverCarry(prevKey,gName,iName,depth+1)-(pi.actual||0);
}
// distinct recent transaction notes/merchants, newest first
function recentNotes(n){
  const all=[],seen=[],out=[];
  Object.values(S.months).forEach(m=>m&&m.groups&&m.groups.forEach(g=>g.items.forEach(i=>(i.txns||[]).forEach(x=>{if(x.note&&x.note.trim())all.push({note:x.note.trim(),date:x.date||""});}))));
  all.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  for(const x of all){const k=x.note.toLowerCase();if(seen.indexOf(k)<0){seen.push(k);out.push(x.note);}if(out.length>=(n||6))break;}
  return out;
}
function safeUntilPayday(){
  const s=S.settings;
  const bb=billsBeforePayday(); if(!bb)return null;
  const pi=bb.info;
  const pay=parseFloat(s.payAmount)||0;
  if(pay<=0)return {needPay:true,info:pi};
  const periodDays=Math.max(1,dayDiff(pi.prev,pi.next));
  const savingsForPeriod=(parseFloat(s.savingsGoal)||0)*(periodDays/30);
  const spent=flexibleSpentBetween(pi.periodStart,pi.today);
  const left=pay-savingsForPeriod-bb.total-spent;
  const days=Math.max(1,pi.daysUntil);
  return {pay,savingsForPeriod,billsTotal:bb.total,unpaidTotal:bb.unpaidTotal,spent,left,perDay:Math.max(0,left)/days,daysUntil:pi.daysUntil,info:pi,over:left<-0.5,bb};
}

// --- bill status ---
function billStatus(b){
  const today=todayLocal();
  const y=today.getFullYear(),mo=today.getMonth();
  const key=y+"-"+String(mo+1).padStart(2,"0");
  const due=new Date(y,mo,clampDay(y,mo,b.dueDay));
  const paid=!!(b.paid&&b.paid[key]);
  if(paid)return {state:"paid",label:"Paid",color:"var(--teal)",bg:"var(--tealsoft)",due,key};
  if(due<today)return {state:"overdue",label:"Overdue",color:"var(--red)",bg:"var(--redsoft)",due,key};
  const dleft=dayDiff(today,due);
  if(dleft<=7)return {state:"soon",label:dleft===0?"Due today":"Due in "+dleft+"d",color:"var(--orange)",bg:"var(--orangesoft)",due,key};
  return {state:"upcoming",label:"Due "+dateLabel(due),color:"var(--dim)",bg:"var(--inset)",due,key};
}

  const d=parseYMD(dateStr)||todayLocal(); const key=ymKey(d);
  b.paid=b.paid||{}; b.paid[key]=dateStr||new Date().toISOString().slice(0,10);
  addBillPaymentToBudget(b,b.paid[key],b.amount||0);
}
function unmarkBillPaidState(id,monthKey){
  const b=(S.bills||[]).find(x=>x.id===id); if(!b)return;
  const key=monthKey||ymKey(todayLocal()); b.paid=b.paid||{}; delete b.paid[key];
  removeBillPaymentFromBudget(b,key);
}
function toggleBillPaid(id){
  const b=(S.bills||[]).find(x=>x.id===id); if(!b)return;
  const key=mk||ymKey(todayLocal());
  b.paid=b.paid||{};
  if(b.paid[key]){
    unmarkBillPaidState(id,key);
  }else{
    const now=todayLocal();
    const currentKey=ymKey(now);
    const p=monthParts(key);
    const paidDate=(key===currentKey)?new Date().toISOString().slice(0,10):(key+"-"+String(clampDay(p.y,p.m,b.dueDay||1)).padStart(2,"0"));
    markBillPaidState(id,paidDate);
  }
  commit();
}
function findMatchingUnpaidBill(amt,note){
  const n=normName(note); if(!amt)return null;

}

function billStatusForMonth(b,monthKey){
  const p=monthParts(monthKey||mk);
  const key=(monthKey||mk);
  const due=new Date(p.y,p.m,clampDay(p.y,p.m,b.dueDay||1));
  const today=todayLocal();

    return {state:"paid",bucket:"paid",label:pd?("Paid "+dateLabel(pd)):"Paid",color:"var(--teal)",bg:"var(--tealsoft)",due,key,days:dayDiff(today,due),paidDate};
  }
  const days=dayDiff(today,due);
  const monthPast=key<ymKey(today);
  if(monthPast||due<today)return {state:"overdue",bucket:"overdue",label:"Overdue",color:"var(--red)",bg:"var(--redsoft)",due,key,days};
  if(days<=3)return {state:"soon",bucket:"soon",label:days===0?"Due today":"Due in "+days+"d",color:"var(--orange)",bg:"var(--orangesoft)",due,key,days};
  if(days<=7)return {state:"week",bucket:"week",label:"This week",color:"var(--orange)",bg:"var(--orangesoft)",due,key,days};
