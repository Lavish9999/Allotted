function feedbackLines(m,t){
  const out=[];
  const paycheck=S.settings.paycheckMode&&paydayInfo();
  if(paycheck){
    const sp=safeUntilPayday();
    if(sp&&!sp.needPay){
      if(sp.over)out.push({t:"You're "+fmt(-sp.left)+" short before payday — ease off flexible spending.",c:"var(--red)"});
      else out.push({t:"You have "+fmt(sp.left)+" for flexible spending until payday.",c:"var(--teal)"});
    }
    if(sp&&sp.bb&&sp.bb.unpaid.length)out.push({t:"You have "+sp.bb.unpaid.length+" unpaid bill"+(sp.bb.unpaid.length>1?"s":"")+" before payday.",c:"var(--orange)"});
  }else if(m){
    const sts=safeToSpend(m);
    if(sts&&!sts.over)out.push({t:"You have "+fmt(sts.pool)+" left for flexible spending this month.",c:"var(--teal)"});
    else if(sts&&sts.over)out.push({t:"You're over your flexible budget by "+fmt(-sts.pool)+".",c:"var(--red)"});
  }
  // category warnings
  if(m)m.groups.forEach(g=>g.items.forEach(i=>{
    if(i.recurring||!(i.planned>0))return;
    const r=(i.planned)-(i.actual||0);
    if(r<-0.5)out.push({t:"You're over budget in "+esc(i.name)+".",c:"var(--red)"});
    else if(i.actual>=i.planned*0.9)out.push({t:esc(i.name)+" is almost maxed out.",c:"var(--orange)"});
  }));
  if(!out.length)out.push({t:"You're on track. Nice work.",c:"var(--teal)"});
  return out.slice(0,3);
}

function budgetPulse(m){
  if(!m)return {score:0,label:"No plan yet",color:"var(--dim)",sub:"Build a budget to get your daily pulse."};
  const b=moneyBreakdown(m), z=zeroStatus(m), sts=safeToSpend(m);
  let score=100;
  if(b.income<=0)score-=35;
  if(z.state==="over")score-=28;
  else if(z.state==="left")score-=10;
  if(sts&&sts.over)score-=30;
  if(sts&&sts.flexPlanned>0&&sts.flexSpent>sts.flexPlanned*.85&&!sts.over)score-=12;
  const overdue=(S.bills||[]).filter(x=>billStatusForMonth(x,mk).state==="overdue").length;
  const dueSoon=(S.bills||[]).filter(x=>{const st=billStatusForMonth(x,mk);return st.state==="soon"||st.state==="week";}).length;
  score-=Math.min(28,overdue*14);
  score-=Math.min(10,dueSoon*3);
  if(b.fixed<=0&&b.income>0)score-=8;
  score=Math.max(0,Math.min(100,Math.round(score)));
  const color=score>=80?"var(--teal)":score>=55?"var(--orange)":"var(--red)";
  const label=score>=80?"On track":score>=55?"Needs attention":"High risk";
  const sub=score>=80?"Bills are protected and spending is controlled.":score>=55?"Fix the next warning before spending freely.":"Slow down and repair the plan first.";
  return {score,label,color,sub};
}

// --- debts ---
function debtOrder(debts,strategy){
  const arr=debts.slice().filter(d=>(parseFloat(d.balance)||0)>0);
  return arr.sort((a,b)=>strategy==="avalanche"?((parseFloat(b.apr)||0)-(parseFloat(a.apr)||0)):((parseFloat(a.balance)||0)-(parseFloat(b.balance)||0)));
}
function simulateDebtPlan(strategy,extra){
  let debts=(S.debts||[]).map(d=>({...d,balance:parseFloat(d.balance)||0,minPayment:parseFloat(d.minPayment)||0,apr:parseFloat(d.apr)||0})).filter(d=>d.balance>0);
  if(!debts.length)return null;
  let months=0,interest=0; extra=parseFloat(extra)||0;
  while(debts.some(d=>d.balance>0.01)&&months<600){
    months++;
    debts.forEach(d=>{if(d.balance>0&&d.apr>0){const int=d.balance*(d.apr/100/12);d.balance+=int;interest+=int;}});
    debts.forEach(d=>{if(d.balance>0){const pay=Math.min(d.balance,d.minPayment||0);d.balance-=pay;}});
    const order=debtOrder(debts,strategy).filter(d=>d.balance>0.01);
    if(order[0]&&extra>0){order[0].balance=Math.max(0,order[0].balance-extra);}
    // roll minimum payments from paid debts to current attack
    const active=debtOrder(debts,strategy).filter(d=>d.balance>0.01);
    const paidMins=debts.filter(d=>d.balance<=0.01).reduce((s,d)=>s+(d.minPayment||0),0);
    if(active[0]&&paidMins>0)active[0].balance=Math.max(0,active[0].balance-paidMins);
  }
  const done=new Date();done.setMonth(done.getMonth()+months);
  return {months,interest,done};
}

  }
  const total=debts.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);

  if(rec)h+='<div class="card" style="background:var(--tealsoft);border-color:var(--tealb);margin-bottom:14px"><div class="label" style="color:var(--teal)">Recommended next attack</div><div style="font-size:18px;font-weight:900;margin-top:6px">'+esc(rec.name)+'</div><div style="font-size:12.5px;color:var(--dim);line-height:1.45;margin-top:4px">Using '+(strategy==="avalanche"?'avalanche: highest APR first.':'snowball: lowest balance first.')+(plan?' Estimated debt-free date: '+plan.done.toLocaleDateString("en-US",{month:"short",year:"numeric"})+'.':'')+'</div>'+(allApr&&plan&&alt?'<div style="font-size:12px;color:var(--dim);margin-top:8px">Estimated interest saved vs '+(strategy==="snowball"?'avalanche':'snowball')+': '+fmt(Math.max(0,alt.interest-plan.interest))+'</div>':'')+'</div>';
  h+='<button id="addDebt" class="btn btn-teal" style="display:flex;align-items:center;justify-content:center;gap:8px;max-width:340px;margin:0 auto 16px">'+I.plus+' Add a debt</button>';
  h+='<div class="gcard" style="margin-bottom:14px"><div class="ghead"><div class="gname">'+(strategy==="avalanche"?'Avalanche payoff order':'Snowball payoff order')+'</div><span class="gtot">'+order.length+'</span></div>';
  order.forEach((d,idx)=>{
    const sub=[d.apr?(parseFloat(d.apr)).toFixed(2)+"% APR":"APR not set",d.minPayment?fmt(d.minPayment)+"/mo min":"no minimum",d.extraPayment?fmt(d.extraPayment)+" extra":""].filter(Boolean).join(" · ");

  });
  h+='</div>';
  const snow=debtOrder(debts,"snowball"), ava=debtOrder(debts,"avalanche");
  h+='<div class="sheet-grid" style="grid-template-columns:1fr 1fr"><div class="gcard"><div class="ghead"><div class="gname">Snowball</div></div>'+snow.slice(0,5).map(d=>'<div class="grow" style="cursor:default"><div class="gn">'+esc(d.name)+'</div><div class="gv">'+fmt(d.balance||0)+'</div></div>').join("")+'</div><div class="gcard"><div class="ghead"><div class="gname">Avalanche</div></div>'+ava.slice(0,5).map(d=>'<div class="grow" style="cursor:default"><div class="gn">'+esc(d.name)+'</div><div class="gv">'+((parseFloat(d.apr)||0).toFixed(1))+'%</div></div>').join("")+'</div></div>';
  h+='</div>';
  return h;
}

function backupStatus(){
  if(!S.lastBackup)return {text:"Never backed up — grab one now",color:"var(--orange)"};
  const days=Math.floor((Date.now()-S.lastBackup)/86400000);
  const txt=days<=0?"Backed up today":days===1?"Backed up yesterday":"Backed up "+days+" days ago";
  return {text:txt,color:days>7?"var(--orange)":"var(--teal)"};
}

function applyBackup(text){
  try{
    const d=JSON.parse(text.trim());
    if(!d.months)throw 0;
    adoptState(d);
    migrate();
    closeModal();commit();toast("Backup restored");
    return true;
  }catch(e){toast("That text isn't a valid backup","var(--red)");return false;}
}

function bind(){
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render();});
  document.querySelectorAll("[data-mnav]").forEach(b=>b.onclick=()=>{
    const dir=parseInt(b.dataset.mnav);
    mk=shiftMonth(mk,dir);
    // moving forward into an empty month → auto-carry the latest prior plan
    if(dir>0 && !S.months[mk]){
      const src=latestBefore(mk);
      if(src){S.months[mk]=cloneForward(src);save();}
    }
    render();
  });
  const sb=document.getElementById("settingsBtn");if(sb)sb.onclick=openSettings;
  const mpk=document.getElementById("mpick");if(mpk)mpk.onclick=openMonthPicker;
  document.querySelectorAll("[data-reorder]").forEach(b=>b.onclick=openReorder);
  document.querySelectorAll("[data-edit]").forEach(el=>el.onclick=()=>{
    const p=el.dataset.edit.split(":");
    if(p[0]==="item")openEditEntry("item",p[1],p[2]);
    else openEditEntry(p[0],p[1],p[1]);
  });
  document.querySelectorAll("[data-add]").forEach(el=>el.onclick=()=>{
    const p=el.dataset.add.split(":");
    if(p[0]==="item")openAddEntry("item",p[1]);
    else openAddEntry(p[0]);
  });
  document.querySelectorAll("[data-gdel]").forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const m=M();if(!m)return;
    const g=m.groups.find(x=>x.id===el.dataset.gdel);
    if(g&&g.items.length){toast("Delete the lines inside "+g.name+" first","var(--orange)");return;}
    m.groups=m.groups.filter(x=>x.id!==el.dataset.gdel);commit();
  });
  document.querySelectorAll("[data-goto]").forEach(el=>el.onclick=()=>{mk=el.dataset.goto;tab="budget";render();});
  document.querySelectorAll("[data-txn]").forEach(el=>el.onclick=()=>{const p=el.dataset.txn.split(":");openTxn(p[0],p[1]);});
  document.querySelectorAll("[data-gtxn]").forEach(el=>el.onclick=()=>openGroupTxns(el.dataset.gtxn));
  document.querySelectorAll("[data-paid]").forEach(el=>el.onclick=e=>{e.stopPropagation();const p=el.dataset.paid.split(":");markPaid(p[0],p[1]);});
  const pa=document.getElementById("payAllRec");if(pa)pa.onclick=payAllRecurring;
  const lt=document.getElementById("logTxn");if(lt)lt.onclick=openTxnPicker;
  const ag=document.getElementById("addGroup");if(ag)ag.onclick=openAddGroup;
  const wob=document.getElementById("wOnboard");if(wob)wob.onclick=startOnboarding;
  const wbl=document.getElementById("wBlank");if(wbl)wbl.onclick=()=>{S.months[mk]=blankMonth();S.settings.onboardingCompleted=true;tab="dashboard";commit();};
  const wi=document.getElementById("wImport");if(wi)wi.onclick=openPasteRestore;
  const wt=document.getElementById("wTemplate");if(wt)wt.onclick=()=>{S.months[mk]=blankMonth();S.settings.onboardingCompleted=true;tab="budget";commit();openTemplatePicker();};
  const so=document.getElementById("startOver");if(so)so.onclick=()=>{delete S.months[mk];commit();};
  const cp=document.getElementById("copyPrev");
  if(cp)cp.onclick=()=>{
    const src=latestBefore(mk);
    if(!src)return;
    S.months[mk]=cloneForward(src);
    commit();toast("Plan carried over — actuals reset to zero");
  };
  const st=document.getElementById("startTemplate");

// desktop keyboard nav: ← / → switch months, Esc closes a sheet
document.addEventListener("keydown",e=>{
  if(document.getElementById("modal").innerHTML){if(e.key==="Escape")closeModal();return;}
  const tag=(e.target.tagName||"").toUpperCase();
  if(tag==="INPUT"||tag==="SELECT"||tag==="TEXTAREA")return;
  if(e.key==="ArrowLeft"){mk=shiftMonth(mk,-1);render();}
  else if(e.key==="ArrowRight"){
    mk=shiftMonth(mk,1);
    if(!S.months[mk]){const src=latestBefore(mk);if(src){S.months[mk]=cloneForward(src);save();}}
    render();
  }
});

function standoutMoney(m){return m?moneyBreakdown(m):{income:0,savings:0,fixed:0,flexPlan:0,flexSpent:0,flexLeft:0,other:0,planned:0,left:0,actual:0,rate:0};}
function standoutSafeLine(m){
  const sts=safeToSpend(m), mb=standoutMoney(m);
  if(!m)return {amount:"—",big:"No plan",sub:"Build a budget to get your daily number.",color:"var(--dim)",score:0};
  if(!sts)return {amount:"—",big:"Set flexible spending",sub:"Add flexible categories so Allotted can calculate today’s safe number.",color:"var(--orange)",score:22};
  if(sts.over)return {amount:fmt(0),big:"Stop spending",sub:"You are over flexible spending by "+fmt(-sts.pool)+". Bill money is still locked.",color:"var(--red)",score:8};
  const ratio=sts.flexPlanned>0?Math.max(0,Math.min(1,sts.pool/sts.flexPlanned)):0;

  return {amount:fmt(sts.perDay),big:hot?"Tight day":"Good to spend",sub:fmt(sts.pool)+" left in flexible spending. Bills and savings are excluded.",color:hot?"var(--orange)":"var(--teal)",score:Math.round(hot?46:78)};
}

  h+='</div>';

  h+='<div class="section-title-v2"><div><h2>Bills before payday</h2><p>Auto-detected from due dates.</p></div></div><div class="card">'+miniRunwayHTML(5)+'</div>';
  return h;
}
function moreHTML(){
  const pulse=budgetPulse(M());
  return '<div class="narrow"><div class="daily-command" style="padding:18px"><div class="eyebrow">Toolbox</div><div style="display:flex;align-items:center;gap:14px;margin-top:10px"><div class="pulse-dial" style="--pulse:'+pulse.score+'%"><div><b>'+pulse.score+'</b><span>Pulse</span></div></div><div><div style="font-size:24px;font-weight:950;color:'+pulse.color+'">'+pulse.label+'</div><div class="safe-copy">'+pulse.sub+'</div></div></div></div><div class="section-title-v2"><div><h2>Smart tools</h2><p>Useful without turning into a bank-sync app.</p></div></div><div class="tool-grid-v2">'
    +toolTile('mAfford',I.wallet,'Can I buy this?','Check a purchase against safe money')
    +toolTile('mWeekly',I.check,'Weekly reset','Review spending and set a limit')
    +toolTile('mYear',I.chart,'Year view','See the long-term picture')
    +toolTile('mDebt',I.card,'Debt Attack','Pick the next payoff target')
    +toolTile('mDemo',I.copy,'Demo budget','Load sample data for testing')
    +toolTile('mSettings',I.gear,'Settings','Income, theme, backup, reset')
    +toolTile('mPrivacy',I.shield,'Privacy promise','No bank login. Local-first.')
    +'</div></div>';
}
function toolTile(id,icon,title,sub){return '<button id="'+id+'" class="tool-tile"><span class="ico">'+icon+'</span><span><b>'+title+'</b><span>'+sub+'</span></span><span style="margin-left:auto;color:var(--dim)">'+I.right+'</span></button>';}

// ================= go =================
load();
save();
render();
setTimeout(()=>{
  const week=7*86400000;
  const hasData=Object.keys(S.months).length>1||Object.values(S.months).some(m=>totals(m).actual>0);
  if(hasData&&(!S.lastBackup||Date.now()-S.lastBackup>week)){
    toast("Tip: grab a backup (⚙ → Download backup) — your data lives in this browser only","var(--orange)");
  }
},1500);
</script>
