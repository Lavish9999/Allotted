*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;background:var(--bg);color:var(--text)}body{font-family:-apple-system,BlinkMacSystemFont,system-ui,Segoe UI,Roboto,sans-serif;padding-bottom:calc(96px + env(safe-area-inset-bottom));letter-spacing:-.005em;background:radial-gradient(900px 520px at 50% -10%,rgba(45,212,191,.12),transparent 58%),var(--bg)}button,input,textarea,select{font:inherit}button{cursor:pointer;border:0}input,textarea,select{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.22);color:var(--text);border-radius:12px;padding:12px 13px;outline:none}.wrap{max-width:1020px;margin:0 auto;padding:18px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:calc(10px + env(safe-area-inset-top)) 18px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;background:rgba(11,14,16,.84);backdrop-filter:blur(18px)}[data-theme="light"] .top{background:rgba(244,247,247,.86)}.brand{display:flex;align-items:center;gap:10px}.logo{width:34px;height:34px}.brand b{font-size:18px}.muted{color:var(--dim)}.small{font-size:12px}.label{font-size:11px;text-transform:uppercase;letter-spacing:.11em;font-weight:800;color:var(--dim);margin-bottom:8px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.card{background:var(--card);border:1px solid var(--card2);border-radius:16px;padding:16px;box-shadow:0 12px 32px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.04)}.span4{grid-column:span 4}.span6{grid-column:span 6}.span8{grid-column:span 8}.span12{grid-column:span 12}.metric{font-size:30px;font-weight:850;letter-spacing:-.04em}.metric.sm{font-size:22px}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}.row:last-child{border-bottom:0}.stack{display:grid;gap:12px}.btn{border-radius:13px;padding:12px 14px;font-weight:800;color:var(--text);background:var(--soft);border:1px solid var(--line)}.btn.primary{background:linear-gradient(135deg,#2DD4BF,#14B8A6);color:#062C27;border:0}.btn.warn{background:var(--red2);color:var(--red);border:1px solid rgba(248,113,113,.28)}.btn.ghost{background:transparent}.pill{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:800;background:var(--soft);color:var(--dim);border:1px solid var(--line)}.pill.good{background:var(--teal2);color:var(--teal);border-color:rgba(45,212,191,.3)}.pill.warn{background:var(--orange2);color:var(--orange);border-color:rgba(245,155,69,.28)}.pill.bad{background:var(--red2);color:var(--red);border-color:rgba(248,113,113,.28)}.progress{height:8px;border-radius:999px;background:var(--soft);overflow:hidden;margin-top:10px}.progress div{height:100%;background:linear-gradient(90deg,var(--teal),var(--purple));border-radius:999px}.nav{position:fixed;left:0;right:0;bottom:calc(14px + env(safe-area-inset-bottom));display:flex;justify-content:center;z-index:20;pointer-events:none}.navin{pointer-events:auto;display:flex;gap:4px;padding:6px;border:1px solid var(--card2);border-radius:999px;background:rgba(18,23,26,.9);backdrop-filter:blur(18px);box-shadow:0 12px 38px rgba(0,0,0,.44)}[data-theme="light"] .navin{background:rgba(255,255,255,.92)}.nav button{background:transparent;color:var(--dim);border-radius:999px;padding:10px 12px;font-size:12px;font-weight:850}.nav button.on{background:var(--teal2);color:var(--teal);box-shadow:inset 0 0 0 1px rgba(45,212,191,.3)}.sheetBg{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.66);display:flex;align-items:flex-end;justify-content:center}.sheet{width:100%;max-width:520px;max-height:88vh;overflow:auto;background:var(--sheet);border:1px solid var(--card2);border-radius:24px 24px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -18px 50px rgba(0,0,0,.45)}.sheet h2{font-size:20px;margin-bottom:14px}.field{display:block;margin-bottom:12px}.field span{display:block;color:var(--dim);font-size:12px;margin-bottom:6px}.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}.toast{position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:60;background:var(--sheet);border:1px solid var(--teal);color:var(--text);padding:12px 15px;border-radius:14px;font-size:13px;font-weight:800;box-shadow:0 12px 36px rgba(0,0,0,.38);max-width:90%}.dangerNote{background:var(--red2);border:1px solid rgba(248,113,113,.24);color:var(--red);border-radius:14px;padding:12px;line-height:1.45}.empty{text-align:center;color:var(--dim);padding:22px 12px}.lineName{font-weight:800}.money{font-variant-numeric:tabular-nums;font-weight:850}.click{cursor:pointer}.click:hover{background:rgba(255,255,255,.035)}@media(max-width:760px){.grid{grid-template-columns:1fr}.span4,.span6,.span8,.span12{grid-column:span 1}.metric{font-size:26px}.top{padding-left:14px;padding-right:14px}.wrap{padding:14px}.nav button{padding:10px 11px}.desktopOnly{display:none}.split{grid-template-columns:1fr}}

<body>
<header class="top"><div class="brand"><svg class="logo" viewBox="0 0 100 100" aria-label="Allotted"><line x1="50" y1="18" x2="25" y2="82" stroke="var(--teal)" stroke-width="12" stroke-linecap="round"/><line x1="50" y1="18" x2="75" y2="82" stroke="var(--orange)" stroke-width="12" stroke-linecap="round"/><line x1="37" y1="57" x2="63" y2="57" stroke="var(--teal)" stroke-width="9" stroke-linecap="round"/></svg><div><b>Allotted</b><div class="small muted">Give every dollar a job</div></div></div><button id="settingsBtn" class="btn ghost">Settings</button></header>
<div id="app"></div>
<div id="modal"></div>
<input type="file" id="fileInput" accept=".json,application/json" style="display:none">
<script>
const KEY="budget-app-v1";
const SCHEMA=5;
const fmt=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(Number(n)||0);
const fmtC=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(Number(n)||0);
const esc=s=>String(s??"").replace(/[&<>\"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const money=v=>{v=parseFloat(v);return isNaN(v)?0:Math.max(0,v)};
const id=()=>"i"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
let tab="dashboard";
let mk=new Date().toISOString().slice(0,7);
let storageBroken=false;
let storageWarning="";
function defaultSettings(){return{onboardingCompleted:false,paycheckMode:false,payFrequency:"biweekly",customDays:14,nextPayday:"",payAmount:0,monthlyIncome:0,savingsGoal:0}};
function defaultState(){return{schemaVersion:SCHEMA,months:{},debts:[],debtPlan:{strategy:"avalanche",extra:0},settings:defaultSettings(),lastBackup:null,theme:"dark",lastLog:null}};
let S=defaultState();
function item(name,planned,recurring,dueDay){return{id:id(),name,planned:money(planned),actual:0,txns:[],recurring:!!recurring,dueDay:dueDay||null}};
function starterMonth(){return{income:[{id:id(),name:"Take-home pay",amount:0}],savings:[{id:id(),name:"Savings",amount:0}],groups:[{id:id(),name:"Bills",items:[item("Rent / Mortgage",0,true,1),item("Electric",0,true,15),item("Phone",0,true,20)]},{id:id(),name:"Food",items:[item("Groceries",0,false),item("Restaurants",0,false)]},{id:id(),name:"Transportation",items:[item("Gas",0,false),item("Insurance",0,true,10)]},{id:id(),name:"Other",items:[]}]} };
function blankMonth(){return{income:[{id:id(),name:"Take-home pay",amount:0}],savings:[{id:id(),name:"Savings",amount:0}],groups:[{id:id(),name:"Spending",items:[]}]} };
function setTheme(){document.documentElement.setAttribute("data-theme",S.theme||"dark");document.querySelector('meta[name="theme-color"]').setAttribute("content",S.theme==="light"?"#F4F7F7":"#0B0E10")}
function adoptState(d){if(!d||typeof d!=="object")return;S={...defaultState(),...S};if(d.months&&typeof d.months==="object")S.months=d.months;if(Array.isArray(d.debts))S.debts=d.debts;if(d.debtPlan&&typeof d.debtPlan==="object")S.debtPlan={strategy:d.debtPlan.strategy||"avalanche",extra:money(d.debtPlan.extra)};if(d.settings&&typeof d.settings==="object")S.settings={...defaultSettings(),...d.settings};if(d.lastBackup!==undefined)S.lastBackup=d.lastBackup;if(d.theme)S.theme=d.theme;if(d.lastLog)S.lastLog=d.lastLog;if(d.schemaVersion)S.schemaVersion=d.schemaVersion}
function recalcItem(i){i.actual=(i.txns||[]).reduce((s,t)=>s+money(t.amount),0)}
function migrate(){S.settings={...defaultSettings(),...(S.settings||{})};S.debts=Array.isArray(S.debts)?S.debts:[];S.debtPlan=S.debtPlan||{strategy:"avalanche",extra:0};S.debtPlan.extra=money(S.debtPlan.extra);Object.keys(S.months||{}).forEach(k=>{const m=S.months[k];if(!m)return;m.income=Array.isArray(m.income)?m.income:[];m.savings=Array.isArray(m.savings)?m.savings:[];m.groups=Array.isArray(m.groups)?m.groups:[];m.income.forEach(x=>x.amount=money(x.amount));m.savings.forEach(x=>x.amount=money(x.amount));m.groups.forEach(g=>{g.items=Array.isArray(g.items)?g.items:[];g.items.forEach(i=>{i.planned=money(i.planned);i.txns=Array.isArray(i.txns)?i.txns:[];i.txns=i.txns.map(t=>({id:t.id||id(),date:t.date||k+"-01",amount:money(t.amount),note:t.note||""}));recalcItem(i);if(i.dueDay)i.dueDay=Math.min(31,Math.max(1,parseInt(i.dueDay)||1));})})});S.debts=S.debts.map(d=>({id:d.id||id(),name:d.name||"Debt",balance:money(d.balance),minPayment:money(d.minPayment),apr:money(d.apr),dueDay:d.dueDay?Math.min(31,Math.max(1,parseInt(d.dueDay)||1)):null,notes:d.notes||""})).filter(d=>d.name||d.balance);if(Object.keys(S.months).length)S.settings.onboardingCompleted=true;S.schemaVersion=SCHEMA;setTheme()}
function load(){try{const raw=localStorage.getItem(KEY);if(raw)adoptState(JSON.parse(raw))}catch(e){storageBroken=true;storageWarning="Allotted could not read saved data. Restore a backup before making changes."}migrate()}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));storageBroken=false;return true}catch(e){storageBroken=true;storageWarning="Allotted could not save on this device. Copy a private backup now.";return false}}
function commit(){const ok=save();render();if(!ok)setTimeout(()=>toast(storageWarning,"bad"),50)}
function monthName(k){const a=k.split("-").map(Number);return new Date(a[0],a[1]-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"})}
function monthShort(k){const a=k.split("-").map(Number);return new Date(a[0],a[1]-1,1).toLocaleDateString("en-US",{month:"short",year:"numeric"})}
function shiftMonth(k,n){const a=k.split("-").map(Number),d=new Date(a[0],a[1]-1+n,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function latestBefore(k){const keys=Object.keys(S.months).filter(x=>x<k).sort();return keys[keys.length-1]||null}
function cloneForward(k){const src=S.months[k],m=JSON.parse(JSON.stringify(src));m.income.forEach(x=>x.id=id());m.savings.forEach(x=>x.id=id());m.groups.forEach(g=>{g.id=id();g.items.forEach(i=>{i.id=id();i.actual=0;i.txns=[]})});return m}
function selectMonth(k,carry){const old=mk;mk=k;if(carry&&!S.months[mk]){const src=latestBefore(mk);if(src){S.months[mk]=cloneForward(src);save();toast("Copied "+monthShort(src)+" into "+monthShort(mk),"good",()=>{delete S.months[mk];mk=old;commit()})}}render()}
function M(){return S.months[mk]||null}
function ensureMonth(){if(!S.months[mk])S.months[mk]=starterMonth();return S.months[mk]}
function totals(m){if(!m)return{income:0,savings:0,planned:0,actual:0,remaining:0,available:0,rate:0};const income=m.income.reduce((s,x)=>s+money(x.amount),0);const savings=m.savings.reduce((s,x)=>s+money(x.amount),0);const planned=m.groups.reduce((s,g)=>s+g.items.reduce((a,i)=>a+money(i.planned),0),0);const actual=m.groups.reduce((s,g)=>s+g.items.reduce((a,i)=>a+money(i.actual),0),0);return{income,savings,planned,actual,remaining:income-savings-planned,available:income-savings-actual,rate:income?Math.round(savings/income*100):0}}
function allItems(m){const out=[];(m?.groups||[]).forEach(g=>g.items.forEach(i=>out.push({g,item:i})));return out}
function findItem(m,gid,iid){const g=(m?.groups||[]).find(x=>x.id===gid);const i=g?(g.items||[]).find(x=>x.id===iid):null;return{g,i}}
function billItems(m){return allItems(m).filter(x=>x.item.recurring)}
function todayLocal(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function clampDay(y,mo,day){return Math.min(Math.max(1,parseInt(day)||1),new Date(y,mo+1,0).getDate())}
function itemPaid(i){return money(i.planned)>0&&money(i.actual)>=money(i.planned)-.01}
function billStatus(i,monthKey){if(itemPaid(i))return{cls:"good",label:"Paid"};const a=(monthKey||mk).split("-").map(Number),due=i.dueDay?new Date(a[0],a[1]-1,clampDay(a[0],a[1]-1,i.dueDay)):null;if(!due)return{cls:"warn",label:"Set due date"};const diff=Math.ceil((due-todayLocal())/86400000);if(diff<0)return{cls:"bad",label:"Overdue"};if(diff===0)return{cls:"warn",label:"Due today"};if(diff<=7)return{cls:"warn",label:"Due in "+diff+"d"};return{cls:"",label:"Due "+due.toLocaleDateString("en-US",{month:"short",day:"numeric"})}}
function billOccurrencesBetween(from,to){const out=[];let y=from.getFullYear(),mo=from.getMonth(),guard=0;while(guard++<24&&(y<to.getFullYear()||(y===to.getFullYear()&&mo<=to.getMonth()))){const k=y+"-"+String(mo+1).padStart(2,"0");const real=!!S.months[k];const src=S.months[k]||(latestBefore(k)?cloneForward(latestBefore(k)):null);billItems(src).forEach(x=>{if(!x.item.dueDay)return;const d=new Date(y,mo,clampDay(y,mo,x.item.dueDay));if(d>=from&&d<=to)out.push({date:d,item:x.item,amount:money(x.item.planned),monthKey:k,paid:real&&itemPaid(x.item)})});mo++;if(mo>11){mo=0;y++}}return out.sort((a,b)=>a.date-b.date)}
const PERIOD={weekly:7,biweekly:14,semimonthly:15,monthly:30};
function nextPaydayInfo(){const s=S.settings;if(!s.nextPayday)return null;let next=new Date(s.nextPayday+"T00:00:00"),today=todayLocal();const step=s.payFrequency==="custom"?Math.max(1,parseInt(s.customDays)||14):(PERIOD[s.payFrequency]||14);while(next<today)next=new Date(next.getTime()+step*86400000);const prev=new Date(next.getTime()-step*86400000);return{today,next,prev,daysUntil:Math.max(1,Math.ceil((next-today)/86400000)),step}}
function flexibleSpentBetween(from,to){const fromIso=from.toISOString().slice(0,10),toIso=to.toISOString().slice(0,10);let total=0;Object.values(S.months).forEach(m=>(m.groups||[]).forEach(g=>g.items.forEach(i=>{if(i.recurring)return;(i.txns||[]).forEach(t=>{if((t.date||"")>=fromIso&&(t.date||"")<=toIso)total+=money(t.amount)})})));return total}
function safeUntilPayday(){const pi=nextPaydayInfo();if(!pi)return null;const s=S.settings;const pay=money(s.payAmount)||((money(s.monthlyIncome)||totals(M()).income)/(30/pi.step));const bills=billOccurrencesBetween(pi.prev,pi.next);const billsTotal=bills.reduce((a,b)=>a+money(b.amount),0);const savings=money(s.savingsGoal)*(pi.step/30);const spent=flexibleSpentBetween(pi.prev,pi.today);const left=pay-billsTotal-savings-spent;return{pay,billsTotal,savings,spent,left,perDay:Math.max(0,left)/pi.daysUntil,daysUntil:pi.daysUntil,bills}}
function debtPayoff(){const debts=S.debts.map(d=>({...d,balance:money(d.balance),apr:money(d.apr),minPayment:money(d.minPayment)})).filter(d=>d.balance>0);const plan=S.debtPlan||{strategy:"avalanche",extra:0};let month=0,interest=0,order=[];while(debts.some(d=>d.balance>.01)&&month<600){month++;debts.forEach(d=>{const int=d.balance*(d.apr/100/12);d.balance+=int;interest+=int});let pool=money(plan.extra);debts.forEach(d=>{if(d.balance<=0)return;const p=Math.min(d.balance,d.minPayment);d.balance-=p;pool+=Math.max(0,d.minPayment-p)});debts.sort(plan.strategy==="snowball"?(a,b)=>a.balance-b.balance:(a,b)=>b.apr-a.apr);for(const d of debts){if(pool<=0)break;if(d.balance<=0)continue;const p=Math.min(d.balance,pool);d.balance-=p;pool-=p;if(d.balance<=.01&&!order.includes(d.name))order.push(d.name)}}return{months:month,interest,order}}
function toast(msg,type,undo){document.querySelectorAll(".toast").forEach(x=>x.remove());const el=document.createElement("div");el.className="toast";if(type==="bad")el.style.borderColor="var(--red)";if(type==="warn")el.style.borderColor="var(--orange)";el.innerHTML=esc(msg)+(undo?' <button id="undoToast" class="btn ghost" style="padding:3px 6px;margin-left:8px;color:var(--teal)">Undo</button>':"");document.body.appendChild(el);if(undo)document.getElementById("undoToast").onclick=()=>{el.remove();undo()};setTimeout(()=>el.remove(),undo?6500:3200)}
function field(id,label,value,type="text",placeholder=""){return'<label class="field"><span>'+label+'</span><input id="'+id+'" type="'+type+'" value="'+esc(value||"")+'" placeholder="'+esc(placeholder)+'"></label>'}
function sheet(title,body){document.getElementById("modal").innerHTML='<div class="sheetBg" data-close="1"><div class="sheet"><h2>'+title+'</h2>'+body+'<button id="closeSheet" class="btn ghost" style="margin-top:12px">Close</button></div></div>';document.getElementById("closeSheet").onclick=closeModal;document.querySelector(".sheetBg").onclick=e=>{if(e.target.dataset.close)closeModal()}}
function closeModal(){document.getElementById("modal").innerHTML=""}
function nav(){const n=[['dashboard','Home'],['budget','Plan'],['track','Spend'],['bills','Bills'],['more','More']];return'<nav class="nav"><div class="navin">'+n.map(x=>'<button data-tab="'+x[0]+'" class="'+(tab===x[0]?'on':'')+'">'+x[1]+'</button>').join("")+'</div></nav>'}
function backupReminder(){const t=totals(M());const hasData=Object.keys(S.months).length>0&&(t.income||t.planned||t.actual||S.debts.length);const age=S.lastBackup?Math.floor((Date.now()-S.lastBackup)/86400000):999;if(!hasData||age<=7)return"";return'<section class="card span12" style="border-color:rgba(245,155,69,.35)"><div class="row"><div><b>Backup reminder</b><div class="small muted">Your data is only on this device. Copy a private backup before you forget.</div></div><button id="dashBackup" class="btn">Back up</button></div></section>'}
function render(){const app=document.getElementById("app");if(!S.settings.onboardingCompleted&&!Object.keys(S.months).length){app.innerHTML=renderWelcome()+nav();bind();return}app.innerHTML='<main class="wrap">'+(storageBroken?'<div class="dangerNote" style="margin-bottom:12px">'+esc(storageWarning)+'</div>':'')+monthBar()+({dashboard:renderDashboard,budget:renderBudget,track:renderTrack,bills:renderBills,more:renderMore,debt:renderDebt,settings:openSettings}[tab]||renderDashboard)()+'</main>'+nav();bind()}
function monthBar(){return'<div class="row" style="border:0;margin-bottom:10px"><button class="btn ghost" data-mnav="-1">Prev</button><button class="btn" id="pickMonth">'+monthName(mk)+'</button><button class="btn ghost" data-mnav="1">Next</button></div>'}
function renderWelcome(){return'<main class="wrap"><div class="card" style="max-width:680px;margin:40px auto"><div class="label">Private budget</div><h1 style="font-size:34px;margin-bottom:8px">Give every dollar a job.</h1><p class="muted" style="line-height:1.6;margin-bottom:18px">Allotted stores your budget only on this device. Start with a guided setup or a blank month.</p><div class="stack"><button id="startGuided" class="btn primary">Guided setup</button><button id="startBlank" class="btn">Start blank month</button><button id="restoreWelcome" class="btn ghost">Restore backup</button></div></div></main>'}
function renderDashboard(){const m=ensureMonth(),t=totals(m),safe=S.settings.paycheckMode?safeUntilPayday():null,spentPct=t.planned?Math.min(100,Math.round(t.actual/t.planned*100)):0;return'<div class="grid">'+backupReminder()+'<section class="card span8"><div class="label">Safe to spend</div><div class="metric">'+fmt(safe?safe.left:t.available)+'</div><p class="muted" style="margin-top:8px">'+(safe?fmt(safe.perDay)+' per day until payday after bills and savings.':'Income minus savings and actual spending for this month.')+'</p><div class="progress"><div style="width:'+spentPct+'%"></div></div></section><section class="card span4"><div class="label">Remaining to assign</div><div class="metric sm" style="color:'+(t.remaining<0?'var(--red)':'var(--teal)')+'">'+fmt(t.remaining)+'</div><p class="small muted">Income minus savings and planned spending.</p></section><section class="card span4"><div class="label">Income</div><div class="metric sm">'+fmt(t.income)+'</div></section><section class="card span4"><div class="label">Planned</div><div class="metric sm">'+fmt(t.planned)+'</div></section><section class="card span4"><div class="label">Spent</div><div class="metric sm">'+fmt(t.actual)+'</div></section><section class="card span6"><div class="row"><div><b>Quick actions</b><div class="small muted">Log spending or check bills.</div></div></div><div class="stack" style="margin-top:12px"><button id="quickLog" class="btn primary">Log spending</button><button id="quickBills" class="btn">View bills</button></div></section><section class="card span6"><div class="label">Upcoming bills</div>'+renderUpcomingBills()+'</section></div>'}
function renderUpcomingBills(){const occ=billOccurrencesBetween(todayLocal(),new Date(todayLocal().getTime()+14*86400000)).filter(o=>!o.paid).slice(0,5);if(!occ.length)return'<div class="empty">No unpaid bills due in the next 14 days.</div>';return occ.map(o=>'<div class="row"><div><b>'+esc(o.item.name)+'</b><div class="small muted">'+o.date.toLocaleDateString("en-US",{month:"short",day:"numeric"})+'</div></div><div class="money">'+fmt(o.amount)+'</div></div>').join("")}
function renderBudget(){const m=ensureMonth(),t=totals(m);return'<div class="grid"><section class="card span12"><div class="row"><div><div class="label">Plan</div><div class="metric sm">'+fmt(t.remaining)+' remaining</div></div><button id="addGroup" class="btn">Add group</button></div></section>'+m.groups.map(g=>'<section class="card span4"><div class="row"><div><b>'+esc(g.name)+'</b><div class="small muted">'+fmt(g.items.reduce((s,i)=>s+money(i.planned),0))+' planned</div></div><button class="btn ghost" data-additem="'+g.id+'">Add</button></div>'+(g.items.length?g.items.map(i=>'<div class="row click" data-edititem="'+g.id+':'+i.id+'"><div><div class="lineName">'+esc(i.name)+'</div><div class="small muted">'+(i.recurring?'Bill':'Spending')+(i.dueDay?' - due '+i.dueDay:'')+'</div></div><div><div class="money">'+(i.planned?fmt(i.planned):'<span style="color:var(--orange)">Set amount</span>')+'</div><div class="small muted">spent '+fmt(i.actual)+'</div></div></div>').join(""):'<div class="empty">No lines yet.</div>')+'</section>').join("")+'</div>'}
function renderTrack(){const m=ensureMonth();let tx=[];allItems(m).forEach(x=>(x.item.txns||[]).forEach(t=>tx.push({...t,cat:x.g.name,line:x.item.name,gid:x.g.id,iid:x.item.id})));tx.sort((a,b)=>(b.date||"").localeCompare(a.date||""));return'<div class="grid"><section class="card span12"><div class="row"><div><div class="label">Spend</div><div class="metric sm">'+fmt(totals(m).actual)+'</div><p class="small muted">Tap a transaction to edit or delete it.</p></div><button id="addTxn" class="btn primary">Log spending</button></div></section><section class="card span12">'+(tx.length?tx.map(t=>'<div class="row click" data-edittxn="'+t.gid+':'+t.iid+':'+t.id+'"><div><b>'+esc(t.line)+'</b><div class="small muted">'+esc(t.cat)+' - '+esc(t.date||"")+' '+esc(t.note||"")+'</div></div><div><div class="money">'+fmtC(t.amount)+'</div><div class="small muted">Edit</div></div></div>').join(""):'<div class="empty">No spending logged yet.</div>')+'</section></div>'}
function renderBills(){const m=ensureMonth(),b=billItems(m);return'<div class="grid"><section class="card span12"><div class="row"><div><div class="label">Bills</div><p class="muted">Bills are recurring plan lines. Paying one logs a transaction.</p></div><button id="addBill" class="btn primary">Add bill</button></div></section><section class="card span12">'+(b.length?b.map(x=>{const st=billStatus(x.item,mk);return'<div class="row"><div><b>'+esc(x.item.name)+'</b><div><span class="pill '+st.cls+'">'+st.label+'</span></div></div><div style="text-align:right"><div class="money">'+fmt(x.item.planned)+'</div><button class="btn ghost" data-paybill="'+x.g.id+':'+x.item.id+'">'+(itemPaid(x.item)?'Undo':'Pay')+'</button></div></div>'}).join(""):'<div class="empty">No bills yet.</div>')+'</section></div>'}
function renderMore(){return'<div class="grid"><section class="card span12"><div class="stack"><button id="goDebt" class="btn">Debt payoff</button><button id="goSettings" class="btn">Settings and backup</button><button id="goPrivacy" class="btn">Privacy</button></div></section></div>'}
function renderDebt(){const r=debtPayoff();return'<div class="grid"><section class="card span12"><div class="row"><div><div class="label">Debt payoff</div><div class="metric sm">'+(r.months?Math.ceil(r.months/12)+' yr '+(r.months%12)+' mo':'No debt')+'</div><p class="small muted">Estimated interest: '+fmtC(r.interest)+'</p></div><button id="addDebt" class="btn primary">Add debt</button></div><div class="split"><button data-strat="avalanche" class="btn '+(S.debtPlan.strategy==='avalanche'?'primary':'')+'">Avalanche</button><button data-strat="snowball" class="btn '+(S.debtPlan.strategy==='snowball'?'primary':'')+'">Snowball</button></div><button id="extraDebt" class="btn" style="margin-top:10px">Extra payment: '+fmt(S.debtPlan.extra)+'</button></section><section class="card span12">'+(S.debts.length?S.debts.map(d=>'<div class="row click" data-editdebt="'+d.id+'"><div><b>'+esc(d.name)+'</b><div class="small muted">APR '+money(d.apr)+'% - min '+fmt(d.minPayment)+'</div></div><div class="money">'+fmt(d.balance)+'</div></div>').join(""):'<div class="empty">Add debts to compare payoff plans.</div>')+'</section></div>'}
function openSettings(){const age=S.lastBackup?Math.floor((Date.now()-S.lastBackup)/86400000):null;sheet("Settings and backup",'<div class="stack"><button id="themeToggle" class="btn">Theme: '+(S.theme==='light'?'Light':'Dark')+'</button><button id="paySettings" class="btn">Income and paycheck</button><div class="dangerNote">Data is stored only on this device. Create private backups often.</div><button id="copyBackup" class="btn primary">Copy private backup</button><button id="downloadBackup" class="btn">Download backup file</button><button id="restoreText" class="btn">Restore from pasted text</button><button id="restoreFile" class="btn">Restore from file</button><div class="small muted">Last backup: '+(age===null?'never':age===0?'today':age+' days ago')+'</div><button id="clearTxns" class="btn warn">Clear '+monthShort(mk)+' transactions</button><button id="clearMonth" class="btn warn">Clear '+monthShort(mk)+' plan</button><button id="startOverAll" class="btn warn">Start over completely</button></div>');bindSettings()}
function openPrivacy(){sheet("Your privacy",'<p class="muted" style="line-height:1.7">Allotted has no accounts, no bank connection, no analytics, no ads, and no network calls during normal use. Your budget, bills, debts, and transactions stay on this device. You control your own backups.</p>')}
function bindSettings(){document.getElementById("themeToggle").onclick=()=>{S.theme=S.theme==='light'?'dark':'light';setTheme();commit();openSettings()};document.getElementById("paySettings").onclick=openPaySettings;document.getElementById("copyBackup").onclick=copyBackup;document.getElementById("downloadBackup").onclick=downloadBackup;document.getElementById("restoreText").onclick=openPasteRestore;document.getElementById("restoreFile").onclick=()=>document.getElementById("fileInput").click();document.getElementById("clearTxns").onclick=()=>{if(!confirm("Clear all transactions for "+monthName(mk)+"? Your planned amounts stay."))return;const snap=JSON.stringify(M());M().groups.forEach(g=>g.items.forEach(i=>{i.txns=[];i.actual=0}));closeModal();commit();toast("Transactions cleared","warn",()=>{S.months[mk]=JSON.parse(snap);commit()})};document.getElementById("clearMonth").onclick=()=>{if(!confirm("Clear the entire "+monthName(mk)+" plan?"))return;const snap=S.months[mk];delete S.months[mk];closeModal();commit();toast("Month cleared","warn",()=>{S.months[mk]=snap;commit()})};document.getElementById("startOverAll").onclick=()=>{if(!confirm("Erase everything in Allotted on this device? Make a backup first if needed."))return;S=defaultState();closeModal();commit()}}
function openPaySettings(){const s=S.settings;sheet("Income and paycheck",'<label class="row" style="border:0"><span><b>Paycheck mode</b><div class="small muted">Use payday safe-to-spend math.</div></span><input id="pmode" type="checkbox" style="width:auto" '+(s.paycheckMode?'checked':'')+'></label>'+field('mincome','Monthly take-home income',s.monthlyIncome,'number')+field('sgoal','Monthly savings goal',s.savingsGoal,'number')+'<label class="field"><span>Pay frequency</span><select id="pfreq"><option value="weekly">Weekly</option><option value="biweekly">Every 2 weeks</option><option value="semimonthly">Twice a month</option><option value="monthly">Monthly</option><option value="custom">Custom days</option></select></label>'+field('customDays','Custom days between paychecks',s.customDays,'number')+field('nextPay','Next payday',s.nextPayday,'date')+field('payAmt','Pay amount',s.payAmount,'number')+'<button id="savePay" class="btn primary">Save</button>');document.getElementById("pfreq").value=s.payFrequency;document.getElementById("savePay").onclick=()=>{s.paycheckMode=document.getElementById("pmode").checked;s.monthlyIncome=money(document.getElementById("mincome").value);s.savingsGoal=money(document.getElementById("sgoal").value);s.payFrequency=document.getElementById("pfreq").value;s.customDays=Math.max(1,parseInt(document.getElementById("customDays").value)||14);s.nextPayday=document.getElementById("nextPay").value;s.payAmount=money(document.getElementById("payAmt").value);closeModal();commit();toast("Paycheck settings saved","good")}}
function backupPayload(){return JSON.stringify({...S,exportedAt:new Date().toISOString()},null,2)}
async function copyBackup(){const txt=backupPayload();try{await navigator.clipboard.writeText(txt);S.lastBackup=Date.now();save();toast("Private backup copied","good")}catch(e){sheet("Copy backup",'<textarea id="copyArea" readonly style="height:190px">'+esc(txt)+'</textarea><button id="selectBackup" class="btn primary" style="margin-top:10px">Select all</button>');document.getElementById("selectBackup").onclick=()=>{const a=document.getElementById("copyArea");a.focus();a.select();S.lastBackup=Date.now();save()}}}
function downloadBackup(){try{const blob=new Blob([backupPayload()],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="allotted-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(a.href);S.lastBackup=Date.now();save();toast("Backup file created","good")}catch(e){toast("Download blocked. Use copy backup.","bad")}}
function applyBackup(text,skipConfirm){try{const d=JSON.parse(text.trim());if(!d.months||typeof d.months!=="object")throw 0;if(!skipConfirm&&!confirm("Restore this backup and replace everything currently in Allotted?"))return false;S=defaultState();adoptState(d);migrate();closeModal();commit();toast("Backup restored","good");return true}catch(e){toast("That is not a valid Allotted backup","bad");return false}}
function openPasteRestore(){sheet("Restore backup",'<p class="muted" style="line-height:1.6;margin-bottom:10px">Paste backup text below. Restore replaces everything currently in the app.</p><textarea id="restoreArea" style="height:170px" placeholder="Paste backup text"></textarea><button id="restoreGo" class="btn primary" style="margin-top:10px">Restore</button>');document.getElementById("restoreGo").onclick=()=>applyBackup(document.getElementById("restoreArea").value)}
function startOnboarding(){sheet("Quick setup",field('obIncome','Monthly take-home income','','number')+field('obSavings','Monthly savings goal','','number')+field('obBills','Monthly bills total','','number')+field('obCats','Spending categories','Groceries, Restaurants, Gas, Fun','text')+field('obPayday','Next payday','','date')+field('obPay','Pay amount','','number')+'<button id="finishOb" class="btn primary">Build my first plan</button>');document.getElementById("finishOb").onclick=()=>{const income=money(document.getElementById("obIncome").value),saveGoal=money(document.getElementById("obSavings").value),bills=money(document.getElementById("obBills").value),cats=document.getElementById("obCats").value.split(",").map(x=>x.trim()).filter(Boolean);const m=blankMonth();m.income[0].amount=income;m.savings[0].amount=saveGoal;const billGroup={id:id(),name:"Bills",items:[item("Monthly bills",bills,true,1)]};const left=Math.max(0,income-saveGoal-bills),each=cats.length?Math.floor(left/cats.length):0;const spendGroup={id:id(),name:"Spending",items:cats.map((c,idx)=>item(c,idx===cats.length-1?left-each*(cats.length-1):each,false))};m.groups=[billGroup,spendGroup];S.months[mk]=m;S.settings.monthlyIncome=income;S.settings.savingsGoal=saveGoal;S.settings.nextPayday=document.getElementById("obPayday").value;S.settings.payAmount=money(document.getElementById("obPay").value);S.settings.paycheckMode=!!(S.settings.nextPayday||S.settings.payAmount);S.settings.onboardingCompleted=true;closeModal();commit()}}
function openLine(gid,iid,makeBill){const m=ensureMonth(),g=m.groups.find(x=>x.id===gid)||(m.groups[0]),i=iid?g.items.find(x=>x.id===iid):null;sheet(i?'Edit line':'Add line',field('lnName','Name',i?.name||'')+field('lnPlanned','Planned amount',i?.planned||'','number')+field('lnDue','Due day for bills',i?.dueDay||'','number')+'<label class="row" style="border:0"><span>Recurring bill</span><input id="lnRec" type="checkbox" style="width:auto" '+((i?.recurring||makeBill)?'checked':'')+'></label><button id="saveLine" class="btn primary">Save</button>'+(i?'<button id="deleteLine" class="btn warn" style="margin-top:8px">Delete</button>':''));document.getElementById("saveLine").onclick=()=>{const obj=i||item("",0,false);obj.name=document.getElementById("lnName").value.trim()||"Line";obj.planned=money(document.getElementById("lnPlanned").value);obj.recurring=document.getElementById("lnRec").checked;obj.dueDay=document.getElementById("lnDue").value?Math.min(31,Math.max(1,parseInt(document.getElementById("lnDue").value)||1)):null;if(!i)g.items.push(obj);closeModal();commit()};const del=document.getElementById("deleteLine");if(del)del.onclick=()=>{if(!confirm("Delete this line and its transactions?"))return;g.items=g.items.filter(x=>x.id!==iid);closeModal();commit()}}
function openTxn(ref){const m=ensureMonth(),choices=allItems(m);if(!choices.length){toast("Add a plan line first","warn");return}let gid="",iid="",tid="",tx=null,source=null;if(ref){[gid,iid,tid]=ref.split(":");source=findItem(m,gid,iid);tx=source.i?(source.i.txns||[]).find(x=>x.id===tid):null}const selected=tx?gid+":"+iid:(S.lastLog?S.lastLog.gid+":"+S.lastLog.iid:"");sheet(tx?"Edit transaction":"Log spending",'<label class="field"><span>Line</span><select id="txLine">'+choices.map(x=>'<option value="'+x.g.id+':'+x.item.id+'" '+((x.g.id+':'+x.item.id)===selected?'selected':'')+'>'+esc(x.g.name)+' - '+esc(x.item.name)+'</option>').join("")+'</select></label>'+field('txAmt','Amount',tx?.amount||'','number')+field('txDate','Date',tx?.date||new Date().toISOString().slice(0,10),'date')+field('txNote','Note',tx?.note||'','text')+'<button id="saveTxn" class="btn primary">'+(tx?'Save changes':'Save spending')+'</button>'+(tx?'<button id="deleteTxn" class="btn warn" style="margin-top:8px">Delete transaction</button>':''));document.getElementById("saveTxn").onclick=()=>{const [ngid,niid]=document.getElementById("txLine").value.split(":");const next=findItem(m,ngid,niid);if(!next.i){toast("Choose a valid line","bad");return}const obj=tx||{id:id()};obj.amount=money(document.getElementById("txAmt").value);obj.date=document.getElementById("txDate").value||new Date().toISOString().slice(0,10);obj.note=document.getElementById("txNote").value||"";if(tx&&source.i){source.i.txns=source.i.txns.filter(x=>x.id!==tid);recalcItem(source.i)}next.i.txns=next.i.txns||[];next.i.txns.push(obj);recalcItem(next.i);S.lastLog={gid:ngid,iid:niid};closeModal();commit();toast(tx?"Transaction updated":"Spending logged","good")};const del=document.getElementById("deleteTxn");if(del)del.onclick=()=>{if(!confirm("Delete this transaction?"))return;const snap=tx?JSON.stringify(tx):null;if(source.i){source.i.txns=source.i.txns.filter(x=>x.id!==tid);recalcItem(source.i)}closeModal();commit();toast("Transaction deleted","warn",()=>{if(source.i&&snap){source.i.txns.push(JSON.parse(snap));recalcItem(source.i);commit()}})}}
function payBill(gid,iid){const m=ensureMonth(),found=findItem(m,gid,iid),i=found.i;if(!i)return;if(itemPaid(i)){i.txns=[];i.actual=0}else{i.txns=[{id:id(),date:new Date().toISOString().slice(0,10),amount:money(i.planned),note:"Bill paid"}];recalcItem(i)}commit()}
function openDebt(idv){const d=idv?S.debts.find(x=>x.id===idv):null;sheet(d?'Edit debt':'Add debt',field('dn','Name',d?.name||'')+field('db','Balance',d?.balance||'','number')+field('dm','Minimum payment',d?.minPayment||'','number')+field('da','APR',d?.apr||'','number')+field('dd','Due day',d?.dueDay||'','number')+'<button id="saveDebt" class="btn primary">Save</button>'+(d?'<button id="deleteDebt" class="btn warn" style="margin-top:8px">Delete</button>':''));document.getElementById("saveDebt").onclick=()=>{const obj=d||{id:id()};obj.name=document.getElementById("dn").value.trim()||"Debt";obj.balance=money(document.getElementById("db").value);obj.minPayment=money(document.getElementById("dm").value);obj.apr=money(document.getElementById("da").value);obj.dueDay=document.getElementById("dd").value?Math.min(31,Math.max(1,parseInt(document.getElementById("dd").value)||1)):null;if(!d)S.debts.push(obj);closeModal();commit()};const del=document.getElementById("deleteDebt");if(del)del.onclick=()=>{if(confirm("Delete this debt?")){S.debts=S.debts.filter(x=>x.id!==idv);closeModal();commit()}}}
function bind(){document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});document.querySelectorAll("[data-mnav]").forEach(b=>b.onclick=()=>selectMonth(shiftMonth(mk,parseInt(b.dataset.mnav)),parseInt(b.dataset.mnav)>0));const pm=document.getElementById("pickMonth");if(pm)pm.onclick=()=>{const v=prompt("Go to month YYYY-MM",mk);if(/^\d{4}-\d{2}$/.test(v||""))selectMonth(v,true)};const sg=document.getElementById("startGuided");if(sg)sg.onclick=startOnboarding;const sb=document.getElementById("startBlank");if(sb)sb.onclick=()=>{S.months[mk]=blankMonth();S.settings.onboardingCompleted=true;commit()};const rw=document.getElementById("restoreWelcome");if(rw)rw.onclick=openPasteRestore;const ql=document.getElementById("quickLog");if(ql)ql.onclick=()=>openTxn();const qb=document.getElementById("quickBills");if(qb)qb.onclick=()=>{tab="bills";render()};const dbk=document.getElementById("dashBackup");if(dbk)dbk.onclick=copyBackup;const ag=document.getElementById("addGroup");if(ag)ag.onclick=()=>{const n=prompt("Group name");if(n){ensureMonth().groups.push({id:id(),name:n,items:[]});commit()}};document.querySelectorAll("[data-additem]").forEach(b=>b.onclick=()=>openLine(b.dataset.additem));document.querySelectorAll("[data-edititem]").forEach(b=>{b.onclick=()=>{const p=b.dataset.edititem.split(":");openLine(p[0],p[1])}});const at=document.getElementById("addTxn");if(at)at.onclick=()=>openTxn();document.querySelectorAll("[data-edittxn]").forEach(b=>b.onclick=()=>openTxn(b.dataset.edittxn));const ab=document.getElementById("addBill");if(ab)ab.onclick=()=>{const g=ensureMonth().groups.find(x=>/bill/i.test(x.name))||ensureMonth().groups[0];openLine(g.id,null,true)};document.querySelectorAll("[data-paybill]").forEach(b=>b.onclick=()=>{const p=b.dataset.paybill.split(":");payBill(p[0],p[1])});const gd=document.getElementById("goDebt");if(gd)gd.onclick=()=>{tab="debt";render()};const gs=document.getElementById("goSettings");if(gs)gs.onclick=openSettings;const gp=document.getElementById("goPrivacy");if(gp)gp.onclick=openPrivacy;const ad=document.getElementById("addDebt");if(ad)ad.onclick=()=>openDebt();document.querySelectorAll("[data-editdebt]").forEach(b=>b.onclick=()=>openDebt(b.dataset.editdebt));document.querySelectorAll("[data-strat]").forEach(b=>b.onclick=()=>{S.debtPlan.strategy=b.dataset.strat;commit()});const ex=document.getElementById("extraDebt");if(ex)ex.onclick=()=>{const v=prompt("Extra payment per month",S.debtPlan.extra);if(v!==null){S.debtPlan.extra=money(v);commit()}}}
document.getElementById("settingsBtn").onclick=openSettings;
document.getElementById("fileInput").addEventListener("change",e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>applyBackup(String(r.result||""));r.readAsText(f);e.target.value=""});
document.addEventListener("keydown",e=>{if(document.getElementById("modal").innerHTML){if(e.key==="Escape")closeModal();return}if(["INPUT","TEXTAREA","SELECT"].includes((e.target.tagName||"").toUpperCase()))return;if(e.key==="ArrowLeft")selectMonth(shiftMonth(mk,-1),false);if(e.key==="ArrowRight")selectMonth(shiftMonth(mk,1),true)});
load();if(!storageBroken)save();render();if(storageBroken)setTimeout(()=>toast(storageWarning,"bad"),700);
</script>
</body>
